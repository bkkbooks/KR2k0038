記性之謂舊作斡帶今改等至和囉噶蒙古語墻圈也舊作活羅海今改川召諸官僚告諭之率賔水居沃赫滿洲語石也舊作斡豁今改貝勒不至烏塔滿洲語奶糕也舊作塢塔今改伐沃赫克之金史太宗天會二年二月命徙扎蘭路都貝勒完顔忠於率賔水哈斯罕路金史哈斯罕解見前卷路置節度使天會七年徙治寧州嘗置都統司明昌四年廢有化成關通考遼遷女真大姓於遼陽之南而著籍焉使不得與本國往來謂之哈斯罕按金史哈斯罕在遼陽府之長宜鎮及蓋州等處又河西亦有之蓋又别經逺徙者耳金史呼實默滿洲語包褁也舊作胡十門今改以哈斯罕歸太祖自言始祖兄阿庫納滿洲語普遍也舊作阿古乃今改後金史天輔三年五月詔咸州路都統司曰兵興以前哈斯罕輝發舊作回怕里又作回霸今改正詳下咸平府條內與係遼籍不係遼籍女真户民有流竄邊境或亡入於遼者當行理索可明諭諸路千戶穆昆遍與詢訪其官稱名氏地里具録以上金史天會二年命南路軍帥以甲士千人益哈斯罕路以備髙麗金史天會七年十一月徙哈斯罕都統司治寧州元史至元二十六年分京師應役新附軍一千人屯田哈斯罕關東荒地呼爾哈路金史呼爾哈路國初置萬户海陵例罷萬户乃改置節度使承安三年置節度副使西至上京六百三十里北至邊界哈喇巴圖蒙古語哈喇黑色也巴圖結實也舊作合里賔忒今改千户一千五百里按呼爾哈路為渤海上京詳見前渤海條金史天會六年徙昏德公重昏侯於韓州八年徙呼爾哈路烏爾古德哷勒統軍司金史烏爾古德哷勒統軍司後升為招討司與夫餘路近按烏爾古德哷勒為遼國外十部之二烏爾古一部德哷勒八部不能成國附庸於遼時叛時服各有職貢猶羈縻州也見於遼營衛志部族表史言與夫餘路近當俱在吉林之北咸平路咸平府金史咸平路府一領刺郡一縣十金史咸平府總管府安東軍節度使本髙麗銅山縣地遼為咸州國初為咸州路置都統司天德二年八月升為府後為總管府置遼東路轉運司東京咸平路提刑司户五萬六千四百四縣八平郭縣倚舊名咸平大定七年更銅山縣遼同州本漢襄平縣遼太祖時以東平寨置南有柴河北有清河西有遼河按柴河在今鐵嶺縣城北二里清河在今開原縣城南二里俱西入遼河則銅山一縣正在開原之南鐵嶺之北也新興縣遼銀州本渤海富州另條見前熙宗皇統三年廢州更名來屬南刻本脫南字今據通志增有范河北有柴河西有遼河按范河在今鐵嶺縣城南三十里清河在開原縣城南二里則新興固北與銅山接界在鐵嶺地為多又鐵嶺縣東有故新興城則遼時所置金仍其名而稍移其地詳見前靺鞨及渤海富州條內慶雲縣遼祺州本以所俘密雲民建州名密雲後更名有遼河按今有慶雲堡在開原縣城西亮子河由此入開原境清安縣遼肅州熙宗皇統三年降為縣按清安本遼肅州縣名見前遼東京條榮安縣東有遼河歸仁縣遼舊𨽻通州本渤海強師縣另條見前遼更名金因之北有細河玉山縣章宗承安三年以穆蘇集平郭林河之間相去六百餘里之地置貞祐二年四月升為節度軍曰鎮安金史烏楞古舊作斡魯古解見前敗遼軍於咸州西斬遼統軍於陳完顔羅索克咸州通考契丹時自咸州東北分界入山谷至粟末江中間所居之女真𨽻咸州兵馬司與其國往來無禁謂之輝發舊作回霸今改正按扈國初輝發國於輝發河邊爾竒山築城以居因號輝發國其名當本於此金王寂遼東行部志慶雲縣本遼祺州歸仁縣遼安州栁河縣舊韓州也先徙州於奚營後改為縣以地近栁河故名之乙亥次韓州州故城在遼水側常苦風沙移於白塔寨又為遼水所侵移於今栁河縣又以地非衝途徙於舊九百奚營即今所治是也丁巳次哈達舊作胡底今改正千户寨哈達漢言山也按哈達滿洲語峯也此解近是而實誤以寨居山下故名戊午次達巴罕舊作南謀懶今改正千户寨達巴罕漢言嶺也以其近分水嶺故名己未次桑阿舊作松瓦今改正千户寨桑阿者城也按滿洲語桑阿扎也此解為城誤寨近髙麗舊城故名辛酉次布拉克舊作關羅今改正寨布拉克漢語暖泉也按蒙古語布拉克泉也此解近似以山間流水一股經冬不冰故名壬戌次奎千户寨奎漢言清河也按蒙古語奎村莊也與清河無涉此解誤宿雅嗒喇庫舊作耶塔剌虎今改正寨漢言火鐮火石按滿洲語雅塔喇庫火鐮也此解近似癸亥次和勒敦舊作和魯奪徒今改正千户寨和勒敦漢言松山也按滿洲語和勒敦果松也此解近似宿茂摩囉舊作蒙古魯今改正寨漢語木盂子也按滿洲語茂摩囉木碗也庚子次博囉和屯舊作鼻里合土今改正千户寨博囉和屯漢言范河也按博囉蒙古語青也和屯滿洲語城也此解殊誤辛丑次咸平府宿府治之安忠堂遼為咸州本朝初置咸州詳衮司後升咸平府己酉宿清安縣治之生明堂世傳遼時為肅州本朝為縣甲寅宿銅山縣遼之同州也本朝為東平縣焉松漠紀聞自信州之北西行三百七十里至咸州南鋪四十里至同州南鋪四十里至銀州南鋪五十里至興州四十里至蒲河四十里至瀋州按自咸州至瀋州二百十里咸州應在今開原站威逺堡之間以今道里計之奉天府四十里至蒲河三十里至懿路站六十里至鐵嶺縣六十里至開原縣即遼同興等州所轄之地又十五里至開原站十五里至威逺堡門許亢宗奉銀州使行程録瀋州七十里至興州興州五十里至銀州四十里至咸州咸州北行九十里至同州同州四十里至信州與洪皓所記異蓋地本犬牙相錯而取道之南北亦時有不同也元一統志咸平府秦築障塞以限要荒漢唐嘗置都督府負山阻河控制東土元一統志遼河從咸平府界流經瀋陽西北達廣寧路境按遼河出吉林西北窩集為赫爾蘇河合諸水北流自赫爾蘇邊門至科爾沁界又西北繞鄧子村又西南折與潢河會遂西南流至開原明安貝勒屯東十里入邊以達於鐵嶺承德自威逺堡門東行九十里至葉赫站八十里至赫爾蘇站此咸平府東北之界也其北境出開原邊外與韓州為鄰韓州金𨽻咸平府元一統志清安縣故城在咸平府西北舊肅州金皇統三年改為縣後廢城址猶存歸仁縣故城在咸平府北舊安州見前遼東京條皇統三年改為縣後廢城址猶存元一統志銅山郡故城在咸平府南後廢按此即金之銅山縣韓州金史韓州刺史遼置東平軍本渤海鄚頡府另條見前户一萬五千四百一十二縣二臨津倚未詳何年置栁河本渤海粵喜縣另條見前遼以河為名枸河栁河按元一統志第言地近栁河河盛京通志有栁河而無枸河惟遼一名巨流一名句驪又名枸栁河相傳謂是枸河栁河合流之處今考栁河源出遼陽州城東北西北流入十里河十里河舊名稠栁河源出遼陽城北西北流至楊家灣合沙河入渾河渾河入遼河則枸河或即十里河但十里河與栁河合流之處去巨流河尚逺而遼河之大豈因二小水得名舊志未足為據句驪巨流枸栁音相同而字異實即遼河而金史誤分枸栁為二河耳考遼河自吉林西四百餘里庫勒納窩集發源西北流至科爾沁左翼東南四百五十里經額爾金山又西北流入左翼後旗界又西南流合潢河入開原邊韓州故城當與今科爾沁左翼東南四百七十里之阿里瑪圖城相近科爾沁隋唐屬粵喜靺鞨其地有遼河並無栁河也餘詳靺鞨及渤海鄚頡府條又土默特右翼有栁河東南流入大凌河地雖近於韓州然與遼河枸栁之稱又不相涉元一統志臨津縣廢城在咸平府遺址猶存栁河縣以近栁河故名今城址猶存金東京遼陽府金史東京路府一領節鎮一刺郡四縣十七鎮五皇統四年立東京新宫金史遼陽府東京留守司本渤海遼陽故城詳前渤海條遼名東京詳前遼東京條太宗天會十年改南京路平州軍帥司為東南路都統司之時嘗治於此以鎮髙麗後更置留守司縣四遼陽縣倚有東梁河國名烏勒呼滿洲語蘆葦也舊作兀魯忽今改必喇俗名太子河鶴野縣宜豐縣遼舊衍州詳前遼東京條皇統三年廢為縣有東梁河石城縣興定三年九月以縣之靈巖寺為巖州名其倚郭縣曰東安置行省鎮一長宜哈斯罕在其地元史遼陽路唐以前為髙麗及渤海所有梁貞明中契丹太祖以遼陽故城為東平郡後唐升為南京石晉改為東京按後唐石晉不應置京邑于遼陽史殊舛錯蓋並係遼事當五代為唐晉時耳金置遼陽府澄州金史澄州南海軍刺史本遼海州詳前渤海及遼東京條海州原文訛海軍今改正天德三年改州名縣二臨溟析木遼銅原本訛同據遼史改州附郭析木縣也皇統三年廢州來屬有沙河鎮一新昌瀋州金史瀋州昭德軍刺史本遼定理府詳前渤海及遼東京條地明昌四年與通貴德澄三州皆𨽻東京縣五樂郊有渾河章義遼舊廣州皇統三年來屬有遼河東梁河遼河大口遼濵遼舊遼州皇統三年廢為縣挹婁遼興州常安縣本挹婁故地另條見前大定二十九年更名有范河清河國名奎必喇舊作叩隈必剌解見前雙城遼雙州皇統三年降為縣章宗時廢貴德州金史貴德州刺史遼置詳前渤海及遼東京條縣二貴德倚有范河奉集遼集州奉集縣本渤海舊縣有渾河蓋州金史蓋州奉國軍節度本髙麗蓋葛牟城遼辰州詳前渤海及遼東京條明昌四年罷哈斯罕建辰州六年以與陳同音更名縣四湯池遼鐵州湯池縣建安遼縣秀巖本大寧鎮明昌四年升泰和四年廢貞祐四年復置按秀巖即今岫巖城熊嶽遼盧州熊嶽縣鎮二神鄉大寧即秀巖復州金史復州刺史遼懷逺軍節度明昌四年降為刺史縣二永康倚化成遼蘇州皇統三年降為縣來屬貞祐四年升為金州鎮一歸勝來逺州金史來逺州舊來逺城見前遼東京條本遼熟女真地大定二十二年升為軍後為州博索府金史博索滿洲語山隂也舊作婆娑今改府初置統軍司天德二年置總管府貞元元年與海蘭路總管並為尹兼本路兵馬都總管此路皆明安户元史元初以博索府廣寧府等作四路至元十七年以博索府屬遼陽行省後廢博索府為巡檢司元史東寧路本髙句驪平壤城髙麗王建以為西京元至元六年李延齡等以府州縣鎮六十城來歸八年改西京為東寧路割靜州義州麟州威逺鎮𨽻博索府按此為髙麗之平安道義州在鴨緑江入海之處平壤西北四百二十里唐賈耽道里紀登州東北海行入鴨緑江口舟行百餘里又小舫泝流三十里至泊汋口得渤海之境按此自登州海行之路渡遼水五百里至安東都護府府故襄平城也按襄平漢縣名在遼陽北七十里漢遼東郡治東南至平壤城八百里西南至建安城三百里故平郭縣也南至鴨緑江北泊汋城七百里故安平縣也按此為自營州陸行之路安平係西安平泊汋口泊汋城當即博索二字之轉音也唐貝觀二十二年薛萬徹伐髙麗圍泊汋城而還即此據賈耽所紀城在鴨緑江北西南去鴨緑江入海處僅百三十餘里元時所以割髙麗之義州來屬也漢志稱馬訾水由西安平入海馬訾即鴨緑江元一統志亦稱鴨緑江由博索府東南入海則博索之本於泊汋明矣元一統志大蟲江在遼陽路發源縣東南之龍鳳山分水嶺下東南流經廢博索府南流合於鴨緑江元一統志斜江在遼陽縣東按圖册源自長白山南流經廢博索府東十里流入於海元一統志鴨緑江源出長白山西南流經廢博索府東南入於海明一統志博索府在遼東都司東四百七十里金置總管府元省按自遼陽城守東南至鳳凰城守界一百九十里鳳凰城東南至義州江一百二十里為朝鮮界凡三百十里明志稱凰凰城在遼東都司東南三百五十里博索府應在鳯凰城東一百餘里謹案金祖肇興白山黑水疆域袤延即我朝創業之地金獻祖徙居與阿勒楚喀河源相近其地在寧古塔之西混同江之東太宗建為上京府曰會寧以金史所記里至及洪皓松漠紀聞徐夢莘北盟會編所載行程考之上京城去混同江二百六十里去拉林河一百五十里寧古塔西六百三十里吉林城東北二百餘里當在今色齊窩集左右今色齊窩集嶺上有故城遺址相傳為金時關門其明證也上京路所轄京之北曰肇州金太祖首破遼兵於此京之西曰濟州太祖乘馬涉混同江之所又西則信州在今科爾沁界夫餘路在肇州之北率賔路在上京之南海蘭路又在率賔東南呼爾哈則寧古塔之境哈斯罕在遼陽之南咸平府在開原鐵嶺間而會寧一府實居其中若朝鮮北境之會寧府則剽襲其名初不相涉東京之置雖承遼舊省併實多博索府路則金所創置尤與髙麗毗連以地與音考之即唐賈耽所紀之泊汋口泊汋城去鴨緑江海口不逺也史述契丹人言金人滿萬則不可敵金祖始以一成一旅仗義興師遼人望風奔潰又何待滿萬始不可敵哉良由山川靈異騎射精嫻上下協心人皆徑旅故能滅遼臣宋號令寰區億年之王氣所鍾前代之幅員可溯按其方域詳臚如右云欽定滿洲源流考卷十二
