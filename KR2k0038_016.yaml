body:
  text: 疆域五金上京金史上京路海古勒解見前之地金舊土也按此下金史原文云國言金曰按出虎以按出虎水源於此故名金源建國之號蓋取諸此考滿洲語金曰愛新金史舊解以金為按春滿洲語耳墜也耳墜以金為之因誤為金并按出虎亦誤為金吉林境內無愛新水亦並無按春水以音與地考之當為今阿勒楚喀河河源在吉林城東北據松漠記聞北盟會編大金國志等所載金上京行程過拉林河一程即至上京驛館拉林河東去阿勒楚喀不過百餘里阿勒楚喀河源在吉林城東北三百里拉林河源在吉林城東北二百二十五里核之諸書所載上京宫闕在混同江東二百六十里去拉林河一百七十五里者俱約略相合此按出虎即阿勒椘喀之明證也至金太祖建國號之詔見於本紀及北盟會編所引太祖實録云契丹以鑌鐵為國號鑌鐵雖堅終有銷壤惟金一色最為真寶自今本國可號大金兩處所載詔旨皆同並未云有金水源而金源縣名遼時已有之遼屬中京金屬北京以地有金甸而名在今喀喇沁右翼界與金初起之地無涉史誤以阿勒椘喀為按出虎又誤以按出虎為金舛錯附會殊不足據也國初稱為內地天眷元年號上京海陵遷都於燕削上京之號止稱會寧府大定十三年復為上京其山有長白青嶺瑪竒滿洲語纛纓也舊作馬紀今改正嶺溫都爾蒙古語髙也舊作完都魯今改正水有阿勒楚喀混同拉林松阿哩鴨子河按此則金上京正我山朝創業之地並詳後川門府一領節鎮四防禦一縣六鎮一舊有會平州天會二年築契丹之珠敦滿洲語山梁也舊作周特今改正城也後廢其宫室有乾元殿天會三年建天眷元年更名皇極慶元宫天會十三年建殿曰辰居門曰景暉天眷元年安太祖以下御容為原廟朝殿天眷元年建殿曰敷德門曰延光寢殿曰宵衣書殿曰稽古又有明德宫明德殿熙宗嘗享太宗御容於此涼殿皇統二年建門曰延福樓曰五雲殿曰重明東廡南殿曰東華次曰廣仁西廡南殿曰西清次曰明義重明後東殿曰龍夀西殿曰奎文時令殿及其門曰奉元有泰和殿武德殿薰風殿行宫有天開殿約羅蒙古語皂雕也舊作爻剌今改正春水之地有混同江行宫興聖宫德宗所居也天德元年名為興德宫後改名永祚宫睿宗所居也光興宫世宗所居也正隆二年命吏部郎中蕭彥良盡毁舊址大定二十一年復修建二十二年以甓束城有皇武殿擊毬校射之所也有雲錦亭有臨漪亭為籠鷹之所在阿勒楚喀水側金史金之先居肅慎另條見前地有混同江長白山混同江亦號黑龍江按混同江為松阿哩烏拉黑龍江為薩哈連烏拉原係二水而史合言之蓋因二水下流會合故也所稱白山黑水是也始祖居完顔部布爾噶水之涯弟博和哩居扎蘭滿洲語隊伍也舊作耶懶今改至獻祖徙居海古勒水始有棟宇之制遂定居於阿勒楚喀之側昭祖耀武至於青嶺白山順者撫之不從者討之按白山為肅慎舊壤苐部族散居昭祖始統屬之耳景祖稍役屬諸部自白山葉赫舊作耶悔今改正按與國初有葉赫國因居葉赫河邊遂為國名此白山圖們並言蓋亦部族之居近是河者圖們舊作統門今改正按圖們江在寧古塔城南六百里源出長白山東北流繞朝鮮北界復東南折入海扎蘭以至五國見前遼五國部條之長皆聽命時遼邊民有逃而歸者鐵驪見前靺鞨條烏舍之民亦來歸前後願附者衆鄂敏滿洲語飲也舊作斡泯今改水富察􅗨作蒲察今從八旗姓氏通譜改部特克紳特布滿洲語特克紳整齊也特布裝載也舊作泰神忒保今改水完顔部圖們水溫特赫舊作溫迪痕今從八旗姓氏通譜改部舍音水完顔部皆來附金史太祖進軍次寥晦城諸路兵皆會於拉林水遇遼軍敗之進軍寧江州諸軍填塹攻城十月朔克其城鐵驪部來送欵次拉林城拜格蒙古語今其停止也舊作龞古今改正之長和索哩滿洲語麩皮也舊作胡蘇魯今改正以城降按松漠紀聞上京至拉林一百五十里拉林至混同江一百十里太祖會兵拉林河克寧江州進次拉林城則寧江城正與拉林河相近金史太宗天會二年四月以實古納蒙古語審問也舊作實古乃今改正所築上京新城名會平州金史熙宗天眷元年八月以京師為上京府曰會寧舊上京為北京十一月以康宗以上畫像工畢奠獻於乾元殿十二月新宫成二年九月初居新宫立太祖原廟於慶元宫皇統三年初立太廟社稷按史所云舊上京據大金國志蓋遼之上京也松漠紀聞自上京至燕二千七百五十里按自京師至餘盛京一千五百餘里吉盛京城至吉林八百里阿勒楚喀河源在林東北三百里綜計之與此約略相合三十里至會寧頭鋪四十五里至第二鋪三十五里至阿薩爾蒙古語閣也舊作阿薩今改正鋪四十里至拉林河四十里至巴達滿洲語張大也舊作報打今改正鋪七十里至賔州渡混同江按此輿北盟會編行程録所載里數俱同可見金之上京實在今寧古塔之西混同江之東其去混同江二百六十里以今道里按之當在色齊窩集嶺上有故城址相傳為金時關門蓋自船厰東十里過混同江至尼什哈站三十里至交蜜峯四十里至額赫穆站十里至納穆􅌪集三十里至山神廟五十里至拉發站七十里至推屯站三里至色齊窩集又東三百九十里至寧古塔色齊窩集在吉林城外混同江東二百四十餘里而拉林河源之拉林山在城東北二百四十五里阿勒楚喀河源之嘉松阿山在城東北三百里俱屬相近量本朝康熙十六年寧古塔章京薩布素以繩道里兩度為丈百八十丈為里自寧古塔西關門量至吉林東關門凡九萬八千丈為五百五十里後分八站作六百三十里雖古今里數未必盡同然正約略可見耳北盟會編出榆關以東第三十八程至拉林河不皇輿全圖拉林河在阿勒楚喀河之西相去過百餘里據此自拉林一程至上京與松漠紀聞言相去一百五十里者合則按出虎之為阿勒楚喀無疑終日之內山無寸木地不産泉又行五里至矩古唐古特語矩十數也古身也舊作句孤今改貝勒寨第三十九程至館去上京尚十里餘翌日馬行可五七里一望平原曠野又一二里云近闕去繖蓋復北百餘步有阜宿圍繞髙丈餘皇城也至門就龍臺下馬行入宿圍朝見即捧國書自山棚東入山棚左曰桃源洞右曰紫極洞中作大牌題曰翠微宫髙五七尺以五綵間結山石及仙佛龍象之形殿七間甚壯額曰乾元殿階髙四尺許階前作壇方數丈名龍墀北盟會編自拉林河國主所居東行約五百里皆平原草莽絶少民居每三五里之間有一二族帳每族帳三五十家許亢宗奉使行程録雄州啓行第三十三程自黃龍府東行二百十里至古烏舍寨寨枕混同江湄寨前髙岸有栁樹沿路設行人幕次於下金國太師李靖所居靖纍使宋朝此排中頓飲食精細時當仲夏藉樹蔭俯長江槃薄少頃殊忘鞍馬之勞過江四十里宿呼勒希見前卷寨三十六程自呼勒希寨東行五里契丹與女真舊界也八十里至拉林河行終日無寸木地不産泉人携水以行渡河五里至矩古貝勒寨第三十七程自矩古寨七十里至達河寨第三十八程自達河寨四十里至布達見語佛也舊作蒲撻今改正寨三十九程自布達寨二十里至烏舍解見前此訛兀室今併改郎君宅又三十里至館此去北庭尚十里按此與北盟會編所載里數皆同自雄州起至金都會寧府共二千七百五十里上京宫闕在拉林河東一百七十五里正與阿勒楚喀河源相近也大金國志女真世居長白山之東南鄰髙麗北接室韋西界渤海東瀕海國初城郭散居呼曰皇帝寨國相寨太子莊後升曰會寧府建為上京其遼之上京改作北京城邑宫室無異中原州縣廨宇制度草創大金國志皇統六年春三月上以上京會寧舊內太狹役五路工匠撤而新之規模倣汴京大金國志天德四年自會寧遷都於燕以舊上京為北京元一統志混同江自長白山北流經建州另條見前西五十里會諸水東北流經故上京下達五國城北又東北注於海會寧府金史會寧府初為會寧州太宗以建都升為府天眷六年置上京留守司以留守帶本府尹兼本路兵馬都總管後置上京海蘭寧古塔河名舊作曷懶今改等路提刑司户三萬一千二百七十東至呼爾哈寧古塔河名舊作胡里改今改路六百三十里按今自吉林烏拉至寧古塔城七站六百五里亦約略相同也北至夫餘另條見前舊作蒲與今改正路七百里東南至率賔舊作恤品今改詳後路一千六百里按渤海以率賔故地為率賔府領華益建三州明統志率賔河在建州東南路名當取諸此上京廣輪千里有餘白山黑水皆在焉即我朝肇興之地也南至海蘭路一千八百里按元史云海蘭路南近髙麗考海蘭河凡數處今取其近髙麗者又原文脫南字今據元史增縣三會寧縣倚與府同時置有長白山青嶺瑪竒嶺巴延滿洲語富也舊作勃海今改淀緑野淀阿勒楚喀河混同江有得勝陀國言額特赫噶珊舊作忽土皚葛蠻今改正滿洲語額特赫勝也噶珊村也原解是而譯訛太祖誓師之地也曲江縣初名鎮東按今寧古塔城西南八十里有蓮花池相傳為金時之曲江大定七年置十三年更今名宜春縣大定七年置有鴨子河元一統志長白山在舊會寧縣南六十里按長白山橫亘千里而望祭之溫德亨山實在吉林城西南九里則會寧即吉林之地明矣元一統志上京故城古肅慎氏地渤海另條見前大氏改為上京金既滅遼即上京建邦設都後改會寧府京之南曰建州京之西曰賔州舊作濵州蓋傳寫之誤今改正又西曰黃龍府原文此下云即勃海之忽汗郡後為龍泉府即渤海之上京忽汗州也忽汗為寧古塔之呼爾哈河此殊舛誤今刪去附訂於此元史開元路古肅慎之地隋唐曰黑水靺鞨另條見前東瀕海南界髙麗西北與契丹接壤即金祖之部落也據此則元初開元一路所轄至廣凡吉林寧古塔等地皆在其中矣金太祖既滅遼即上京設都海陵遷都於燕改為會寧府肇州金史肇州防禦使舊珠赫舊作出河解見前店也天會八年以太祖兵勝遼肇基王迹於此遂建為州天眷元年置防禦使𨽻會寧府海陵時嘗為濟州支郡承安二年復以太祖神武龍興之地升為節鎮軍名武興五年置漕運司以提舉兼州事後廢軍貞祐二年復升為武興軍節鎮置招討司以使兼州事户五千三百七十五縣一始興按與州同時置有鴨子河黑龍江按此所云黑龍江實指混同江而言蓋州下流會合致誤詳見前混同江一名黑龍江注金史遼蕭嘉哩滿洲語巡察也舊作糾里今改托卜嘉滿洲語膝也舊作撻不野今改等將步騎十萬會於鴨子河北太祖自將擊之黎明及河遼兵方壞陵道選壯士十輩擊之大軍繼進遂登岸與敵遇於珠赫店會大風起塵埃蔽天乘風擊之遼兵潰逐至沃楞滿洲語水紋也舊作幹論今改濼殺獲無算遼人嘗言女真兵若滿萬則不可敵至是始滿萬云北盟會編遼天慶四年金太祖會集諸部全裝軍二千餘騎首破混同江之寧江州大敗渤海之衆獲甲馬三千又敗蕭嗣先於珠赫店及拉林河黃龍府咸州好草峪四路都統誅斬不可勝計據此則肇州在拉林河之東吉林之北元一統志上京之北曰肇州治始興縣金皇統三年置按置州年號與金史異史言黑龍江在州境與所言上京之北正合又金史帝紀即稱混同一名黑龍江故史名以混同江為黑龍江隆州金史隆州利涉軍節度古夫餘之地遼太祖時有黃龍見遂名黃龍府另條詳前天眷三年改為濟州以太祖來攻城時太軍徑涉不假舟楫之祥也置利涉軍天德二年置上京路都轉運司四年改為濟州路轉運司大定二十九年更今名貞祐初升