body:
  text: 凡例一我國家建邦啟土肇迹東方創業始基地靈効瑞其古今沿革自應詳臚本末用以昭傳信而正羣訛謹擬首立部族一門凡在古為肅慎在漢為三韓在魏晉為挹婁在元魏為勿吉在隋唐為靺鞨新羅渤海百濟諸國在金初為完顔部及明代所設建州諸衛並為考據異同訂析訛誤博稽史傳參証羣書分目提綱各加按語俾源流分合指掌瞭然一按唐史所載渤海置五京十三府其上京龍泉府即肅慎故地而黑水靺鞨入朝亦嘗置燕州勃利州及黑水府諸名目其後若遼置東京黄龍府金置上京㑹寧府分設郡邑俱詳載二史地理志中至元時猶有肇州之稱碁布星羅遺跡尚頗可攷謹擬次立疆域一門凡史册所載諸城鎮村寨之屬各按原書方位證以現在地理形勢件繫條分詳加辨證務使圖經所紀條貫咸該至遼金宫室建置一切古蹟應行考据者均即載入疆域一門用徴故實一按白山黒水其名始見于北史而顯著于金源至本朝受命龍興實為朱果發祥之地鍾神毓慶靈蹟昭然而諸史或稱太白山或稱徒太山或稱完水或稱室建河稱謂多殊名實易舛允宜詳悉核訂至若松花江即唐書之粟末水寕古塔即唐書之忽汗水亦為勝地名川向来紀載紛淆均資考覈謹擬次立山川一門以現在大清一統志盛京通志所載据今證古析異定譌其或古有今不可考者則别為存疑附之于末一史稱東方仁謹道義所存樸厚之源上追隆古我朝肇基東土舊徳敦龎超軼前代即如祀神之禮無異于豳人之執豕酌匏三代遺風由兹可覩而㕘稽史乘其儀文習尚亦往往同符如左傳稱肅慎之矢可以見俗本善射之原後漢書稱三韓以石頭可以見俗用卧具之訛松漠紀聞稱金燕飲為軟脂蜜糕可以見俗尚餅餌之始其他足資引証者尚多謹擬次立國俗一門博引典籍分條臚考以著淳風所本源逺流長洵與周公之陳七月金世宗之歌土風取義維均足以訓行奕禩一金時官制如渤極烈之為貝勒謀克之為穆昆猛安之為明安雖沿誤相仍而溯源可考又自新羅渤海已肇興文字金之初年用契丹字太祖熙宗作女真大小字其制漸備維時設女真進士科經書皆有譯觧今遺製已湮而碑刻間存至我太祖髙皇帝創制國書義藴精㣲允為制作之極則謹擬約舉大凡附列國俗一門之後用以􅂷信方来一國家扶輿積慶俶造丕基長白肇興實為邠岐舊壌今敬謹考核一以近發祥初地者為定至若王師順動以後經營遼瀋卜宅定都凡盛京地方建置規模及山川地理已具詳開國方畧盛京通志諸書中是編請毋庸兼載以恊體制一恭讀御製文集盛京賦三韓考諸篇及巡幸盛京吉林諸詩什苞括典故剖晰舛譌詢足折衷羣言埀示千古謹擬于書中各條内恭録載入永昭定論欽定滿洲源流考
