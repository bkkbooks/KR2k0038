body:
  text: 部族六渤海唐舊唐書渤海靺鞨大祚榮者始居營州萬嵗通天年􅆻丹李盡榮叛祚榮與靺鞨乞四比羽各東奔保阻以自固盡榮既死則天命右玉鈐衛大將軍李楷固率兵討其餘黨先破乞四比羽又度天門嶺以迫祚榮祚榮合髙麗靺鞨之衆以拒楷固王師大敗楷固脫身還屬􅆻丹及奚盡降突厥道路阻絶則天不能討祚榮遂率其衆東保桂婁新唐書作挹婁之故地據東牟山築城以居之祚榮驍勇善用兵靺鞨之衆及髙麗餘燼稍稍歸之聖厯中自立為振通考作震國王遣使通於突厥其地在營州東二千里南與新羅相接東北至黒水靺鞨地方二千里編戸十餘萬勝兵數萬人中宗即位遣侍御史張行岌往招之祚榮遣子入侍將加册立會􅆻丹與突厥連嵗入邊使命不達先天二年遣即將崔訢往册拜祚榮為左驍衛員外大將軍渤海郡王仍以其所統為忽汗州加授忽汗州都督開元七年祚榮卒册立其嫡子桂婁郡王大武藝十四年黑水靺鞨遣使來朝詔以其地為黑水州置長史武藝謂其屬曰黒水途經我境今始與唐家相通舊請突厥吐屯皆即知同去今不計會即請漢官必是與唐家通謀叛背攻我也遣母弟大門藝及其舅任雅新唐書通考皆作任雅相發兵以擊黑水門藝曾充質子至京師開元初還國至是謂武藝曰黑水請唐家官吏即欲擊之是背唐也昔髙麗全盛時强兵三十餘萬唐兵一臨掃地俱盡今日渤海之衆數倍少於髙麗事必不可武藝不從門藝兵至境又上書固諫武藝怒遣從兄大壹夏代統兵徵門藝欲殺之門藝遂棄其衆間道來奔詔授左驍衛將軍武藝上表極言門藝罪狀請殺之上宻遣門藝往安西報武藝云門藝逺來歸投義不可殺今流向嶺南乃留其使馬文軌葱勿雅别遣使報之俄有洩其事者武藝又上書云大國示人以信豈有欺誑之理今聞門藝不向嶺南請依前殺却帝遣門藝暫向嶺南以報之二十年武藝遣其將張文休率海賊攻登州詔門藝往幽州徴兵以討之仍令太僕員外卿金思蘭發新羅兵以攻其南境屬寒凍雪深丈餘兵士死者過半無功而還武藝懷怨不已宻遣使至東都假刺客刺門藝於天津橋南門藝格之不死詔捕獲其賊盡殺之二十五年武藝卒子欽茂嗣立新唐書渤海本粟末靺鞨姓大氏髙麗滅率衆保挹婁之東牟山地直營州東二千里南北新羅以泥河為境東窮海西􅆻丹築城郭以居萬嵗通天中有舍利乞乞仲象者與乞四比羽東度遼水保太白山之東北武后封乞四比羽為許國公乞乞仲象為震國公不受命李楷固擊殺比羽是時仲象已死其子祚榮敗楷固兵乃自號震國王地方五千里盡得夫餘沃沮弁韓朝鮮海北諸國先天中拜為左驍衛大將軍渤海郡王自是始去靺鞨號專稱渤海祚榮卒其國諡為髙王子武藝立斥大土宇東北諸國畏臣之改年曰仁安卒諡武王子欽茂立改年大興天寳末欽茂徙上京直舊國三百里忽汗河之東卒諡文王子宏臨早卒族弟元義立一嵗國人殺之推宏臨子華璵為王復還上京改年中興卒諡成王欽茂少子嵩鄰舊唐書作璘立改年正厯諡康王子元瑜立改年永徳諡定王弟言義立改年朱雀諡僖王弟明忠立改年太始立一嵗卒諡簡王從父仁秀立改年建興其四世祖野勃案野勃當為伊伯之轉音滿洲語令進也祚榮弟也仁秀頗能討伐海北諸部開大境宇有功卒諡宣王子新徳早卒孫彛震立改年咸和卒弟䖍晃立䖍晃卒元錫立初其王數遣諸生詣京師太學習識古今制度至是遂為海東盛國地有五京十五府六十二州以肅慎故地為上京曰龍泉府領龍湖渤三州其南為中京曰顯徳府領盧顯鐵湯榮興六州濊故地為東京曰龍原府亦曰栅城府領慶鹽穆賀四州沃沮故地為南京曰南海府領沃晴椒三州髙麗故地為西京曰鴨渌府領神桓豐正四州曰長領府案遼史作長嶺古字相通考今吉林烏拉城西南五百里有山名長嶺子滿洲語謂之郭勒敏珠敦南接納魯窩集北接庫勒訥窩集自長白山南一嶺環繞至此遂綿亘不絶為衆水分流之地渤海府名當取諸此領瑕河二州夫餘故地為夫餘府常屯勁兵扞􅆻丹領扶仙二州鄚頡府領鄚髙二州挹婁故地為定理府領定潘遼志作瀋當係此誤二州安邊府領安瓊二州率賔故地為率賔府領華益建三州拂湼故地為東平府領伊䝉陀通考作沱黑比五州鐵利故地為鐵利府領廣汾蒲海義歸六州越喜故領為懷逺府領達越懷紀富美福邪芝九州安逺府領寧郿慕常四州又郢銅涑三州為獨奏州涑州以其地涑沫江葢所謂粟末水也府州並詳後疆域門幽州節度府與相聘問自營平距京師葢八千里而逺後朝貢至否史家失傳考册府元龜渤海朝貢在唐時至會昌間止今詳於後册府元龜唐𤣥宗先天二年二月封靺鞨大祚榮為渤海郡王祚榮聖厯中自立為振國王在營州東二千里兵數萬人至是遣郎將崔訢往册命祚榮左驍衛員外大將軍渤海郡王仍以其所統為忽汗州都督自是每嵗遣使朝貢開元七年祚榮卒遣使弔祭立其嫡子桂婁郡王大武藝襲為左驍衛大將軍渤海郡王忽汗州都督八年六月册武藝嫡男大都利行為桂婁郡王二十年武藝卒其子大欽茂嗣立二十一年渤海靺鞨越海來侵登萊殺刺史韋俊詔新羅王金興光發兵伐之貞元十一年二月令内常侍殷志瞻往渤海册大嵩璘為郡王嵩璘欽茂之子也十四年三月加大嵩璘銀青光禄大夫簡校司空册為渤海國王依前忽汗州都督嵩璘父欽茂以開元間襲郡王都督左金吾大將軍天寳中累加特達太子詹事賔客寳應元年進封國王大厯中又累拜司空太尉及嵩璘嗣位時但授其郡王將軍嵩璘遣使叙理更加册命焉貞元二十一年復加金紫光祿大夫簡校司徒元和元年加簡校太尉四年嵩璘卒册男元瑜為銀青光禄大夫簡校秘書監充忽汗州都督渤海國王八年元瑜卒以其長弟權知國務言義襲十三年以知渤海國務大仁秀為國王十五年加仁秀金紫光禄大夫簡校司空太和五年以權知國務大彛震襲為國王册府元龜唐開元九年渤海大首領來朝十年遣其大臣味勃計來朝授大將軍十二年遣其臣賀祚慶來賀正旦十三年遣首領烏借支䝉來賀正首領謁徳來朝授果毅王弟大昌勃價來朝授左威衛將軍留宿衛十四年渤海王子大都利行原文作渤海王大都利考之史傳渤海王實未嘗來朝惟開元八年封王子大都利行為桂婁郡王葢渤海之支郡下文亦稱宿衛王子大都利行卒此處係脫二字謹增來朝授左武衛大將軍留宿衛王子義信來朝十五年大昌勃價還國封襄平縣開國男王弟大寳方來朝十六年宿衛王子大都利行卒贈特進令有司䕶歸國首領菸夫須來朝授折衝十七年獻鷹及鯔魚王弟大胡雅來朝授遊擊將軍留宿衛王弟大琳來朝授中郎將留宿衛十八年王弟大郎雅來朝賀正大首領使知䝉獻馬三十匹烏那達初案烏氏為渤海大姓那達初以滿洲語考之當為納丹珠之轉音也來獻海豹皮五貂䑕皮五瑪瑙杯一馬三十匹十九年國王遣大姓取珍等百二十人來朝二十三年王弟蕃來朝册府元龜褒異門作二十四年並載授蕃太子舍人二十五年首領木智䝉公伯計等來獻鷹鶻二十六年獻豹䑕皮千張乾文魚百口二十七年王弟大朂進來朝宴於内殿授左武衛大將軍留宿衛十月使其臣受福子一作優福子來謝二十九年遣失阿利來朝天寳二年王弟蕃來朝留宿衛自天寳迄大厯一嵗皆二三至建中元年三年並來朝貞元七年以賀正使大常靖為衛尉卿王子大貞幹來宿衛十年以來朝王子大清允為右衛將軍十四年以王姪大能信為中郎將元和元年二年四年並遣使二年進奉端午使楊光信逃歸榆闗吏執以至五年遣其臣髙才南及其子大延真來朝七年御麟徳殿宴使臣賜官告三十五通衣各一襲八年遣辛文徳等九十七人九年遣髙禮進等三十七人大孝真等五十九人來朝十年賜使者茒貞夀大吕慶等告遣王子大庭俊等一百一人來朝十一年授使人髙宿滿等官十二年十三年十五年長慶二年四年寳厯元年二年太和元年三年五年並遣使朝貢六年遣王子大明俊來朝七年遣同中書右平章事髙賞英謝册命開成元年遣王子大明俊來朝淄青節度使奏渤海將到熟銅請不禁斷四年遣王子大延廣來朝會昌六年遣使來朝五代五代史渤海本號靺鞨唐髙宗滅髙麗徙其人散處中國置安東都䕶於平壤以統之武后時􅆻丹攻北邊髙麗别種大乞乞仲象與靺鞨長乞四比羽走遼東分至髙麗故地武后遣將擊殺乞比羽而乞乞仲象亦病卒仲象子祚榮立因并有比羽之衆其衆四十萬人據挹婁臣於唐中宗時以為忽汗州都督封渤海郡王其後世遂號渤海其貴族姓大氏開平元年國王大諲譔遣使者來訖顯徳常來朝貢國土物産與髙麗同諲譔世次立卒史失其紀五代史契丹附録契丹欲攻中國患渤海等在其後欲擊渤海懼中國乗其虚乃遣使聘唐以通好明宋遣供奉官姚坤至西樓􅆻丹主方東攻渤海坤追至慎州見之􅆻丹主曰昨聞中國亂欲以甲馬五萬往助我兒而渤海未除志願不遂因攻渤海取夫餘一城以為東丹國通考與此同舊五代史出榆闗行砂磧中七八日至錦州又五六日過海北州又行十餘日渡遼水至渤海國鐵州又行七八日至南海府天成元年十一月青州霍彦威奏得登州狀申契丹先發諸部攻逼渤海自契丹主卒雖已抽退尚留兵馬在夫餘城今渤海王弟部領兵士攻圍夫餘城契丹通鑑同光二年契丹擊渤海之遼東無功而還天成元年復擊渤海七月拔夫餘城宋史渤海併有夫餘肅慎等十餘國厯唐梁後唐朝貢不絶後唐天成初為契丹攻夫餘城下之改夫餘為東丹府命其子托雲舊作突欲留兵鎮之契丹主卒渤海王復攻夫餘不能克厯長興清泰遣使朝貢周顯徳初其豪崔烏斯等三十人來歸其後隔絶不復通宋㑹要與此同之案烏斯當為烏蘇訛䝉古語水也册府元龜梁開平元年五月渤海王子大昭順貢海東物産三年三月渤海王大諲譔遣其相大誠諤朝貢進人口及貂皮熊皮等乾化元年遣使來賀二年五月遣王子大光贊進方物後唐同光二年正月遣王子大禹謨五月遣其姪元讓並來朝貢三年使臣裴璆貢人參松子昆布黄明細布貂鼠被一褥六髪靴革奴子二拜右贊善大夫天成元年四月遣使大陳林等百十六人進兒口女口三及人參昆布白附子虎皮等七月使人大昭佐等六人朝貢十一月青州奏契丹先發諸部攻渤海自契丹主卒雖已抽退尚留兵夫餘城今渤海王弟部領兵士攻圍夫餘四年渤海遣使髙正詞貢方物長興元年正月青州奏差人押渤海王憲一行歸本國被黑水剽劫今得黑水兀兒狀及將印紙一張進呈二年使人文成角來朝貢三年正月遣使來朝應順二年十一月遣使列周義入貢案後唐愍帝應順改元止三月即為潞王清泰元年考五代史載清泰二年渤海遣使者來是應順當係清泰之誤通考後唐同光二年渤海王遣姪學堂親衛大元讓原本避宋濮王允讓諱改讓為謙今據册府元龜改來朝授原本脫三字今據册府元龜改試國子監丞三年及天成元年俱遣使入貢先是契丹太祖兵力雄盛東北諸國多臣屬之以渤海土地相接常有吞併之意是嵗率諸部攻渤海夫餘城下之改夫餘城為東丹府命其子托雲鎮之未幾按巴堅舊作阿保機今改死命其弟率兵攻夫餘城不克而還四年及長興二年三年四年清泰二年三年俱遣使貢方物周顯徳元年渤海國烏思羅等三十人歸化其後隔絶不通宋宋史太平興國四年太宗平晉陽移兵幽州渤海首領大鸞河率小校李勛等十六人部族三百騎來歸以鸞河為渤海都指揮使六年賜烏舍城浮渝府渤海琰府王詔令助攻契丹九年春宴大明殿召鸞河慰撫乆之謂殿前都校劉延翰曰俟髙秋戒候當與駿馬數十匹令出郊逰獵以遂其性因以緡錢十萬併酒賜之案渤海無浮渝府當即夫餘府音近而訛宋會要太平興國六年賜渤海烏舍城清渝府宋史作浮渝府渤海琰府王詔曰聞爾國爰從前代本是大藩近年以來頗為契丹所制宜盡率部族來應王師朔漠之外悉以相與渤海大國近來服役於契丹至是將發師大舉故先告諭俾為應也淳化二年以渤海不通朝貢令女真發兵攻之凡斬一級給絹五匹徽宗政和八年五月臣僚言登州與渤海相望熙寧中巡檢每季下北海駞基島駐劄以駞基石為界自北朝通好不曾根理深慮渤海相近作過則駞基塞孤立乞以末島嗚呼島為界併欽島添置卓望兵令戍守往來巡邏詔令指畫聞奏不得希功生事通考定安國宋開寳三年遣使入朝太平興國中詔其國張掎角之勢同伐契丹六年冬遣使上表云定安國王烏元明言臣本髙麗舊壤渤海遺黎保據方隅渉厯星紀頃嵗契丹入侵境土攻破城寨俘掠人民臣祖考守節不降與衆避地僅存生聚以迄於今而又夫餘府昨背契丹並歸本國災禍將至無大於斯所宜率兵助討必欲報敵其末題云元興六年十月日上答以詔書令其恊力同伐契丹端拱二年其王子獻馬及雕羽鳴鏑淳化二年王子大元上表後不復至按烏氏為渤海著姓詳表中所叙當係渤海舊臣保守方隅不肯降遼者髙麗舊壤在渤海為鴨渌府夫餘復歸事遼史未載宋薛暎記渡潢水石橋旁有饒州唐於契丹嘗置饒樂今渤海人居之遼遼史本紀太祖神册二年渤海遣使來貢四年修遼陽故城以渤海戸實之天贊三年渤海殺遼州刺史張秀實而掠其民四年十二月親征大諲譔丁巳次商嶺夜圍夫餘府天顯元年正月庚申拔之丙寅命特哩衮舊作惕隠今改阿敦舊作安端今改前北府宰相蕭阿固齊舊作阿古只今改等將萬騎為先鋒遇諲譔老相兵破之是夜大元帥耀庫濟舊作堯骨今改南府宰相蘇北院額爾竒木舊作夷离堇今改薩納齊舊作斜湼赤今改南院額爾竒木迪里舊作迭里今改圍忽汗城辛未諲譔率僚屬三百餘人出降上優禮而釋之甲戍詔諭渤海郡縣丙子遣近侍康末怛等十三人入城索兵器為邏卒所害諲譔復叛攻其城破之駕幸城中諲譔請罪馬前詔以兵衛諲譔及族屬出帝還軍中二月安邊鄚頡南海定理等府泊諸道節度刺史來朝慰勞遣之甲午復幸忽汗城改城名天福改渤海國為東丹册皇太子貝為人皇王以主之以皇弟塔喇舊作迭剌今改為左大相渤海老相為右大相渤海司徒大素賢為左次相耶律伊濟舊作羽之今改為右次相赦其國内三月遣額爾竒木康黙記等攻長嶺唐書通考俱作領府己巳安邊鄚頡定理三府叛遣阿敦討平之乙酉以大諲譔舉族行五月南海定理二府復叛大元帥耀庫濟討之七月鐵州刺史衛鈞反耀庫濟攻拔之八月康黙記等攻下長嶺府耀庫濟討平諸州太宗天顯三年遷東丹即夫餘城民以實東平其人或亡入新羅女真五年以渤海户賜皇弟拉呼舊作李胡今改聖宗統和四年涿州之役渤海小校貫海等叛入於宋十四年渤海雅必舊作燕頗今改等侵鐵驪遣奚王和碩努等討之不克削和碩努官二十一年四月渤海部遣使來貢聖宗開泰八年置東京渤海承奉官都知押班遷寧州渤海户於遼土二河之間太平八年以渤海宰相羅漢權東京統軍使九年八月東京實里舊作舍利今改軍詳衮舊作詳穏今改大延琳囚留守駙馬蕭孝克及南陽公主殺户部使韓紹勲等即位號其國為興遼年為天慶延琳先與副留守王道平謀道平夜踰城與延琳所遣召黄龍府黄翩者俱至行在告變上即徴兵進討時蕭丕勒迪舊作匹敵今改治近延琳先率兵據其要害絶其西渡之計渤海太保夏行美先戌保州延琳宻馳書使圖統帥耶律布爾古舊作蒲古今改行美反以實告布爾古遂殺渤海兵八百人而斷其東路延琳知黄龍保州皆不附遂分兵西取瀋州節度副使張傑聲言欲降故不急攻及知其詐而已有備攻之不克而還時南北女真皆從延琳及諸道兵皆至延林嬰城固守命燕王蕭孝穆等攻之十月八月延琳渤海平詔渤海舊族有勲勞材力者叙用餘分居來隰遷閏等州天祚帝天慶五年二月饒州渤海古裕舊作古欲今改等自稱大王以蕭色佛呼舊作謝佛留今改等討之為古裕所敗以南面副部署蕭圖斯哈舊作陶蘇斡今改為都統赴之五月及古裕戰敗績丙辰獲古裕等六人正月朔東京禆將渤海髙永昌稱隆基元年閏月貴徳州守將耶律伊都舊作余覩今改以廣州渤海附永昌二月張嘉努誘饒州渤海攻陷髙州三月饒州平五月金軍破東京擒髙永昌七月春州渤海叛尋降續通考遼太祖嘗親征渤海大諲譔拔夫餘府誅其守將遂圍忽汗攻破其城詔以兵衛諲譔及族屬以出改渤海為東丹忽汗城為天福册皇子貝為人皇王以居之衛送大諲譔於皇都西城名諲譔曰烏爾古舊作烏魯古今改妻曰阿勒扎舊作阿里只今改改夫餘府為黄龍府世為遼重鎮遼史營衛志太祖宏義宫以心腹之衛置益以渤海戸永興宫以太祖平渤海俘户等置敦睦宫以渤海建瀋巖三州戸置遼史兵衛志天顯元年滅渤國國地方五千里兵數十萬五京十五府六十二州盡有其衆契丹益大遼國兵制詔諸道徴兵惟南北奚王東京渤海兵馬雖奉詔未敢發兵必以聞上遣大將持金魚符合然後行遼東為渤海故國太祖以其地建南京遼陽府統縣六轄軍府州城二十六有丁四萬一千四百遼史地理志太祖東併渤海得城邑之居百有三東京道遼陽府本朝鮮之地後為渤海大氏所有併吞海北地方五千里兵數十萬金金史粟末靺鞨始附髙麗姓大氏李勣破髙麗粟末靺鞨保東牟山後為渤海稱王傳十餘世有五京十五府六十二州太祖二年執寧江州渤海大嘉努次扎錫舊作札只今改水遇渤海軍攻我左翼七穆昆舊作謀克今改衆少却敵兵直犯中軍太祖射耶律色錫舊作謝十今改死敵大奔十月召渤海梁福烏達舊作斡答剌今改使偽亡去乃招諭其鄉人曰女真渤海本同一家我興師伐罪不濫及無辜也收國二年詔渤海諸部官民已降或為軍所俘獲逃遁而還者勿以為罪其酋長仍官之且使從宜居處太宗天會四年命貝勒舊作孛堇今改大㚖以所領渤海軍八明安舊作猛安今改為萬戸松漠紀聞渤海國去燕京及女真所都皆千五百里以石壘城脚東並海其王以大為姓右姓曰髙張楊竇烏李不過數種部曲奴婢無姓皆從其主男子多智謀驍勇他出國右至有三人渤海當一虎之語契丹太祖滅其王大諲譔徙其名帳千餘户于燕給以田疇蠲其賦入往來貿易闗市皆不征有戰則用為前驅天祚之亂聚族立姓大者於舊國為王金人討之軍未至其貴族髙氏棄家來降言其虚實城遂䧟契丹所遷民益蕃至五千餘戸勝兵可三萬金人慮其難制頻年轉戍山東每徙不過數百家至辛酉嵗盡驅以行其居渤海故地者仍契丹舊為東京置留守有蘇扶等州蘇與中國青州登州相直契丹東丹王封於此處蘇乗筏浮海歸後唐遼東行部誌瀋州在唐時嘗為髙麗侵據唐季不能勤逺為大氏所有傳國十餘世當五代時契丹與渤海血戰數十年竟滅其國于是遼東之地盡入于遼謹案渤海處黑水靺鞨之南實靺鞨之粟末部也南併百濟北兼黑水幅員五千里在東方最為大國大氏自唐則天時建國迄于後唐厯二百餘年官府制度燦然大備其世次傳受及使命往來史皆詳述惟是遼紀稱天顯元年太祖破忽汗城獲王大諲譔遂併其地改渤海為東丹國而諸書皆云取夫餘一城以封托雲太祖既崩渤海王復攻夫餘不能克似諲譔尚在而宋太宗時有賜渤海琰府王之詔徽宗時登州有置戍巡防渤海之奏似其國至北宗末猶存考之薛史及册府元龜諲譔既俘統兵攻夫餘城者為王之弟即遼紀所載渤海諸州為遼攻得者惟忽汗城及西南二京南京止南海一府西京未得者尚有東平安逺等六府其東北之境並未屬遼即長嶺南海鄚頡定理諸府亦屢平屢叛聖宗十四年紀云渤海侵鐡驪遣奚王討之不能克二十一年紀云渤海來貢是忽汗破後壤地與遼相接者雖已入遼而國人收合餘部别自立王故五代史宋史宋會要通鑑通考皆謂止取夫餘一城也册府元龜又有後唐遣人送渤海王憲歸國之文憲必王之子弟留中國者長興清泰間使命往來則仍世君其國可知苐為遼所隔石晉又臣遼遂不復至耳至五京十五府六十二州之名詳見新唐書而州止六十考遼志東京道有崇集麓三州皆渤海置而唐書止載益州葢本髙麗之葢牟城在今葢平境益州為率賔故地實係二州則渤海州名固不止六十有二矣遼史又云唐元和時渤海王大仁秀南定新羅北略諸部開置郡邑其見於志者若龍河會農吉理杉盧沸流鐵利安定銅山安寧諸郡若銀州之改為富州葢州之改為辰州皆唐書所未及也王都忽汗城因河得名以地理及音譯考之當即今呼爾哈河河源出吉林烏拉界會畢爾騰湖東流經故會寧城北又九十餘里繞寧古塔城南北流七百里入混同江唐書云渤海上京在忽汗河之東為肅慎故地新唐志云自安東都䕶府經葢牟城又經渤海長嶺府千五百里至渤海王城城臨忽汗海其西南三十里有古肅慎城又曰自神州陸行四百里至顯州又正北如東四百里至渤海王城明一統志亦言金滅遼設都于渤海上京是忽汗城實與古肅慎城金會寧城相近俱在今寧古塔境其北即黑水境遼史以遼陽當之失之逺矣其餘府州多在今吉林烏拉寧古塔及朝鮮界並詳後疆域門遼既未能全併渤海以所俘獲散置他處多取渤海州邑之名以名之亦猶黔潭嚴廣蘇潤松江諸州之在遼耳又若大延琳之志恢宗國烏元明之守節不降割據頻興迄於天祚之世金太祖以本屬一家遣人招諭松漠紀聞謂智謀驍勇出他國右至有三人渤海當一虎之語不信然哉欽定滿洲源流考卷六
