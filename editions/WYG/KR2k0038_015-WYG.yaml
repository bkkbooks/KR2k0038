景祖襲而擒之金史遼咸雍八年五國穆延舊作没撚今從八旗姓氏通譜改部舍音滿洲語白色也舊作謝野今改貝勒叛遼鷹路不通景祖伐之舍音敗走元一統志開元路三京故國五國舊城東北一都㑹也案元之開元路所統至廣據元一統志所載長白山亦在境内東於使大路非止今一縣地也元一統志混同江發源長白山北流經渤海建州西五十里㑹諸水東北流經上京下達五國頭城北又東北注於海明一統志五國頭城在三萬衛北一千里自此而東分為五國舊傳宋徽宗𦵏於此按五國城之説不一或謂寜古塔東松花黒龍二江合流之處有土城焉或以為在朝鮮北境近寜古塔有古城在山上或以為去燕京三千八百里西至黄龍府二千一百里或謂寜古塔相近槍頭街有舊城址五疑即是也據金太宗本紀云天㑹六年徙昏德公重昏侯於韓州八年再徙呼爾哈路則實在寜古塔也宋史稱韓州五國城誤合為一地第諸書皆約畧之辭未有實據今三姓地方相傳有五國城遺址謹案遼東北之境與完顔部為隣白山黒水雖隔封外而壤地相錯經界分合之故史乘尚有可稽其最近者上京之長春州東京之寧江州皆混同江之地長春州遼時春蒐巴納在焉寜江則金太祖起兵首集大勲於此按之皇輿全圖長春當近白都訥寜江實傍拉林河次若黄龍府賔咸等州並都㑹衝要遼金百戰之區亦與混同江相近行程里數具存其餘遼瀋諸州東京規畫所闗不容罣漏且里至逺近亦藉以考見若中京則相去稍逺不復贅列焉至遼金舊界諸書尚約畧可考遼史營衛志所載阿延伊德二部葢女真之係遼籍者五國城之説紛然不一遼史各有國名大約在寜古塔以東東接大海而五國城則為五國至遼總集之所蓋五國部節度使所治之城所云自此而東分為五國者近之亦不越寜古塔境内初不必有舊城址五而後為是也並附於末用資參考云欽定滿洲源流考卷十一
