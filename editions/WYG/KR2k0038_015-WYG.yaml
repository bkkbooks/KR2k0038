body:
  text: 疆域四遼東北地界北盟㑹編遼太祖遷女真大姓數千户置遼陽之南使不得與本國相通名曰哈斯罕舊作合蘇欵又作曷蘇館今改正按滿洲語哈斯罕藩籬也據此云使不得與本國往來實有防閑之意與滿洲語意相合謂之熟女真按滿洲語稱舊國初所屬曰佛滿珠謂滿洲也新附編入旗分者伊徹滿珠謂之新滿洲也此所云生熟蓋即新舊意自咸州東北分界入山谷至於粟末江中間所居𨽻咸州兵馬司許與本國往來非熟女真亦非生女真也自粟末之北寜江之東北處界外者則謂之生女真遼國沿邊置東京黄龍府兵馬都部署司咸州湯河兵馬司東北路統軍司分𨽻之謂之羈縻道契丹國志東南至新羅另條見前國西以鴨緑江東八里黄土嶺為界至保州十一里次東南至五節度熟女真國係契丹樞宻院所轄差契丹或渤海人充節度管押西北至東京五百餘里又次東南至熟女真國按此疑即自咸州至粟末江之部然志文殊未明晰不屬契丹所管去東京二百餘里東北至生女真國契丹常設防備西南去東京六百里又東北至烏舍滿洲語皮條也舊作烏惹今改正國阿里瑪蒙古語梨也舊作阿里眉今改正國布庫里蒙古語整全也舊作破骨魯今改正國各一萬户衣装言語與女真異西去上京四千餘里又東北至鐵驪見前靺鞨條國次東北至靺鞨國按靺鞨即女真國舊名此分為二國殊誤葢作志者摭拾舊文未足為據遼上京長春州遼史長春州本鴨子河春獵之地興宗重熈八年置統縣一長春縣本混同江地户二千按遼上京臨潢府在今巴林阿嚕科爾沁扎嚕特等地惟長春一州濵混同江今杜爾伯特扎賴特皆州之北境則遼長春州當與今白都訥相近遼史兵衛志長春縣丁四千金史泰州承安二年置於長春縣北至邊四百里南至懿州八百里東至肇州三百五十里户三千五百四縣一長春遼長春州天徳二年降為縣𨽻肇州承安三年來屬遼史春巴納舊作納鉢今改正按滿洲語巴納地方也葢指遊獵之地而言曰鴨子河濼皇帝正月上旬起牙帳約六十日方至天鵞未至卓帳冰上鑿冰取魚冰泮乃縱鷹鶻捕鵞雁晨出暮歸鴨子河濼東西二十里南北三十里在長春州東北三十五里四面皆沙堝多榆栁杏林契丹國志每歲正月上旬出行射獵凡十六日然後並洮爾河鑿冰釣魚冰泮即縦鷹鶻以捕鵞雁按遼史本紀載聖宗太平四年改鴨子河為混同江塔魯河為長春河然又屢以鴨子混同二水並稱即金史亦並稱鴨子混同據契丹國志則鴨子即塔魯河今洮爾河也又契丹國志云太宗破晉改粟末河為混同江史志傳訛未有確據並詳後山川門大金國志太祖十四年遼天祚帝率蕃漢兵十餘萬出長春路分五部北出駱駝口太祖乘其未陣三面擊之天祚大敗退保長春太祖乘勝遂平渤海遼陽等五十四州遼東京遼陽府遼史東京遼陽府本朝鮮之地後為渤海大氏所有號中京顯徳府太祖攻渤海俘其王大諲譔以為東丹王國神冊四年葺遼陽古城以渤海漢户建東平郡為防禦州天顯三年遷東丹國民居之升為南京城名天福髙三丈有樓櫓幅員三十里八門東曰迎陽東南曰韶陽南曰龍原西南曰顯德西曰大順西北曰大遼北曰懐逺東北曰安逺宫城在東北隅髙三丈具敵樓南為三門壮以樓觀四隅角樓相去二里外城謂之漢城東至烏爾呼赫滿洲語偏也舊作烏魯虎克今改四百里南至海邊鐵山八百六十里西至望平縣海口三百六十里北至挹樓縣范河二百七十里東西南三面抱海天顯十三年改南京為東京府曰遼陽户四萬六百轄州府軍城八十七統縣九遼陽縣本漢浿水縣户一千五百仙鄉縣本漢遼陽縣户一千五百鶴野縣本漢居就縣地户一千三百析木縣本漢望平縣地户一千紫䝉縣本漢鏤方縣地户一千興遼縣本漢平郭縣户一千肅慎縣以渤海户置歸仁縣順化縣案歸仁順化二縣沿革未詳元一統志東丹王故宫在遼陽路按本路圖冊在府之東北隅有讓國皇帝御容殿明一統志鶴野廢縣在遼東都司城西八十里元省入遼陽縣開州遼史開州鎮國軍節度本濊地渤海為龍原府詳見前渤海條開泰三年遷雙韓二州千餘户實之號開封府開逺軍節度更名鎮國軍𨽻東京留守兵事屬東京統軍司統州三縣一開逺縣本龍原縣詳前渤海條遼初廢聖宗東討復置以軍額名户一千遼史鹽州本龍河郡詳前渤海條𨽻開州相去一百四十里遼史穆州保和軍刺史本㑹農郡詳前渤海條户三百東北至開州一百二十里統縣一㑹農縣遼史賀州刺史本吉理郡詳前渤海條户三百𨽻開州定州遼史定州保寜軍髙麗置州聖宗統和十三年升軍遷遼西民實之統縣一定東縣髙麗所置遼徙遼西民實之户八百保州遼史保州宣義軍節度髙麗置州故縣一曰來逺聖宗以髙麗王詢擅立問罪取其保定二州統和末髙麗降於此置榷場𨽻東京統軍司縣一來逺縣初徙遼西諸縣民實之又徙奚漢兵七百防戍焉户一千遼史宣州定逺軍刺史開泰三年徙漢户置𨽻保州遼史懐化軍下刺史開泰三年置𨽻保州辰州遼史辰州奉國軍節度本葢牟城渤海改為葢州詳見前渤海條遼徙其民於祖州初曰長平軍户二千統縣一建安縣元一統志葢州地最要衝稱為繁富契丹移其民於上京西祖州後陞為長平軍盧州遼史盧州元徳軍刺史本渤海杉盧郡詳前渤海條統縣一熊岳縣西至海一十五里傍海有熊岳山明一統志熊岳廢縣在葢州衛南六十里遼為盧州治所金屬葢州元省按今有熊岳城來逺城遼史來逺城本熟女真地統和中伐髙麗以燕軍驍猛置兩指揮建城防戍兵事屬東京統軍司元一統志來逺城本熟女真地遼伐髙麗於此建城先是侵髙麗軍敗值冬雪彌旬不止人馬多斃軍㑹鴨緑江餘軍漂溺遼主隆緒次來逺界有防邊猛軍數十人遇而刼之逮問所從來開襟示其金製環甲衆軍驚散遼主至遼城收不在營中者誅之金陞來逺軍鐵州遼史鐵州建武軍刺史本漢安市縣地詳前渤海條統縣一湯池縣鴨江行部誌湯池縣本遼時鐵州明一統志安市廢縣在葢州衛東七十里故鐵州金為湯池縣元省興州遼史興州興中軍節度本漢海宜縣地詳前渤海條北盟㑹編第二十四程至梁魚務過遼河二十七程至興州許亢宗奉使行程録自瀋州七十里至興州遼太祖破渤海建為東京路自此所至居民稍盛食物充足湯州遼史湯州本漢襄平縣地詳前渤海條崇州遼史崇州隆安軍刺史本漢長岑縣地詳前渤海條統縣一崇信縣海州遼史海州南海軍節度本沃沮另條見前國地渤海號南京南海府詳前渤海條太平中大延琳叛南海城堅守經歲不下别部酋長皆被擒乃降因盡徙其民於上京移澤州民來實之户一千五百統州二縣一臨溟縣明一統志臨溟廢縣在海州衛東一百八十里遼置金屬澄州元省遼史耀州刺史本渤海椒州詳前渤海條𨽻海州統縣一巖淵縣明一統志廢耀州在海州衛西南二百里遼史嬪州柔逺軍刺史本渤海晴州詳前渤海條元一統志遼太平九年渤海大延琳叛盡徙南海府人於上京之北移澤州民以實其城仍號南海府金改海州又改澄州又廢嬪州為新昌鎮入焉淥州遼史淥州鴨緑軍本髙麗故國渤海西京鴨緑府詳前渤海條大延琳叛遷餘黨於上京置易俗縣居之在者户二千𨽻東京留守司統州四縣二宏聞縣神鄉縣桓州豐州正州慕州俱詳前渤海條惟慕州渤海别屬安逺府遼移屬淥州顯州遼史顯州奉先軍上節度本渤海顯徳府地詳前渤海條世宗置以奉顯陵顯陵者東丹人皇王墓也人皇王性好書購書數萬卷置醫巫閭山絶頂築堂曰望海大同元年世宗親䕶人皇王靈駕歸自汴京以人皇王愛醫巫閭山水竒秀因葬焉州在山東南遷東京三百餘户以實之應厯元年穆宗葬世宗於顯陵西山仍禁樵採兵事屬東京都部署司統州三縣二奉先縣本漢無慮縣即醫巫閭世宗析遼東長樂縣民以為陵户山東縣本漢望平縣世宗割渤海永豐縣民為陵户歸義縣初置顯州渤海民自來助役世宗嘉憫因籍其人户置縣金史天輔元年抜顯州乾懿豪徽成川惠等州皆降許亢宗奉使行程録自錦州八十里至劉家荘自劉家荘一百里至顯州遼史嘉州嘉平軍下刺史𨽻顯州遼史遼西州阜成軍中刺史本漢遼西郡地世宗置州屬顯州統縣一長寜縣統和八年以諸宫提轄司人户置遼史康州下刺史世宗遷渤海率賔府人户置屬顯州縣一率賔縣詳前渤海條遼東行部誌廣寜本陽羅郡渤海顯徳府遼世宗改顯州宗州遼史宗州下刺史在遼東石熊山耶律隆運以所俘漢民置聖宗立為州統縣一熊山縣本渤海縣地乾州遼史乾州廣徳軍上節度本漢無慮縣地聖宗統和三年置以奉景宗乾陵有凝神殿兵事𨽻東京都部署司統州一縣四奉陵縣本漢無慮縣地括諸落帳户助營山陵延昌縣析延昌宫户置靈山縣本渤海靈峯縣地司農縣本渤海麓郡縣詳前渤海條元一統志乾州故城在廣寜府西南七里遼統和二年立今基址頺然遼東行部誌閭陽遼乾州也去廣寜五里北盟㑹編離顯州七里别建乾州以奉陵寢明一統志乾州城在廣寜衛西南七里遼史海北州廣化軍中刺史世宗以所俘漢户置地在閭山之西南海之北初𨽻宣州後屬乾州統縣一開義縣明一統志開義廢縣在義州衛南四十里遼置為海北州治所金屬義州元省貴德州遼史貴德州寜逺軍下節度本漢襄平縣地漢公孫度所據太宗時察克蒙古語時也舊作察割今改正以所俘漢民置州聖宗建貴德軍後更名兵事屬東京都部署司統縣二貴徳縣本漢襄平縣渤海為崇山縣奉德縣本渤海縁城縣地嘗置奉徳州詳前渤海條崇山縁城並渤海崇州縣名縁城又作緑城元一統志貴德州今廢為巡檢司元一統志公孫廢城在貴德州漢末公孫度為遼東太守治襄平傳子至孫據有其地遺址猶存元一統志大寶城在廢貴德州瀋州遼史瀋州昭德軍中節度本挹婁國地渤海置州詳前渤海條太宗置興遼軍後更名兵事𨽻東京都部署司統州一縣二樂郊縣太祖俘薊州三河民建三河縣後更名靈源縣太祖俘薊州吏民建漁陽縣後更名大金國志太祖十五年渤海人髙永昌自稱大渤海國皇帝據有遼東五十餘州遼主遣張琳討之至瀋州女真遣兵來援琳敗績許亢宗奉使行程録自顯州一百五十里至梁漁務又一百三十里至摩綽滿洲語拙也舊作沒咄今改正寨又八十里至瀋州遼史巖州白巖軍下刺史本渤海白巖城見前渤海條統縣一白巖縣元一統志瀋陽渤海建定理府都督瀋定二州此為瀋州地後罹契丹兵火其定州與縣並廢即瀋州為興遼軍又更昭德集州遼史集州懐衆軍下刺史古陴離郡地詳前渤海條統縣一奉集縣明一統志奉集廢縣在撫順千户所南八十里漢為險瀆縣金屬貴德州廣州遼史廣州防禦漢屬襄平縣渤海為鐵利郡詳前渤海條太祖遷渤海人居之建鐵利州統和八年省開泰七年以漢户置統縣一昌義縣金史瀋州章義縣遼舊廣州皇統三年降為縣有遼河東梁河明一統志章義廢縣在瀋陽衛西南六十里遼置廣州金改為縣屬瀋州元省遼州遼史遼州始平軍下節度渤海為東平府詳前渤海條太祖改為州軍曰東平太宗更為始平軍兵事屬北女真兵馬司統州一縣二遼濵縣安定縣明一統志遼濵廢縣在瀋陽衛西北一百八十里本拂湼國另條見前地遼為遼州治金貞祐時廢遼史祺州祐聖軍本渤海䝉州地詳前渤海條太祖以檀州俘户於此建檀州後更名兵事屬北女真兵馬司統縣一慶雲縣太祖俘宻雲民於此建宻雲縣後更名遂州遼史遂州