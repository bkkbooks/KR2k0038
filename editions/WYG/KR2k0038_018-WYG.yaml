body:
  text: 欽定四庫全書欽定滿洲源流考卷十四山川一臣等謹案髙山肇迹豐水貽謀自古王業所興必有名山大川扶輿蜿蟺以翊昌運而鞏丕基我國家啟宇遼東於山則有長白醫巫閭之神瑞於水則有混同鴨緑之靈長幹衍支分盤紆迴繚懐柔咸秩篤祚萬年臣等謹立山川一門凡史乘所載者詳為詮次用以稽古證今參同考異仰惟啟運天柱隆業三山敬奉神宫尤為王氣所鍾坤珍所㑹爰首列之以著發祥之自至若羣山衆水稱名實繁則具見於大清一統志盛京通志二書兹不復甄叙云啟運山謹案大清一統志啟運山在興京城西北十里自長白山西麓一幹綿亘至此層巒環拱衆水朝宗萬世鴻基實肇於此御製恭謁永陵追王𫝊前籍遺庥逮後昆高山瞻彼作徳水溯兹源疆理興家室星辰衛廟垣㡬多𤓰瓞感揮淚灑寒原御製恭謁永陵四祖分陵墲壝同鴻禧景佑奠岐豐制因漢氏修園寢尊擬周家號古公念結拜瞻千里外派綿繼續萬年中曰承曰啟均予責惟敬惟勤勵此衷御製恭瞻啟運山作歌長白龍幹西南來靈山啟運神堂開源逺流長綿奕世駢蕃禔祉皇圖培肇祖衣冠秘陵室三祖元宫千載謐仇成不共何忍言七恨興師此第一我我景祖太祖顯祖陷明氏之計致不諱是以興師討明以此為七大恨之首爰始爰謀緬亶父橋山景祐猶故土昌平樵採禁至今朝家厚徳昭千古明季為我朝興自遼東乃毁及金陵為壓勝我朝雖有二祖之恨而彼南京孝陵及昌平十三陵皆為守䕶禁樵採厚徳仁風垂則千古云天柱山謹案大清一統志天柱山在承徳縣東二十里福陵在焉近則渾河環於前輝山興隆嶺峙於後逺則發源長白俯臨滄海洵王氣之所鍾也御製恭謁福陵草昧起英雄維皇乃眷東風雲龍虎㑹日月海天中帝業千年鞏山陵萬古崇永維無競烈繼序矢深衷御製恭謁福陵天柱隆崇萬載亭陵山即天柱山福貽奕葉藉威靈風雲儼若通神縡龍虎常如䕶帝扃黍稷一時陳爼豆瞻依十載易霜星敬觀實録思開創每悉艱難淚雨零隆業山謹案大清一統志隆業山在承徳縣西十里昭陵在焉自城東北疊巘層巒至此而寛平宏敞有包羅萬象統御八荒之勢遼水右迴渾河左繞輪囷葱鬱永固丕基御製恭謁昭陵早是天歆漢何曽鹿逐秦百年經五世一壘豈三旬太室烝嘗永元宫松柏新紹庭懐積悃展拜此時申御製昭陵石馬歌在昔穆王八駿追雲霞耄荒忘返天之涯太乙况漢天馬來樂府曽聞産渥洼勤勞血汗事何有雌黄徒惹詩人口不如漢文却受千里駒吉行五十符陽九周家岐渭始勤農我朝三韓奮跡實彎弓由來受命雖有異艱難創業多齊蹤太宗馬上得天下房駟星輝天錫嘏叶大白小白協安吉故老云帝所昭陵前石馬一名大白一名小白葢白文皇御也文皇帝體豐而鎧重乘小日行百里乘大白祗能行五十里云至今立仗昭陵貽石馬遐思我祖如唐宗陵園廟號先後同汗趨嘗傳杜甫句闡揚光烈千秋隆六御今年來故里貞觀遺跡餘荒壘唐壘在廣寧縣城東南相傳唐太宗征髙麗駐兵之所文皇曽亦討寒盟謹案朝鮮昭陵神功聖徳碑云天聰二年以毁盟討之拔其都載飛舸於車凌江華島李倧自縛請為臣釋之還并歸其俘獲乘此雙龍渡浿水文綏武服為蕃屏萬年正朔奉永清不似李唐東征悔失計仆碑重建思魏徵御製恭謁昭陵丕顯丕承王業昭肇基景命大清朝那同鼎足分三國可擬戎衣定一朝兩白常趨石馬汗陵前立仗石馬曰大白小白葢太宗當日所乘以畧陣破堅者萬青永䕶玉峯標元孫五世親陳奠僾愾聲容未覺遙長白山御製駐蹕吉林境望叩長白山吉林真吉林長白鬱嶔岑作鎮曽聞古鍾祥亦匪今邠岐經處逺雲霧望中深天作心常憶明禋志倍欽御製望祭長白山作詰旦升柴温徳亨山名建望祭殿於此髙山望祭展精誠椒馨次第申三獻樂具鏗鏘叶六英五嶽真形空紫府萬年天作佑皇清風來西北東南去吹送羶薌達玉京山海經大荒之中有山名不咸在肅慎氏之國晉書肅慎氏一名挹婁在不咸山北魏書勿吉國南有徒太山魏言太白有虎豹熊狼不害人人不得山上溲汙行逕山者皆以物盛去北史靺鞨國南有從太山者案魏書隋書俱作徒太山通考與此同華言太皇案魏書作太白與此異俗甚敬畏之人不得山上溲汙行經山者以物盛去上有熊羆豹狼皆不害人人亦不敢殺新唐書靺鞨居肅慎地粟末部居最南抵太白山亦曰徒太山與髙麗接新唐書渤海大氏度遼水保太白山之東北阻奥婁河樹壁自固通典挹婁即古肅慎其國在不咸山北太平寰宇記挹婁國在不咸山北夫餘北千里案通考云在夫餘東北千里契丹國志長白山在冷山東南千餘里乃白衣觀音所居其山禽獸皆白金史女真地有長白山金史昭祖耀武至於白山入於率賔扎蘭之地所至克㨗還經佛頁水金史㑹寧府㑹寧縣有長白山金史大定十七年省臣奏咸平府路一千六百餘户自陳皆長白山錫馨珊沁河女真人遼時簽為獵戸移居於此號伊勒敦部本朝之興首詣軍降仍居本部今乞釐正從之金史祭祀志大定十二年有司言長白山在興王之地禮合尊崇議封爵建廟宇十二月禮部太常學士院奏奉勅㫖封興國靈應王即其山北地建廟宇十五年三月奏定封冊儀物冠九旒服九章玉圭玉冊函香幣冊祝遣使副各一員詣㑹寧府行禮官散齋二日致齋一日所司於廟中陳設如儀廟門外設玉冊衮冕幄次牙仗旗鼓從物等視一品儀禮用三獻祭如嶽鎮其冊文曰自兩儀剖判山嶽神秀各鍾於其分野國將興者天實作之對越神休必以祀事故肇基王迹有若岐陽望秩山川於稽虞典厥惟長白載我金徳仰止其髙實惟我舊邦之鎮混同流光源所從出秩秩幽幽有相之道列聖蕃衍熾昌迄於太祖神武徵應無敵於天下爰作神主肆予冲人紹休聖緒四海之内名山大川靡不咸秩矧王業所因瞻彼旱麓可儉其禮服章爵號非位於公侯之上不足以稱焉今遣某官某持節備物冊命兹山之神為興國靈應王仍勅有司嵗時奉祀於戯廟食之享亘萬億年維金之禎與山無極豈不偉歟自是每嵗降香命有司春秋二仲擇日致祭明昌四年十月備衮冕玉册儀物上御大安殿用黄麾立仗八百人行仗五百人復册為開天宏聖帝金史章宗泰和二年遣使報謝於長白山金史昭祖族人果布者從昭祖耀武至於白山金史温都布拉始居長白山阿布繖河徙隆州額勒敏河金史昭祖耀武至於青嶺白山舒嚕佐之也元一統志開元路長白山在舊㑹寧縣南六十里横亘千里髙二百里其頂有潭周八十里淵深莫測南流於鴨緑江北流於混同江今呼為松阿哩江東流為愛呼舊訛阿也苦今改正河明一統志長白山在故㑹寧府南六十里横亘千里高二十里其巔有潭周八十里附覺羅吳木訥原奏内大臣覺羅呉木訥等謹題為遵㫖看驗長白山事康熙十六年四月十五日内大臣覺羅吳木訥一等侍衛兼親隨侍衛首領臣耀色等奉上諭長白山係本朝祖宗發祥之地今乃無確知之人爾等四人前赴鎮守烏拉地方將軍處選取識路之人往看明白以便酌量行禮臣等欽遵於五月初五日起行本月十四日至盛京二十三日至烏拉地方轉宣上諭於將軍等隨查烏拉寧古塔及烏拉獵户所居村莊等處俱無確知長白山之人僉云曽逺望見惟都統尼雅滿之宗族達穆布魯原係採獵之人稱原在額赫訥隂地方居住雖不曽躋長白山巔曽聞我父云如往獵於長白山脚獲鹿肩負以歸途中三宿第四日可至家以此度之長白山離額赫訥隂地方不甚遙逺等語因訪問赴額赫訥隂水路㡬日陸路幾日可至亦有知額赫訥隂陸路之人否據管獵户噶喇達額赫等口稱如乘馬由陸路十日可至如乘小舟二十日可至倘遇漲阻難計日期有獵户喀喇者能知陸路等語臣等隨議每人攜三月糧而往又思或三月糧盡或馬力疲乏亦不可定隨語鎮守寧古塔將軍巴海可載一船米於額赫訥隂地方預備巴海云大船不能過松花江大險處當載米十七小船以往又與噶喇達額赫約我輩乘此馬匹肥壯速由陸路往看過長白山回時再由水路逆流而上前赴額赫訥隂地方約定臣等帶固山達薩布素於六月初二日起行經過温徳亨河阿虎山庫勒訥林初爾薩河呼沱河沙爾布堪河納丹佛勒地方輝發江法河穆敦林巴克塔河納爾琿河敦敦山卓龍窩河等處及至訥隂地方江干不意額赫乘小舟而行半月程途七日齊至因語固山達薩布素我輩乘小舟由江中逆流前赴額赫訥隂地方汝帶官兵馬匹由斡努河逆流而上由佛多和河順流而下至額赫訥隂相會約定遣發去後臣等於十一日至額赫訥隂薩布素等初十日已至因前去無路一望林木復與薩布素商議令閒散章京喀達與識路徑之喀喇帶領每旗甲士二名前行伐木開路并諭如望見長白山可將行㡬日方望見有㡬許路程相度明確來報隨於十二日遣發前行去後本日據固山達薩布素差人前來報稱我等别後行三十里至一山頂上望見長白山不甚遥逺似止有一百七八十里等語又續遣艾哈來報稱先差人來後又至一髙山頂上望見長白山甚明約有百餘里上見有片片白光等語臣等趁未有雨水之時急往看視因留噶喇達額赫督捕珠蚌於十三日起行十四日與固山達薩布素等會於樹林中揣摩開路前進十六日黎明聞鶴鳴六七聲十七日雲霧迷漫不見山在何處因向鶴鳴處尋路而行適遇鹿蹊由此前進直至長白山脚下見一處周圍林宻中央地平而圓有草無木前面有水其林離駐劄處半里方盡自林盡處有白樺木宛如栽植香木叢生黄花燦爛臣等隨移於彼處駐劄步出林外逺望雲霧迷山毫無所見臣等近前跽誦綸音禮拜甫畢雲霧開散長白山歴歴分明臣等不勝駭異又正值一路可以躋攀中間有平坦勝地如築成臺基遥望山形長濶近觀地勢頗圓所見片片白光皆氷雪也山髙約有百里山頂有池五峯圍繞臨水而立碧水澄清波紋蕩􅃞池畔無草木臣等所立山峯去池水約有五十餘丈周圍寛闊約有三四十里池北岸有立熊望之甚小其繞池諸峯勢若傾頹頗駭瞻視正南一峯較諸峯稍低宛然如門池水不流山間處處有水由左流者則為松阿哩烏拉右流者則為大訥隂河小訥隂河繞山皆平林逺望諸山皆低相視畢禮拜下山之際岸頭有鹿一羣他鹿皆奔獨有七鹿如人推狀自山岸陸續滚到山下閒散章京等駐立之處臣等不勝駭異因思正在乏食此殆山靈賜與者隨望山叩謝臣等上山之時原有七人也自得鹿之處退至二三十步回首瞻望又忽然雲霧迷山臣等因清浄勝地不宜久留於十八日言旋回望雲霧朦朧不得復見山光矣二十一日回至二訥隂河合流之處二十五日回至恰庫河此河乃訥隂東流會合之所二十八日正行之際適遇頒到勅㫖當經叩頭謝恩訖二十九日自恰庫河乘小舟而歸經過色克勝險處圖伯赫險處噶爾漢險處噶達琿險處薩滿險處薩克錫險處徳克錫險處松阿哩大險處多琿險處乘一葉小舟歴此大江九險得以無恙而渡者皆仰賴皇上洪福之所致也七月初一日回至烏拉地方本月十二日至寧古塔徧看會寧府等處地方畢七月十七日自寧古塔起行八月二十一日抵京師案自古言長白山者皆得自傳聞想像之詞我朝發祥基業嫓美豳岐康熙年間吳木訥等奉確謹附㫖親往看驗所載尤為詳録於此案長白山在吉林烏拉城東南横亘千餘里東自寧古塔西至奉天府諸山皆發脈於此山巔有潭為鴨緑混同愛嘑三江之源古名不咸山亦名太白山亦名白山亦名徒太山亦名太末山其名長白山則自金始也金大定十二年封太白山神為興國靈應王即其山北地建廟宇明昌四年復冊為開天宏聖帝本朝康熙十七年尊為長白山之神遣大臣致祭懐柔之典以時舉行又案長白山南麓蜿蜒磅礴分為兩幹其一西南指者東界鴨緑江西界佟佳江麓盡處兩江會焉其一繞山之西而北亘數百里以其為衆水所分舊謂之分水嶺西至於興京邊茂樹深林幕天翳日者土人呼為納緑窩集從此西入興京門遂為啟運山自納緑窩集而北一岡袤四十餘里者土人呼為果爾敏珠敦即長嶺也復西指入英額邊門遂為天柱隆業二山迴旋盤曲虎踞龍蟠其間因地立名為山為嶺者不一皆此山之支裔也山之靈異自昔稱名而神聖發祥於今為盛萬世鴻基與天無極矣金史祭祀志大定二十五年勅封上京䕶國林為䕶國嘉䕃侯毳冕七旒服五章圭同信圭遣使詣廟以三獻禮祭告其祝文曰蔚彼長林實壯天邑廣袤百里惟神主之廟貌有嚴侯封是享歆時蠲潔相厥滋榮自後遇月七日上京幕官一員行香著為令案今稱盛京窩集至多金時所䕶國林在上京今附於長白山之後青嶺金史上京有青嶺金史會寧府會寧縣山有青嶺金史初烏蘇展部有女名博多和青嶺東混同江舒舒水人掠而去生二女昭祖與舒嚕謀取之遂偕至嶺右炷火於箭端而射舒舒水人怪之金史昭祖耀武至於青嶺金史拉必瑪察剽呼拉布濼牧馬過青嶺東與烏春烏木罕交結世祖自將伐之金史拉必瑪察與世祖戰於野鵲水世祖中四創軍敗拉必使吉遜圖罕等過青嶺見烏春賂諸部與之交結烏春以古哩甸兵百十七人助之金史天輔六年三月都統杲出青嶺宗翰出瓢嶺追遼主於鴛鴦濼金史宗翰至奚王嶺與都統杲會杲軍出青嶺宗翰軍出瓢嶺期於羊城濼案今有大青山在開原城東南四十里疑即是也瑪竒嶺金史上京山有瑪竒舊作馬紀今改正嶺金史會寧縣有瑪竒嶺金史錫馨海蘭水烏凌阿部人昭祖柩至海蘭水錫馨攻而奪之昭祖之徒告於佛穆丹與瑪竒嶺赫伯村完顔部䝉克巴圖等募軍追及之與戰復得柩金史世祖自將過瑪竒嶺至烏木罕村與罕都合至阿卜薩水嶺東諸部皆會金史穆宗使薩哈取瑪竒嶺道攻阿蘇行次阿卜薩水色埒謂薩哈曰宜先撫定珊沁錫馨路合軍未晩也遂攻下通恩城與穆宗會阿蘇城下金史阿蘇起兵穆宗自瑪竒嶺出兵攻之薩哈自和倫嶺往畧定珊沁錫馨兩路攻下通恩城穆宗至阿齊呼水益募軍至阿蘇城金史康宗時率賔水民不聽命使威泰等至呼爾哈川召諸官僚告諭之鴻觀部率賔水居沃赫貝勒不至威準部哲爾徳部既至復亡去烏塔遇二部長於瑪竒嶺執之而來金史威準部達薩塔貝勒哲爾徳部薩克蘇貝勒遯去遇烏塔於瑪竒嶺烏塔遂執二人以降金史康宗使博囉報聘髙麗且取亡命之民康宗畋於瑪竒嶺伊智村以待之案瑪竒嶺未詳所在以金史所載考之當在吉林烏拉境内伊勒呼嶺金史自景祖以來兩世四主志業相因一切治以本部法令東南至於伊勒呼舊作乙離骨今改正海蘭扎蘭托卜古倫東北至於五國矩威圖塔金葢盛於此金史伊勒呼嶺布薩部居髙麗女真之兩間穆宗使族人招之伊勒呼嶺東諸部皆内附金史康宗使碩碩歡以錫馨圖們之兵往至伊勒呼嶺益募兵趨和尼水徇地海蘭甸收叛亡七城二年四月髙麗復來攻碩碩歡以五百人禦於布騰水復大破之追入布騰水髙麗請和使色格經正疆界至伊勒呼嶺海蘭甸和尼水留兩月色格不能聽訟康宗遣碩碩歡往立幕府於珊沁水金史太祖命雙寛綽和等撫定伊勒呼嶺綽滿水之西諸部居民案金地理志有伊勒呼水亦屬海蘭路近髙麗界長嶺新唐書長嶺營州道也唐賈躭道里記渤海長嶺府千五百里至渤海王城案渤海王城在今寧古塔境吉林西南五百里有長嶺子滿洲語為果勒敏珠敦自長白山南一嶺環繞至此為衆水分流之地渤海曽置府於此又錦州復州雖俱有長嶺不若此之最著也詳見疆域門東牟山舊唐書渤海大祚榮保桂婁新唐書作挹婁之故地據東牟山築城以居之新唐書渤海本粟末靺鞨保挹婁之東牟山遼史渤海大氏始保挹婁東牟山金史李勣破髙麗粟末靺鞨保東牟山元一統志東牟山在瀋陽路挹婁故地唐滅髙驪粟末靺鞨保挹婁之東牟山即此明統志東牟山在瀋陽衛東二十里唐髙宗平髙麗渤海大氏以衆保挹婁之東牟山即此案今承徳縣城東二十里為也天柱山當即東牟山輝山明統志輝山在瀋陽東北四十里層巒疊嶂為諸山之冠案輝山在今承徳縣東北四十里白平山山海經遼水出白平東水經大遼水出塞外御亦作衛白平山水經注遼水亦言出砥石山案遼河有兩源東源出吉林之庫勒訥窩集西源即潢河也白平砥石之名或古今稱名之異遼山瑚呼瑪山漢書地理志髙句麗遼山遼山所出入大遼水水經髙句麗縣有遼山小遼水所出水經注小遼水出遼山元一統志渾河源出廢貴徳州東北瑚呼瑪山案渾河即小遼水源出長白山納魯窩集諸書皆傳聞之異庫堪山金史景祖時舒嚕之子噶順舉部來歸居於阿勒楚喀水源庫堪原作胡凱今改正山之南庫堪山者所謂和陵之地是也沃哷部博諾與其兄弟居阿勒楚喀水之北及烏春作難博諾誘烏魯斯哈珠水居人與之相結案今阿勒楚喀河源出阿勒楚喀城東北里許扎松阿山古今異名也果囉山明統志果囉山在都司城東北五百里大梁水發源於此案太子河源出吉林薩木禪山馬鞍山明統志馬鞍山在三萬衛東北四百里建州東案馬鞍山在吉林烏拉城西北一百二十里髙六十步周四里冷山宋史洪皓傳皓使金流遞於冷山地苦寒四月草生八月已雪穴居百家陳王烏舎聚落也松漠紀聞冷山去燕山三千里去金都二百餘里案本傳雲中至冷山行六十日距金主所都僅百里去寧江州百七十里案扈從日録鄂摩和索羅站東北二百餘里為冷山自必爾罕必喇北望相去約數十里積素凝寒髙出衆山之上土人呼為白山以其冬夏皆雪也徳林石金史世祖擒拉必獻於遼主并言烏春助兵之狀遼主使人問狀烏春曰未嘗與拉必為助也徳林石之北古哩滿洲語遷移也舊作姑里今改甸之民所管不及此案徳林石在寧古塔城西九十里自鄂摩和池東繞沙闌站之南抵呼爾哈河有大石廣二十餘里孔洞大小不可數計或圓或方或六隅八隅如井如盆如池深或丈餘或數尺中有泉澄然凝碧或潛鱗㳺泳或中生樺榆等樹夏無蚊䖟麋鹿羣聚於中名曰徳林石渤海有徳里府亦是其處龍首山明統志龍首山在鐵嶺東二里案龍首山在今鐡嶺縣城東二里許蛇山遼史遼州本拂湼國城有蛇山案蛇山在今鐵嶺縣西一百五里刁蹕山明統志刁蹕山在三萬衛西南一百五十里遼河西岸案刁蹕山在今鐵嶺縣西北七十里俗呼貂皮山醫巫閭山御製過廣寧望醫巫閭山恭依皇祖聖祖仁皇帝元韻海旭凝螺黛罡風削玉蓉靈竒經覽乍聖跡躡尋重過客羣停轡仙人迥矗峯是山有仙人巖桃花洞聖水盆北鎮廟諸竒勝徒思山側逕未撫寺前松萬古為幽鎮千秋溯舜封崇功標地紀秩祀偶天宗嶻㠔疑鶱鳯巉峘突逴龍盈眸欣積素步馬遲婁胸御製杪秋遊醫巫閭山得五言三十韻奥宇坤維鎮神堂碣石開巃嵸參漢迥案衍向陽恢舜典升柴載山經括地晐昔曽望巒嶺癸亥嵗有過廣寧望醫巫閭山之作今已近壇陔禋祀帛籩薦威儀卿尹陪達誠仙闕退問景玉鞭催驀入栗梨塹延縁峛崺堆圃場崇有積雞犬静無猜頻見畊荒隧疇能保一阫日髙方覺暖風細不生埃盤谷深成阻牛山乆已峐寺頹僧避去屋寂鳥飛來遂造﨑嶇遍從看草木纔地靈自呵䕶天意本栽培寫霧豁宫霍流澌落漩洄柳書人作字松抱石為胎初狹塵凡限中宏造化胚便因窮窈窕旋命減輿儓詰曲遵碕逕䝉茸藉嫩苔懸崖飛瀑水切顥聳瑶臺右聖水盆尚有芝英碣寧妨薦福雷右蝌蚪碑武陵雖假借洞口試徘徊作記徵彭澤成詩憶楚材右桃花洞寧知進士第轉遜岳陽杯右吕公岩肥遯幽棲處翹思獨往才右道隠谷雲巢真可號龍種是誰裁右雲巢松最後中峯矗居然一笠嵬右曠觀亭海天惟浩蕩心目與兼該始遇欣佳矣曠觀誠壯哉安期如却掃意不在蓬萊御製祭北鎮醫巫閭山敬謁橋山大典昭旋輿蠲吉祀寅朝提封於昔更無北望秩而今溯有姚廟古百王䖍盛享神庥億載佑全遼高低黍稻盈豳野嵗嵗顒祈風雨調周禮職方氏東北曰幽州其山鎮曰醫巫閭北魏書和平元年正月帝幸遼西望祀醫巫閭山隋書開皇十四年閏十月詔北鎮醫巫閭山就山立祠唐六典立冬之日祭北鎮醫巫閭於營州文獻通考唐武徳貞觀之制五嶽四鎮年别一祭各以五郊迎氣日祭之祭北鎮醫巫閭於營州册府元龜天寳十載遣范陽郡司馬祭醫巫閭山廣寧公宋史秘書監李至言案五郊迎氣之日皆祭逐方嶽鎮海瀆望遵舊禮就迎氣日各祭於所𨽻之州長吏以次為獻官立冬祀北鎮醫巫閭山於定州案宋時北鎮逺隔封外是以止於定州望祭許亢宗奉使行程録出渝闗以東南行瀕海忽峭㧞摩空蒼翠萬仞乃醫巫閭山也遼史人皇王性好讀書購書數萬卷置醫巫閭山絶頂築室曰望海山南去海一百三十里山形掩抱六重金史大定四年詔依典禮立冬祭北鎮醫巫閭山於廣寧府元史至元三年定嵗祀嶽鎮海瀆之制十月土旺日祀醫巫閭山於遼陽廣寧府界明史洪武三年詔定嶽鎮海瀆神號北鎮曰醫巫閭山之神明會典祭北鎮醫巫閭山於遼東明統志醫巫閭在廣寧衛西五里舜封十二山以此為幽州之鎮自是遂以為北鎮其山掩抱六重故又名六山案醫巫閭山在今廣寧縣西四十里周二百四十里千山御製望千山我聞古來稱奥區必有名山為作鎮况兹遼陽實天府羲經巳兆帝出震長白巫閭衆所瞻千山亦復髙千仞設在晉郊魯甸間太華泰岱應齊峻我來譙邑攬形勝南望巑岏映青潤朝嵐夕靄儼相接巒光峰態如堪引龍泉祖樾久聞名靈蹟相傳半疑信何時長嘯眺滄海據盛京通志千山香巖寺中有仙人臺俯瞰滄海如布几席云千仞岡頭衣始振明統志千山在遼東都司城南六十里峯巒叢宻中有龍泉祖樾香巖中會等寺下有羅漢洞龍泉案千山在今遼陽州南六十里世傳唐太宗征髙麗時駐蹕於此十三山御製閭陽驛望十三山當前誰展十三屏古縣荒涼考奉陵出金史百載堠臺烽火息山青雲白自層層五代史附録胡嶠等東行過一山名十三山遼史顯州有十三山遼史燕王淳討武朝彦至乾州十三山許亢宗奉使行程録出渝闗東路平如掌至此㣲有登陟經由十三山下元一統志十三山在廣寧府南一百十里明統志十三山在廣寧右屯衛北三十里山下有洞山上有池案十三山在今錦縣東七十五里周二十里峯有十三故名首山亦名駐蹕山又名手山三國志景初二年司馬懿征公孫淵軍至遼東八月丙寅大流星長數十丈從首山墜襄平城南三國志司馬懿伐公孫淵潛濟遼水進至首山大破淵軍遂圍襄平新唐書貞觀十八年車駕度遼水軍於馬首山遼史遼陽府有駐蹕山唐太宗征髙麗駐蹕其巔數日勒石紀功焉俗呼手山案唐書貞觀十九年太宗親征髙麗破遼東城降白崖進攻安市城髙麗傉薩髙延夀率衆十五萬來援太宗自山而下引軍臨之賊大潰延夀等降因名所幸山為駐蹕山命中書侍郎許敬宗為文勒石以紀其功今考駐蹕山凡數處一為首山唐書稱馬首遼史稱手山在遼陽城西南接海城縣界唐太宗初渡遼水攻遼州時駐營之山也一在安市城外唐太宗既得遼州巖州進攻安市所駐之山唐書所載名所幸山為駐蹕山及李勣從戰駐蹕山功最多者是也又駐蹕山一名六山則醫巫閭也又盖平東百十餘里分水嶺諸山相傳唐太宗駐蹕處又海城西南十里有平頂山一名車駕山亦傳唐太宗駐蹕處而首山與安市城外之駐蹕山地志多誤為一山謹附訂於此金史斡魯克瀋州與髙永昌隔鄂勒和水衆遇淖不能進棟摩以所部先濟軍東京城下城中人來戰棟摩破之於首山殱其衆明統志首山在都司城南十五里連海州衛界山頂平石之上有掌指之状泉出其中挹之不竭晉司馬懿圍公孫淵於襄平即此唐太宗征髙麗駐蹕其巔數日勒石紀功因改為駐蹕山案明志亦沿遼史之誤明王山遼史東京遼陽府有明王山元一統志明王山在遼陽縣東三十里契丹地志云夫餘王東明葬於此因以為名明統志明山在復州衛東十里元志有明王山即此案今復州東十里為東屛山疑即是也華表山新唐書顯慶四年薛仁貴破温沙多門於横山遼史東京道遼陽府有白石山亦曰横山元一統志華表山俗呼為横山因丁令威化鶴得名明統志華表山在都司城東六十里因丁令威得名俗呼為横山案華表山在今遼陽州東六十里遼陽州為遼之東京道遼陽府考遼史載遼陽府所属仙鄉縣因丁令威化鶴而得名則華表山即遼時之白石山無疑熊岳山遼史熊岳縣西至海一十五里傍海有熊岳山案望海山在盖平縣西南三十里其山傍海遼史熊岳疑即此金山通典唐乾封二年薛仁貴破髙麗於金山進拔夫餘城案夫餘城東接挹婁西接鮮卑在遼為通州金為威平府地明統志金山在開原西北三百五十里遼河北岸又西北三十里曰東金山又二十里曰西金山三山緜亘三百餘里與烏梁海接境蒺藜山金史天輔元年烏楞古等敗耶律聶哷兵於蒺藜山拔顯州乾懿豪徽成川恵等州皆䧏金史遼耶律聶哷軍於蒺藜山烏楞古以兵一萬戍東京與戰於蒺藜山大敗之追北至額勒錦坡遂圍顯州案蒺藜山在廣寜縣境外龍鳯山元一統志大蟲江在遼陽路發源龍鳯山分水嶺下東南流經廢博索府南合於鴨緑江明統志龍鳯山在遼東都司東南大蟲江發源於此案鳯凰城西北八十五里有龍鳯臺山鳯凰山元一統志鳯凰山在利州南十三里南北一十里東西廣三里相傳鳯凰嘗止其上故名明統志鳯凰山在都司城南三百六十里上有壘石古城可容十萬衆唐太宗征髙麗駐蹕於此案今鳯凰城東南五里有鳯凰山噶哈嶺年征渾太祖髙皇帝甲申河部鑿道噶哈嶺太蘭岡敗渾河太祖乙酉年擊諸部兵於此吉林崖哲陳渾太祖乙酉年擊敗河諸部兵於此古哷山赫哈達太祖癸巳年破葉等九部兵於此扈爾竒山在輝發河邊太國初輝發國城在焉祖丁未年平之宜罕山國初屬烏拉國取之太祖戍申年攻伊瑪䕶山岡征烏拉太祖壬子年築木城於此薩爾滸山年大破太祖己未明師於此御製己未嵗我太祖大破明師於薩爾滸山之戰書事葢聞國之將興必有禎祥然禎祥之賜由乎天而致天之賜則由乎人予小子於己未嵗我太祖大破明師於薩爾滸之戰益信此理之不爽也爾時草創開基篳路藍縷地之里未盈數千兵之衆弗滿數萬惟是父子君臣同心合力師直為壯荷天之龍用能破明二十萬之衆每觀實録未嘗不流渧動心思我祖之勤勞而念當時諸臣之宣力也謹依實録叙述其事如左己未二月明帝命楊鎬杜松劉綎等統兵二十萬號四十萬來攻左翼中路以杜松王宣趙夢麟張銓督兵六萬由渾河出撫順闗右翼中路以李如柏賀世賢閻鳴泰督兵六萬由清河出鴉鶻闗左翼北路以馬林麻巖潘宗顔督兵四萬由開原合葉赫兵出三岔口右翼南路以劉綎康應乾督兵四萬合朝鮮兵出寛甸口期並趨我興京三月朔我西路偵卒遥見火光馳告甫至而南路偵卒又以明兵逼境告我太祖曰明兵之來信矣南路駐防之兵有五百即以此拒之明使我先見南路有兵者誘我兵而南也其由撫順闗西來者必大兵急宜拒戰破此則他路兵不足患矣即於辰刻率大貝勒代善後封禮親王及衆貝勒大臣統城中兵出而令大貝勒前行時偵卒又以明兵出清河路來告大貝勒曰清河之界道途偪仄崎嶇兵未能驟至我兵惟先往撫順以逆敵兵遂過扎喀闗與達爾漢侍衛扈爾漢後授三等子世職集兵以待上之至時四貝勒即我皇帝太宗文以祀事後至謂大貝勒曰界藩山上我築城夫役在焉山雖險儻明之將帥不惜士卒奮力攻之陷夫役奈何我兵宜急進以安夫役之心大貝勒等善是言下令軍士盡擐甲日過午至太蘭岡大貝勒及扈爾漢欲駐兵隐僻地以待敵四貝勒艴然曰正宜耀兵列陣明示敵人壯我夫役士卒之膽俾并力以戰何故令兵立隠僻地耶巴圖魯額亦都後為一等大臣追封𢎞毅公曰貝勒之言是也我兵當堂堂正正以向敵人遂督兵赴界藩對明兵營列陣而待初衆貝勒兵未至我國防衛築城夫役之兵僅四百人伏薩爾滸谷口伺明總兵杜松王宣趙夢麟之兵過谷口將半尾擊之追至界藩渡口與築城夫役合據界藩山之吉林崖杜松結營薩爾滸山而自引兵圍吉林崖仰攻我兵我兵四百人率衆夫役下擊之一戰而斬明兵百人時我國衆貝勒甫至見明兵攻吉林崖者約二萬人又一軍列薩爾滸山巔遥為聲勢四大貝勒與諸將議曰吉林崖巔有防衛夫役之兵四百人急増千人助之俾登山馳下衝擊而以右翼四旗兵夾攻之其薩爾滸山之兵則以左翼四旗兵當之遂遣兵千人往吉林崖上至問四大貝勒破敵䇿四大貝勒具以前議告上曰日暮矣且從汝等今分右翼四旗之二與左翼四旗兵合先破薩爾滸山所駐兵此兵破則界藩之衆自喪膽矣再令右二旗兵遥望界藩明軍俟我兵由吉林崖馳下衝擊時并力以戰是時我國近都城之兵乗善馬者先至乗駑馬者後至其數十里外者尚未至於是合六旗兵進攻薩爾滸山明兵駐營列陣發鎗礮我兵仰而射之奮力衝擊不移時破其營壘死者相枕藉而所遣助吉林崖之兵自山馳下衝擊右二旗兵渡河直前夾擊明兵之在界藩山者短刃相接我兵縱横馳突無不一當百遂大破其衆明總兵杜松王宣趙夢麟等皆没於陣横屍亘山野血流成渠其旗幟器械及士卒死者蔽渾河而下如流澌焉追奔逐北二十餘里至碩欽山時已昏軍士沿途搜𠞰者又無數是夜明總兵馬林兵營於尚間崖濬壕嚴斥堠鳴金鼔自衛我兵見之乗夜馳告於大貝勒翼旦大貝勒以三百餘騎馳往馬林兵方抜營行見大貝勒兵至回兵結方營環營濬壕三匝列火器俾習火器者立壕外繼列騎兵以俟又潘宗顔一軍距西三里外營裴芬山大貝勒見之使人馳告於上時我國逺路之兵亦陸續至與大貝勒兵合明左翼中路後營逰擊龔念遂李希泌統步騎萬人駕大車持堅楯營於斡琿鄂謨地環營濬壕外列火器上見之與四貝勒率兵不滿千人分其半下馬步戰明兵發火噐拒敵四貝勒引騎兵奮勇衝入我步兵遂斫其車破其楯明兵又大敗龔念遂李希泌皆陣没焉會大貝勒使人至知明兵已營尚間崖上不待四貝勒兵急引侍從四五人往日中至其地見明兵四萬人布陣成列上趣令我軍先據山巔向下搏擊衆兵方欲登山而馬林營内之兵與壕外兵合上曰是將與我戰也我兵且勿登山宜下馬步戰令大貝勒往諭時左二旗兵下馬者方四五十人明兵已自西突至大貝勒代善言於上曰兵已進矣即怒馬迎戰直入其陣二貝勒阿敏三貝勒莾古爾泰與衆台吉等各鼔勇奮進兩軍搏戰遂敗明兵斬首捕鹵過當方戰時我六旗兵見之不及布列行陣人自為戰前後弗相待縦馬飛馳直逼明營明兵發鳥鎗巨礮我兵衝突縱擊飛矢利刃所向無前明兵不能支又大破遯走我兵乗勝追擊明副將麻巖及大小將士皆陣沒總兵馬林僅以身免滅跡掃塵案角隴種尚間崖下河水為之盡赤上復集軍士馳往斐芬山攻開原道潘宗顔兵令我兵之半下馬仰山而攻宗顔兵約萬人以楯遮蔽連發火器我兵突入摧其楯遂破之宗顔全軍盡沒時葉赫貝勒錦台什布揚古欲助明與潘宗顔合其兵甫至開原中固城聞明兵敗大驚而遯是時我軍既擊破明二路兵上乃收全軍至固勒班地方駐營而明總兵劉綎李如柏等由南路進者已近逼興京偵卒馳告上遂命扈爾漢先率兵千人往禦翼旦上復命二貝勒阿敏率兵二千繼之上率衆貝勒大臣還軍至界藩行凱旋禮刲八牛祭纛告天大貝勒代善請曰吾先歸從二十騎㣲行探信祀畢上徐來上許諾三貝勒莽古爾泰亦相繼行四貝勒馳至上前請與俱往上曰汝兄㣲行往探汝隨吾後行四貝勒曰兄獨往吾㽞此未安也遂亦行日暮大貝勒回至興京入宫則皇后内廷等見大貝勒至亟問禦敵䇿大貝勒曰撫順開原二路敵兵已破誅戮且盡南來兵已遣將往禦我待父皇命當即往破之於是大貝勒復出城迎上於大屯之野上自界藩啟行至興京平明命大貝勒三貝勒四貝勒統軍士禦劉綎而㽞兵四千於都城待李如柏賀世賢等之兵初劉綎兵出寛甸進棟鄂路我居民避匿深山茂林中劉綎悉焚其柵寨殺其孱弱佐領託保額爾訥額赫率駐防五百人迎敵劉綎兵圍之數重額爾訥額赫死之并傷我卒五十人託保引餘兵與扈爾漢軍合扈爾漢伏兵山隘以待巳刻大貝勒三貝勒四貝勒引兵甫出瓦爾喀什􅌪集時劉綎所率精鋭二萬先遣萬人前掠將趨登阿布達哩岡布陣大貝勒欲引兵先登馳下擊之四貝勒曰兄統大兵㽞此相機為援吾先督兵登岡自上下擊之大貝勒曰善吾引左翼兵出其西汝引右翼兵登山俾将士下擊汝立後督視勿違吾言輙輕身入也四貝勒遂率右翼兵往先引精騎三十人趨出衆軍前自山馳下奮擊之兵刃交接戰甚酣後軍隨至衝突而入大貝勒又率左翼兵自山之西至夾攻之明兵大潰四貝勒乗勝追擊與劉綎後隊兩營兵遇綎倉卒不及陣四貝勒縱兵奮擊殱其兩營兵萬人劉綎戰死是時明海盖道康應乾步兵合朝鮮兵營於富察之野其兵執筤筅長鎗被籐甲皮甲朝鮮兵被紙甲其胄以栁條為之火器層壘列待四貝勒既破劉綎兵方駐軍衆貝勒皆至遂復督兵攻應乾明兵及朝鮮兵敵競發火器忽大風驟作走石揚沙烟塵反撲敵營昏㝠晝晦我軍乗之飛矢雨發又大破之其兵二萬人殱焉應乾遯去先是二貝勒阿敏扈爾漢前行遇明逰擊喬一𤦺兵擊敗之一𤦺收殘卒奔朝鮮都元帥姜功烈營時功烈據固拉庫崖衆貝勒復整兵逐一𤦺遂攻朝鮮營功烈知明兵敗大驚遂按兵偃旗幟遣通事執旗來告曰此來非我願也昔倭侵我國據我城郭奪我疆土急難之時頼明助我獲退倭兵今以報徳之故奉調至此爾撫我我當歸附且我兵之在明行間者已被爾殺此營中皆髙麗兵也明兵迯匿於我者止逰擊一人及所從軍士而已當執之以獻四大貝勒定議乃曰爾等䧏先令主將來否則必戰功烈復遣使來告曰吾若今夕即往恐軍亂迯竄其令副元帥先往宿貝勒營以示信詰朝吾率衆䧏遂盡執明兵擲於山下付我明逰擊喬一𤦺自縊死於是朝鮮副元帥先詣衆貝勒䧏翼日姜功烈率兵五千下山䧏衆貝勒宴勞之送功烈及所部將士先詣都城上御殿朝鮮都元帥姜功烈及副元帥等匍匐謁見上優以賓禮數賜宴厚遇之士卒悉㽞豢養四大貝勒既殱南路明兵四萬人我軍駐三日籍其俘獲人馬輜重鎧仗而還是役也明以傾國之兵雲集遼瀋又招合朝鮮葉赫分路來侵五日之間悉被我軍誅滅其宿將猛士暴骸骨於外士卒死者不啻十餘萬我軍邀天佑助以少擊衆無不摧堅挫鋭迅奏膚功䇿勲按籍我士卒僅損二百人自古克敵制勝未有若斯之神者也時明經畧楊鎬駐瀋陽聞三路兵敗大驚急檄總兵李如栢副將賀世賢等回兵如栢等自呼蘭路遯歸我哨兵二十人見之據山上鳴螺繫帽弓弰揮之作招集大兵狀已而呼噪下擊殺四十人獲馬五十匹明兵奪路而迯相蹂踐死者復千餘人庚寅大軍還至都城上顧衆貝勒大臣曰明以二十萬衆號四十七萬分四路并力來戰今我不踰時破之遂獲全勝各國聞之若謂我分兵拒敵則稱我兵衆若謂我往來𠞰殺則服我兵强傳聞四方孰不懾我軍威者哉嗚呼由是一戰而明之國勢益削我之武烈益揚遂乃尅遼東取瀋陽王基開帝業定夫豈易乎允因我太祖求是於天復讎乎祖同兄弟子姪之衆率股肱心膂之臣親冒矢石授方畧一時聖嗣賢臣抒勞效悃用成鴻勲我大清億萬年丕丕基實肇乎此予小子披讀實録未嘗不起敬起慕起悲愧未能及其時以承訓抒力於行間馬上也夫我祖如此勤勞所得之天下子若孫覩此戰蹟而不思所以永天命綿帝圖兢兢業業治國安民凜惟休惟恤之誡存監夏監殷之心則亦非予子孫而已爾此予覩薩爾滸之戰所由書事也此予因實録尊藏人弗易見而特書其事以示我大清億萬年子孫臣庶期共勉以無忘祖宗開創之艱難也鐵背山在城興京西北一百二十里上有界藩太祖大破明兵殱杜松於此碩欽山明敗卒太祖近至此尚間崖明馬林太祖己未年破麻巖兵於此斐芬山破明潘太祖己未年宗顔兵於此阿布達哩岡破明劉太祖己未年綎兵於此固拉庫崖年降朝太祖己未鮮兵於此青苔峪征明䧏太祖辛酉年青苔峪城黄骨島征明䧏太祖辛酉年黄骨島城牽馬嶺征明收太祖壬戌年䧏牽馬嶺城覺華島遣縂兵太祖丙寅年征寕逺武訥格攻克覺華島興安嶺統大兵太宗文皇帝壬申年親由興安嶺征察哈爾皮島親王等太宗丁丑年遣英率兵取明皮島吕翁山在錦縣南十里承疇於太宗辛巳年擒明洪此御製吕翁山詩所過連山塔山皆我太宗文皇帝用武之地而吕翁山則生擒洪承疇處也盖有明末季驟加遼餉至八百餘萬竭天下之力奉東北一隅未收片甲之用而兵食兩詘人民離畔我太祖髙皇帝一舉薩爾滸而遼左之業成太宗文皇帝再舉吕翁山而闗西之勢定今因叩謁祖陵親履其地思經營草昧之艱難爰恭紀其事以示來許俾念祖宗得天下之不易益勵守成之志亦以舉其殷鍳明之鹿亡其必有以失之之故也連山相接塔山峯溝濠壁塹凡㡬重以守則固以戰勝將以勇氣吞遼東増募戍卒號百萬重臣經畧操鐵劵朝拜㤙命暮縲紲舉棋不定曽無算監軍意氣壮且豪凌駕朝士如兒曹綿山亘海排鐵騎謂當唾手成勲勞太宗從容處以暇精兵已伏杏山下金支五色雲上蟠明卒望見魂驚怕奔走禦侮多英賢投石超距衆閒閒君臣一徳功乃建人心既單必格天彼志離兮我志合如枯易摧朽易拉不數唐帝美良川祗今戰氣猶森颯陸血標杆海屍浮乗潮㕍鶩隨波鷗一時破竹十三萬傷我十人厮卒儔清流闗側擒皇甫煌煌大業開疆土河山帯礪酬勲庸於鑠雲龍與風虎乃知皇天惟徳親桓桓謨烈告後人從来守成事不易殷鍳應思鹿失秦交則為泰塞則否九重宴安豈宜恃不見吕翁山畔上將䧏猶設椒漿奠忠鬼松山御製松山詩烽銷堠戍間萬古此松山羽衛經過處頻思創業艱塔山親王等太宗壬午年遣鄭率兵克明塔山城杏山親王等太宗壬午年遣鄭率兵䧏明杏山城御製雪後過杏山詩岝㟧羣峰玉筍攢翠㣲佳色入慿觀踈林蔽芾迷歸鳥猶帯當年戰氣寒聮鶱銀鳯自飛來獨峙朝陽霽景開古戍黄蕪嘶馬去題詩遥寄白雲隈每逢咏雪興偏豪況對嶤峯積翠髙此日蕭閒供白戰曩時辛苦憶黄旄謹案自噶哈嶺以下古無稱引而我太祖太宗肇造區夏百戰開基駿烈豐功於是焉在諸山之名遂炳耀古今與天地無極謹據開國方畧所載臚叙如右有非天作之詩嶞山之頌所能彷彿萬一者矣附載單單大嶺後漢書昭帝始元五年罷臨屯真畨以并樂浪元菟元菟復徙居句驪自單單大嶺巳東沃沮􅐮悉属樂浪後以境土廣逺復分嶺東七縣置樂浪東部都尉建武六年省都尉官遂棄嶺東地三國魏志漢武帝分朝鮮為四郡自單單大嶺以西屬樂浪自嶺以東七縣都尉主之三國魏志沃沮屬樂浪漢以土地廣逺在單單大嶺之東分治東部都尉治不耐城别主嶺東七縣册府元龜漢昭帝始元五年元莵郡徙居句驪自單單大嶺已東悉屬樂浪後以境土廣逺復分嶺東七縣置樂浪東部都尉案單單與滿洲語善延相近疑即長白山也盖馬大山魏志東沃沮在盖馬大山之東丸都山魏志毌丘儉遣王頎追髙句驪王宫過沃沮千有餘里到肅慎氏南界刻石紀功刋丸都山銘不耐城通考漢末髙麗王伊夷模作新國於丸都山下魏正始五年毌丘儉將萬人出元莵懸車束馬登丸都山屠其所都六年儉復伐之刻石紀功刋丸都銘不耐而還至晉建元初慕容皝乗勝追至丸都案丸都山在髙麗之丸都城渤海之桓都縣據賈躭紀去鴨緑江口六百三十里詳前疆域門善玉山魏書勿吉傳自和龍北二百餘里有善玉山祁黎山魏書勿吉傳善玉山北行十三日通考作三十日有祁黎山又北行七日至如洛􅅛水案和龍為令土黙特右翼地如洛瓌北史作洛懷即老哈也魏史所称皆未到勿吉國以前所經則善玉祁黎二山皆在今䝉古東南境詳前疆域門天門嶺舊唐書渤海大祚榮保阻自固則天命李楷固率兵度天門嶺以迫祚榮祚榮合髙麗靺鞨之衆以拒楷固王師大敗楷固脱身還案祚榮始居營州後東奔保阻楷固兵度天門嶺以迫之楷固既敗則天不能討祚榮遂東保東牟山則天門嶺當在今承徳縣西境獨山新唐書程名振攻沙卑城破獨山陣皆以少擊衆案沙卑城為今海城地獨山亦當在其處佛寧嶺金史太祖度佛寧舊作盆搦今改正嶺破埒克城金史太祖以三十人詣薩哈軍道遇人曰敵已據佛寧嶺南路矣衆欲由沙班嶺往太祖曰汝等畏敵耶既度佛寧嶺不見敵已而聞敵乃守沙班嶺以拒我金史初太祖過佛寧嶺經烏塔城下從騎有後者烏塔城人攻而奪之釡及破将克其人持釡而前曰奴輩誰敢毁詳衮之噐也温都爾山金史上京山有温都爾舊作完都魯今改正哈達拉山金史天輔五年斡魯敗錫勒哈達於哈達拉舊作合撻剌今改正山誅首惡四人餘悉撫定金史斡魯討錫勒哈達至希爾根河錫勒哈達遯去追及於哈達拉山阿嚕岡金史收國元年上率兵次寧江州西遼軍潰圍出逐北至阿嚕岡額斯琿山金史太祖伐巴圖與烏庫哩部沿屯水過摩琳鄉追及巴圖於額斯琿舊作阿斯温今改正山北濼之間殺之布爾罕山金史太祖克寧江州使羅索招諭係遼籍女真䧏伊屯伊罕路達哈藩卓勒等敗遼兵於布爾罕舊作婆剌趕今改正山呼岱巴岡金史收國元年追及遼主於呼岱巴舊作䕶步荅今改正岡古納嶺金史烏楞古與遼托卜嘉戰敗之斬托卜嘉古納舊作酷輦今改正嶺烏爾圖罕等十四達哈藩皆䧏托輝山金史呼實黙率族屬部衆詣薩哈烏珍䧏營於托輝舊作駞囬今改正山之下色辰嶺金史烏春舉兵来戰道色辰舊作斜寸今改正嶺涉和倫拉林水舎於珠格部阿勒哈村案金史又有色辰水巴固嶺金史訥格納遯去烏色督軍而進至巴固舊作巴忽今改正嶺西茂宻水及之大破其衆曹家山金史𤓰里據威平賊勢益張權曹家山明安綽竒集兵千餘扼於夜河賊不得東綽竒敗𤓰里遂犯濟州珠格崖金史斡突自泰州往攻濟州元帥完顔黙音等至珠格舊作术虎今改正崖輕騎襲其輜重斡罕還救遇於長濼官軍馳擊大破之斡罕率其衆西走金史黙音率諸軍討斡突會兵於濟州過泰州至珠格崖乃捨輜重輕騎追之及於霿河急擊敗之裊嶺金史大定初契丹叛宗室襄從黙音討賊戰於肇州之長濼賊走霿河復從布薩忠義追賊至裊嶺西之陷泉及之案今翁牛特左翼西南一百十里有梟嶺字形相近或即是也佛門山金史世宗二十三年遷山東東路八穆昆處之河間其棄地以山東東路特赫河明安下扎哈穆昆額勒敏鄂勒歡明安下錫布穆昆佛們舊作付母温今改正山穆昆九村人户徙於瑠僧安和二穆昆之舊地案此以舊地名所遷之明安穆昆羅卜科達巴金史布薩師恭上京羅卜科達巴舊作老哈達葛今改正人多科阿林金史圖克坦繹其先上京阿勒楚喀人祖薩噶爾瑪克國初有功授隆安府路哈濟穆昆多科舊作奪古今改正阿林明安海蘭哈達金史完顔特爾格襲父率賔路海蘭哈達明安薩巴山金史烏庫哩元忠大定十八年授薩巴舊作撒巴今改正山世襲穆昆伯爾克山金史富珠哩阿嘍罕隆州伯爾克舊作琶離葛今改正山人禪嶺金史烏雅沃哩布海蘭路禪嶺人也巴爾嘉山金史延扎們都隆州巴爾嘉舊作帕里干今改正山人也烏克登山金史烏雅富埒琿海蘭路烏克敦舊作烏古敵昏今改正山人封豳國公孫扎昆襲烏克敦山世襲明安阿穆濟山金史通吉義哈斯罕人也徙居遼陽之阿穆濟舊作阿米吉今改正山博諾山金史永元天徳初授博諾舊作百女今改正山世襲穆昆烏爾古山元一統志烏爾古舊作吾里哥今改正山在遼陽路廢博索府濛溪山明統志濛溪山在三萬衛東北七百四十里松花江東岸牛心山明統志牛心山在三萬衛東北二百五十里艾河北土河東案今喀喇沁左翼有牛心山土河在喀喇沁右翼東南百八十里或即是也額爾根山明統志額爾根舊作阿兒干今改正山在三萬衛東北三百五十里古信州東謹案自單單嶺以下皆散見諸書而金史尤夥或今古殊稱或傳聞未審求之音譯時有相通而考之輿圖未能確証類附於後以謹傳疑至明時以山川名衛者具詳疆域門兹不複載欽定滿洲源流考卷十四
