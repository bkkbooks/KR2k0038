body:
  text: 部族七完顔五代金史世紀金之先出靺鞨另條見前氏古肅慎另條見前地也五代時附屬于契丹在南者籍契丹曰熟女真在北者不在契丹籍號生女真按滿洲語稱國初所屬曰佛滿珠謂舊滿洲也新附編入旗分者曰伊徹滿珠謂新滿洲也此所云生熟盖即新舊之意生女真地有混同江長白山所謂白山黒水也金之始祖諱哈富舊作函普初從髙麗來按通考及大金國志皆云本自新羅來姓完顔氏考新羅與髙麗舊地相錯遼金史中往往二國互稱不為分别以史傳按之新羅王金姓相傳数十世則金之自新羅來無疑建國之名亦應取此金史地理志乃云以國有金水源為名史家附㑹之詞未足憑耳居完顔部布爾噶滿洲語叢栁也舊作僕今改正水之涯生二男長曰烏嚕舊作烏魯次曰斡魯遂為完顔部人至獻祖徙居海古勒蒙古語行軍殿後也舊作海古今改正水耕墾樹藝始築室有棟宇之制自此遂定居于阿勒楚喀水之側矣按金史云國言金曰安出虎以安出虎水源于此故名金源考滿洲語稱金曰愛新與安出虎音不相渉大金國志亦祗言國産金及有金水源其以安出虎為金葢作史者强加附㑹猶黑水掬之㣲黑鴨渌江色若鴨頭之論耳金自始祖四遷至此後為上京故地實與今阿勒楚喀拉林河源相近詳見下疆域門六世至景祖稍役屬諸部修弓矢偹噐械前後願附者衆鄂敏舊作斡冺水富察舊作蒲察部特克新特布舊作泰神忒保水完顔部圖們舊作統門按圖們江在今寕古塔城南六百里源出長白山水完特赫舊作温廸痕部舎音舊作神隠水完顔部按此二完顔部盖族姓之散居者皆相繼來附大金國志金國本名珠里真謹按所本朝舊稱滿珠屬曰珠申與珠里真音相近但㣲有緩急之異寔皆肅慎之轉音也後訛為女真或曰慮真肅慎氏之後渤海另條見前之别族也唐貞觀中靺鞨來中國始聞女真之名按通考云五代時始稱女真據此則唐時已有是稱矣世居混同江之東長白山下南隣髙麗北接室韋西界渤海東瀕海三國志所謂挹婁另條見前元魏所謂勿吉另條見前唐所謂黑水靺鞨者今其地也其屬分六部有黑水契丹目為混同江按混同即松阿哩江雖下流與黒龍江會實係二水此合為一亦誤居江之南者謂之熟女真以其屬契丹也江之北為生女真亦有受宣命號太師者契丹自賔州混同江北八十里建寨以守之契丹恐女真為患誘豪右數千家處之遼陽之南使不得與本國往來謂之哈斯罕滿洲語藩籬也志云不得與本國往來寔有防閑之義舊作合蘓欵又作曷蘓館今改正東北分界入山谷至涑沬江按涑沬即混同而志並稱盖誤以混同為黒龍江也中間所居之女真𨽻咸州兵馬司謂之輝發舊作囬覇亦作囬㧞案咸州在今威逺英峩門之間東北至松阿哩江約六七百里今有輝發河因國初尼瑪察部人旺吉努于河邉築城以居號輝發國盖猶沿其稱也極逺而野居者謂之黄頭女真又居涑沬江之北寕江州之東地方千餘里户十餘萬族帳散居山谷無國名自推豪傑為長小者千户大者数千户葢七十二部落之一也或云金祖本新羅人號完顔氏傳至太祖以其國産金及有金水源故稱大金按志但言有金水源未甞以安出虎為金考金源之稱始於遼中京有金源縣以地有金甸為名金元並因之在今喀喇沁右翼地則金源之稱固與安出虎無渉且金本紀載太祖建國之詔曰賔鐵雖堅終亦變壊惟金不變于是國號大金是併未甞因水取名矣通考女真盖古肅慎氏五代時始稱女真後避契丹主宗真諱更為女直俗訛為女質按巴堅舊作阿保機吞北方三十六國此其一也遼通考按巴堅遷女真豪右數千家於遼陽南而著籍焉謂之哈斯罕哈斯罕者熟女真也𨽻咸州兵馬司者謂之輝發輝發者非熟女真亦非生女真也自涑沫江之北寕江之東地方千餘里户十餘萬無大君長亦無國名小者千户大者數千則謂之生女真宋建隆後屡遣使來淳化時契丹伐女真女真衆纔萬人而弓矢精勁又為灰城以水淋之為堅氷不可上距城三百里燔其積聚設伏於山林間契丹既不能攻城野無所取遂引騎去大為山林之兵掩襲殺戮大中祥符三年契丹征髙麗道由女真女真復與髙麗合兵拒之契丹大敗而還自天聖後屬契丹世襲節度使兄弟相傳其帥本新羅另條見前人號完顔氏女真服其練事以首領推之自哈富觧見前此又作龕福今併改按此所載諸名與金史異同者頗多今俱從金史改正仍注原文於下後同以下班班可紀哈富生烏嚕舊作訛魯烏嚕生雅哈舊作洋海雅哈生蘓赫舊作随濶蘓赫生實魯寔魯生呼蘭舊作胡來呼蘭三子伯曰和勒博舊作核里頗叔曰富勒蘓舊作蒲剌束季曰伊克舊作楊割伊克聚族帳最多謂之伊克太師能用其人遂稱强諸部賦歛調發刻箭為號事急者三刻之粟粥燔肉為食上下無異品和勒博四子長曰烏魯斯舊作吳喇束次太祖次太宗次曰賽音舊作撒也永昌八年秋太祖盡得遼東長春兩路始稱皇帝建元天輔改國號大金契丹國志女真國乃肅慎故區也地方數千里户口萬餘無大君長立首領分主部落地饒山林契丹於長春路置東北統軍司黄龍府置兵馬都部署司咸州置詳兖舊作詳穏司分𨽻之黄頭女真皆山居號哈斯案此又合二部為一盖契丹志為葉隆禮所撰傳聞之詞未得其真也其人勇鷙契丹每出戰皆被以重札令前驅契丹國志東南五節度熟女真部族共一萬餘户皆處山林尤精弋獵其地南北七百餘里東西四百里西北至東京五百餘里又次東南至熟女真國其地東西八百餘里南北千餘里居民皆處山林耕養屋宇與五節度同無首領統轄至東京二百餘里東北至生女真國居民屋宇耕鑿言語衣装與熟女真並同精於騎射前後屡與契丹為患契丹亦設防偹南北二千餘里沿邉創築城堡屯守其南界西南至東京六百里遼史營衛志阿延滿洲語尊大也舊作奥衍今改女真部聖宗以女真户置𨽻北府節度使屬西北路招討使司戍鎮州境自北至河西部皆俘獲諸國之民初𨽻諸宫户口蕃息置部訖於五國皆有節度使伊徳舊作語有力也舊作乙典今改女真部聖宗以女真户置𨽻南府居髙州北國外十部有長白山部遼史兵衛志伊徳女真部𨽻西南路招討司又有東北路女真兵馬司又髙州屬國軍有北女真南京女真女真哈斯罕輝發金金史本紀收國元年正月壬申朔羣臣奉上尊號是日即皇帝位上曰遼以賔鐵為號取其堅也賔鐵雖堅終亦變壊惟金不變不壊金之色白完顔部色尚白於是國號大金改元收國案金開國以後具詳金史兹不復載大金國志女真靺鞨之後也其國在元魏齊周之時稱勿吉至隋稱靺鞨地直長安東北六千里東瀕海分為数十部有黑水白山等名後為奚契丹所攻部族分散其居混同江之上者初名女真乃黑水舊部大金國志女真在契丹東北隅地饒山林國初之時族帳散居山谷地千餘里無城郭居止自後并遼得大遼全盛之地深入中原舉大江以北皆有之疆宇始廣矣元元史地理志開元路古肅慎之地隋唐曰黑水靺鞨後屬渤海渤海寖弱黑水復有其地即金祖之部落也元初立開元南京二萬户府又設軍民萬户府五分領混同江南北之地並見後疆域門其居民皆碩逹勒逹舊作水逹逹今改正女真之人各仍舊俗以射獵為業設官牧民随俗而治謹按金始祖本從新羅來號完顔氏所部稱完顔部新羅王金姓則金之逺𣲖出於新羅所居有白山黑水南北之境二千里而遥固與本朝肇興之地輪廣相同大金國志言金國本名珠里真與本朝舊稱所屬曰珠申相近實即肅慎之轉音也五代以後盡得靺鞨舊部於是女真之名始著考之遼史有繫籍不繫籍之分繫籍者惟遷居遼陽之南數千家所謂哈斯罕大王不繫籍者亦間有節度太師之號所謂長白山太師輝發部太師是也金景祖亦曾受遼太師之稱而終不肯受印繫籍遼人於邉境南北距千二百里築城置戍葢其震懾兵威者至矣自始祖八世十帝遂至太祖應運造邦滅遼臣宋迹其初起衆未滿千洵由山川鍾毓騎射精嫻故能所向無前光啟方夏也竒功偉績具詳金史兹録其開國時舊部分合之由而完顔氏之𨽻籍八旗者具載姓氏通譜至若上京及呼爾哈海蘭諸路建置之詳則别載於後疆域門云建州唐新唐書渤海傳率賔故地為率賔府領華益建三州按建州之名始見於此考率賔故地在今吉林烏拉境遼地理志云康州世宗遷率賔人户置所屬有率賔縣志云本渤海率賔府地考遼康州及率賔縣俱屬顯州為渤海顯徳府地在今廣寕境當亦遷率賔人户所置非故府地盖遼志固别有率賔府在涑州定理之間也又鴨渌江本名益州江則益州亦去長白不逺渤海建州固與國初所統之地相近矣遼遼史營衛志孝文皇太弟敦睦宫以渤海另條見前建瀋巖三州户置屬州三建瀋巖按此為建州移于西北之始志云以三州户置明非渤海建州之舊率賔故地在遼為東京此屬中京遼史所謂在靈河之南者是也遼史地理志中京道興中府本號霸州彰武軍節度制置建霸宜錦白川等五州建州保静軍節度使唐武徳中置昌樂縣太祖完葺故壘置州按此云置不言仍渤海之舊其非率賔故地明矣漢乾祐元年石晉太后詣世宗求於漢城側耕墾自贍許於建州南四十里給地五十頃州在靈河之南按靈河以元一統志考之當即凌河屡遭水害聖宗遷於河北唐崇州故地初屬武寕軍𨽻永興宫後屬敦睦宫統縣二永霸永康按此則建州再移於遼聖宗時其在靈河之南者遼初所置州城是也在靈河之北者自聖宗以後至金元相承不改考大清一統志在今喀喇沁及土黙特地故城在土黙時右翼西南一百二十里周二里餘四門與喀喇沁左翼毗連明屬三衛契丹國志節鎮三十三處有建州金金史地理志建州保靖軍刺史遼初名軍曰武寕後更今名金因之領縣一永霸唐昌黎縣地大金國志刺史七十五處有建州按金承遼舊非渤海建州故地也元元史地理志大寕路唐初屬營州貞觀中置饒樂郡遼為中京大定府金因之元初為北京路總管府領川建等十州元至元七年改北京為大寕仍領川建等州按元承遼金之舊非明時之建州也元一統志金上京城古肅慎另條見前氏地按圖册所載京之南曰建州京之西曰賔州又西曰黄龍府北曰肇州府之東曰永州曰昌州延州東北曰呢嚕干城皆渤海遼金所置州縣並廢城址猶存海蘭河經故建州東南一千里入於海混同江北流經故建州五十里會諸水東北流經故上京下逹五國頭城按此所云故建州盖渤海之舊在金上京之南者金之上京自開元東抵寜古塔自長白北抵阿勒椘喀幅員甚廣考金地理志云上京山有長白青嶺水有阿勒椘喀混同江拉林河皆在今吉林境又云東至呼尔哈路六百三十里西至肇州五百五十里東南至海蘭路一千八百里呼尔哈河在寕古塔城旁海蘭河在寕古塔城南四百十里據四至以求其中則金上京正在今吉林城東北阿尔椘哈阿旁而渤海之建州東去松花江北流之所五十里東南去海蘭河一千里亦在吉林境眀初土人猶沿舊稱耳又按境大清一統志海蘭河有五皆在寕古塔吉林内一入呼爾哈河三入混同江皆去海逺惟在寕古塔城南四百一十里源出無名山者東流㑹布爾哈圖河入海元志所云海蘭應即指此也並詳後疆域及山川門元一統志碓觜河在大寕路金源縣西東南入建州境合於靈河凌河在大寕路興中州源出龍山縣經本州下流逹建州境大凌河自建州界流經興中州東南下流入義州境凌水在大寕府建州南五里自富庻縣流至本境四十里入興中界一云發源龍山縣南八十里東北流百里入利州界又北經富庻縣東南三十里入建州境按此所云建州盖元時大寕所領即遼時以渤海建州人户移置者在凌河南者故城在錦縣西北在凌河北者故城在土黙特右翼西南皆非渤海之舊也金源龍山富庻並元大寕路屬縣今屬喀喇沁土黙特界明實録永樂二年置建州衛十年置建州左衛宣德七年置建州右衛謹按建州為本朝岐邠故地州置於渤海本在今吉林境至遼時一移於凌河之南再移於凌河之北金元相承置節度刺史而建州遂在今錦州邉外喀喇沁土黙特之間大抵東土州郡之名多始於渤海而移於遼遼志所載襲渤海之名而易其地者十居七八如率賔府遼遷其人户於今廣寕謂之率賔縣而其故地仍有率賔府在涑州定理之間涑州以涑沫江名定理府據一統志為興京而率賔府與之相連則所領之建州寔即國初所統之建州也以元一統志考之其祗稱建州者屬興中府在凌河南北為遼金所置眀屬烏梁海其稱故建州者近混同江北流之所即渤海所置是州雖已移而故地相傳舊稱尚在眀初因以名衛耳迨我肇祖原皇帝始居赫圖阿拉是為興京寔右衛之地舊邦新命王迹肇基恢天作之鴻模啟億年之景運嗣後若棟鄂哲陳蘓完及海西之烏拉哈逹輝發葉赫長白山之訥殷珠舎哩以至瓦爾喀呼爾哈黑龍江諸部並入版圖東極使犬諾羅諸部罔不率先臣服東京盛京以次締創出震乗乾有開必先矣附金史姓氏考按金史所載姓氏均與滿洲氏族相合第譯對字訛今悉據八旗姓氏通譜改正仍依百官志所載序次如左完顔金始祖自新羅來居完顔部因以為氏温特赫舊作溫廸罕今改正史云圖們江水温赫特部景祖時來附𤓰爾佳舊作夾谷布薩舊作僕散珠格舊作术虎又作凖葛今併改伊勒圖舊作移剌答沃哷舊作斡勤旺札卜舊作斡凖把阿布哈舊作阿不罕珠嚕舊作卓魯輝特舊作囬特輝罕舊作黒罕輝羅舊作㑹蘭徹木衮舊作沉谷賽宻哷舊作塞蒲里烏克遜舊作烏古孫舒爾都舊作石敦卓特舊作卓陀烏蘓占舊作阿厮凖博提斯舊作匹獨思博爾濟克舊作潘术古烏實拉舊作暗石剌舒古蘓舊作石古若珠爾罕舊作綴罕光嘉喇舊作光吉剌以上皆封金源郡費摩舊作裴滿圖克坦舊作徒丹温都舊作温敦烏凌阿舊作兀林答阿克占舊作阿典赫舍哩舊作紇石烈納喇舊作納蘭富珠哩舊作孛术魯珠勒根舊作阿勒根納哈塔舊作納合實嘉舊作石盞布希舊作蒲鮮𤓰爾佳舊作古里甲阿達舊作阿迭尼瑪蘭舊作聶摸欒穆延舊作抹撚納塔舊作納坦烏蘇舊作兀撒惹烏新舊作阿鮮拜格舊作把古温都遜舊作温古孫諾延舊作耨盌色赫哩舊作撒合烈烏色舊作五塞哈薩喇舊作和速嘉納雅舊作能偃阿里从原文巴爾舊作班兀里尼沙舊作聶散富色里舊作蒲速烈以上皆封廣平郡烏庫里舊作烏古論烏雅舊作兀顔鈕祜禄舊作女奚烈通吉舊作獨吉洪果舊作黄摑延札舊作顔盞博和哩舊作蒲古里必喇舊作必蘭斡哩舊作斡雷都克塔舊作獨鼎尼瑪哈舊作尼龎窟又作尼龎古今併改托羅特舊作拓特赫舒舊作合散沙逹喇舊作撒答牙阿蘓舊作阿速薩察舊作撒剗卓多穆舊作凖土谷納木都魯舊作納諸魯雅蘓貝舊作業速布額蘓哩舊作安煦烈爱新舊作爱申納克舊作拿可古勒渾舊作貴益昆斡色舊作温撒索歡舊作梭罕呼雅舊作霍域以上皆封隴西郡唐古舊作唐括又作同古今併改富察舊作蒲察珠嘉舊作木甲䝉古以原文又作䝉刮亦作䝉括今併改伯蘓舊作蒲速鄂屯舊作奥屯錫黙舊作斜邜愛滿舊作諳蠻都克塔哩舊作獨虎术魯摩年舊作磨輦伊年舊作益輦托諾舊作帖暖蘓伯林舊作蘓孛輦以上皆封彭城郡欽定滿洲源流考卷七
