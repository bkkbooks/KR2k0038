body:
  text: 欽定四庫全書欽定滿洲源流考卷十九國俗四物産御製盛京土産襍詠十二首有序盛京山川渾厚土壤沃衍盖扶輿旁薄鬱積之氣所鍾洵乎天府之國而佑唘我國家億萬年靈長之王業也是以地不愛寶百産之精咸稡於斯農殖蕃滋井里熙阜而且瓌珍可以耀采嘉珉可以興文豐毳可以章身靈苖可以夀世矧採於山獵於原䱷於江不可勝食不可勝用稽古圖經志乗罕得而詳焉余昔再莅陪都頌揚光烈惟物産闕而未詠兹展謁珠邱三至此地念夫豳風之陳衣食生民之溯藝植撫百昌而昭大美亦述祖徳者所不能忘也爰舉十二事各紀以詩且系之引具梗概云五榖地脈厚則榖寶滋黍稷稻梁菽麥之𩔖植無不宜畆獲數石而斗直三錢故百室盈而四鬴充嵗以為常神臯五榖種皆宜后稷穡同有相之畧異豳風躬耒耜兼精立政詰戎師髙原下隰秋常穫萬廩千倉嵗可期内地流民成土著胥吾赤子率聴平聲其盛京可耕之土甚多畿輔山左無業窮氓挈侣至者咸墾藝安居久之悉成土著日積日多雖于本地淳樸古風有礙然太平日乆户口蕃孽藉此以飬無萬窮黎故向有禁之之例而未嘗嚴飭也東珠東珠出混同江及烏拉寧古塔諸河中匀圓瑩白大可半寸小者亦如菽顆王公等冠頂飾之以多少分等秩昭寶貴焉出蚌隂精稱自古大東毓瑞未前聞混同鴨緑二江名圓流夥合浦交州獨産分取自珠軒供賦役採珠者乃打牲烏拉􅊶衣下食糧人户合數人為一起謂之珠軒以四月乗舟往至八月囬各以所得之珠納之於官如供賦然殊他蜑户効殷勤緯蕭亦識留名喻沽譽難更舊制云人葠深山邃谷中葠株滋茁嵗産既饒世人往往珍為上藥葢神臯鍾毓厥草效靈亦王氣悠長之一徴耳奥壤靈區産草神三椏五葉邁常倫即今上黨成凡品自昔天公葆異珍昔陶𢎞景稱人參上黨者佳今惟遼陽吉林寜古塔諸山中所産者神效上黨之參直同凡卉矣氣補那分邪與正人葠固能扶羸濟弱然余謂其助正氣即助邪火而人多思籍以滋補每受其害而不悟亦足嗤矣口含可别偽和真文殊曰能活能殺冷笑迷而不悟人松花玉混同江産松花玉色浄緑細膩温潤可中硯材發墨與端溪同品在歙阬之右長白分源天漢江混同江發源長白山國語曰松阿哩江松阿里漢語天河也俗呼為松花江而金史乃有宋瓦江之稱皆音轉之訛耳方流瑞氣孕靈厖琢為硯佐文之焕較以品知歙可降起墨益毫功有獨匪奢用樸徳無雙昨来偶製龍賔譜寶重三朝示萬邦近集内府所蔵硯繪圖系説輯為西清硯譜而松花玉硯則擇其曽經皇祖皇考題識及余所銘詠者入之貂烏拉諸山林中多有之索倫人以捕貂為恒業嵗有貢額第其等以行賞冬時供御用裘冠王公大臣亦服之以昭章采東瀛物産富難詳美毳猶稱貂䑕良食喜松皮和栗實色惟重黒乃輕黄貂豐厚純黑者為上紫次之黄又次之毛潤澤而香則以喜食松栗之實故也蝨談敝困蘇季子狗盗獻嗤齊孟嘗狐白那堪相比擬名裘黼黻佐朝章貂裘可作常服三品以上大臣及京堂翰詹官皆得用之若為端罩惟以供御餘則皇子諸王亦得用為朝祭之服鹿地多崇山茂林鹿蕃息而肥腯麋鹿尤他所罕覯扶餘之鹿所以稱美唐書也長白神山夏育夥鹿以四五月遇雨生麛交以八九月攜麛就暖出林窠長白山崇地冷鹿以夏月山中避炎至秋冬乃成羣就暖向盛京圍塲而来取之無盡用不竭賜以有常受者羅將軍等冬日行圍所獲麅鹿山積擇其肥者以進嵗率千餘年節頒賜羣臣受者如拜割鮮之恵焉抱朴稱来經目少趙髙指處戒心多分明角觧非同麈月令傳文早定訛月令謂仲夏鹿角解仲冬麋角解今試之鹿與吉林之麋無不解角於五月已知月令之訛後見南苑所育之麈實於冬至始觧角盖古人不便麋與麈耳經文不可易因改正靈臺時憲並為鹿角觧説以訂其誤熊羆盛京多窩集茂宻蓊翳連林數十里熊羆每跧伏其中熊趫㨗而羆憨猛皆獸之絶有力者甲戌行圍並曽殪之羆重千餘斤熊亦及半小者為熊大者羆羆惟東土始逢之熊各䖏皆有羆惟吉林盛京始有他䖏所無也蟄時居穴或居木熊羆冬令皆入蟄不食熊小或居木孔羆大則居穴也夢裏得祥必得兒力士刺須十始勝刺􅍑者不過五人一排向於盛京圍中使力士刺熊羆非十人不能勝蓋其力倍於虎也封駝負覺一難支獸哉何自觧人語異苑徒傳子路竒堪達漢堪達漢出黒龍江似鹿而大其角可作射韘色如象牙而堅白勝之韘間環以黒章一綫即角中之通理以㸃細宻而匀正者為最音義率同爾雅爾雅釋獸鹿絶有力音義俱相相近而字佩文韵未收今據廣韵用鹿中絶有力頎然垂胡固以樊纓比堪達漢國語馬樊纓也是獸項下懸肉相似因以得名戴角猶勝象决鐫履洳迅行如蹴雨逢岡遲進似騰烟是獸生山中而喜水行水則速行山則遲亦異聞也和闐玉韘夥新詠嘗命玉工仿角韘琢玉剏為之及和聞嵗貢美玉每擇其精好者製為韘屢有題詠數典於斯未可捐海東青羽族之最鷙者有黒龍江之海東青焉身小而健其飛極髙能擒天鵞搏免亦俊於鷹鶻鷙鳥従来有窟窠海東青窟鮮逢他鷹鵬皆有窠巢多縁峭壁為之人不能上惟海東青従未見其窠也徒傳飛至滄􅌡左亦自投於叢樾羅鶻骨雕周早輸健蠅營狗茍底須多禽中􅍑也却愁燕演雅名言可㑹麽輟耕録載演雅言海東青羽中虎也燕能制之羣集縁撲即墜云云以小制大物性徃往如此亦猶黄腰啖虎之類也鱏鰉魚盛京之魚肥美甲天下而鱏鰉尤竒巨口細睛鼻端有角大者丈計重可三百斤冬日輦以充庖備賜亦有售於市肆者都人分鱠之目為珍品物巨其中目小者可知賦性必良馴即如雪象殊常獸自合江鰉異别鱗蹲岸釣難投美餌鑿氷射要繋長緡魚出黑龍等江非釣所能得捕之者以綱圍至岸邊伺魚首向岸挽强射之魚負痛一躍而上至陸地即易于掩取冬日或鑿氷以捕則必繫長䋲於箭以掣取之頽然陳䖏欣兼惜倍勝椎牛饗衆人松子松子諸山皆産而窩集中所産更勝盖林多千年之松髙率數百尺枝幹既茂故結實大而芳美亦足徴地氣滋培之厚也窩集林多各種松中生果者亦希逢大雲遥望鋪一色寶塔近瞻湧幾重松子生松塔中其形下豐上鋭層瓣鱗砌望之如窣堵每各瓣藏一粒既熱則瓣開而子落鱗砌蚌含形磊落三稜五粒味甘濃偓佺曽遺去聲堯弗受小矣子房學步蹤温普温普國語譯漢音書之山中果也形似樝味丼而酢或借榅桲字書之考花木記以榅桲為梨别種則徒取音近固不相類耳山果還將山宻浸去聲大于北地小于南関内山樝大如弹丸製之可供殽核関外如熱河一帶之山樝小不及半亦不中食盛京所産温普大小介乎二者之間蜜漬之可以致逺實成露結而霜降味合梅酸與蔗甘可口已教述荘子狀形却覺漏嵇含地靈氣厚誠天府動植飛潜物普覃周禮職方氏東北曰幽州其利魚鹽其畜宜四擾其穀宜三種注四擾馬牛羊豕三種黍稷稻案幽州山鎮為醫無閭正属遼東之地而魚鹽之利榖畜之饒與諸史所載並同謹首録此條以徵物産蕃滋之自後漢書夫餘國土宜五榖出名馬赤玉貂豽注豽似豹無前足大珠如酸棗後漢書挹婁有五榖麻布出赤玉好貂好養豕後漢書馬韓人知田蠶作綿布出大栗如梨有長尾雞尾長五尺辰韓土地肥美宜五榖知蠶桑作縑布國出鐵凡諸質易皆以鐵為貨後漢書東沃沮土肥美背山向海宜五榖善田種有貂布魚鹽海中食物後漢書濊知種麻養蠶作綿布樂浪檀弓出其地又多文豹有果下馬髙三尺乗之可於果下行海出従魚案三國志作斑魚三國志夫餘土地宜五榖不生五果其國善養牲出名馬赤玉貂貁美珠珠大者如酸棗三國志挹婁俗好養豬出赤玉好貂今所謂挹婁貂是也三國志馬韓其民土著種植知蠶桑作綿布禽獸草木畧與中國同出大栗大如梨又出細尾雞其尾皆長五尺餘弁韓土地肥美宜種五榖及稻曉蠶桑作縑布國出鐵諸市買皆用鐵如中國用錢三國志濊有麻布蠶桑作綿其海出斑魚土地饒文豹又出果下馬漢桓時獻之晉書肅慎氏有馬不乗但以為財産而已案遼金軍制非近敵不乗戰馬所以惜馬力也肅慎氏之制當亦如此無牛羊多畜豬績毛以為布有樹名雒常若中國有聖帝代立則其木生皮可衣其國東北有山出石其利入鐵案山海經云肅慎之國有樹名曰雄常中國常有聖帝代立則此木生皮可衣也晉書作雒字形相近傳冩致異又或作頟常考字書雒頟二字相通與額同晉書夫餘國地宜五榖出善馬及貂豽美珠珠大如酸棗晉書辰韓地宜五榖俗饒蠶桑善作縑布冊府元龜魏景元三年肅慎獻其國弓三十張長五尺五寸楛矢長一尺八寸石砮三百枚皮骨鐵雜鎧二十領貂皮四百枚案元戚輔之遼東志畧云肅慎東北山出石其利如鐵取以為鏃即石砮而楊賔栁邉紀略以為楛木令寧古塔居人或得之呼爾哈河長三四寸色黒或黄或微白有文理非鐡非石相傳為肅慎故矢云云盖楊賔誤以石砮為楛木也通考挹婁有五榖牛馬麻布出赤玉好貂國東北有山出石其利入鐵將取之必先祈神魏書百濟國有五榖魏書勿吉國無牛有車馬有粟及麥穄菜則亦有葵水氣鹹凝鹽生樹上有鹽池多豬無羊嚼米醖酒飲能至醉有虎豹羆狼梁書新羅土地肥美宜植五榖多桑麻作縑布周書百濟土田下濕氣候温暖五榖雜果蔬菜及酒醴餚饌藥品之属多同於内地唯無駞驢騾羊鵞鴨等物北史百濟賦稅以布絹絲麻及米䓁量嵗豐儉輸之土田下濕氣候温暖人皆山居有巨栗其五榖雜果菜蔬及酒醴餚饌之属多同於内地唯無駞騾驢羊鵞鴨等北史新羅田甚良沃水陸兼種其五榖果菜鳥獸物産畧與内地同北史勿吉國土多粟麥穄菜則有葵水氣鹹生鹽於木皮之上亦有鹽池其畜多豬無羊嚼米為酒飲之亦醉隋書百濟國有五榖牛豬雞厥田下濕有巨栗隋書靺鞨土多粟麥穄水氣鹹生鹽于木皮之上其畜多豬嚼米為酒飲之亦醉隋書新羅田甚良沃水陸兼種物産輿華同舊唐書百濟國武徳四年其王遣使来獻果下馬貞觀十一年遣使來獻鐵甲雕斧舊唐書新羅國大厯八年遣使來獻金銀牛黄魚牙紬朝霞紬等舊唐書靺鞨其畜宜豬富人至數百口新唐書百濟國武徳間獻明光鎧新唐書新羅國畜無羊少驢驘多馬開元中其王興光獻果下馬朝霞紬魚牙紬海豹皮又上異狗馬黄金美髢諸物新唐書黒水靺鞨其畜多豕無牛羊有粟麥土多貂䑕白兔白鷹有鹽泉氣蒸薄鹽凝樹顛開元天寶間來獻鯨睛貂䑕白兔皮新唐書渤海俗所貴者太白山之兔南海之昆布柵城之豉夫餘之鹿鄚頡之豕率賔之馬顯州之布沃州之緜龍州之紬位城之鐵盧城之稻湄沱之鯽果有九都之李樂游之梨案九都當是丸都樂游當是樂浪之訛冊府元龜武徳七年百濟獻光明甲貞觀十三年百濟獻金甲雕斧永徽四年新羅獻金總布開元七年靺鞨獻鯨鯢魚睛貂䑕皮白兔貓皮十年渤海獻鷹十一年新羅王遣使獻果下馬及牛黄人參頭髪朝霞紬魚牙紬鏤鷹鈴海豹皮金銀等十七年渤海靺鞨獻鷹鯔魚十八年渤海靺鞨獻海豹皮五張豹䑕皮三張瑪瑙盞一馬三十匹二十二年新羅王遣其姪来獻小馬両匹狗三頭金百両銀二千両布六十匹牛黄二十両人参二斤頭髪一百両海豹皮一十六張二十五年渤海来獻鷹鶻二十六年渤海靺鞨獻豹䑕皮一千張乾文魚一百口天寶七載黒水鞨靺獻金銀及六十綜布魚牙紬朝霞紬牛黄頭髪人參唐㑹要靺鞨土多貂䑕皮骨咄角白兔白鷹等五代史女真地多牛鹿野狗醸麋為酒其南海曲有魚鹽之利其北出大魚契丹仰食又多黒白黄貂䑕皮北方諸國皆仰足宋㑹要新羅地宜槖駞水牛出人參水銀麝香松子榛子石決明松塔子防風白附子茯苓大小布毛施布草席䑕毛筆通志新羅土地肥美宜植五榖多桑麻果菜鳥獸物産畧與華同通考百濟氣候温暖五榖雜果菜蔬多同内地其海島出黄漆樹似小棕樹而大六月中取汁漆物器若黄金其光奪目通考新羅土地肥美宜植五榖多桑麻果菜畜無羊多馬有果下馬朝霞紬魚牙紬海豹皮通考濊其海出斑魚皮諸蕃志新羅地宜槖駞水牛不用錢以米博易民家器皿悉以銅為之地出人參水銀麝香松子榛子石決明松塔子防風白附子茯苓大小布毛施布銅磬瓷器草席䑕毛筆等商舶用五色纈絹及建本文字博易契卅國志女真國地饒山林田宜麻榖土産人參蜜蠟珠玉金銀細布松實白附子禽有鷹鸇海東青之類獸多牛馬麋鹿野狗白彘青䑕貂鼠契丹國志女真東北與五國為隣五國之東接大海出名鷹自海東来者謂之海東青小而俊健能擒天鵞𤓰白者尤以為異契丹國志寧江州𣙜塲以北珠人參生金松實白附子蜜蠟麻布之類為市契丹國志新羅國貢進物件金器二百両金抱肚一條五十両金紗羅五十両金鞍轡馬一匹五十両紫花綿紬一百匹白綿紬五百匹細布一千匹麄布五千匹銅器一千斤法清酒醋共一百瓶腦先茶十斤籐造器物五十事成形人參不定數細紙墨不定數契丹國志烏舍舊作屋惹今改正觧見前阿里瑪舊作阿里眉今改正觧見前國每年貢大馬蛤珠青䑕皮貂䑕皮膠魚皮蜜蠟等物鐵驪國貢馬蛤珠鷹鶻青䑕皮貂䑕皮膠魚皮靺鞨國以鷹鶻鹿細白布青䑕貂䑕皮大馬膠魚皮等與契丹交易程大昌演繁露契丹主滔爾河釣牛魚以占嵗松漠記聞每春氷始泮遼主必至寧江州鑿氷釣魚金史㑹寧府嵗貢秦王魚又貢豬二萬大定間俱罷之海蘭路舊貢海葱大定間罷之遼陽府土産白兔師姑布䑕毫白䑕皮人參白附子案秦王二字即鱏鰉之誤金史遼金故地濵海多産鹽上京東北二路食肇州鹽率賔路食海鹽臨潢之北有大鹽濼烏爾古實壘觧並見前部有鹽池皆足以食境内之民大定二十一年併遼東等路諸鹽塲為兩鹽司各行其地北京宗錦之鹽行本路及臨潢府肇州泰州之鹽與接壌者亦預焉二十四年帝在上京謂丞相烏庫哩元忠等曰舊率賔以東食海鹽夫餘呼爾哈等路食肇州鹽初定額萬貫今増至二萬七千若罷鹽引添竈户庶可易得二十五年還自上京謂宰臣曰朕聞遼東凡人家食鹽無引目即以私治罪細民徐買食之何由有引因為之罷遼東鹽使司通考女真國地多良馬獸多野豬野牛驢之𩔖以牛䭾物有紫青貂䑕皮北珠良犬及俊鷹海東青海東青者小而健能擒天鵝爪白者尤以為異出於五國之東大金國志女真土産人參蜜蠟北珠生金細布松實白附子禽有鷹鷂海東青之𩔖獸多牛馬麋鹿野狗白彘青䑕貂䑕無蠶桑惟多織布喜耕種松漠記聞寧江州多草木如桃李之𩔖皆成園至八月則倒置園中封土數尺覆其枝幹季春出之厚培其根否則凍死松漠記聞㮦柃木有文縷可愛多用為椀松漠記聞西𤓰形如扁蒲而圓色極青翠經嵗則變黄其瓞𩔖甜𤓰味甘脆中有汁尤冷常攜以歸可留数月但不能經嵗亦不變黄色有乆苦目疾者曝乾服之而愈松漠記聞鹿頂合燕以北者方可車須是未觧角之前才觧角血脉通冬至方觧案鹿角觧於五月此云冬至盖洪皓之誤好者有人字不好者成八字有髄眼不實北人謂角為鹿角合頂為鹿頂合南鹿不實定有髓眼不可車北地角未老不至秋時不中松漠聞聞麋角與鹿角不同麋角如駝骨通身可車却無紋鹿頂骨有紋上下無之亦可熏成紋北盟録女真土多林木田宜麻榖以耕鑿為業土産名馬生金大珠人參及蜜蠟細布松實白附子禽有鷹鸇海東青獸多牛羊麋鹿白彘青䑕貂䑕花果有白芍藥西瓜海多大魚螃蠏北盟録宋崇道熙寧之間競尚北珠北珠者皆北中来𣙜場相貿易美者大如弹子而小者若梧桐子皆出遼東海汊中每八月望月色如晝則珠必大熟乃以十月方採取珠蚌而北方沍寒九十月堅氷厚已盈尺鑿氷沒水而捕之又又有天鵝能食蚌則珠藏其嗉焉有俊鶻號海東青者能擊天鵝人既以鶻而得天鵝則於其嗉得珠焉海東青者出五國之東東接大海自海東而来者謂之海東青小而俊健爪白者尤以為異每嵗發甲馬千餘人即海東巢穴取之與五國戰鬬而後得馬擴茒齋自敘混同江以北不種榖麥所種止稗子自過嬪辰州東京迤北絶少麥麫每晨及夕各以射到禽獸薦飯同州地宜穄黍東望大山云新羅山其間出人參白附子周麟之海陵集有梁大使者先朝内侍也入館傳㫖賜金蘭酒二瓶銀魚牛魚二盤牛魚出混同江其大如牛案此即鱏鰉也宋人呼為牛魚耳周必大二老堂雜志牛魚一尾之直與牛同周樞宻麟之使金金主愛之享以所釣牛魚非舊例也樞宻糟其首以歸獻於朝同館王龜齡目為魚頭公元史産金之所遼陽省曰大寧開元産銀之所遼陽省曰大寧産珠之所曰碩達勒達産銅之所曰大寧産硃砂水銀之所遼陽省曰北京至元十三年於遼東雙城採金延祐四年遼陽惠州銀洞三十六眼立提舉司辦課又至元十一年命於松阿哩江愛呼江採珠至元十五年撥採木夫一千户于遼陽錦瑞州採銅硃砂水銀在北京者至元十一年命以率賔人户于濟喇敏之地採煉元史遼陽之鹽太宗丁酉年始命北京路徴收課税所以大鹽泊硬鹽立隨車隨引載鹽之法每鹽一石價銀七錢半帶納匠人米五升癸夘年海蘭路嵗辦課白布二千匹率賔路布一千匹至元四年立開元等路運司三年禁東京懿州硬鹽不許過塗河界元史肇州產魚哈喇巴圖爾為宣慰使得魚九尾皆千斤來獻明統志遼東土産鹽鐵榛各衛皆出松子三萬衛出茶海州衛出海絲菜復州衛出人參荆芥白附子五味子俱遼東都司出暖木樺木銀俱海州各衛出箭出三萬衛者尤佳滑石海州衛出水獺皮東寧海州各衛出貂䑕皮青䑕皮俱東寜衛出八梢魚金州衛出黄䑕海州衛出蠣房肋魚俱金州衛出欽定滿洲源流考卷十九
