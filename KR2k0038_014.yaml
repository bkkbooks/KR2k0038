平府領䝉州原本脫䝉州明志引遼史有之今據增入紫䝉縣尋徙遼城并入黃嶺縣渤海復置紫蒙縣遼因之屬遼陽府沱州遼史貴德州本漢襄平縣地有沱河按沱州無可考或因沱河得名今附見新唐書亦言湄沱湖之鯽為渤海物産之珍也東平寨遼史尚州本漢襄平縣地渤海置東平寨金史咸平府銅山縣遼同州本漢襄平縣遼以東平寨置南有柴河北有清河西有遼河遼史作尚州與此異考遼志别有尚州此東平寨之地當為同州以字相近而誤也懷逺府新唐書越喜故地為懷逺府領達越懷紀富美福邪芝九州按九州可考者惟富美福三州餘俱遼時廢遼史東京信州本越喜故城渤海置懷逺府武昌縣本渤海懷福縣地定武縣本渤海豹山縣地併乳水縣人户置金史上京信州本渤海懷逺軍遼開泰七年建縣一武昌本渤海懷福縣地按懷逺府當在渤海邊界其所統州為最多可考者惟富美福三州餘盡為遼所廢考信州故城在今科爾沁左翼東南三百八十里開原邊外金遼志稱自開原東北至信州三百十里是也今有古城周一里門八土人猶呼信州城富州遼史東京銀州富國軍本渤海富州太祖以銀冶更名統縣三延津縣本渤海富夀縣境有延津故城更名新興縣本越喜國地渤海置銀冶嘗置銀州永平縣本渤海優富縣地金史咸平府新興縣遼銀州富國軍本渤海富州熙宗皇統三年廢州更名來屬有范河柴河遼河詳前靺鞨疆域條按渤海富州治富夀縣遼更富夀為延津更優富為新興金改延津為新興以𨽻咸平今鐵嶺縣則渤海之富夀遼之延津金之新興也又有故新興城在鐵嶺治東則渤海之優富遼所置新興縣也又永平廢縣在鐵嶺東北美州遼史東京遂州本渤海美州地統縣一山河縣本渤海縣併黑川麓川二縣置福州遼史上京福州國舅蕭寧建南征俘漢民居北安平故地在原州北二十里西北至上京七百八十里按原州在顯州東北三百里史雖不言福州仍渤海之舊然以他州道里計之實屬相近其稱名當有自耳胡嶠北行記嶠為蕭翰掌書記自翰得罪被鎖嶠與部曲東之福州翰所治也嶠等東行過一山名十三山云此西南去幽州二千里又東行數日過衛州至福州按十三山在今錦縣城東七十五里去京師不及二千里嶠蓋約略之詞衛州當係渭州之訛在顯州東北二百五十里鐵利府新唐書鐵利故地為鐵利府領廣汾蒲海義歸六州按汾海二州無考遼之海州渤海為南海府另列前條非此州也蓋俱係遼廢遼史東京鐵利府故鐵利國地廣州遼史廣州漢屬襄平髙麗為當山縣渤海為鐵利郡太祖遷渤海人居之建鐵利州統和八年省開泰七年以漢户置金史瀋州章義縣遼舊廣州皇統三年降為縣來屬有遼河東梁河遼河大口按東梁河即太子河亦名大梁河明志章義故城在瀋陽中衛西南六十里有章義站松漠紀聞瀋州六十里至廣州七十里至大口蒲州松漠紀聞興州見前四十里至蒲河四十里至瀋州元一統志蒲河在瀋陽路源出鐵利國蒲谷流經蒲水田過故名按蒲州遼初已廢本鐵利國地自應以蒲河得名以洪皓所記考之距瀋州四十里今承德縣城西北四十里香爐山蒲河源在焉蒲州之設亦應在此義州遼史上京慶州富義縣本義州太宗遷渤海義州民於此重熙元年降義豐縣後更名遼史上京永州義豐縣本鐵利府義州遼兵破之遷其民於南樓之西北仍名義州重熙元年廢州改今縣在州西北一百里又嘗改富義縣屬慶州原誤泰州今改正始末不可具考今兩存之按富義義豐當係渤海義州縣名遼徙其民分屬慶永二州非渤海故地金史義州崇義軍遼宜州天德三年更名按遼史宜州崇義軍屬中京東丹王每秋畋於此興宗以定州俘户置與錦州相次實今義州地前所載富義義豐兩縣既云遷義州民於此雖仍舊名明非故地乃又云本渤海義州此自相矛盾也合遼金兩史考之似渤海義州之民分徙兩縣故地已空興宗時方以定州俘户實之以義為宜金時始更正耳元史大寧路有義州明一統志義州衛遼宜州金改為義州治宏政縣元省縣州屬大寧路洪武二十二年置衛按金元明之義州即今義州地在遼為宜州俱未言渤海之舊然考遼史實係東丹王分地為每嵗秋畋之所則實係渤海故壤宜與義或因音同而字異金朝改宜為義正非漫然耳又今義州城西南五十里有古饒慶縣城遼金並無此縣名金義州所屬但有饒慶鎮或即渤海舊縣而金廢為鎮歟歸州遼史東京歸州太祖平渤海以降户置後廢統和二十九年伐髙麗以所俘渤海户復置縣一歸勝安逺府新唐書安逺府領寧郿慕常四州按寧州慕州俱近朝鮮常州屬朝鮮平安道之定逺府郿州疑即平安道之買州考元史東寧路本髙麗平壤城所屬有定逺府至元六年來歸或即安逺府之地而稍易其名也寧州遼史東京寧州觀察統和二十九年伐髙麗以渤海降户置兵事𨽻東京統軍司統縣一新安慕州遼史東京慕州本渤海安逺府地故縣二慕化崇平久廢户二百𨽻渌州在西北二百里按遼慕州移屬渌州鴨緑軍則安逺一府固與今髙麗相近又考一統志朝鮮平安道有定逺府有常州當即仍渤海之舊又有買州字義無取疑即郿音之訛也郢銅洓三州新唐書郢銅洓三州為獨奏州按通考文與此同獨奏之義當猶今直𨽻州不轄於府而事得專達也遼史東京郢州渤海置遼史銅州廣利軍渤海置統縣一析木縣渤海為花山縣初𨽻東京後來屬按金史金廢銅州以析木縣𨽻澄州遼史咸州安東軍本髙麗銅山縣地渤海置銅山郡地在漢侯城縣北渤海龍泉府南開泰八年置州統縣一咸平縣唐安東都護治營平二州間即此按渤海諸州間有支郡之稱如盧州之稱杉盧郡定州之稱安定郡是也此銅山郡亦當為銅州所分治遼析為二州所云在營平間者為得其實至云在龍泉府南則約略之詞耳至金之銅山縣雖屬咸平府在遼為同州鎮安軍名同而地異亦相附近也金史咸平府本髙麗銅山縣地遼為咸州遼東行部志咸平本渤海地契丹改為咸州金為咸平府元一統志銅山郡故城在咸平府南元史咸平府古朝鮮地箕子所封漢屬樂浪郡後髙麗有其地唐置安東都護以統之繼為渤海大氏所據遼平渤海以其地多險隘建城以居流民號咸州金升咸平府元初因之𨽻開元路後復割出𨽻遼東宣慰司通考洓州以其近洓沫江蓋所謂粟末水也遼史東京洓州渤海置蓋州遼史辰州本髙麗蓋牟城唐太宗㑹李世績攻破蓋牟城即此渤海改為蓋州又改辰州以辰韓另條見前得名統縣一建安按以下四州皆在唐書通考所載六十州之外今並附於此蓋牟亦稱蓋曷牟金仍改蓋州統縣四湯池即遼鐵州秀巖即今岫巖熊嶽即遼盧州熊嶽縣並金時廢州來屬惟建安尚仍遼舊至元時併湯池熊嶽入建安又省建安入蓋州初為蓋州路後併入遼陽路即今蓋平縣也又熊嶽城在蓋州南六十里有熊嶽山熊嶽河崇州遼史崇州本漢長岑縣地渤海置州故縣三崇山溈水緑城皆廢户五百在京東北一百五十里按渤海州名有榮州無崇州榮為中京所屬與湯興二州相次今遼史以崇州次於湯興之後而東京所屬别有榮州又不載其沿革疑崇字即榮字之訛而榮州又復出也遼史貴德州貴德縣本漢襄平縣渤海為崇山縣奉德縣本渤海緣按此又作緣與前異城縣地按金史貴德縣有范河見前定理府注集州遼史集州古陴離郡地漢屬險瀆縣髙麗為霜巖縣渤海置州統縣一奉集縣渤海置按奉集廢縣在今撫順城南八十里金史貴德州奉集縣遼集州奉集縣本渤海舊縣有渾河麓州遼史麓州渤海置按唐書通考渤海無此州名遼史載其名而不詳其地又遼乾州所屬之司農縣本渤海麓郡縣併麓波雲川二縣入焉亦未詳渤海所𨽻之州今附於此乾州為漢無慮縣地因醫巫閭得名或麓州麓郡亦因附北鎮之麓而名歟謹按渤海五京五府之外為長嶺等十府長嶺在吉林西南夫餘府在開原鄚頡在開原邊外科爾沁界定理府在鐵嶺以南承德界安邊府亦在開原邊外率賓府與本朝發祥之鄂多理城相近東平府在廣寧東北懷逺府在鐵嶺鐵利府濱太子河安逺府在髙麗界其後所屬之州半為遼時廢併而因革可溯者尚多又有郢銅洓三州不𨽻於府合之十五府所屬共為州六十與所稱六十二州之數不符考之遼史則又别出蓋崇集麓四州唐書通考皆未之載與六十二州之數亦不合今以地理考之蓋集二州與顯德府屬之鐵州盧州相近當時或間有省併而史不能詳崇州疑即榮州以字形相近而訛麓州則史文殊略今附列於諸州之後而支郡之可考者亦各附於本條至若古今沿革及山川道里有足證據臚注於下凡史文舛誤及名同而地異者並加訂正用資參考云欽定滿洲源流考卷十
