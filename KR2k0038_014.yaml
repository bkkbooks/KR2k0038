body:
  text: 疆域三渤海國境新唐書渤海本粟末靺鞨保挹婁之東牟山按東牟山史志皆言在瀋陽城東二十里今天柱山也舊唐書作桂婁與此異直營州東二千里以泥河為境按元一統志引契丹地理志云浿水即古泥河也自東逆流數百里至遼陽豬蓄不流有蓒芋草生於泊中故名蓒芋泊明一統志徙之又以朝鮮大通江為浿水考平盛京通志泥河在海城縣西南六十五里蓋縣北五十五里源出聖水山流至米真山西散漫為遼時之蓒芋泊與朝鮮界內之浿江不同也東窮海西契丹築城郭以居萬嵗通天中度遼水保太白山之東北阻奧婁河樹壁自固按太白即長白奧婁河當為阿魯河源出吉林諳班和託峯一西南流入哈達河一流至開原城東南入清河是時契丹李盡忠殺營州都督趙文翽故渤海退保於此後乃建國地方五千里户十餘萬盡得夫餘沃沮辨韓俱另條見前朝鮮海北諸國有五京十五府六十二州通考渤海國王大武藝斥大土宇東北諸國畏臣之遼史渤海王大仁秀南定新羅另條見前北略諸部開置郡邑遼史渤海大氏始保挹婁東牟山武后時為契丹盡忠所逼有乞乞仲象者度遼水自固傳子祚榮建都邑併吞海北地方五千里中宗賜所都為忽汗州封渤海郡王十有二世至彛震稱號改元建宫闕有五京十五府六十二州為遼東盛國按遼史所稱凡渤海拓地改元及五京十五府六十二州之建皆自國王大彛震始據唐書及通考國王大祚榮已諡髙王祚榮子武藝已改元仁安武藝子欽茂已徙上京又徙東京自大祚榮以後無不稱號改元者遼史所云未得其實元史遼陽路唐以前為渤海所有忽汗州忽汗城新唐書睿宗先天中拜大祚榮為渤海郡王以所統為忽汗州領忽汗州都督唐賈耽道里紀渡遼水至安東都護府五百里府故漢襄平城也按安東都護府本在平壤儀鳯初移此東南至平壤城八百里西南至都里海口六百里至建安城三百里故平郭縣也南至鴨渌江北泊汋城七百里故安平縣也自都護府東北經渤海長嶺府見後千五百里至渤海王城城臨忽汗海其西南三十里有古肅慎城其北經德理鎮按此即唐㑹要所云德理府也渤海無德理府之名此作鎮為是至南黑水靺鞨千里按此為營州陸行至渤海之路渤海大祚榮所都在長白山東北大欽幾又東徙三百里直忽汗河之東今寧古塔呼爾哈河也呼爾哈河滙於寧古塔城西南一百里之畢爾騰湖湖廣五六里袤七十里許中有三山即所謂忽汗海也又自發庫東繞寧古塔城旁古大城之南東北流與混同江合明一統志稱呼里改江出建州衛東南山下東北滙為鏡泊又北入混同江呼里改即呼爾哈鏡泊即畢爾騰湖之異名也德林石在其北即德里鎮所在也然則渤海上京及忽汗城實在寧古塔城旁其後國王世襲忽汗州都督之號凡五京皆有忽汗州之稱矣唐賈耽道里紀登州東北海行至鴨緑江口舟行百餘里又小舫泝流三十里至泊汋口得渤海之境又自顯州見後正北如東六百里至渤海王城按此為登州海行至渤海王城之路五代㑹要唐中宗命侍御史張行岌往渤海宣慰號其都為忽汗州遼史忽汗州故平壤城也號中京顯德府太祖攻渤海拔忽汗城俘其王大諲撰以為東丹王國按通考平壤城即漢樂浪郡王險城自慕容皓來伐後徙都此城亦曰長安城南臨浿水平壤城東北有魯陽山西南二十里有葦山考之圖志皆合實在今朝鮮境內髙麗圖經亦云平壤城在鴨緑水東南顯德府在今遼陽以北忽汗州非平壤城亦非顯德府遼史俱誤渤海王於天寶末徙上京貞元時徙東京未幾仍還上京天寶中又曽都顯州蓋既設五京則隨時移駐史固不能詳而當中京破時國王適在彼耳遼史天顯元年正月丙寅夜圍忽汗城庚午駐軍於忽汗城二月丙午改渤海為東丹忽汗城為天福册皇太子貝為人皇王以主之按遼史所稱忽汗城皆渤海中京顯德府城為今遼陽非上京之忽汗城也上京龍泉府新唐書以肅慎故地為上京曰龍泉府領龍湖渤三州通考天寶末渤海王大欽茂徙上京直舊國三百里忽汗河之東按渤海舊國在長白山東北今又東徙三百里在呼爾哈河之東實與今寧古塔城相近呼爾哈河源出吉林界色齊窩集中諸河滙為一大河東注鏡泊又東出繞寧古塔城旁古大城及覺羅城之南復東北折入混同江唐賈耽所云渤海王城臨忽汗海者蓋即鏡泊上盛京通志寧古塔城旁古大城或即京舊址歟遼史上京懷州夫餘縣本龍泉府太祖遷夫餘降户於此世宗置縣按遼史此條殊誤懷州奉陵軍本唐歸誠州太宗行帳放牧於此天贊中從太祖破夫餘城下龍泉府俘其人築寨居之太宗懷陵在焉故州軍以是為名歸誠州為唐契丹羈縻州本屬遼地為太宗放牧之所非渤海上京明矣龍州遼史太祖破龍州盡徙富利縣人散居京南長霸縣本龍州長平縣民遷於此按龍州所屬縣名僅見富利長平二縣餘無可考又按契丹與渤海攻戰次第具載太祖本紀太祖天贊二年十二月出兵先破夫餘府次至中京顯德府是時渤海王適在中京故為所獲太祖入城祭告天地復還軍中二月安邊鄭頡南海定理府降三月己巳安邊鄭頡定理府復叛丁丑三府平乙酉班師五月南海定理二府復叛七月顯德府之鐵州亦叛大元帥平之是月太祖還次夫餘府又自三月遣將攻長嶺府八月始下並未嘗逺及龍州而渤海仍自為國迄於遼末猶存龍州之破僅於此見之或率兵至此俘掠人口而還不能有其地也髙麗載紀初契丹以鴨緑江北地豫髙麗髙麗築六城有龍州城按遼史外紀云契丹取女真國鴨緑江東數百里賜髙麗是鴨緑江東北地皆與髙麗故得於龍州築城後復為女真所取今考自鏡泊至朝鮮界約五百里則與渤海之龍州當不甚逺蓋遼太祖破龍州遷其人而空其地以于高麗也湖州遼史東京湖州興利軍渤海置渤州遼史渤州清化軍渤海置貢珍縣亦渤海置按遼地志云遼以征伐俘户建州襟要之地多因舊居名之故渤海州縣遼移其名於他所者十之五六如建州在長白山而遼移之廣寧西北其明證也遼志中稍為分别者如曰某州本渤海某州民户則為遼所移曰某州渤海置則似仍渤海之舊然如遼史稱集州髙麗為霜巖縣渤海置州今考霜巖縣屬盧州無集州之名則史文固有疏略也中京顯德府新唐書上京之南為中京曰顯德府領盧顯鐵湯榮興六州按顯德府所屬西至醫巫閭山當在上京之西南遼史渤海中京顯德府天顯三年升為南京十三年改南京為東京府曰遼陽統縣九遼陽縣本渤海金德縣地漢浿水縣髙麗為句麗縣渤海為常樂縣按浿水縣漢屬東樂浪郡渤海鴨緑府所屬之浿水縣是也遼志誤仙鄉縣本漢遼隊縣地渤海為永豐縣鶴野縣本漢居就縣地渤海為雞山縣興遼縣本漢平郭縣地渤海為長寧縣按顯德府屬縣遼志沿革具存今附録如上又有析木紫䝉二縣遼屬遼陽府而渤海分屬銅州䝉州今各附本條又肅慎歸仁順化三縣則遼所自置非渤海之舊遼永州之長寧縣又遷長寧民所置亦非舊地也鴨江行部志廣寧本陽羅郡渤海為顯德府按廣寧東北界渤海屬東平府其西南之境為顯德府屬明一統志遼隊廢縣在海州衛西六十里渤海曰永豐縣遼改仙鄉縣鶴野廢縣在遼東都司城西八十里渤海為雞山縣元省入遼陽按明志顯德屬縣僅載此二邑今考常樂故縣在遼陽城內長寧縣在遼陽西南蓋平之東永豐縣在海城縣西六十里遼水東岸明時有永豐堡亦在海城縣西南六十里也盧州遼史東京盧州本渤海杉盧郡按杉盧郡即渤海之盧州顯德府之支郡也故縣五山陽杉盧漢陽白巖霜巖皆廢户三百在京東一百三十里統縣一熊嶽縣西至海十五里傍海有熊嶽山按遼盧州所治為熊嶽縣今熊嶽城也金廢州以熊嶽屬蓋州渤海盧州所屬五縣至遼止三百户故但治熊嶽一縣已非渤海之舊矣遼史東京巖州白巖軍本渤海白巖城太宗撥屬瀋州白巖縣渤海置按唐太宗貞觀十九年伐髙麗既得遼州進軍白巖城克之置巖州後屬渤海白巖縣當即其地今考巖州古城在遼陽州城東北五十七里石城山上周圍四里一門又遼營衛志云敦睦宫以渤海巖州户置是渤海亦有巖州之稱蓋隨時移置而史不能詳也顯州唐賈耽道里紀自神州見後陸行四百里至顯州天寶中王所都按顯州為王都當為顯德府附郭之州今次於盧州之後疑史有誤遼史東京顯州本渤海顯德府地世宗置以奉顯陵州在醫巫閭山東南按渤海顯州實今遼陽州地遼之顯州不言渤海所置然亦係顯德府之地松漠紀聞廣州見後百三十里至梁漁務又八十五里至沙河五十里至顯州鐵州五代史自錦州行五六日過海北州又行十餘日渡遼水至渤海鐵州又行七八日過南海府按此為晉侯入契丹所行之途一南一北故迂其程未足為憑也遼史鐵州本漢安市縣地髙麗為安市城唐太宗攻之不下薛仁貴白衣登城即此渤海置州故縣四位城河端蒼山龍珍皆廢户一千在京西南六十里按明一統志安市城在蓋州衛東北七十里唐貞觀十九年征髙麗攻安市城不克引還咸亨三年髙侃擊敗髙麗餘衆於安市城渤海置鐵州即此地志安市城外有駐蹕山考駐蹕山凡數處一為首山唐書稱馬首山遼史稱手山在遼陽城西南十五里接海城縣界唐太宗初渡遼水攻遼州時駐營之山也一在安市城外唐太宗既得遼州巖州進攻安市所駐之山唐書所載駐蹕山是也又蓋平東百十餘里分水嶺諸山亦傳唐太宗駐蹕處又駐蹕山本名六山則醫巫閭也又海城縣西南十里有平頂山一名車駕山又名唐望山亦相傳唐太宗駐蹕處而首山與安市城外之駐蹕山地志多混為一山附考於此領縣一湯池按今蓋平城東北六十里有湯池堡當即湯池縣遺址也遼史天顯元年七月鐵州刺史衛鈞反大元帥耀庫濟攻拔之鴨江行部志湯池縣本遼時鐵州以其東有鐵嶺故名按明一統志載初置鐵嶺衛在今鐵嶺城東南五百餘里故鐵嶺城與髙麗接界洪武二十六年方移其名於今治所則鐵嶺之名實本於此金廢鐵州以湯池屬蓋州湯州遼史東京湯州本漢襄平縣地故縣五靈峯常豐白石均谷嘉利皆廢户五百在京西北一百里按遼史雖未言渤海所置然所屬故縣皆渤海縣名其為即渤海之湯州無疑明志湯州故城在遼東都司城北遼史東京乾州靈山縣本渤海靈峯縣地按乾州為漢無慮縣地無慮本因醫巫閭山得名則靈峯當亦相近金史北京懿州靈山縣本渤海靈峯縣地按遼亦有懿州而靈山則屬乾州考明一統志乾州在廣寧衛西南七里懿州在廣寧衛北二百二十里蓋金時廢乾州而以靈山縣移𨽻懿州也榮州遼史東京所屬有榮州原文不載沿革蓋作史時已無可考然遼東京有崇州為渤海所置所統縣名亦係渤海之舊而新唐書不載史云在東京東北一百五十里與鐵湯等州相近遼史本文亦與湯興二州相次疑即榮州以字形相近而誤又復出也今詳於後興州遼史興州本漢海宜縣地渤海置州故縣三盛吉蒜山鐵山皆廢户二百在京西南三百里按明人地志有以興州為鐵嶺縣之懿路城者考金志云瀋州挹婁縣遼舊興州常安縣懿路即挹婁之訛也則遼之興州始實移於挹婁後乃復渤海之舊又遼志云遼陽府東西南三面皆抱海南至海邊鐵山八百里今考鐵山在寧海西南百五十里為濱海要地興州所統縣名或取此歟松漠紀聞銀州南鋪五十里至興州四十里至蒲河按遼銀州即渤海富州今鐵嶺縣蒲河源出承德西北四十里東京龍原府新唐書濊故地為東京曰龍原府亦曰栅城府