body:
  text: 疆域六元瀋陽路元史瀋陽路本挹婁另條見前故地渤海建定理府叧條見前都督瀋定二州此為瀋州地契丹為興遼軍另條見前金為昭徳軍另條見前後皆燬於兵火元初平遼東髙麗國麟州神騎都領洪福源率西京都䕶龜州四十餘城來降各立鎮守司設官以撫其民後髙麗復叛洪福源引衆来歸授髙麗軍民萬户徙降民散居遼陽瀋州初創城郭置司存僑治遼陽故城中統二年改為安撫髙麗軍民總管府及髙麗舉國内附又以質子淳為安撫髙麗軍民總管分領二千餘戸理瀋州元貞二年併兩司為安撫髙麗軍民總管府仍治遼陽故城開元路元史開元路古肅慎叧條見前之地隋唐曰黒水靺鞨叧條見前唐置黒水府其後渤海另條見前盛靺鞨皆役屬之又其後渤海寖弱為契丹所攻黒水復有其地東瀕海南界髙麗西北與契丹接即金始祖之部落也太祖既㓕遼即上京設都金末其将布希舊作蒲鮮今從八旗姓譜改正萬努舊作萬奴今改正據遼東元初癸巳歳出師伐之生擒布希萬努師至開元率賔東土悉平開元之名始見於此乙未歳立開元南京二萬戸府治黄龍府至元四年更遼東路總管府二十三年改為開元路領咸平府後割咸平為散府俱𨽻遼東道宣慰司按開元本金上京境内地名元兵至此遂定其地而故上京一帯俱已殘毁因改建開元路非開元即上京也其初寄治黄龍府後徙於今開元縣地明初因以設衛亦非今開原縣即黄龍府也俱詳見前金上京條元史中統三年割遼河以東𨽻開元路四年罷開元宣慰司元一統志開元路南鎮長白之山北浸鯨川之海三京故國五國舊城亦東北一都會也元一統志開元勁健善戰習尚射獵咸平府元史咸平府古朝鮮地遼平渤海以其地多險隘建城以居流民號咸州另條見前金升咸平府領縣六叧條見前兵亂皆廢元初因之𨽻開元路後復割出𨽻遼東宣慰司元史至元二十五年増軍戍咸平府以察罕伊埓薩哈勒䝉古語察罕白色也伊埒明顯也薩哈勒鬚也舊作察忽亦兒思合今改正言其地舊邊徼請益兵以偹不虞故也海蘭府碩達勒達等路元史海蘭詳前金上京條府碩達勒達滿洲語隠避處也舊作水達達今改正等路土地廣濶人民散居元初設軍民萬户府五撫鎮北邊一曰屯舊作桃温今改正按屯河在今寧古塔東北七百里源出屯池南流入混同江明永樂二年曽置屯河衛及千戸所當即其地猶唐之羈縻州也距上都四千里舊訛四十里按元上都與海蘭府相去甚逺訛誤顯然今改正一曰呼爾哈今寧古塔河名見前渤海及金上京條距上都四千二百里大都三千八百里有呼爾哈江并混同江又有海蘭河流入於海一曰鄂多理舊作斡朶憐今改正按明太祖實録遼陽至琿綽琿之地三千四百里琿綽琿至鄂多理一千里鄂多理城在開元東北千二百里有理河出城南城在開元東北千二百里有理河出城南諸山北入混同江明永樂十一年嘗置衛考理河在吉林城南六百七十里源出吉林城南之勒克山東流會兩訥音河入混同江明人所識地理皆傳聞約畧之詞未足為據鄂多理城為我朝最初山之東發祥之地在興京東一千五百里長白以音與地按之均屬相合也一曰托果琳䝉古語周圍也舊作脱斡憐今改正一曰布呼滿洲語鹿也舊作孛苦今改正江各有司存分領混同江南北之地其居民皆碩達勒達女真之人各仍舊俗無市井城郭以射獵為業設官牧民隨俗而治元一統志自南京而南曰海蘭府又南曰雙城直抵於髙麗之王京按渤海南京在海州遼南京在遼陽此所云南京而南或僅指海蘭府冶所然亦當在東而非南也雙城亦非遼之雙城縣肇州元史按哈喇巴圖爾䝉古語哈喇黒色巴圖爾勇也舊作哈喇八都魯今改正傳至元三十年世祖謂哈喇巴圖爾曰納廷䝉古語八十數也舊作乃顔今改正故地曰阿巴拉呼䝉古語阿巴扯呼行圍也舊作阿八剌忽今改正者産魚吾今立城而以伊斯琿滿洲語迎靣也舊作元連憨今改正哈喇納蘇哈喇觧見前納蘇䝉古語歳數也舊作哈納思今改正竒爾濟蘇䝉古語竒爾斑㸃也濟蘇顔色也舊作乞里吉思今改正三部人居之名其城曰肇州汝往為宣慰使既至定市里安民居得魚九尾皆千斤來獻又成宗紀元貞元年立肇州屯田萬户府以遼陽行省左丞阿薩爾䝉古語閣也舊作阿散今改正領其事而大一統志與經世大典皆不載此州不知其所屬所領之詳今以廣寧為納延分地故附於廣寧之下按元史以肇州沿革未詳故附廣寧之後考肇州之名實始於金太祖始破遼兵於珠赫店之地肇基王業因創此州在開元之東北與濟州相連詳元史所云立城而以肇州名之則非金肇州故地或稍移西近亷寧邊外耳元史肇州䝉古屯田萬户府成宗元貞元年七月以納延布拉噶齊䝉古語捕貂人也舊作不魯古赤今改正及打魚碩達勒達女真等户於肇州旁近地開耕為户布拉噶齊二百二十户碩達勒達八十户歸附軍三百尸續增丁五十二户元史仁宗大徳二年撥夫餘路另條見前蠻軍三百户屬肇州䝉古萬户府博索府元史元初以廣寧府博索府見前金上京條懿州葢州作四路直𨽻中書省至元八年割東寧路之義州麟州威逺鎮𨽻博索府十七年以府屬遼陽後廢為巡檢司按博索府與髙麗接界當即新唐書所稱鴨緑江口之泊汋口泊汋城也詳見前金上京條元史中統三年命博索府屯田軍移駐鴨緑江之西以防海道謹按元時省併遼東州縣分設萬户府鎮戍其地統於遼陽行中書省所轄路凡七曰瀋陽路僑治遼陽以統髙麗曰開元路所統近黑龍江東極於海而萬尸府則僑治黃龍故地曰海蘭府碩達勒達路則今吉林寧古塔之境設萬户府分領混同江南北而鄂多里即本朝始祖定居之地屯河在寧古塔東北呼爾哈近繞寧古塔城咸平府近威逺堡門肇州博索府則上承金舊雖元一統志經世大典諸書已不復傳元史地理志所載亦僅存其大畧然設官分域猶可參稽若遼陽廣寧大寧三路則具載大清一統志及盛京通志諸書其有闗於渤海遼金建置者已詳具前各條中東寧路則本髙麗之地後仍歸於髙麗兹不復載云附明衛所城站考謹按明初疆圉東盡於開原鐵嶺遼瀋海葢其東北之境全屬我朝及國初烏拉哈達葉赫輝發諸國并長白山之訥殷東海之窩集等部明人曾未渉其境永樂二年倣唐羈縻州之制設尼嚕罕衛七年改為尼嚕罕都司後又續設衛所空名其疆域逺近原弗及知所稱山川城站亦多在傳聞疑似之間而又譯對訛舛名目重複一地而三四名一名而三四見者甚多又如黑龍江屯河呼爾哈河等地與明邊界相去絶逺而亦列於衛所之中葢縁諸部常以市易與明往來即其所居强名為衛書之實録授以官稱或間有部長自来或僅部人之來貿易者前後蕪複輾轉傳訛明人固無由而悉也洪惟我國家始興之地在鄂多理城元史訛為斡朶憐明人訛為斡朶里又訛為斡朶倫而誤分為兩地至王迹肇基在渤海國建州另條見前之境故明人又有建州之稱迨我太祖髙皇帝受天顯命仗義龔行諸部之人率先臣僕其有藉明聲援抗我顔行者電掃霆驅以次平殄瀋遼舊壤作我陪都即明邊内廣寧寧逺諸衛亦不足為藩籬之固矣今就明實録會典所載按年臚叙其譯對雖訛尚實有是名及一地數名複見充數者並為考證附注於下有其名而無其地并撰造不能成語者改對字面姑列其名而附糾其誤凡為衛三百七十有六所二十有四城站地面五十有八窩集衛舊訛兀者今改正明實録永樂元年部長錫揚哈舒什哈進馬置窩集衛以錫揚哈為指揮舒什哈為指揮同知按漢魏之沃沮元之烏者吾者明之兀者其部族不一而地甚廣袤以音與地求之葢即寓集也寧國初名東海窩集部所屬有呼爾哈赫實赫古塔等路後以次太祖己亥年討平之窩集左衛明實録永樂二年置以部長托克托和為指揮同知窩集右衛明實録永樂二年置以部長諾海為指揮同知窩集後衛明實録永樂二年置以部長徹伯爾為指揮同知畢里衛明永樂三年置按畢里河在葢平縣東南九十里實勒們衛舊訛失里綿今改正明實録永樂三年置按吉林城西南八百九十餘里有實勒們河此衛與下哈勒琿衛同置地亦相近也哈勒琿衛舊訛處爾文今改正明實録永樂三年置以部人綽爾布鼐額爾吉納等為指揮等官按吉林城西南九百里有地名哈勒琿穆毘有哈勒琿河即温水河也薩里衛䝉古語地弩也舊訛撒力今改正明實録永樂三年置以巴蘭等處部人茂義等為指揮僉事按寧古塔城東北六百五十里有巴蘭窩集在混同江北又吉林有巴蘭河巴蘭屯又有薩里屯當即是也齊巴噶衛䝉古語棗也舊訛赤不罕今改正明實録永樂三年䝉古部人實爾哈岱爾來朝置衛以實爾哈岱爾為指揮屯河衛明實録永樂三年置按屯河在寧古塔東北安河衛明實録永樂三年置按安河在呼倫布裕爾北七百十里摩琳衛滿洲語馬也舊訛毛憐元史作末隣今改正明實録永樂三年置堅河衛明實録永樂三年置考有盛京通志無此河名惟黙爾根城西糾河音與相近又寧古塔城東四里有珊延河亦書作商堅河或明人誤截稱一字耳右城衛明實録永樂三年置以部長哈清阿為指揮喀本河衛舊訛古賁今改正明實録永樂四年置按喀本河在呼倫布裕爾北三百四十里塔山衛明實録永樂四年置以部長達拉齊為指揮考盛京通志塔山在開元城東二十五里明時北闗所在又布爾徳庫蘇巴爾督漢山上有塔山皆葉赫國地明時又甞以衛都授哈達部主葢哈達强時葉赫嘗屬之耳額伊瑚衛舊訛兀也吾今改正明實録永樂四年置以部長多羅為指揮按自吉林至寧古塔路程八十里至額赫穆站九十里至額伊瑚站嘉河衛明實録永樂四年嘉河等處人進馬因置嘉河等三衛考皇輿全圖嘉哈必喇在朝興京之南當永樂時我尚未定居於此耳哈密衛按哈密在西域不應遼瀋之東有此地名而明實録稱永樂四年因嘉河人進馬與嘉河衛同置其訛舛實不可詰考喇皇輿全圖嘉哈必喇毗連之地有哈實瑪必或因音有緩急致誤亦未可定今姑仍原文附糾其誤温都衛舊訛幹灘今改正明實録永樂四年與嘉河同置原文作斡灘又訛斡難乃元始興之地即今鄂嫩河與嘉河逺不相涉考河興京西百五十里有温都河出八盤嶺入渾音轉而訛為斡灘耳達喜穆魯衛舊訛塔魯木今改正明實録永樂四年置為葉赫國地部長祝孔額嘗授達喜穆魯衛都督僉事即明時所稱北闗也太祖乙未年滅之考葉赫相近惟達喜穆魯山南為古尼河北為葉赫傳聞不審誤倒其音耳蘇完河衛舊訛蘇温今改正明實録永樂四年置考國初有蘇完部太祖戊子年來歸其故地在吉林惟無此河名或古今有異稱也阿蘇江衛明實録永樂四年二月置考阿蘇河在黒龍江境内率賓江衛舊訛速平今改正按率賓本渤海府名金史有蘇濱水亦作恤品明一統志恤品河在建州東南千餘里河已無考以音求之即率賓也又今開原東南一百九十餘里有碩賓河與率賓音亦相近疑明人不知碩賓之即為恤品而誤傳在逺地耳吉河衛明實録永樂四年三月置以部人肅魯棟阿為指揮考東北河名之有吉字者甚多此未知所屬雙城衛明實録永樂四年七月因温托琿等處部人吉里納入朝置雙城等五衛諸人因市易而來並非部長不必同為一部也雙城見前海蘭府條沙蘭衛舊訛撒剌兒今改正明實録永樂四年七月置考沙蘭河沙蘭城沙蘭站俱在寧古塔城西不及百里尼瑪拉衛舊訛亦馬剌今改正明實録永樂四年七月