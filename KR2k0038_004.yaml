body:
  text: 卷一部族一滿洲肅慎夫餘卷二部族二挹婁三韓勿吉卷三部族三百濟卷四部族四新羅卷五部族五靺鞨卷六部族六渤海卷七部族七完顔建州附金史姓氏考卷八疆域一興京吉林黑龍江肅慎四至肅慎城肅慎縣夫餘國都夫餘城夫餘府挹婁國界挹婁故地挹婁縣三韓分地三韓屬國三韓故地馬韓都督府辰州三韓縣卷九疆域二沃沮濊勿吉行程勿吉七部故地勿吉旁國百濟里至百濟郡城百濟邑百濟諸城新羅雞林州新羅九州靺鞨黑水州黑水府鐵利越喜故地卷十疆域三渤海國境忽汗州忽汗城上京龍泉府龍州湖州渤州中京顯德府盧州顯州鐵州湯州榮州興州東京龍原府慶州鹽州穆州賀州南京南海府沃州晴州椒州西京鴨緑府神州桓州豐州正州長嶺府河州夫餘府鄚頡府髙州安寧郡定理府定州瀋州安邉府安州率賔府益州建州東平府䝉州沱州東平寨懷逺府富州美州福州鐵利府廣州蒲州義州歸州安逺府寧州慕州郢銅洓三州蓋州崇州集州麓州卷十一疆域四遼東北地界遼上京長春州遼東京遼陽府開州定州保州辰州盧州來逺城鐵州興州湯州崇州海州渌州桓州豐州正州慕州顯州宗州乾州貴德州瀋州集州廣州遼州遂州通州韓州雙州銀州同州咸州信州賔州龍州湖州渤州郢州銅州洓州率賔府定理府鐵利府安定府長嶺府鎮海府冀州東州尚州吉州麓州荆州懿州媵州順化州寧州衍州連州歸州蘇州復州肅州安州榮州率州荷州源州渤海州寧江州河州祥州遼營衛阿延女真伊德女真五國部卷十二疆域五金上京㑹寧府肇州隆州信州夫餘路海蘭路率賔路哈斯罕路呼爾哈路烏爾古德哷勒統軍司咸平路咸平府韓州金東京遼陽府澄州瀋州貴德州蓋州復州來逺州博索府卷十三疆域六元瀋陽路開元路咸平府海蘭府碩達勒達等路肇州博索府附明衛所城站考卷十四山川一啓運山天柱山隆業山長白山輝山白平山遼山瑚呼瑪山庫堪山果囉山馬鞍山冷山德林石龍首山蛇山刁蹕山醫巫閭山千山十三山首山明王山華表山熊嶽山蒺藜山龍鳳山鳳凰山噶哈嶺太蘭岡吉林崖古哷山扈爾竒山宜罕山伊瑪護山岡薩爾滸山鐵背山碩欽山尚間崖斐芬山阿布達哩岡固拉庫崖青苔峪黃骨島牽馬嶺覺華島興安嶺皮島吕翁山松山塔山杏山附載單單大嶺諸山卷十五山川二混同江鴨緑江愛呼河圖門江佟佳江遼河渾河瀋水太子河沙河大清河柴河范河輝發河伊屯河伊爾們河小凌河大凌河羊腸河珠子河率賔水札蘭水海蘭水拉林河阿勒楚喀河海古勒水呼爾哈河琿春河滔爾河黑龍江屯河哈勒琿河奧婁河蓒芋泊附載弱水諸水卷十六國俗滿洲騎射冠服卷十七國俗二政教附字書卷十八國俗三祭祀祭天祀神雜禮官制語言附金史舊國語解考卷十九國俗四物産卷二十國俗五雜綴臣等謹按欽定滿洲源流二十卷乾隆四十三年奉敕撰洪惟我國家朱果發祥肇基東土白山黑水實古肅慎氏之舊封典籍遺文班班可考徒以年祀綿長道途修阻傳聞不免失真又文字互殊聲音屢譯記載亦不能無誤故厯代考地理者多莫得其源流是編仰禀聖裁參考史籍證以地形之方位驗以舊俗之流傳博徴詳校列為四門一曰部族自肅慎氏以後在漢為三韓在魏晉為挹婁在元魏為勿吉在隋唐為韎􅞘新羅渤海百濟諸國在金為完顔部並一一考訂異同存真辨妄而索倫費雅喀諸部毗連相附者亦並載焉二曰疆域凡渤海之上京龍泉府靺􅞘之黑水府燕州勃利州遼之上京黃龍府金之上京㑹寧府元之肇州並考驗道里辨正方位而一切古蹪附見焉三曰山川凡境內名勝分條臚載如白山之或稱太白山徒太山黑水或稱完水或稱室建河以及松花江即粟未水寧古塔即忽汗水今古異名者皆詳為辨證其古有而今不可考核者則别為存疑附於末四曰國俗如左傳所載楛矢貫隼可以見騎射之原松漠紀聞所載軟脂蜜膏可以見飲食之概而後漢書所載辰韓生兒以石壓頭之類妄誕無稽者則訂證其謬至於渤海以來之文字金源以來之官制亦皆並列其體例每門以國朝為綱而詳述列朝以溯本始其援據以御製為據而博採諸書以廣參稽允足訂諸史之訛而傳千古之信非諸家地志影響附㑹者所能擬也乾隆五十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
