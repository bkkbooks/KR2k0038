body:
  text: 欽定四庫全書欽定滿洲源流考卷八疆域一洪惟我國家肇造大東覆育區宇輿圖之盛厯古所無始祖建國鄂多理城肇祖徙居赫圖阿拉詒謀考卜實啓興京太祖髙皇帝以十三戎甲次第削平諸部經始瀋遼太宗文皇帝正號太清濯征明國臣服朝鮮世祖章皇帝統一方輿極天所覆罔不率俾溯王迹之肇基緬神區之鍾萃在原在巘因陟降而地靈成邑成都啟版圖於日闢若肅慎以下故城舊治及渤海金元之所建置遺迹猶在沿革可稽臣等謹立疆域一門條舉史傳所載附以考證仍先列興京及吉林黒龍江將軍所轄於前騐古徴今庶幾暸如指掌至如奉天錦州所屬四州八縣之地則具詳一統志盛京通志中不復兼載云興京謹按興京周以前為肅慎氏漢晉為挹婁南北朝暨隋為靺鞨唐時渤海定理府遼金迄元為瀋陽地在盛京城東㣲南二百七十里城周五里羣山拱䕶河水環縈實本朝邠岐故壤㳟考發祥世紀始祖居長白山東俄莫恵之野鄂多理城城在興京東一千五百里寜古塔城西南三百三十里勒福善河西岸肇祖原皇帝殱仇創業始居呼蘭哈逹山下赫圖阿拉太祖天挺神武相險宅中始締構於興京旋經營於遼瀋東漸海西訖遼西東南及朝鮮北暨嫩江黒龍江以至使犬諾羅諸部罔不臣服太宗繼伐幅員孔長其城堡之𨽻興京境内者有老城城南八里周十一里餘髙麗城城南一百二十里周三里餘鹻厰舊城城南一百四十六里周二里餘鹻厰新城城南一百四十八里周一百十歩清河城城西南一百六十里周四里餘山羊峪城城西南一百九十五里周一里餘瑪哈丹城城西南二百一十里周二里餘太祖戊午年征明降其城薩爾滸城城西一百二十里内城周三里外城周七里太祖破明四路兵二十萬於此界藩城城西北一百二十里在鐵背山上太祖殱明將杜松於此而親御桴鼓及命帥奏功者曰烏拉在混同江東尼什哈站北山城祖癸丑年平其國冇宜罕太克太祖戊申年攻克臨河五城金州城壬子年攻遜扎泰城郭多城鄂謨城富勒哈城皆癸丑年攻克哈達在開原東北邊外即明時所謂南闗也有綏哈城太祖己亥年平其國輝發國城在輝發河邊扈爾竒山上冇多璧城太祖乙未年攻克之丁未年平其國葉赫在威逺堡東北近葉赫河岸即明時所謂北闗也太祖癸巳年破葉赫等九部兵于古埒山甲辰年攻取張阿竒蘭二城癸丑年取吉當阿城烏蘇城雅哈城赫爾蘇城喀布齊賚城哈敦城額吉岱城天命四年取克伊特城是年葉赫新親統大兵攻克東西二城平其國東城即城西城即葉赫老城也蘇克素䕶河在清河東所屬城寨曰圖倫城太祖癸未年起兵討尼堪外蘭于此曰薩爾滸城亦癸未年攻取曰瑪爾墩寨甲申年攻取曰安國瓜爾佳城乙酉年攻取曰嘉木瑚城曰沾河寨曰古哷城曰沙濟城皆癸未以後収服渾河太祖甲申年征之鑿道噶哈嶺乙酉年敗其兵于太蘭岡吉林崖所屬城寨曰巴爾逵城丙戍年攻取曰兆佳城己丑年攻取曰杭甲城曰札庫木城曰東佳城曰伯伊堚寨俱以次攻取完顔子年平太祖戊其部棟鄂在寛甸堡外有齊吉達城翁鄂洛城太祖甲申年征之戊子来歸哲陳甲巴爾太祖乙酉年征之托漠河章達界藩俱集兵来禦我兵四人敗其八百人癸亥復征克之長白山之訥殷有佛多和城年勦太祖癸巳誅納殷部長於此珠舍哩癸巳年太祖征之鴨淥江部夘年征太祖辛取之瓦爾喀之安褚拉庫内河太祖丙申年征之取屯寨三十餘烏爾里尼滿聪九年太祖天平其部烏爾格辰崇徳二年平其部綏芬庚戌年太祖攻克雅蘭甲寅年太祖攻克瑚葉己酉年太祖攻克烏爾吉額赫庫倫俱崇徳二年攻克諾羅阿萬天命元年招服呼爾哈之扎庫塔辛亥年太祖攻克烏扎拉崇徳五年征服烏蘭海倫崇徳五年征服庫爾喀之拉里禪鐸辰阿薩津多津烏庫爾城卦拉爾額蘓里額爾圖俱崇徳五年征服黑龍江之薩哈連部天命元年征之取其屯寨三十六卦爾察部天命十年十一年兩次征之天聰八年歸附索倫部天聪八年通貢崇徳五年征之博和里諾爾噶爾都里崇徳八年攻取小噶爾達蘓大噶爾達蘓綽庫禪能吉爾俱崇徳八年征降窩集之赫什赫鄂謨和索囉佛納赫托克索俱祖丁未太年征取錫璘甲寅年太祖征取而部落之舉族内附者曰蘓完戌子年太祖歸附曰雅爾古戊子年太祖歸附瓦爾喀則有斐優烏拉所太祖丁未年部長為侵率户五百歸順呼爾喀則有錫喇忻天命元年招服格伊克哩天聰二年歸附納堪泰天聰四年朝貢托科羅努雅喇黙爾庫勒赫葉俱崇徳二年朝貢輝克崇徳五年朝貢瑪爾哲賴科爾佛科爾庫薩喀哩俱崇徳六年朝貢喀爾喀木哲克特庫塔圖庫福題希額爾琿斡齊竒庫巴扎拉額題竒薩里尼葉爾北俱崇徳七年招降松阿哩則有巴雅喇天聰二年朝貢黒龍江則有杜莫訥武因庫魯木圖納屯俱天聰八年朝貢果博爾色布竒赫赫岱克殷烏魯蘓裕爾根海倫固濃昆都倫烏蘭俱天聰九年朝貢扈爾布爾俄勒俱崇徳三年朝貢索倫之薩哈爾察天聰六年朝貢博穆博果爾崇徳二年朝貢納木丹尼都遜烏喇喀徳都爾俱崇徳五年歸附庫爾喀之賴達爾崇徳六年朝貢及延楚地方之庫雅喇即庫爾喀之别名在圖們江北岸與朝鮮之慶逺相對去寜古塔五百里崇徳八年朝貢精格里河渾春崇徳三年朝貢窩集則有那木都魯寜古塔尼瑪察俱戌年招太祖庚降使犬部則有盖青天聰八年朝貢使鹿部則有喀木尼漢崇德元年招降東北邊部落以次入貢者自寜古塔東北行四百餘里住呼爾哈松花江兩岸者曰諾雷天聰五年朝貢曰克宜克勒崇徳二年朝貢曰祜什哈哩崇徳三年朝貢皆編甲入户自寜古塔東行千餘里住烏蘓里江兩岸者曰木倫辛亥年太祖征降又東二百餘里住尼滿河源者曰竒雅喀喇乂冇班吉爾漢喀喇亦在寜古塔東南去烏蘓哩四千里每二年一次遣官至尼滿河地方収貢頒賜自寜古塔東北行千五百里住松花江黒龍江兩岸者曰赫哲喀喇又東北行四五百里住烏蘓里松花黑龍三江滙流左右者亦曰赫哲喀喇自寜古塔水路至其部東北界共四千五百餘里即使犬國也又東北行七八百里曰費雅喀又有居處甚逺不能至寜古塔之庫葉一部每年六月遣官至離寕古塔三千里之普禄鄊收貢頒賜自寜古塔東北行三千里曰竒勒爾即使鹿卾倫春㳺牧處所距齊齊哈爾城千餘里又使馬鄂倫春亦散處山林距齊齊哈爾五六百里直至于大東海皆自古荒逺未聞之地朝貢惟謹逺至邇安廣輪有截豐水詒謀夐乎莫並矣吉林謹按吉林周以前為肅慎地漢以後屬挹婁靺鞨唐初為新羅之雞林州尋屬渤海遼於混同江左右置濱州寜江州稍西為黄龍府金於混同江左右置肇州隆州信州江之西為率賔路南近髙麗為海蘭路皆統於上京元置海蘭府碩達勒達路萬户府五分領混同江南北之民寧古塔則渤海之忽汗州後稱上京龍泉府今城西南六十里呼爾哈河南古城周三十里内城周五里宫殿舊址猶存金為呼爾哈路亦統於上京拉林勒楚喀之間則金上京城在焉今城南四里尚有古城及子城宫殿遺址我朝於吉林烏拉設將軍以統諸城而寧古塔白都訥三姓阿勒楚喀拉林各設副都統分鎮焉時代雖遥山川猶昔按其方域尚可參稽焉爾黑龍江謹按黒龍江在吉林東北東西三千餘里南北四千里後魏時曰黒水部屬勿吉唐曰黒水靺鞨跨江分南北部黒水部之北為思慕靺鞨郡利靺鞨窟説靺鞨近西北者為室韋部唐會要靺鞨傳言思慕等部南與渤海徳里府接東至大海北至小海今考黒龍江極北有小海北史所云于已尼大水即北海當即指此遼為女真金屬上京北境及夫餘路溟渤逺環興安層抱重江叠嶂控扼諸藩雖渤海之盛亦不能全有其地也所云思慕郡利窟説等地名亦皆得自傳聞未通使傳我朝徳威逺被海隅日出罔不率俾黒龍江諸城爰自國初望風景附至康熙二十三年設將軍副都統鎮守之與内地郡縣無異固漢唐以來簡䇿所不能詳者矣肅慎四至後漢書古肅慎國在夫餘東北千餘里東濱大海晉書肅慎在不咸山北案不咸山即今長白山東濱大海西接冦漫汗國北極弱水其土界廣袤數千里通考魏正始六年母丘儉討髙麗過沃沮千餘里到肅慎南界舊唐書渤海以肅慎故地為上京曰龍泉府領龍湖渤三州肅慎城肅慎縣松漠紀聞古肅慎城四面約五里餘遺堞尚在在渤海國都三十里以石累城脚遼史東京路遼陽府肅慎縣以渤海户置黄龍府黄龍縣本渤海長平縣并富利佐慕肅慎縣置元史開元路古肅慎之地案元時開元路所統甚廣不止今開原一邑元字明初始改原謹案肅慎疆域僅見於後漢書晉書其國界南包長白北抵弱水東極大海廣袤數千里約而計之正在今吉林寜古塔黒龍江境史云西接冦漫汗國考晉書有㓂莫汗國去養雲國馬行百日養雲國去禆離國五十日禆離國在肅慎西北可二百日莫與漫音實相同汗當為王稱計去肅慎三百五十程矣又考遼史集州古陴離郡地金屬貴徳州今為撫順和屯陴與禆音亦相同撫順正在長白山西北然則後漢書言肅慎在夫餘東北者指寜古塔黒龍江諸境而言晉書謂禆離國在肅慎西北者指不咸山而言其程郵第約畧計之未為確據耳松漠紀聞稱古肅慎城在渤海國都三十里考唐書渤海始都忽汗州以忽汗河得名今呼爾哈河是也唐天寳末徙上京直舊國三百里忽汗河之東考呼爾哈河源出吉林界色齊窩集中諸源滙為一大河東注鏡泊又從鏡泊之發庫東注繞寜古塔城南復東北與混同江合是渤海王都皆臨忽汗而上京為肅慎故地則肅慎古城實在上京為今寜古塔地也至遼時黄龍府肅慎舊縣併入黄龍縣者當為渤海縣名遼陽府之肅慎縣則遼所自置雖各止一隅要皆肅慎之故地也夫餘國都後漢書夫餘國在元莵北千里南與髙句驪東與挹婁西與鮮卑接北有弱水地方二千里三國魏志夫餘本屬元菟漢末更屬遼東時句驪鮮卑强夫餘在二國間其印文言濊王之印國有故城名濊城盖本濊地而夫餘王其中晉書夫餘在元莵北千餘里南接鮮卑案後漢書作西接鮮卑當係此誤國中有古濊城晉書永和二年夫餘為百濟所侵西徙近燕夫餘城夫餘府通典夫餘南接髙麗東接挹婁西接鮮卑後髙麗得其地置夫餘城唐乾封二年薛仁貴破髙麗於金山進拔夫餘城後屬於渤海新唐書李勣伐髙麗拔夫餘城通考夫餘故地渤海為夫餘府常屯勁兵扞契丹領扶仙二州册府元龜後唐天成元年陳繼威使契丹至渤海界夫餘府契丹族帳在府城東南隅通考遼太祖攻渤海夫餘城下之改夫餘城為東丹府案遼史作拔忽汗城以為東丹王國誤遼史地理志通州安逺軍本夫餘國王城渤海號夫餘城通逺縣本渤海夫餘縣案遼史又有夫餘縣乃太祖遷渤海夫餘縣降户所置非故地也遼火地理志龍州黄龍府本渤海夫餘府金史地理志隆州古夫餘之地有混同江拉林河謹按夫餘在漢元莵郡北元莵為今海城盖平復州自開原以北千餘里皆夫餘之境南北朝為慕容氏所侵走保沃沮又因百濟侵畧西徙近燕尋為髙句麗分據唐滅髙麗入於渤海遼併渤海以為東京若龍州同州祺州肅州皆其故地其國王城則為通州領通逺安逺歸仁漁谷四縣金為隆州屬上京路尋廢州以三縣併入歸仁屬咸平府元初又廢歸仁故城在今鐵嶺東北金山據明統志在開原西北三百五十里遼河北岸又西北三十里曰東金山又二十里曰西金山三山綿亘三百餘里與烏梁海接境則隋唐伐髙麗所謂出夫餘道者盖常由此而渤海傳所云夫餘為契丹道及後漢書所言西接鮮卑者皆相符合至朝鮮亦有夫餘縣則徒襲其名不足憑也挹婁國界後漢書挹婁古肅慎之國在夫餘東北千餘里東濱大海南與北沃沮接不知其北所極土地多山險三國魏志挹婁在夫餘東北千餘里濱大海南與北沃沮接未知其北所極邑落各有大人處山林之間古肅慎氏之國也晉書肅慎氏一名挹婁在不咸山北去夫餘可六十日行東濱大海西接㓂漫汗國北極弱水其土界廣袤數千里居深山窮谷其路險阻車馬不通挹婁故地挹婁縣通考挹婁故地渤海為定理府領定瀋二州遼史地理志瀋州昭徳軍本挹婁故地渤海建瀋州雙州保安軍本挹婁故地渤海置安定郡定理府刺史故挹婁國地遼史地理志東京城北至挹婁縣范河二百七十里案遼南京後改東京金史地理志瀋州挹婁縣遼嘗置定理府刺史於此本挹婁故地元史地理志瀋陽路本挹婁故地謹案挹婁疆域與肅慎正同史皆云處長白山北東濱大海不知其北所極則自今興京吉林寜古塔黒龍江諸境皆挹婁地奉天之承徳鐵嶺亦挹婁之界其與肅慎稍異者惟今開原縣周秦以前屬肅慎漢屬夫餘國界考元史言開元路古肅慎之地太祖立開元南京二萬户府治黄龍府遼史言黄龍府本渤海夫餘府夫餘府所屬有肅縣縣是始屬肅慎繼屬夫餘之明証也苐元之開元路兼統東北諸境直抵海濱所轄甚廣不止一邑之地又始則寄治黄龍府迨至元以後方徙治今城則不屬挹婁者僅今一邑若一邑以外屬肅慎即屬挹婁也其故地之見扵史傳者若渤海之定理府安定郡遼金之瀋州雙州興州皆其一隅而瀋州挹婁縣之遺今猶有挹婁城在鐵嶺縣南六十里明為懿路所置中左右等千户懿路河在焉太祖髙皇帝辛酉年征明降懿路城即此盖字音之轉也新唐書及遼史言渤海大氏始保挹婁之東牟山明一統志云山在瀋陽衛城東二十里恭考今承徳縣城東二十里為天柱山即東牟山也舊唐書作桂婁之東牟山桂婁為髙麗部名髙麗五部西漢以還桂婁部為王已久前史並未言其分地亦未有止稱桂婁者當以新唐書為正爾三韓分地後漢書韓有三種馬韓在西有五十四國其北與樂浪南與倭接辰韓在東十有二國其北與濊接弁辰即弁韓在辰韓之南亦十有二國其南亦與倭接凡七十八國各在山海間地合方四千餘里東西以海為限三國魏志韓在帶方之南東西以海為限南與倭接方可四千里有三種馬韓在西辰韓在馬韓之東弁辰與辰韓雜處其瀆盧國與倭接界晉書辰韓在帶方南東西以海為限馬韓居山海之間無城郭有小國五十六所辰韓在東分十二國又有弁辰亦十二國屬扵辰韓三韓屬國通考馬韓有愛襄國牟水國桑外國小石索國大石索國優休牟涿國臣濆活國伯濟另條詳後國速盧不斯國日華國古誕者國古離國怒藍國月支亦作目支國治魏志作咨離牟盧國素謂乾國古爰國莫盧國卑離國占離卑國臣釁國支侵國勾盧國卑彌國監奚卑離國古蒲國致利鞠國冉路國兒林國駟盧國内卑離國感奚國萬盧國辟卑離國舊魏志作臼斯烏旦國一離國不彌國支半國勾素國㨗盧國牟盧卑離國臣蘇塗國莫盧國古臘國臨素半國臣雲新國如來卑離國楚山塗卑離國一難國勾奚國不雲國不斯濆邪國爰池國乾馬國楚離國凡五十餘國大國萬餘家小國數千家總十餘萬户辰王治月支國案第一國曰愛㐮襄與新音相近滿洲語謂金曰愛新魏志作爰襄則傳冩之異也又國名多繋以卑離二字以滿洲語考之當為貝勒之轉音其後百濟甚强分建侯王有面中弗斯邁盧等當即彌凍不斯莫盧諸國也三國志辰韓始有六國稍分為十二國弁辰亦十二國又有諸小别邑有已抵國不斯國弁辰彌離彌凍國弁辰接圖國勤耆國難彌離彌凍國弁辰古資彌凍國弁辰古淳是國冉奚國弁辰半路國弁樂努國軍彌國弁軍彌國弁辰彌烏邪馬國如湛國弁辰甘路國户路國州鮮國馬延國弁辰勾邪國弁辰走漕瑪國弁辰安邪國馬延國弁辰瀆盧國斯盧國案此即新羅國之本名優中國合二十四國大國四五千家小國六七百家總四五萬户案弁辰與辰韓雜居故魏志于兩國所屬不為分𨽻其冠以弁辰者當為弁辰所屬也三韓故地馬韓都督府辰州三韓縣舊唐書百濟國為馬韓故地顯慶五年以其地置熊津馬韓等五都督府遼史地理志辰州本髙麗盖牟城渤海盖州又改辰州以辰韓得名井邑駢列最為衝會遼史地理志髙州三韓縣辰韓為夫餘弁韓為新羅馬韓為髙麗開泰中聖宗以三國之遺人置縣户五千案此以三國分屬三韓殊為謬誤金史地理志三韓縣屬大定府謹案三韓在夫餘挹婁二國之南所統凡七十八國合方四千里馬韓在西辰韓在東弁韓在辰韓之南馬韓北與樂浪接所轄則在今盖平復州寜海辰韓北與濊接濊地即夫餘境也馬韓弁韓之南皆與倭接東西以海為限則併今髙麗全國亦𨽻封域至所屬諸國多繋以卑離二字當為貝勒之轉音而以三汗統諸貝勒於體制亦適相符合晉書又載有裨離國在肅慎西北陴與卑音相近耳遼史有陴離郡為今撫順城是不獨東南廣而西北亦極袤亘矣唐馬韓都督之設未久輒廢其址無存辰州即今之盖州今為盖平縣至三韓縣遼時以遷户置但取其名非故地也欽定滿洲源流考卷八
