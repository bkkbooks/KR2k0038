body:
  text: 疆域二沃沮濊後漢書東沃沮在髙句驪蓋馬大山之東按原注蓋馬縣名屬元莬郡其山在今平壤城西平壤即王險城也東濱大海北與挹婁夫餘南與濊接其地東西狹南北長可折方千里武帝滅朝鮮以沃沮地為元菟郡後徙於髙句驪西北更以沃沮為縣屬樂浪東部都尉至光武罷都尉官封其帥為沃沮侯又有北沃沮去南沃沮八百餘里南接挹婁三國魏志東沃沮在蓋馬大山之東其地形東北狹西南長可千里按此與後漢書稍異漢武元封中以其地為元菟郡後徙郡句驪西北今所謂元菟故府是也沃沮還屬樂浪漢以土地廣逺在單單大嶺之東分治東部都尉治不耐城别主嶺東七縣時沃沮亦皆為縣光武六年省都尉以縣中渠帥為縣侯遼史海州南海軍本沃沮國地有沃沮縣後漢書濊北與髙句驪沃沮南與辰韓接東窮大海西至樂浪濊及沃沮句驪本皆朝鮮之地元朔元年濊君南閭等率二十八萬口詣遼東內屬武帝以其地為蒼海郡數年乃罷至元封三年滅朝鮮分置樂浪臨屯元菟真畨原注畨音潘四郡至昭帝始元五年罷臨屯真畨以并樂浪元菟元菟復徙居句驪自單單大嶺已東沃沮濊悉屬樂浪後以境土廣逺復分嶺東七縣置樂浪東部都尉建武六年省都尉官遂棄嶺東地悉封其帥為侯三國魏志濊南與辰韓北與髙句驪沃沮接東窮大海今朝鮮之東皆其地也漢武帝分朝鮮為四郡自單單大嶺以西屬樂浪自嶺以東七縣都尉主之皆以濊為民後省都尉封其渠帥為侯今不耐濊皆其後也謹按兩漢魏晉時國於東方者為夫餘挹婁三韓其邑落散處山海間者又有沃沮濊等名以史傳核之沃沮之在東者東濱大海北接挹婁夫餘又有北沃沮南沃沮並皆散處山林無大君長所云單單大嶺即長白山單單與滿洲語珊延音固相近也今自長白附近東至海邊北接烏拉黑龍江西至俄羅斯叢林密樹綿亘其間魏毌丘儉討髙麗絶沃沮千餘里到肅慎南界則沃沮者實即今之窩集也濊地君長亦皆分統邑落無所專屬夫餘挹婁皆有其地考其故壤自鳯凰城並海至朝鮮三國以後隋屬髙麗唐屬渤海矣勿吉行程魏書勿吉國在髙句麗北去洛五千里自和龍北二百餘里有善玉山山北行十三日至祁黎山又北行七日至如洛瓌水北史作洛瓌水水廣里餘又北行十五日至太魯水北史作太嶽魯水又東北行十八日到其國國有粟末水徒太山按和龍為今土默特右翼地太魯水當為今滔爾河亦作淘爾洮兒又作拖羅皆音之轉新唐書之它漏遼金之他魯撻魯河并聖宗所改撻魯河為長春河者皆是水也源出科爾沁西北興安山東南流合貴勒爾河又東北折經科爾沁右翼後旗南界又東經扎賴特南界滙為納蘭薩蘭池亦名日月池會嫩江以入於松花江松花江即粟末水新唐書言粟末西北注它漏河者蓋不知它漏河東南入嫩江以達松花而反謂松花由嫩江以注它漏是據圖臆揣之誤也洛瓌當即老哈之轉音䝉古稱老河為老哈源出喀喇沁右翼東北流經故大寧城東又北經敖漢翁牛特在翼南又東北經奈曼及喀爾喀左翼北流五百里許與潢河合證之下文使臣所行地里音譯更相符合其不能徑由東北行者蓋中間為契丹所隔故耳又扎魯特右翼西北一百九十里亦有他魯河源出大青羊山南流數十里入阿里雅河史載自和龍至勿吉由北而東不應反岐至西北則太魯非此河也又有以如洛瓌為饒樂之訛者考唐貞觀中置饒樂都督府領弱水祁黎洛瓌太魯湯野六州洛瓌太魯皆以水名州與饒樂並置且魏時亦未置州其非饒樂之訛明矣太和初使臣乙力支稱初發其國乘船溯難河西上至太河南出陸行渡洛孤水從契丹西界達和龍按難河亦曰那河即嫩江也太即上文太魯洛孤即上文洛瓌皆音轉而訛實即滔爾及老哈二河也滔爾河入嫩江故自難河乘船可溯滔爾與老河相隔故南出陸行渡老河以至和龍是時土默特地屬元魏之營州而老河旁若喀喇沁敖漢奈曼翁牛特等境皆屬契丹故云自契丹西界達和龍使臣所厯之途與魏使正同也時代雖遙其迹尚有可尋耳勿吉七部故地北史粟末部與髙麗接新唐書粟末部居最南抵太白山與髙麗接依粟末水以居水源於山西北注它漏河按它漏即滔爾河入嫩江嫩江入松花江此云粟末西北注它漏河殊誤新唐書渤海本粟末部附髙麗者詳見後渤海條北史伯咄部在粟末北新唐書粟末稍東北曰汩咄部按此作汩與北史異北史安車骨部在伯咄東北新唐書汩咄又東北曰安居骨部按居與車音同字異唐會要汩咄安居骨因髙麗破後奔散微弱後無聞焉北史拂涅部在伯咄東新唐書安居骨曰拂涅部通考拂涅故地渤海為東平府領伊䝉陀黑比五州遼史地理志東京紫䝉縣本漢鏤芳按兩漢志並作鏤方縣地後拂涅國置東平府領紫䝉縣遼史地理志東京遼州始平軍本拂涅國城渤海為東平府唐太宗征髙麗李世績拔遼城髙宗詔程名振蘇定方討髙麗至新城大破之皆此地也有遼河羊腸河錐子河蛇山狼山黑山巾子山按羊腸錐子河及蛇山等俱在今廣寧境遼河亦經廣寧境內則拂涅故地實在今廣寧北史號室部在拂涅東北史黑水部在安車骨西北詳見下靺鞨條新唐書安居骨之西北曰黑水部北史白山部在粟末東南新唐書粟末之東曰白山部舊唐書白山部近髙麗因收平壤之後部衆多入中國遼史百官志長白山三十部大王府勿吉傍國北史勿吉傍有大莫盧國覆鍾國莫多回國庫婁國素和國具弗伏國匹黎爾國拔大何國郁羽陵國庫伏真國魯婁國羽真侯國魏書北史豆莫婁在勿吉北千里舊北夫餘也室韋之東東至於海方二千餘里當即大莫盧之轉音或言濊地也謹按勿吉即挹婁為肅慎故地分七部粟末部近長白山以粟末水得名則在今松花江左右伯咄在松花江北拂涅在伯咄東史稱拂涅故地渤海為東平府領伊䝉陀黑比五州又遼史稱紫䝉縣拂涅國置東平府是其分州立邑又在渤海之前矣紫蒙故城在今遼陽東境東平府契丹為遼州金為遼濱縣屬瀋州故城在明瀋陽衛城西北百八十里唐以前為髙麗所據謂之遼東城唐太宗克之改曰遼州時亦謂之新城以别於遼東故城也考唐書貞觀十九年伐髙麗江夏王道宗將兵數千至新城二十一年復伐髙麗命李世績將青州兵自新城道入永徽三年髙麗侵契丹契丹大敗髙麗於新城儀鳯三年徙安東都護於新城皆此地也黑水以黑龍江名唐時最盛今詳載於靺鞨條白山部以長白山名舊唐書言因平壤之役多散入中國而白山部太師暨長白山三十部大王之稱見於遼志則其部族仍以繫號可知蓋自粟末部强諸部皆為服屬於是中土但知有渤海其他部不可考矣東平府及遼州並詳後渤海契丹疆域條至勿吉附近之大莫盧當即魏書之豆莫婁亦稱達末婁覆鍾當即百濟之弗中郁羽陵當即尉厥里皆與契丹相接也百濟里至魏書百濟國北去髙句麗千餘里處小海之南按史是時髙麗國東至新羅西度遼二千里南接百濟北鄰靺鞨一千餘里北史百濟始立國於帶方故地其國東極新羅句麗西南俱限大海處小海南東西四百五十里南北九百餘里後周書百濟始立國於帶方其地界東極新羅北接髙句麗西南俱限大海東西四百五十里南北九百餘里治固麻城宋書百濟本與髙驪俱在遼東之東千餘里其後髙驪略有遼東百濟略有遼西隋書百濟國東西四百五十里南北九百餘里南接新羅北距髙麗舊唐書百濟處大海之北小海之南東北至新羅按隋唐時通百濟皆自登萊泛海而往蓋為契丹所隔新唐書所載亦同新唐書百濟直京師東六千里而贏濱海之陽其東新羅也唐會要百濟當馬韓故地處大海之北小海之南東北至新羅通考百濟晉時略有遼西晉平唐栁城北平之間自晉以後吞併諸國據有馬韓故地其國東西四百里南北九百里百濟都城百濟郡邑北史百濟所都曰居拔城亦曰固麻城其外更有五方中方曰古沙城東方曰得安城南方曰久知下城西方曰刀先城北方曰熊津城都下有方方分五部曰上部前部中部下部後部五方各有方領一人方有十郡城之內外民庶及餘小城咸分𨽻焉宋書百濟所治謂之晉平郡晉平縣梁書晉世百濟有遼西晉平二郡地自置百濟郡梁天監中為髙句驪所破遷居南韓地後更為强國號所治城曰固麻謂邑曰檐魯其國有二十二檐魯皆以子弟宗族分領之按宋書云百濟所治謂之晉平郡晉平縣是以郡統縣矣北史云國有五方方管十郡則當為五十郡今梁書云二十二檐魯是縣反少於郡恐無是理隋書百濟國都曰居拔城畿內為五部五方各有方領一人方有十郡國西南人島居者十五所皆有城邑百濟自西行三日至貊國云舊唐書百濟王所居有東西兩城貞觀十六年伐取新羅四十餘城又襲破新羅十城二十二年又破其十餘城永徽中又與髙麗靺鞨侵其北界三十餘城其國舊分五部統郡三十七城二百至顯慶五年以其地分置熊津馬韓東明等五都督府各統州縣立其帥為都督刺史縣令命王文度為熊津都督以鎮之新唐書百濟王居東西二城有六萬方統十郡按六萬方與他書異當為六方方統十郡萬字亦作万與方相近而誤耳顯慶五年平其國五部三十七郡二百城户七十六萬析置熊津馬韓東明金漣德安五都督府後其地為新羅渤海靺鞨所分按五代史後唐清泰間及元史世祖本紀至元四年百濟皆遣使入貢是百濟至元代猶存但故地已失僅守偏隅非復隋唐之舊耳唐會要百濟王所居有東西兩城又外置六方方管十郡唐顯慶五年分其國為五部統郡三十七城二百置熊津馬韓東明金漣德安等五都督各統州縣立其長為都督刺史縣令麟德以後其地為新羅靺鞨所分百濟諸城舊唐書龍朔元年百濟僧道琛舊將福信據周留城其西部北部並應之帶方州刺史劉仁軌便道發兵轉鬬而前所向皆下道琛於熊津江口立兩柵以拒復退保任存城新書作任孝舊唐書龍朔二年劉仁願仁軌大破福信餘衆於熊津東拔其支羅城及尹城大山沙井等柵福信等以真峴城臨江髙險又當衝要加兵守之仁軌夜拔之遂通新羅運糧之路仁願請益兵詔發淄青萊海兵七千人浮海赴熊津於是水軍自熊津江往白江以會陸軍同趨周留城通考髙麗以百濟為金州金馬郡謹按百濟與新羅壤地相錯隋書云南接新羅唐會要言東北至新羅考百濟之境西北自今廣寧錦義南踰海蓋東極朝鮮之黃海忠清全羅等道東西狹而南北長自栁城北平計之則新羅在其東南自慶尚熊津計之則新羅在其東北其北亦與勿吉為鄰也王都有東西兩城號固麻城亦曰居拔城以滿洲語考之固麻為格們之轉音居拔蓋滿洲語之卓巴言二處也二城皆王都故皆以固麻名之宋書言百濟所治謂之晉平郡晉平縣通考云在唐栁城北平之間則國都在遼西而朝鮮全州境內又有俱拔故城殆梁天監時遷居南韓之城歟唐顯慶中分為五都督府曰德安即百濟東方之得安城曰熊津即北方之熊津城熊津今朝鮮漢江城在全州西北百濟與髙麗分界處也曰東明者東明為百濟之祖自稿離渡河以之名地當與稿離國相近考遼志稿離為鳯州韓州皆在今開原境則東明都督府之設亦應與開原相邇矣任存城在熊津江口朝鮮全州西百濟之西部支羅真峴在熊津東全州之北自熊津溯白江為周留城在全州西加林城亦在焉沙井柵在其東北唐蘇定方劉仁軌等由登萊海道濟師故戰守之地皆在今朝鮮境耳唐書又言後為新羅渤海靺鞨所分百濟遂絶而自五代迄元尚有百濟朝貢之文考百濟舊設五方方管十郡則列郡五十唐初又攻取新羅六七十城其幅員益廣蘇定方所得止三十七郡王子夫餘豐脫身而走是其支庶保守偏隅仍循位號僅有黃海忠清等地而海蓋以北盡歸新羅渤海矣新羅北史新羅在髙麗東南居漢時樂浪地多山險兼有沃沮不耐韓濊之地附庸於百濟梁書新羅本辰韓也其國在百濟東南五千餘里按通志通考俱作五百餘里查二國壤地昆達無相去五千里之理疑梁書之誤東濱大海南北與句驪百濟接其邑在內曰啄評按唐書通考俱作喙評考通典注云呼穢反則喙字當因字形相近而訛在外曰邑勒國有六喙評五十二邑勒今有邑勒必拉入松阿哩江與薩木什必拉相近通志新羅國在百濟東南五百餘里東濱大海其西北界出髙麗之間隋書新羅在髙麗東南居漢時樂浪之地魏將毌丘儉討髙麗破之奔沃沮其後復歸故國留者遂為新羅焉兼有沃沮不耐韓濊之地冊府元龜隋伐髙麗新羅亦攻取髙麗五百里舊唐書新羅在漢時樂浪之地東及南方俱限大海西接百濟北鄰髙麗東西千里南北二千里王所居曰金城周七八里顯慶以後漸有髙麗百濟之地其界益大西至於海新唐書新羅居漢樂浪地橫千里縱三千里咸亨五年王金法敏略百濟地守之上元二年劉仁軌破其衆於七重城以靺鞨兵浮海略南境又詔李謹行屯買肖城冊府元龜開元二十四年敕浿江以南令新羅安置太平寰宇記新置在百濟東南五百餘里兼有漢樂浪地東濱大海通考新羅在百濟東南五百餘里亦在髙麗東南隋時襲加羅任那諸國滅之其西北界犬牙出髙麗百濟之間地多山險奉使行程録自咸州北行至同州東望大山即新羅山深處與髙麗接界按遼咸州即金咸平府同州為金銅山縣俱在今鐵嶺開原之間東至威逺堡即吉林界南至奉天即唐時髙麗界開原即漢時夫餘界百濟之舊國也通考謂新羅西北界出髙麗百濟之間者應即指此雞林州舊唐書龍朔三年詔以新羅為雞林州都督府授其王金法敏為都督按自此以後凡新羅嗣王俱加雞林州大都督之號新唐書王居金城環八里龍朔元年按舊唐書作三年與此異以其國為雞林州大都督府新羅九州新唐書新羅多取百濟地抵髙麗南境置尚良康熊全武漢朔溟九州州有都督統郡十或二十按是時髙麗北境已屬渤海新羅既有百濟之地又兼有髙麗南境非得百濟而始抵髙麗之南也尚州全州遼金皆有之朝鮮亦有之遼地志云尚州屬東京路本漢襄平縣地渤海為東平寨金地志云全州屬北京路治安豐縣二史並未詳沿革之由或遼金所置徒襲其名未必即其舊地也朝鮮慶尚道之尚州本辰韓南境為新羅故地全羅道之全州本辨韓邊境為百濟要隘似為相近然考唐會要五代㑹要太平寰宇記皆作金州與唐書通考作全者異唐平髙麗嘗置金州明為金州衛即今寧海縣新羅既得髙麗之地其州名即沿唐舊亦未可知苐克國初烏拉國有金州城為武勳王揚古利攻今吉林城北猶有金州山金州站實與新羅之難林州相近非唐以後所置其稱名當有所自也康州遼屬顯州去醫巫閭山不逺熊州當以熊嶽為名唐儀鳯初徙熊津都督於建安城與此相近在蓋州南六十里渤海之杉盧郡也漢州以漢江為名本百濟地後為朝鮮王都朔州在鳯凰城東南溟州本濊地唐㑹要新羅封百濟故地及髙麗南境東西約九百餘里南北約一千八百里於界內置尚良康熊金武漢朔溟九州唐㑹要武州物産為新羅之最謹按新羅始附庸於百濟後兼加羅任那諸國與百濟為鄰考其疆土東南並有今朝鮮之慶尚江原二道西北直至今吉林烏拉又西近開原鐵嶺唐顯慶以後又得百濟故地及髙麗南境於是東西增九百里南北增千餘里開元以後渤海盛强其西北諸境盡為所併新羅所有僅鴨渌江以南唐末髙麗復起割其南境暨渤海為契丹所侵於是新羅西與契丹以海州巖淵縣為界西北與契丹以鴨渌江東八里黃土嶺為界矣雞林州之名始於唐龍朔三年以其國為雞林州大都督府國王世襲都督之號以音譯及地理考之即今吉林許亢行程録云自咸州至同州東望大山即新羅山遼之咸州金為咸平府同州金為銅山縣俱在今鐵嶺開原之間東至威逺堡門即吉林界則州名取此無疑苐其後為渤海所得而都督之號則仍繫新羅於是并朝鮮之地亦沿雞林之稱耳七重城在朝鮮慶州北南臨發盧河舊唐書言劉仁軌率兵絶匏盧河攻七重城即此水也買肖城亦在其地當時用兵皆自登萊浮海往來故多在朝鮮界也至九州之設東至吉林西至廣寧跨海蓋而包朝鮮幅員式擴矣靺鞨隋書靺鞨在髙麗之北凡有七部見前勿吉條即古之肅慎也其國西北與契丹接舊唐書靺鞨後魏謂之勿吉在京師東北六千餘里東至於海西接突厥南界髙麗北鄰室韋其國凡為數十部黑水最處北方分為十六部部又以南北為柵新唐書黑水靺鞨居肅慎地亦曰挹婁元魏時曰勿吉東瀕海西屬突厥南髙麗北室韋離為數十部部間逺者三四百里近者二百里黑水分十六落以南北稱黑水西北又有思慕部益北行十日得郡利部東北行十日得窟說部亦號屈說稍東南行十日得莫曳皆部又有拂涅見前勿吉條虞婁越喜鐵利等部其地南距渤海北東際於海西抵室韋南北袤二千里東西千里按上文云西屬突厥北室韋而後又云西抵室韋考新唐書室韋傳室韋地據黃龍北東黑水靺鞨西突厥南契丹北瀕海附於突厥則黑水部實西北皆鄰室韋也因室韋嘗附突厥故有西屬突厥之文耳新唐書室建河東合那河忽汗河又東貫黑水靺鞨故靺鞨跨水有南北部按室建河即黑龍江那河即嫩河忽汗河即呼爾哈河嫩河呼爾哈皆㑹混同以合黑龍江而唐宋諸史多以混同為黑龍江者蓋傳聞之誤唐㑹要靺鞨有數十部黑水靺鞨最處北方分為十六部落又以南北為柵舊說黑水西北有思慕靺鞨正北微東十日程有郡利靺鞨東北十日程有窟說靺鞨東南十日程有莫曳皆靺鞨今黑水界南與渤海國德里府接按渤海十五府具載唐書及通考無德里府之名據新唐志蓋鎮名也以地與音考之今寧古塔城西九十里自鄂摩和湖東繞沙蘭站之南至呼爾哈河有大石廣二十餘里袤百餘里石平如鏡孔洞大小不可數計或圓或方或六隅八隅如井如盆如池或口如盂而中如洞深或丈許或數尺中有泉澄然凝碧名德林沃赫俗呼黑石甸子石縫中魚或躍出甸上草木皆異車馬行其上如聞空洞之聲石或少損即有水從罅出探之深不可測迤西十餘里有海眼季春冰泮水流石下聲如雷吼里與林音實相近呼爾哈河即渤海舊都所在鎮名當取諸此北至小海按今黑龍江極北有海汊北史謂于已尼大水即北海者當即此也東至大海西至室韋南北約二千里東西約一千里渤海寖强黑水亦為所屬冊府元龜靺鞨在髙麗北營州東二千里越喜靺鞨東北至黑水靺鞨地方二千里通考拂涅鐵利虞婁越喜時時通中國而郡利屈設按二字與唐書異莫曳皆不能自通元史地理志開元路隋唐曰黑水靺鞨其後渤海盛靺鞨皆役屬之又其後渤海寖弱黑水復擅其地東瀕海南界髙麗西北與契丹接壤即金鼻祖之部落也按元時開元路所統至廣今黑龍江寧古塔及開原縣地皆為所轄黑水州黑水府唐㑹要武德三年部長突地稽遣使朝貢以其部置燕州並以其長帥為都督總管貞觀十四年以黑水地為黑水州冊府元龜黑水帥突地稽隋末率部落千餘家內屬處之營州唐武德初以其部落置燕州以突地稽為總管按此為營州地屬靺鞨之始燕州之置實在營州也通考云武德三年黑水長阿固郎始來貞觀二年以其地為燕州通考開元十年拜黑水部長帥為勃利州刺史於是安東都護請置黑水府以部長為都督刺史領黑水經略使唐㑹要開元十三年於黑水部落內置黑水軍續又以最大部落為黑水府仍以其首領都督諸部刺史𨽻屬焉舊唐書開元十年置黑水經略使其地南距渤海北東際海西抵室韋南北二千里東西千里其後渤海盛府遂廢元史開元路唐黑水靺鞨以其地為燕州置黑水府鐵利越喜故地通考渤海以鐵利故地為鐵利府領廣汾蒲海義歸六州越喜故地為懷逺府領達越懷紀富美福邪芝九州詳後渤海條遼史地理志東京廣州渤海為鐵利郡太祖建鐵利州按鐵利郡即渤海鐵利府所屬之廣州條也渤海屬州往往以郡稱今詳後渤海遼史地理志東京鐵驪府故鐵驪國地按鐵驪即鐵利音同字異又按元一統志云蒲河在瀋陽路源出鐵利國蒲谷流經蒲水田故名松漠紀聞云蒲河距瀋州四十里今考蒲河在承德縣城西北四十里源出香爐山經永安橋入蓮花泊則鐵利故國實在於此遼史地理志東京韓州本渤海粵喜縣地按粵喜縣亦以粵喜國得名音同字異韓州故藁離國地在開原東北遼史地理志銀州新興縣本故粵喜國城按遼銀州本渤海懷逺府所屬之富州也新興縣之地渤海亦嘗置銀州遼移其名新興縣金𨽻咸平府志云南有范河北有柴河西有遼河以今水道考之外遼河在鐵嶺城西十里柴河源出城東南百八十里繞至城北西入於遼范河出城東南百二十里西流過城南西入遼河則粵喜國城正在今鐵嶺縣也遼史地理志東京信州本粵喜故城地鄰髙麗按此即渤海懷逺府治所據元一統志在濱州之西今開原之東蓋遼時渤海衰而髙麗復興故與髙麗相近也金史地理志韓州栁河縣本粵喜縣地以河為名有枸河栁河元一統志栁河縣故城本粵喜地後置縣以其地近栁河故名今城址猶存按元一統志苐言地近栁河金地理志云有枸河栁河考巨盛京通志有栁河而無枸河苐云遼河一名流河一名句麗河亦名枸栁河謂是枸河栁河合流之處今考栁河源出遼陽州城東北八十里西北流經承德縣城東南之䃳子山紅寶石山陽入十里河又考十里河舊名椆栁河源出遼陽州城北六十里亦西北流至楊家灣合沙河入渾河渾河入遼河則枸河或即十里河也苐十里河與栁河合流之地去巨流河尚逺而遼河之大豈轉因二小水得名舊志止屬傳聞未有確據蓋因句麗巨流枸栁音頗相同是以傳疑有此說耳又按今土默特右翼西北亦有栁河東南流經喀喇城入大凌河又義州境內之栁河川亦發源於土默特右翼南亦東南流入大凌河土默特右翼為古栁城地雖與靺鞨接界在遼為興中府屬中京殊不相涉考遼金韓州信州故城皆在今科爾沁左翼東南科爾沁地在隋唐屬靺鞨無栁河有遼河則所謂枸河栁河者當即枸栁之誤分為二河耳謹按靺鞨即勿吉舊屬七部並同拂涅白山等部已載前勿吉條粟末後稱渤海另條詳後惟黑水一部復分為十六考之史傳思慕郡利窟說莫曳皆虞婁皆在黑水以北不與中土相聞今黑龍江之外當即其地可考者惟黑水之南北部及越喜鐵利二部新唐書言室建河東合那河忽汗河又東貫黑水靺鞨故跨江有南北之稱所言較諸史為詳尚猶有未盡者室建即今黑龍江那河即嫩河忽汗即呼爾哈河二河並入混同江混同合黑龍江入海混同黑龍合流之處僅在靺鞨東界新唐書兼那河忽汗河言之似誤以混同為黑龍江也其實一出長白一出肯特逺不相涉前史但知有黑水而未知黑水源委僅據其入海之處與混同合流故誤以混同為黑水金史亦言混同江一名黑龍江指下流交㑹處而言猶之可也若新唐書言混同入嫩江北盟㑹編稱混同南流入鴨緑通鑑注又以混同為鴨緑尤舛謬之甚者矣嫩江之地亦屬靺鞨魏書稱勿吉使臣自其國溯難河至太河是也難河即嫩河太即洮爾詳見前勿吉條忽汗河上流屬渤海其入混同江處亦屬靺鞨唐㑹要所稱南與渤海德里府接界是也唐㑹要又云北至小海東濱大海渤海盛時黑水亦為所屬考渤海郡縣實未嘗過混同以北惟鐵利越喜兩部故地渤海嘗郡縣之而鐵利仍自為國朝貢往來見於遼史者不一暨金興始屬於金殆故地為渤海所得而其部落稍徙相逺歟鐵利故地有蒲河在今承德縣西北越喜故地有遼河范河柴河在今開原鐵嶺東北唐時黑水府黑水州但即其全部遙授都督之名初無專治燕州之設則在營州僅為别部長帥突地稽所居統計黑水全部北東際海南至寧古塔其西界嫩江科爾沁西南至開原鐵嶺史言南北袤二千里東西千里第約計之詞實不止是也欽定滿洲源流考卷九
