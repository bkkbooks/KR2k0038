body:
  text: 國俗五雜綴御製吉林土風雜咏十二首有序吉林在盛京東北我朝發祥所自舊俗流傳有先民遺風焉甲戌東巡駐蹕連日江城山郭廬旅語言想見岐豳式廓之始咨詢土風拈一字成語者為題得近體十有二首聊紀一二云爾威呼刳巨木為舟平舷圓底脣鋭尾修大者容五六人小者二三人剡木兩頭為槳一人持之左右運掉㨗若飛行取諸涣卦合羲經舴艋評量此更輕刳木為舟剡木楫林中擕往水中行􅌪集中山溪相間凡採参捕貂者擕威呼以往遇水則乗之飽帆空待吹風力柔櫓還嫌劃水聲泥馬賖枯尤㨗便泥馬賖枮者以樺皮為之只容一人両手持小槳划行恰如騎鯉遇琴生呼蘭因木之中空者刳使直達截成孤柱樹簷外引炕烟出之上覆荆筐而虚其旁竅以出烟雨雪不能入比室皆然中通外直求材易暮㸑晨炊利用均曲突徙薪誠上策焦頭爛額更何人疎烟土銼烹蒸便夜雨荆筐葢覆頻却有千年遼海鶴驀疑華表話前身法喇似車無輪似榻無足覆席如龕引䋲如御利行氷雪中俗呼扒犁以其底平似犁葢土人為漢語耳架木施箱質莫過致遥引重利人多氷天自喜行行坦雪嶺何愁嶽嶽峩駿馬飛騰難試滑老牛緩步未妨蹉華軒誠有輪轅飾人弗庸時奈若何斐蘭弧矢之利童而習之小兒以榆栁為弓曰斐蘭剡荆蒿為矢翦雉翟雞翎為羽曰鈕勘榆栁彎弓弦檿絲剡荆作箭雉翎翍壯行㓜學率由舊蓬矢桑弧匪襲為揖譲豈知爭君子闓抨惟覺慣童兒曽聞肅慎稱遥貢可惜周人未觧施賽斐古人食皆以匕羮則以勺國俗舊用木匕長四寸許曲柄豐末猶古制也質古惟稱以木為曲長且橢進餐宜鼎中底用輕染指座裏應教笑朶頤無下奢哉嗤彼箸有捄便矣藉茲匙青泥坊底芹香處杜老居然得句時額林庋横板楣棟間以貯奩篋缾甕諸器具兼几案匱匵之用庋楣横版當中厨家計精麤箇裏俱䑕閙欲投還忌器爵飛同量不妨觚竈間那識薪為蠟几上常看皮是烏淳樸遺規恭儉徳風聲擬使遍黄圖施函斵木為筩因其自然虗中以受物貯水醸酒皆用之視束鐵編篾攅木片為器者天質為勝誰云瓠落不中材虚受天然器量恢泉貯雲漿消舊渇春篘石凍醱新醅早嗤轇釡催人去閭閻有無相通客至必留飯其有頡羮者羣以為吝而笑之何用修筒引水來可供缾罍謝梁棟孰非造物善栽培拉哈土壁堵間綴麻草下垂縁以施圬墁此國初過澗芮鞫間故俗也乗屋居閒事索綯經營婦子共勤勞禦寒塞向諸凡預施墁編麻要取牢出氣天􅐼柱左右拉哈墻壁之上據棟中𥪡柱以承梁左右留二孔出氣謂之嘛木哈圖拉圖拉者漢語所謂柱也通烟土銼炕周遭室家豳館風猶在慙愧宫庭雉尾髙霞綳蓬梗為榦搏榖糠和膏傅之以代燭燃之青光熒熒烟結如雲俗呼糠燈蓬梗糠粃膏傅塗茅檐夜作每相需績麻乍可呼燈婢耽奕非闗誚燭奴最愛燄輝一室朗那辭烟染滿􅐼烏葛燈籠是田家物勤儉遺風與古符豁山夏秋間擣敗苧楮絮入水漚去聲之成毳􅅹蘆簾匀暴為紙堅韌如革謂之豁山凡紙牋胥以是名之擣苧漚麻亦號牋粘牕寫牘用猶便百畨徒訝銀光薄萬杵還輕越竹堅但取供書何貴巧便稱鋪玉詎能賢髙麗鏡面尋常有愛此淳亷舊制傳羅丹鹿蹄腕骨也舊俗以蹄腕骨随手攤擲為戲視具偃仰横側為勝負小者以麞大者以鹿瑩澤如玉兒童婦女圍㘴擲以相樂以薄圓石擊之則曰帕格投石軍中以戲稱手彈腕骨俗相仍得全四色方愉快腕骨一具四面各不同持四枚擲之各得一色則為四色全大約以此分勝負何必三梟始絶勝閨秀争能守爐火一手攤擲承空上下各取之以不動局上者為工婦女多能之非男子事也兒童較逺驟寒氷人有較逺之戯趨氷上以中為勝名曰撒罕無端勝負紛憂喜麞鹿那知有許能周斐樺木之用在皮厚者盈寸取以為室上覆為瓦旁為墻壁户牖體輕而工省逐獸而頻移山中所産不可勝用也巢處遺風藉樺皮上簷側壁總堪為端誇不漏還勝瓦豈慮頻遷等奕棋甕牖䋲樞猶未備夏凉冬煖且相宜五侯第宅皇州遍芮鞫先型爾尚知御製盛京土風雜咏十二首有序我國家發祥之初居鄂多理城地近吉林烏拉數世後棄而他徙至肇祖居赫圖阿拉爰創始基越我太祖膺運造邦乃討平圖倫還定烏拉撫有葉赫諸部遂遷居興京繼復克瀋陽遼陽因建都於瀋即今盛京故盛京土風與吉林同譬之成周豐鎬風規無殊沮漆也曩既成吉林土風十二章茲仍舉前題為盛京詠亦數典所當遞及耳各題小引已詳前作故不復綴威呼漢語小舩也造舟周室昔為梁開國規模百務詳奢匪黄龍及青雀利資雨泛與烟航製堅質樸提携便威呼刳木為之水行可載三人登陸則可挟之而趋或行窩集中遇小河港随時可渡其制最為輕便圓底平舷坐起康何必樓舩稱伐越威呼久矣武惟揚呼蘭漢語竈突也豳岐家室屢為遷時處恒依舊俗然水火每資叩昏户㸑炊常看引朝烟疏風避雨安而稳直外通中樸且堅截中空之木刳使直達樹之簷外引出炕烟覆荆筐其上以䕶雨雪而旁竅仍通滿洲舊製如此玉食寄言惟辟者莫忘陶復九章綿法喇漢語為扒犁即拕牀也服牛乗馬取諸隨制器殊方未可移似榻似車行以便曰氷曰雪用皆宜似榻無足似車無輪以牛馬挽行氷雪中可以致逺孤篷雖遜風帆疾峻坂無愁銜橛危太液拕牀龍鳯飾液池冬日則御拕床其製有施氊幄及餙以龍鳯者椎輪大輅此堪思斐蘭漢語榆栁小弓也桑弧蓬矢舉惟男示有事胥自㓜諳榆栁為弓騂角未荆蒿作箭雉翎堪其名曰鈕勘二三卿士節權畧日夕兒童戲以耽我滿洲以射為重雖小兒嬉戲亦習慣成自然云即此箕裘應共朂進之觀徳更名談賽斐漢語匙也有捄早是詠周雅異地同風古製存不改木為非玉作常資朝食與晡飱匙以木為長四寸許每食用之取其質也失時巧計傳昭烈投處仙方訝葛元何似兩忘供日月大東四鬴足村村額林漢語擱板也横施木板置楣桭家計精粗具畢陳楣棟間􅍥横板以置瓶盎匳篋諸器家具精粗咸備滿洲舊俗比室皆然舉之以示淳樸菽粟為文莫忘古雕幾作器漫求新寒衣饑食勞中婦耕九餘三厪主人咨爾後生勤數典更希寰宇普還淳施函漢語木筩也枯木荒山那計年虚中貯水借天然筩斷枯木為之因其自然虚中以受貯水醸酒皆宜無用為有用亦見尚質之意弗愁缾罄為罍恥可佐樽盛用缶旋厨下風無慮落葉林邊雨尚憶鳴泉不材材際全其質善注南華二十篇拉哈漢語圬墻所綴麻也層層坏土砌為墻綴以漚麻色帶黄築土甃坏為墻壁縁之以施圬墁亦國初樸素故俗也婦織男耕斯室處㓜孶壯作舊風蘉底稱鑿遁顔家闔漫喻操嘻圬者王故俗公劉𫝊芮鞫九重此况慎毋忘霞綳漢語糠燈也摶糠塗梗傅之膏繼日相資夜作勞以蓬梗為幹摶榖糠和膏塗之燃以代燭用資作勞開國勤儉之風即此可見土障葛燈應憶樸駝頭鳳腦漫誇豪未知勤讀鄰鑿壁且佐服田宵索綯此日舊宫試燃者稱先何異土風操豁山漢語紙也漚苧弗殊用敝麻以為紙乃樸無華擣敗苧故絮漚以為紙製樸而性堅猶存古初遺意不知有漢蔡倫合漫數上聲惟萊左伯嘉紀事傳言胥貴寔銷金鋪玉那求奢卷筒金粟常臨帖藏經紙無摺痕者謂之卷筒較經背紙尤難得敢忘斯哉惕自嗟羅丹漢語鹿蹄踠骨也鹿踠骨非無用物以為戱亦有時需中原漫喻人人逐一具還看面面殊踠骨一具四面各異戲者持其四枚擲之各行一面則為四色全即以此分勝負偶語何湏較土木采名乍欲擬梟盧帕格讀作哥漢語謂以薄圖石擊之也真足方投石可用從來如此乎周斐漢語樺皮房也野處穴居傳平聲易傳去聲樺皮為室鮮前聞樺皮厚盈寸取以為室覆可代瓦旁作墻壁户牖即以山中所産之木用之費不勞而工省乃我滿洲舊風無殊周室之陶復陶穴也風何而入雨何漏梅異其梁蘭異棼占吉簷頭鵲常報防寒墻角䑕還熏稱名則古惟淳樸却匪斐然周尚文周斐本滿洲語對音書之非取文義若如之義方觀承之書鄂博作峩軷引軷祭行路神曲為觧乃失之鑿矣葢滿文漢文音義各不同滿文漢文互譯則可取漢字以强合滿文則不可後漢書挹婁人便乗船北沃沮畏之每夏藏於巖穴至冬船道不通乃下居邑落後漢書挹婁土氣極寒常為穴居以深為貴大家至接九梯冬以豕膏塗身厚數分以禦風寒按陶復陶穴古固有之至豕膏得熱氣則融安能塗厚數分此亦范蔚宗好竒逞妄之辭也後漢書馬韓作土室開户在上辰韓有城栅屋室三國志夫餘有宫室倉庫牢獄作城柵皆員三國志夫餘庫有玉璧珪瓚數代之物傳世以為寳耆老言先代之所賜也三國志挹婁常穴居大家深九梯以多為好冬以豬膏塗身厚數分以禦風寒其國便乗船三國志馬韓居處作草屋土室其户在上舉家具在中魏畧弁辰其國作屋横累木為之晉書肅慎氏夏則巢居冬則穴處無井竈作瓦鬲受四五升以食無鹽鐵燒木作灰灌取汁而食之按南北朝史稱鹽凝于木皮之上又有鹽池而金時率賔以東食海鹽㑹寜呼爾哈等路食肇州鹽則肅慎地未嘗無鹽或所云凝于樹上之鹽亦須煎煉乃成耳魏書勿吉築城穴居開口於上以梯出入佃則耦耕車則步推北史勿吉築土如隄鑿穴以居開口向上以梯出入無牛有馬車則步推相與耦耕隋書百濟多不火食人皆山居有投壺圍棊樗蒲握槊㺯珠之戲舊唐書靺鞨無屋宇並依山水掘地架木於上以土覆之夏則出随水草舊唐書新羅器用栁棬亦以銅及瓦新唐書黒水靺鞨有車馬田耦以耕車則步推居無室廬負山水坎地梁木其上覆以土夏出隨水草冬入處新唐書新羅冬則作竈堂中夏以食置氷上宋會要新羅不用錢以米博易民家器皿悉以銅為之商舶用五色纈絹及建本文字博易契丹國志渤海富室往徃為園池植牡丹多至二三百本有叢生數十幹者皆燕地所無契丹國志混同江之地其俗刳木為舟長可八尺形如梭曰梭船船上施一槳止以捕魚至渡車則方舟或三舟按此即威呼之制梭船乃漢人語耳王曽行程録渤海俗每嵗時聚㑹作樂先命善歌舞者數輩前行士女相隨更相唱和回旋宛轉號曰踏鎚所居屋皆就山墻開門神麓記金景祖始教人燒炭煉鐵刳木為器制造舟車建屋宇五代史女真其人無定居行以牛負物遇雨則張革為屋契丹國志女真部族皆處山林有屋居舍門皆於山牆下闢之耕鑿與渤海人同無出租税契丹國志女真人無定居行以牛負物遇雨則張韋為屋通考女真俗以樺皮為屋金史世紀黒水舊俗無室廬負山水坎地梁木其上覆以土遷徙靡常獻祖始築室有棟宇之制大金國志女真部其居多依山谷聫木為栅或覆以板與樺皮如墻壁亦以木為之冬極寒屋纔髙數尺獨開東南一扉扉既掩復以草綢繆之穿土為牀煴火其下而寝食起居其上道路無行店行者息于民家主人具飲食而納之其市無錢以物博易無工匠屋舍車帳往往自能為之大金國志金太祖十四年生紅芍藥花北方以為瑞女真多白芍藥花皆野生絶無紅者好事之家採其芽為菜以麫煎之凡待賔齋素則用之金人珍甚不肯妄設遇大賔縷切數絲置楪中以為異品按今英莪門外獵場中有芍藥両叢相對繁柯密葉鬱然猶存其下不生雜草土人云凡鳥獸避跡不敢蹂踐花時人過之畏不採擷或有所犯必致疾病因名其地為花園詳見及注御製花囿詩序松漠記聞金人舊俗炙股烹䔕音蒲膞肉也以餘肉和菜擣臼中糜爛而進率以為常凡宰羊但食其肉貴人享重客間兼皮以進曰全羊北盟録女真人耐寒忍飢不憚辛苦能食生物依山谷而居聨木為栅屋髙數尺無瓦覆以木板或以樺皮或以草綢繆之墻垣籬壁率皆以木門皆東向環屋為土牀熾火其下寝食起居其上謂之炕以取其煖以牛負物或鞍而乗之遇雨多張牛革以為禦以麋釀酒以豆為醬芼以蕪荑食器無瓠陶皆以木為盆春夏之間止用木盆注粥随人多寡盛之以長柄小木杓子數柄回環共食下粥肉味無多止以魚生獐生間用燒肉冬亦冷飲以木楪盛飯木盌盛羮下飯肉味與下粥一等飲酒無算用一木杓子自上而下循環酌之炙股烹脯以餘肉和菜擣臼中糜爛而進率以為常道路無旅店行者息于民家主人與飲食而納之其市易惟以物博易無錢無蠺桑無工匠屋舍車帳往往自䏻為之北盟録女真俗重油煮麫食以密塗拌名曰茶食非厚意不設渡拉林河以東無市井買賣不用錢惟以物相貿易寝榻皆土牀厚鋪氊褥及錦繡貂䑕被大頭枕輟耕録髙麗以北地名巴實伯里囬語巴實頭也伯里腰也舊作别失八里今改正其地極寒海亦氷自八月即合至明年四五月方觧人行其上如平地征東行省每嵗委官至尼嚕干滿洲語畫也舊作奴兒干今改正須用站車每車以四狗挽之狗悉諳人性若尅减其分例必齧其主者至死乃已元一統志開元路有狗車木馬輕㨗之便木馬形如彈弓長四尺濶五寸一左一右繫於両足激而行之雪中氷上可及奔馬狗車以木為之其制輕簡形如船長一丈濶二尺許以數狗拽之二者止可於氷上雪中行之謹案古所稱陸海奥區豐衍蕃沃者大抵在舟車所輳商賈所通之地此以人力致者也周原之美堇荼豐邑之歌麀鹿其物又甚微也若乃天作地藏瓌竒絶特凡名都大邑之儲航海梯山之貢有不能擬其萬一者則惟大東天府毓粹孕珍扶輿旁薄之所鍾山川靈異之所聚巨珠靈藥早著於曩編文玉豐貂並稱於往牒以至牛魚之歸獻俊鶻之蜚聲史家詫為異聞海内仰其瑰寶矣至如索綯乗屋不改淳風土障葛燈彌敦儉徳考之於古則梭船之制實即威呼木馬之行又同法喇室惟覆樺行不齎糧斲木為盆環屋為炕儉勤之俗古猶今也御製土産土風雜詠昭徳産之精華繪古風之醇質較生民公劉諸篇所陳尤為過之謹録冠各條之首而自後漢書以下仍分繫焉庶乎神臯之繁殖先民之遺規並可考見云爾欽定滿洲源流考卷二十
