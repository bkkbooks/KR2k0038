body:
  text: 部族二挹婁一作樓漢後漢書挹婁古肅慎之國也在夫餘條詳見前東北其邑落各有大人處于山林之間自漢興以後臣屬夫餘册府元龜挹婁地多山險人形似夫餘善乘船北沃沮畏之每夏藏于巖穴至冬船道不通乃下居邑落三國三國志挹婁在夫餘東北千餘里人多勇力土氣寒劇于夫餘古之肅慎氏國也自漢以來臣屬夫餘夫餘責其租賦重以黃初中叛之夫餘數伐之其人衆雖少所在山險鄰國人畏其弓矢卒不能服也通考挹婁即古肅慎之國也其國在不咸山北魏常道鄉公景元末來貢楛矢石砮弓甲貂皮之屬晉晉書肅慎一名挹婁在不咸山北其國東北有山出石其利入鐡將取必先祈神武帝元康初來貢元帝中興又詣江左貢其石砮至武帝時通貢于石季龍四年方達唐新唐書渤海另條詳後本粟末靺鞨姓大氏髙麗滅率衆保挹婁之東牟山地直營州東二千餘里遼史地理志大氏始保挹婁之東牟山有乞乞仲象者渡遼水自固武后封為震國公後自稱震王五代史武后時乞乞仲象子祚榮立因並有乞四比羽之衆四十萬人據挹婁遼遼史地理志瀋州昭德軍雙州保安軍定理府皆故挹婁國地按瀋州昭德軍今承德縣雙州保安軍今鐡嶺縣定理府在今興京境內金大金國志北接室韋西界渤海鐡離東瀕海三國志所謂挹婁地也按挹婁之名始于後漢考之史傳即古肅慎氏晉書所謂肅慎一名挹婁是也至南北朝始别有勿吉靺鞨勿吉靺鞨俱另條詳後之稱而舊名之見于簡冊者猶有可考如遼之瀋州雙州定理府金之挹婁縣皆僅指一隅非其全部元史稱瀋陽路為挹婁故地似矣而于開元路則云古肅慎地隋唐曰靺鞨又似岐而二之者蓋魏晉以前部族未分魏晉以後釐而為七族愈繁而地愈廣容有非舊部之名所能該者矣至金史地理志謂瀋州本遼定理府為挹婁故壤考遼志則瀋州之外别有定理府亦屬挹婁之地遼之定理實唐時渤海所建至金已廢又金志稱瀋州挹婁縣本遼舊興州常安縣考遼志東丹城北至挹婁縣范河二百七十里則遼時已有挹婁縣蓋郡邑雖移而幅員有定今見于盛京通志者若承德若鐵嶺若吉林若寧古塔自奉天府治極于東北胥挹婁地也又明一統志載洪武二十九年設左右千戶于懿路城永樂八年復設中千戶于懿路城其廢址今在鐵嶺縣城南六十里又有站名懿路亦作伊魯當即遼金挹婁縣之遺今滿洲語謂巖穴之穴為葉嚕與伊魯音相近可知當時命名之義而音轉傳訛厯代遂有互異究之遺址可尋正猶陶之為陶邱豳之為豳亭焉爾三韓御製三韓訂謬嘗讀後漢書三韓傳稱辰韓人兒生欲令頭扁皆押之以石訝其說之悖于理而肆為詭誕以惑世也夫以石押頭壯夫且不能堪而以施之初墮地之小兒實非人情所宜有間考三韓建國本末諸史率多抵牾以方位凖之蓋在今奉天東北吉林一帶壤接朝鮮與我國朝始基之地相近國朝舊俗兒生數日即置卧具令兒仰寢其中久而腦骨自平頭形似扁斯乃習而自然無足為異辰韓或亦類是耳范蔚宗不得其故從而曲為之解甚矣其妄也且如漢人生兒常令側卧久而左右角平頭形似狹蒙古人生兒以韋帶束之木板植立于地長則股形微箕此亦皆習而自然無足為異藉如蔚宗所言豈漢人蒙古亦皆以石押之令其頭狹而股箕乎若夫三韓命名史第列馬韓辰韓辨韓亦曰辨辰而不詳所以稱韓之義陳夀魏志直云韓地韓王魚豢魏略且以為朝鮮王凖冒姓韓氏其為附會尤甚蓋國語及蒙古語皆謂君長為汗韓與汗音相混史載三韓各數十國意當時必有三汗分統之史家既不知汗之為君而庸鄙者至訛韓為族姓何異扣槃捫籥以喻日哉且中外語言不通不能强為詮解者勢也今夫天昭昭在上人皆仰之然漢語謂之天國語謂之阿卜喀蒙古語謂之騰格里西畨語謂之那木喀回語謂之阿思滿以彼語此各不相曉而人之所以敬與天之所以感則無弗同若必一一以漢字牽附臆度之能乎不能夫韓與汗音似義殊謬而失之誣猶可也至于以石押頭之謬實悖于理斯不可也然則余之三韓訂謬之作烏容已乎哉謹按三韓雖與漢時諸郡毗連然音譯多訛往往以漢字轉相附㑹于是異說分岐至范蔚宗有生兒以石押頭之論誕妄不經莫斯為甚矣恭讀御製三韓訂謬以國語蒙古語證韓之當為汗而即漢人蒙古習俗之不同并推及國朝生兒仰寢卧具見理之至常而無足怪審音知義曠若發蒙據事揆情瞭如指掌誠非厯代紀載家所能窺測也謹録冠諸書之前以昭凖則漢漢書朝鮮傳真畨辰國欲上書見天子朝鮮雍閼弗為通師古曰辰謂辰韓之國也通典三韓後漢時通焉一曰馬韓二曰辰韓三曰辨韓晉梁二書作辨辰馬韓在西有五十四國其北與樂浪南與倭接辰韓在東十有二國其北與濊貊接辨辰在辰韓之南亦十有二國其南亦與倭接凡七十八國百濟另條詳後是其一國焉大者萬餘户小者數千家各在山海間地合方四千餘里東西以海為限皆古之辰國也馬韓最大共立其種為辰王都目支魏志作月支通考作自支國盡王三韓之地其諸國王先皆是馬韓種人後漢書馬韓邑落雜居無城郭辰韓耆老自言秦之亡人避苦役適韓國馬韓割東界地與之或名之為秦韓有城柵屋室諸小别邑各有渠帥貿易以鐡為貨兒生欲其頭扁皆押之以石辨辰與韓辰雜居城郭衣服皆同其人形皆長大美髮而刑罰嚴峻初朝鮮王準為衛滿所破乃將其餘衆走入海攻馬韓破之遂立為韓王準後滅絶馬韓人復自立為辰王魏略朝鮮王凖為衛滿所破走入海中其子及留在國者因冒姓韓氏凖王海中不與朝鮮相往來魏略初右渠朝鮮王衛滿之孫未破時朝鮮相厯溪卿以諫右渠不用東之辰國時民隨出居者二千户亦與朝鮮真畨不相往來至王莽時亷斯鑡為辰韓右渠帥欲來降出其邑落見一人其語非韓人問之曰我等漢人名户來我等輩千五百人伐材木為韓所得積三年矣辰鑡因將户來出詣樂浪郡郡令鑡乘大船入辰韓取户來伴輩尚得千人其五百人已死辰韓曰我當出贖直耳乃出辰韓萬五千人辨韓布萬五千匹鑡收取直還郡册府元龜漢建武二十年韓國亷斯人蘇馬諟等詣樂浪貢獻帝封蘇馬諟為亷斯邑君使屬樂浪郡四時朝謁後漢書本紀建武二十年韓國人率衆詣樂浪內附注辰韓卞韓馬韓謂之三韓國也通考靈帝末韓濊並盛郡縣不能制百姓苦亂多流亡入韓者獻帝建安中公孫康分屯有有鹽縣屯有有鹽兩縣並漢遼東所屬以南荒地為帶方郡遣公孫模張敞等收集遺民興兵伐韓濊舊民稍出是後韓遂屬帶方郡三國魏志韓在帶方之南東西以海為限南與倭接其地方可四千里有三種一曰馬韓二曰辰韓辨韓辰韓者古之辰國也馬韓在西其民土著各有長帥大者名臣智散在山海間無城郭凡五十餘國總十萬餘户辰王治月支國魏景初中明帝密遣帶方太守劉昕樂浪太守鮮于嗣越海定二郡諸韓國臣智加賜邑君印綬其次與邑長部從事吳林以樂浪本統韓國分割辰韓八國以與樂浪吏譯轉有異同臣智激韓忿攻帶方郡﨑離營時太守弓遵樂浪太守劉茂興兵伐之遵戰死二郡遂滅韓辰韓在馬韓東自言避秦役來適韓國今有名之為秦韓者始有六國分為十二國辨辰亦十二國又有諸小别邑各有渠帥總四五萬户其十二國屬辰王辰王常用馬韓人作之世世相繼土地肥美辨辰與韓雜居亦有城郭衣服居處與辰韓同其瀆盧國與倭接界十二國亦有王晉晉書馬韓居山海之間凡有小國五十六所武帝太康元年二年其王頻遣使貢方物七年八年十年又頻至太熙元年詣東夷校尉何龕上獻咸寧三年復來明年又請內附辰韓常用馬韓人作主雖世世相承而不得自立明其流移之人故為馬韓所制也太康元年其王遣使貢方物二年復來朝貢七年又來通考三韓自咸寧三年來貢明年又請內附其王來朝自後無聞蓋為百濟新羅另條詳後所吞併南北朝梁書辰韓始有六國稍分為十二新羅其一也馬韓有五十四國百濟其一也唐舊唐書百濟國為馬韓故地宋宋史定安國本馬韓之種為契丹所破其帥糾合餘衆保于西鄙建國改元自稱定安開寶三年其王烈萬華因女真遣使入貢遼遼史地理志髙州三韓縣辰韓為扶餘辨韓為新羅馬韓為髙麗開泰中聖宗伐髙麗取三國之遺人置縣按三韓統名辰國自漢初已見後為新羅百濟所併其七十八國之名備載于魏志國名多繫以卑離二字如監奚卑離內卑離辟卑離如來卑離以滿洲語考之當為貝勒之轉音正猶汗之訛為韓而三汗之統諸貝勒于體制洽相符合也至馬韓亦作慕韓辰韓亦作秦韓辨韓亦作辨辰又作卞韓尚書傳扶餘馯並稱正義謂馯即韓也當時祗以諧音並非漢語范蔚宗始稱為韓國韓人魏志遂有韓地韓王之目甚者至訛為韓氏又如辨韓在三韓中記載獨少考史記真畨注謂畨音普寒切遼東有潘汗縣或即辨韓之轉音亦未可定或有以三韓為髙麗者蓋因宋史髙麗傳有崇寧後鑄三韓通寶之文又遼史外紀遼時常以三韓國公為髙麗封號遂謂三韓之地盡入髙麗不知髙麗之境亦屬三韓所統當時假借用之未經深考耳至遼之三韓縣乃取髙麗俘户所置並非其故壤也勿吉南北朝魏書勿吉在髙麗北舊肅慎國也邑落各自有長不相總一其人徑悍常輕豆莫婁諸國延興中遣使乙力支朝貢太和初又貢馬五百匹自云其國先破髙句麗十落密共百濟謀從水道并力取髙句麗來請其可否詔三國宜共和順勿相侵擾九年復遣使侯尼支朝獻十二年遣使貢楛矢方物十七年遣使婆非等五百餘人朝獻景明四年遣使俟力歸北史作侯力歸興和二年遣使石久云北史作石文云等貢方物至于武定不絶北史勿吉一曰靺鞨另條詳後其部類凡七種其一號粟米部與髙麗接勝兵數千多驍武其二伯咄部在粟末北勝兵七千其三安車骨部在伯咄東北其四拂涅部在伯咄東其五號室部在拂涅東其六黑水部在安車西北其七白山部在粟末東南勝兵並不過三千而黑水部尤徑自拂涅以東矢皆石鏃即古肅慎氏也册府元龜魏孝文延興五年勿吉國遣使朝獻又太和二年十年並遣使朝貢十二年勿吉國貢楛矢石砮十七年遣使朝獻又宣武景明四年正始四年勿吉國貢楛矢又永平元年二年三年並遣使朝貢四年延昌元年貢楛矢延昌二年三年七月九月並朝貢四年孝平熙平二年貢楛矢神龜元年二年朝貢東魏孝靜帝天平三年興和二年三年武定二年四年五年北齊武平三年並遣使朝貢隋太平寰宇記隋初靺鞨國有使來獻謂即勿吉也通考隋開皇初勿吉遣使貢獻文帝厚勞之其國與隋懸隔惟粟末白山為近唐舊唐書靺鞨蓋肅慎之地後魏謂之勿吉太平寰宇記貞觀初伯咄安車骨入號室部髙麗破後並歸渤海惟黑水部全盛分為十六部落通考拂涅亦稱大拂涅開元天寶間八來獻鯨晴貂鼠白兔新唐書渤海本粟末部姓大氏五代五代史黑水靺鞨本號勿吉當後魏時見中國蓋古肅慎氏之地也其衆為分數十部而黑水最處其北尤徑其部族世次史皆失其紀遼遼史營衛志國外十部有長白山部金金史世紀景祖稍役屬諸部自白山之屬以至五國之長皆聽命金史世紀勿吉古肅慎地也元魏時勿吉有七部太祖敗遼兵于境使梁福烏達喇舊作斡答喇招諭渤海人曰女真渤海本同一家皆勿吉之七部也北盟録女真所居之地東瀕海南接髙麗西接渤海鐡離北近室韋三國所謂挹婁元魏所謂勿吉是也按勿吉始見于北魏亦謂之靺鞨故魏書為勿吉傳隋書為靺鞨傳而北史傳云勿吉一名靺鞨其事則實為一國蓋南北音殊譯對互異併不得謂一國而二名也第自唐武德以前則勿吉與靺鞨互稱武德以後則黑水一部獨强分為十六部始専稱靺鞨而粟末部自萬嵗通天以後改稱震國又稱渤海無復目為勿吉者矣今靺鞨渤海各具専條取史傳之稱勿吉者繫屬于此至伯咄五代史太平寰宇記作汩咄拂寰宇記作拂涅按滿洲語謂朋友曰固楚與汩咄音同謂羣處之羣曰佛寧與拂揑音同兩句相連即朋友之意當時二部命名應取諸此而音字傳說遂不畫一耳又按佛寧清文作合下一字尼音二字合切漢字無恰者借用寧字譯之考遼史地理志為紫蒙縣為興平軍為始平軍地粟末部以粟末水得名即今之松阿哩江白山今長白山滿洲語謂之果勒敏珊延阿琳黑水今黑龍江滿洲語謂之薩哈連烏喇詞異義同尤信而可徴也至諸史咸稱七部中黑水尤徑扶輿之氣鍾厚於兹益以徵我國家出震方行霆驅電掃八旗徑旅有勇知方所由來者逺矣欽定滿洲源流考卷二
