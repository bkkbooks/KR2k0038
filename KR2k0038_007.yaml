body:
  text: 部族三百濟一作伯濟漢後漢書三韓另條見前凡七十八國伯濟是其一國焉三國三國志馬韓有伯濟國晉册府元龜晉簡文帝咸安二年正月百濟遣使貢方物六月遣使拜百濟王餘句按百濟為夫餘王尉仇台之後故以夫餘為姓諸史往往刪去夫字誤為鎮東將軍領樂浪太守孝武帝太元十一年以百濟世子餘暉為鎮東將軍百濟王義熙十二年以百濟王映為使持節都督百濟諸軍事鎮東將軍百濟王通典晉義熙中以百濟王夫餘腆為使持節督百濟諸軍事通考百濟即後漢末夫餘另條見前王仇台之後馬韓五十四國百濟是其一也初以百家濟因號百濟後漸強大兼諸小國晉時句麗既略有遼東百濟亦略有遼西晉平唐栁城北平之間自晉以後吞併諸國據有馬韓故地南接新羅另條詳後北拒髙麗千餘里西限大海處小海之南自晉代受藩爵自置百濟郡太平寰宇記百濟西限大海過海至越州處小海之南南到海即倭國晉代受藩爵自置百濟郡其人土著地多下濕率皆山居南北朝宋書髙麗傳髙祖踐祚詔曰使持節督百濟諸軍事鎮東將軍百濟王映執義海外逺修貢職惟新告始宜荷國休可鎮東大將軍持節都督王公如故宋書百濟國本與髙麗俱在遼東之東千餘里其後髙麗略有遼東百濟略有遼西百濟所治謂之晉平郡晉平縣義熙十二年以百濟王餘映為使持節都督百濟諸軍事鎮東將軍百濟王髙祖踐祚進號大將軍少帝景平二年映遣長史張威詣闕貢獻元嘉二年太祖詔之曰皇帝問使持節都督百濟諸軍事鎮東將軍百濟王纍葉忠順越海效誠慕義既彰厥懷亦欵浮桴驪水獻琛執贄故嗣位方任以藩東服勉朂所蒞無墜前蹤今遣兼謁者問丘恩子兼副謁者丁敬子等宣旨慰勞稱朕意其後每嵗遣使奉表獻方物七年百濟王餘毗復修職貢以映爵號授之二十七年毗上書獻方物私假臺使馮野夫西河太守表求易林占式腰弩太祖並與之毗死子慶代立世祖大明元年遣使求除授詔許之二年慶遣使上表曰臣國纍葉偏受殊恩文武良輔世蒙朝爵行冠軍將軍右賢王餘紀等十一人忠勤宜在顯進伏願垂愍並聽賜除仍以行冠軍將軍右賢王餘紀為冠軍將軍以行征虜將軍左賢王餘昆行征虜將軍餘暈並為征虜將軍以行輔國將軍餘都餘乂並為輔國將軍以行龍驤將軍沐襟餘爵並為龍驤將軍以行寧朔將軍餘流糜貴並為寧朔將軍以行建武將軍于西餘婁並為建武將軍太宗泰始七年又遣使貢獻齊書武帝永明八年百濟王牟大上表曰寧朔將軍臣姐瑾等四人振竭忠效攘除國難志勇果毅等威名將論功料勤宜在甄顯今依例輒假行職伏願恩愍聽除所假寧朔將軍面中王姐瑾厯贊時務武功並立今假行冠軍將軍都將軍都漢王建威將軍八中侯餘古弱冠輔佐忠效夙著今假行寧朔將軍阿錯王建威將軍餘厯忠欵有素文武列顯今假行龍驤將軍邁盧王廣武將軍餘固忠效時務光宣國政今假行建威將軍弗斯侯又表曰臣所遣行建威將軍廣陽太守兼長史臣髙達行建威將軍朝鮮太守兼司馬臣楊茂行宣威將軍兼參軍臣會邁等三人志行清亮忠欵風著往太始中比使宋朝今任臣使冒涉波險宜在進爵謹依例合假行職伏願除正達邊效夙著勤勞公務今假行龍驤將軍帶方太守茂志行清一公務不廢今假行建威將軍廣陵太守舊作萬今據前文改執志周密屢致勤效今假行廣武將軍清河太守詔可並賜軍號除大為使持節都督百濟諸軍事鎮東大將軍使謁者僕射孫副策命大襲其祖父梁書作父牟都爵為百濟王是嵗魏人又發騎數十萬攻百濟入其界辨大遣將沙法名贊首流解禮昆木千那率衆襲擊魏軍大破之建武二年遣使上表曰去庚午年按庚午為齊武帝永明八年獫允弗悛舉兵深逼臣遣沙法名等領軍逆討宵襲霆擊乘奔追斬僵尸丹野今邦宇寧謐實名等之略今假沙法名行征虜將軍邁羅王贊首流為行安國將軍辟中王解禮昆為行威武將軍弗中侯木干那前有軍功又拔臺舫為行廣威將軍面中侯伏願天恩特愍聽除又表曰臣所遣行龍驤將軍樂浪太守兼長史臣慕遺行建武將軍城陽太守兼司馬臣王茂兼參軍行振武將軍朝鮮太守臣張塞行揚武將軍臣陳明在官忘私蹈難弗顧今任臣使冒涉波險各假行爵伏願特賜除正詔可並賜軍號按此所載百濟人地名有與滿洲語相近者若牟大當為穆丹韻也弗斯當為富森滋生也牟都當為穆敦切磋之磋也弗中當為法珠樹杈也又如沙氏解氏木氏皆百濟大族其名如首流當為舒嚕珊瑚也干那當為噶納往取也時代雖遙尚亦有可通者耳梁書馬韓有五十四國百濟其一後漸強大兼諸小國其國本在遼東之東晉世據有遼西晉平二郡自置百濟郡晉太元中王須義熙中王餘映宋元嘉中王餘毗並遣獻生口餘毗死子慶立慶死子牟都立都死子牟太齊書作大立齊永明中除太都督百濟諸軍事鎮東大將軍百濟王天監元年進太號征東將軍尋為髙句驪所破衰弱者纍年遷居南韓按辨韓在辰韓之南故史稱為南韓地普通二年王餘隆始復遣使奉表稱纍破句驪今始得通好而百濟更為強國其年詔加寧東大將軍五年隆死復以其子明為綏東將軍百濟王所治城曰固麻中大通六年大同七年纍遣使獻方物并請涅槃等經義毛詩博士并工匠畫師等敇並給之太清三年猶遣使貢獻南史馬韓五十四國百濟其一也後漸強大兼諸小國其國本與句驪俱在遼東之東千餘里晉世據有遼西晉平二郡地自置百濟郡晉義熙十二年以餘映為王宋元嘉七年百濟王餘毗復修貢職以映爵號授之毗死子慶代立慶死立子牟都牟都死立子牟大齊永明中除大都督百濟諸軍事鎮東大將軍百濟王梁天監中為髙麗所破衰弱纍年遷居南韓地普通二年王餘隆始復遣使奉表稱纍破髙麗今始與通好五年隆死復以其子明為持節督百濟諸軍事綏東將軍百濟王其人形長太清三年遣使貢獻及至見城闕荒毁並號慟涕泣侯景怒囚執之景平乃得還國册府元龜宋髙祖永初元年餘映進號鎮東大將軍文帝元嘉七年十七年二十年二十七年並遣使獻方物孝武大明元年七年並遣使朝貢順帝升明二年王牟都遣使貢獻詔授使持節都督百濟軍事鎮東大將軍齊武帝永明八年遣謁者僕射孫副策命牟太為百濟王曰於戲惟爾世襲忠勤誠著遐表海路肅澄要貢無替式循彝典用纂顯命敬膺休業可不慎歟梁普通二年詔加餘隆寧東大將軍詔曰守藩海外逺修貢職乃誠款到朕有嘉焉宜率舊章服兹榮命三年遣使貢方物五年以餘隆子明為縘東將軍百濟王陳文帝天嘉三年以百濟王餘明為撫東大將軍臨海王光大元年宣帝大建九年後主至德二年四年並遣使入朝魏書百濟國其先出自夫餘其民土著地多下濕率皆山居延興二年其王餘慶始遣使上表曰臣建國東極豺狼隔路雖世承靈化莫由奉藩瞻望雲闕馳情罔極涼風微應伏惟陛下協和天休不勝係仰之情謹遣私署冠軍將軍駙馬都尉弗斯侯長史餘禮龍驤將軍帶方太守司馬張茂等投舫波阻搜徑元津託命自然之運遣進萬一之誠冀神祗垂感皇靈洪覆克達天庭宣暢臣志雖旦聞夕沒永無餘恨又云臣與髙句驪源出夫餘先世之時篤崇舊款其祖釗輕廢鄰好親率士衆陵踐臣境臣祖須整旅電邁應機馳擊矢石暫交梟斬釗首自爾以來莫敢南顧自馮氏數終餘燼奔竄醜類漸盛遂見凌逼構怨連禍三十餘載財殫力竭轉自孱踧若天慈曲矜逺及無外速遣一將來救臣國又云今漣有罪國自魚肉大臣強族殺戮無已是滅亡之期假手之秋也且馮族士馬有鳥畜之戀樂浪諸郡懷首丘之心天威一舉有征無戰臣雖不敏志效畢力當率所統承風響應且髙麗不義逆詐非一外慕隗囂藩卑之辭內懷凶禍豕突之行或南通劉氏或北約蠕蠕共相唇齒謀陵王略今若不取將貽後悔去庚辰年後臣西界小石山北國海中見尸十餘并得衣器鞍勒視之非髙麗之物後聞乃是王人來降臣國長蛇隔路以沈于海雖未委當深懷憤恚陛下合氣天地勢傾山海豈令小豎跨塞天逵今上所得鞍一以為實驗顯祖以其僻達冒險朝獻禮遇優厚遣使者邵安與其使俱還詔曰卿處五服之外不逺山海歸誠魏闕欣嘉至意用戢于懷卿與髙麗不睦屢致凌犯茍能順義守之以仁亦何憂于冦仇也前所遣使浮海以撫荒外之國積年不返達否未能審悉卿所送鞍比校舊乘非中國之物不可以疑似之事以生必然之過經略權要已具别旨又詔曰知髙麗阻強侵軼卿土修先君之舊怨棄息民之大德兵交纍代難結荒邊使兼申胥之誠國有楚越之急乃應展義扶微乘機電舉但以髙麗稱藩先朝供職日久于彼雖有自昔之釁干國未有犯令之愆卿使命始通便求致伐討尋事會理亦未周故往年遣禮等至平壤欲驗其由狀然髙麗奏請頻煩辭理俱詣行人不能抑其請司法無以成其責故聽其所啓詔禮等還若今復違旨則過咎益露後雖自陳無所逃罪然後興師討之于義為得所獻錦布海物雖不悉達明卿至心今賜雜物如别又詔璉護送安等安等至髙句驪璉稱昔與餘慶有仇不令東過安等于是皆還乃下詔切責之五年使安等從東萊浮海賜餘慶璽書褒其誠節安等至海濵遇風飄蕩竟不達而還魏書髙麗傳髙麗王釗烈帝時與慕容氏相攻建國四年慕容元真伐之釗單騎奔竄後為百濟所殺按烈帝為道武帝之伯祖隋書以昭列帝三字相連為髙麗王之名殊誤涉羅國為百濟所併魏書勿吉傳勿吉先破髙句驪十落密共百濟謀從水道併力取髙句麗勿吉國另條見前太平寰宇記百濟國後魏孝文帝遣衆征破之後其王牟大為髙句麗所破遷居南韓舊地後周書百濟者馬韓之屬國夫餘之别種有仇台者始國于帶方其地界東極新羅北接髙句麗西南俱限大海王姓夫餘氏自晉宋齊梁據江左後魏宅中原並遣使稱藩兼受封拜齊氏擅東夏其王隆亦通使焉隆子昌建德六年遣使獻方物宣政元年又遣使來獻北史百濟夫餘王東明之後詳見前夫餘條有仇台者篤于仁信始立國于帶方故地漢遼東太守公孫度以女妻之遂為強國初以百家濟因號百濟王姓餘氏按後周書作夫餘氏當以後周書為是其都曰居拔城亦曰固麻城其外更有五方方有十郡其人兼有新羅髙麗倭等亦有中國人有僧尼多寺塔而無道士有鼓角箜篌笙竽箎笛之樂行宋元嘉厯以建寅月為嵗首國中大姓有八族原脫八字今據隋書增沙氏燕氏刕通考作劦注云音狹氏解氏真隋書新唐書俱作貞氏國氏木氏苗新唐書作䒤通考作苩注云音白氏齊武平元年齊後主以餘昌為使持節侍中車騎大將軍帶方郡公百濟王如故二年又以餘昌為持節都督東青州諸軍事東青州刺史周建德六年齊滅餘昌始遣使通周宣政元年又遣使來獻隋隋書百濟夫餘王東明之後開皇初其王餘昌遣使貢方物拜昌為上開府帶方郡公百濟王平陳之嵗有一戰船漂至海東􅡭牟羅國其船得還經于百濟昌資送之甚厚并遣使奉表賀平陳髙祖善之下詔曰百濟往復至難若逢風浪便致傷損百濟王心迹淳至朕已委知相去雖逺事同言面何必數遣使來自今以後不須年别入貢朕亦不遣使往王宜知之開皇十八年北史作八年昌使其長史王辨那來獻方物屬興遼東之役遣使請為軍導帝下詔曰往嵗為髙麗不供職貢無人臣禮故命將討之髙元君臣畏服歸罪朕已赦之不可致伐厚其使而遣之髙麗頗知其事以兵侵掠其境昌死子餘宣立餘宣死子餘璋立大業三年璋遣死者燕文進朝貢其年又遣使王孝鄰入獻請討髙麗煬帝許之令覘髙麗動靜然璋內與髙麗通和七年帝親征髙麗璋使其臣國智牟來請軍期帝大悅厚加賞錫遣尚書起部郎席律詣百濟與相知明年六軍度遼璋亦嚴兵于境聲言助軍尋與新羅有隙每相戰爭十年復遣使朝貢後天下亂使命遂絶其南海行三月有􅡭牟羅國南北千餘里東西數百里附庸于百濟唐舊唐書百濟地在京師東六千二百里東北至新羅西渡海至越州南渡海至倭國北渡海至髙麗其王所居有東西兩城又外置六方方管十郡其用法叛逆者死籍沒其家殺人者以奴婢三贖罪官人受財及盜三倍追贓仍終身禁錮武德四年其王夫餘璋遣使獻果下馬七年又遣大臣奉表朝貢髙祖遣使册為帶方郡王百濟王自是嵗遣朝貢髙祖撫勞甚厚因訟髙麗閉其道路不許來通中國詔遣朱子奢往和之又與新羅世為仇敵數相侵伐貞觀元年賜璽書曰王世為君長撫有東藩海隅遐曠風濤險阻忠欵之至職貢相尋尚想徽猷甚以嘉慰新羅王金真平王之鄰國每聞遣師征討不息阻兵安忍殊乖所望朕已對王侄福信及髙麗新羅使人具敕通和咸許輯睦王必須忘彼前怨識朕本懷共篤鄰情即停兵革璋因遣使陳謝實相仇如故十一年遣使獻鐵甲雕斧賜綵帛三千段并袍等十五年璋卒其子義慈告哀太宗素服哭之贈光祿大夫賻物二百段遣使册義慈為柱國帶方郡王百濟王十六年義慈興兵伐新羅取四十餘城又發兵以守之與髙麗通好謀取黨項新唐書作棠項誤城以絶新羅入朝之路新羅遣使告急請救太宗遣司農丞相里元奬齎書告諭及太宗親征髙麗百濟乘虛襲破新羅十城新書作七城二十二年又破其十餘城數年之中朝貢遂絶髙宗永徽二年始又遣使朝貢使還降璽書于義慈曰海東三國開基自久地實犬牙近代已來遂搆嫌隙戰爭交起朕代天理物載深矜憫去嵗新羅使金法敏奏書乞詔百濟令歸所侵之城若不奉詔即自興兵打取但得故地即請交和朕以其言既順不可不許王所兼新羅之城並宜亟還其本國王若不從朕已依法敏所請任其決戰亦令約束髙麗不許救恤髙麗若不從命即令契丹諸蕃渡遼澤入抄掠王可深思朕言自求多福六年新羅王金春秋又表稱百濟與髙麗靺鞨侵其北界已沒三十餘城顯慶五年命左衛大將軍蘇定方統兵討之大破其國虜義慈及太子隆小王孝演等五十八人送京師命右衛郎將王文度為熊津都督總兵以鎮之義慈事親以孝行聞友于兄弟時人號海東曾閔及至京數日而卒贈金紫光祿大夫衛尉卿文度濟海而卒百濟僧道琛舊將福信按新唐書福信為夫餘璋之從子率衆據周留城遣使往倭國迎故王子夫餘豐立為王其西部北部並翻城應之時郎將劉仁願留鎮于百濟府城道琛等引兵圍之帶方州刺史劉軌代文度統衆便道發新羅兵以救仁願轉戰而前所向皆下道琛于熊津江口立兩柵以拒官軍仁軌與新羅兵四面夾擊之退走入柵阻水橋狹墮水及戰死萬餘人道琛等乃釋仁願之圍退保任存城按新唐書作任孝城新羅兵以糧盡引還時隆朔元年三月也于是道琛自稱領軍將軍福信自稱霜岑將軍使告仁軌曰聞唐與新羅約誓百濟無問老少一切殺之然後以國付新羅與其受死豈若戰亡所以聚結自守耳仁軌作書具陳禍福遣使諭之道琛置仁軌之使于外館傳語謂曰使人官職小我一國大將不合自參不答書遣之尋而福信殺道琛并其衆夫餘豐但主祭而已二年七月仁願仁軌率留之兵大破福信餘衆于熊津之東福信等以真峴城臨江髙險又當衝要加兵守之仁軌引新羅兵乘夜薄城四面攀堞而上比明而入據其城遂通新羅運糧之路仁願奏請益兵詔發淄青萊海之兵七千人遣左新唐書作右威衛將軍孫仁師統衆浮海赴熊津以益之時福信既專其兵權與夫餘豐漸相猜貮稱疾卧于窟室將俟夫餘豐問疾謀襲殺之夫餘豐覺而率其親信掩殺福信又遣使往髙麗及倭國請兵以拒官軍孫仁師中路迎擊破之遂與仁願之衆相合兵士大振于是仁師仁願及新羅王金法敏帥陸軍進劉仁軌及别帥杜爽夫餘隆率水軍及糧船自熊津江往白江以會陸軍同趨周留城仁軌遇夫餘豐之衆于白江之口四戰皆捷焚其舟四百艘豐脫身而走王子夫餘忠勝忠志等率士女及倭衆並降百濟諸城皆復歸仁師等振旅還詔劉仁軌代仁願率兵鎮守乃授夫餘隆熊津都督遣還本國共新羅和親以招輯餘衆麟德二年八月隆到熊津城與新羅王金法敏刑白馬而盟先祀神祇及川谷之神而後歃血藏其盟書于新羅之廟仁願仁軌等既還隆懼新羅尋歸京師儀鳳二年拜光祿大夫太常員外卿兼熊津都督帶方郡王令歸本蕃安輯餘衆時百濟本地荒毁漸為新羅所據隆竟不敢還舊國而卒其孫敬則天朝襲封帶方郡王授衛尉卿其地自此為新羅及渤海靺鞨所分百濟遂絶按周留既破夫餘豐脫身而走通考亦言豐走不知所在至後唐清秦三年百濟國復遣使來蓋其支裔共保海濵仍稱百濟雖故地已失而世祀未嘗絶也新唐書顯慶五年詔蘇定方為神丘道行軍大總管率左衛將軍劉伯英右武衛將軍馮士貴左驍衛將軍龎孝泰發新羅兵伐百濟自城山濟海百濟守熊津口定方擊敗之乘潮以進趨真都城復破之拔其城義慈挾太子隆走北鄙定方圍之次子泰自立為王率衆固守義慈孫文思曰王太子固在叔乃自王若唐兵解去如我父子何與左右縋而出民皆從之泰不能止定方令士超堞立幟泰開門降定方執義慈隆等送京師平其國析置熊津馬韓東明金漣按地理志作逺太平寰宇記作蓮德安五都督府按地理志云又置帶方州麟德後俱廢擢渠長治之命劉仁願守百濟城義慈尋卒授隆司稼卿唐會要百濟本夫餘之别種當馬韓之故地其後有仇台者為髙麗所破以百家濟因號百濟東北至新羅册府元龜唐武德七年封百濟王夫餘璋為帶方郡王七年九月遣使獻光明甲貞觀十一年璋遣太子隆來朝並獻鐵甲雕斧十三年獻金甲雕斧十五年詔曰故柱國帶方郡王百濟王夫餘璋棧山航海逺稟正朔獻琛奉賮克固始終宜加常數式表哀榮可贈光祿大夫令其嫡子義慈嗣位使祠部郎中鄭文表備禮册命十九年正月百濟太子夫餘康信貢方物百濟自武德四年至永徽三年朝貢不絶獻慶五年蘇定方既濟熊津口乘山而陳與之大戰揚帆蓋海相續而至敵兵大潰官軍連舳入江水陸並進直趨真都去城二十餘里復傾國來拒大戰破之追奔入郭義慈及太子隆走北境其大將禰植將義慈來降及諸城主亦俱送欵龍朔三年百濟西部人黑齒常之來降常之長七尺餘驍勇有謀略按唐書列傳常之為百濟達帥蘇定方平百濟時常之糾合逋亡依任存山自固定方攻之不克常之遂擾二百餘城髙宗遣使招諭乃詣劉仁軌降授左領軍將軍通考百濟王夫餘映子餘毗餘毗子慶慶子牟都牟都子牟大每王立必遣使詣江南請命俱授以鎮東大將軍都督百濟諸軍事亦遣使稱藩奉貢于魏尋為髙麗所破衰弱纍年梁時王餘隆纍破髙麗隆卒子明嗣北齊時亦通使焉齊亡遣使通周隋時其王餘昌立餘昌卒子餘璋立隋亂貢使遂絶唐武德四年璋始通使自是數朝貢且訟髙麗梗道貞觀初詔使平其怨璋卒子義慈立義慈事親孝與兄弟友時號海東曾子明年與髙麗連和取新羅四十餘城聞帝討髙麗又取新羅七城久之又奪十餘城因不朝貢永徽六年復與髙麗取新羅三十餘城顯慶五年蘇定方平其國璋從子福信等立故王子夫餘豐龍朔二年劉仁願等復破之豐走不知所在帝以夫餘隆為熊津都督俾歸國平新羅故憾招還遺人麟德二年與新羅王會熊津城刑白馬以盟辭曰往百濟先王侵削新羅破邑屠城天子憐百姓無辜命行人修好先王負險恃遐皇赫斯怒是伐是夷立前太子隆為熊津都督守其祭祀附伏新羅長為與國結好除怨永為藩服右威衛將軍魯城縣公仁願親臨厥盟有貮其德神明監之乃作金書鐵劵藏新羅廟中仁願等還隆畏衆擕散亦歸京師儀鳳時進帶方郡王遣歸藩是時新羅強隆不敢入舊國寄治髙麗卒武后又以其孫敬襲王而其地已為新羅渤海靺鞨所分百濟遂絶太平寰宇記百濟舊有五部分統三十七郡二百城七十六萬户顯慶五年以其地分置熊津馬韓東明金蓮德安五都督府至麟德三年其舊地沒于新羅城傍餘衆後漸寡弱散投突厥及靺鞨其王夫餘崇新舊唐書俱作隆竟不敢歸舊國土地盡入于新羅靺鞨五代五代史後唐清泰三年正月百濟國遣使貢方物册府元龜同宋通考髙麗以百濟為金州金馬郡號南京按此乃百濟東南邊境其全部始屬新羅後歸渤海及契丹非髙麗所能有也元元史世祖至元四年正月百濟遣其臣梁浩來朝賜以錦繡有差謹按百濟自後漢時已見史傳厯晉迄唐使命嵗通王本夫餘王仇台之後以夫餘為氏舊國屬馬韓晉代以後盡得馬韓故地兼有遼西晉平二郡自置百濟郡宋書言所治謂之晉平郡晉平縣都城號居拔城則百濟郡即晉平而居拔城即晉平城也馬端臨謂晉平在唐栁城北平之間實今錦州寧逺廣寧之境一統志謂居拔城在今朝鮮境內者殆梁天監時遷居南韓之城歟普通以後纍破髙麗斬其王釗更為強國號所治城曰固麻北史謂居拔城即固麻城以滿洲語考之固麻為格們之轉音唐書云王居有東西兩城則居拔即滿洲語之卓巴兩城皆王都故均以格捫稱之其曰建居拔者建字乃漢文通考連三字為城名誤也通考又云南接新羅會要云東北至新羅考百濟之境其西北自今廣寧錦義南跨海蓋東南極朝鮮之黃海忠清全羅諸道東西狹而南北長故自栁城北平計之則新羅在其東南而自慶尚熊津計之則新羅在其東北又魏時與勿吉謀并力取髙麗則東北亦鄰勿吉矣唐初復取新羅六七十城其界益廣蘇定方浮海濟師故自熊津北趨其國熊津即漢江在朝鮮國城南十里則今朝鮮國城亦百濟之南界也其後夫餘隆畏新羅不敢歸故地為新羅渤海靺鞨所分夫餘豐脫身而走不知所往而後唐時有百濟遣使入貢之文至元初猶通朝使是其支庶保守海隅仍用舊號國祚猶存唐書云百濟遂絶者非也又北史云國有五方方管十郡舊唐書云六方各管十郡則為郡且五六十而定方所得僅三十七郡未得者尚五分之二此必餘衆所保第為渤海契丹所隔故不復相聞耳若其聲明文物之盛與新羅埒史言俗重騎射兼愛墳史信矣其國內衆建侯王以酬勳懿自宋齊時已然則又地廣民稠之驗也欽定滿洲源流考卷三
