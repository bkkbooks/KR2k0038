body:
  text: 國俗二政教附字書漢後漢書夫餘國食飲用俎豆會同拜爵洗爵揖讓升降後漢書馬韓人知田蠶不貴金寶錦罽辰韓知蠶桑嫁娶以禮行者讓路辨辰人皆長大而刑法嚴峻後漢書濊人不相盜無門户之閉婦人貞信飲食以籩豆少嗜欲俗重山川各有部界知種麻養蠶作綿布侯星宿豫知年嵗豐約三國三國志馬韓其民土著種植知蠶桑作綿布辨辰曉蠶桑作縑布嫁娶以禮男女有别行者相逢皆讓路法特嚴峻有瑟其形似筑彈之有音曲辨辰與辰韓法俗相似三國志東沃沮飲食居處衣服有禮節濊人性願慤少嗜欲有亷恥晉晉書夫餘國㑹同揖讓之儀有似中國晉書肅慎以言語為約野處而不相犯南北朝南史百濟國元嘉二十七年國王餘毗上書求易林式占與之大同七年遣使取毛詩博士并工匠畫師並給之南史新羅多桑麻作縑布刻木為信周書百濟兼愛墳史秀異者頗解屬文又解隂陽五行以建寅月為嵗首亦解醫藥卜筮占相之術北史百濟之秀異者解屬文能吏事又知醫藥蓍龜與相術隂陽五行法有鼓角箜篌筝竽箎笛之樂北史新羅文字同於中國隋隋書百濟其俗讀書史能吏事亦知醫藥蓍龜之術有鼓角箜篌箏竽篪笛之樂隋書新羅風俗刑政與百濟同唐舊唐書百濟國其書籍有五經子史又表疏依中華之法舊唐書貞觀二十二年新羅王真德遣子弟來朝太宗賜以所制溫湯及晉詞碑并新撰晉書舊唐書開元十六年新羅王金興光請令人就中國學問經教許之舊唐書渤海靺鞨有文字及書記太和七年遣學生三人請赴上都學問先遣學生三人事業稍成請歸本國許之新唐書渤海王數遣諸生詣京師太學習識古今制度新唐書貞觀二十二年新羅王真德遣子弟詣太學觀釋奠講論帝賜所製晉書永徽元年真德織錦為頌以獻其詞曰巨唐開洪業巍巍皇猷昌止戈成大定興文總百王統天崇雨施理物體含章深仁偕日月撫運邁時康幡旗既赫赫鉦鼓何煌煌外夷違命者翦覆被天殃淳風凝幽顯遐邇競呈祥四時和玉燭七曜巡萬方維嶽降宰輔維帝任忠良三五成一德昭我唐家光開耀元年國王政明遣使者丐唐禮及他文辭武后賜吉凶禮并文詞五十篇開元中又遣子弟入太學學經術太和五年學生嵗滿者一百五十人皆還國新唐書百濟有文籍紀時月百濟王義慈事親孝與兄弟友時號海東曾子新唐書白居易傳居易最工詩當時士人爭傳雞林行賈售其國相率篇易一金其僞者相輒能辨之案雞林即今吉林詳前疆域門册府元龜唐則天垂拱二年新羅王金政明遣使請禮記一部并新文章令所司寫吉凶要禮并於文館詞林採其詞涉規戒者勒成五十卷賜之寶厯元年新羅國王金彥升奏先在太學崔利貞等四人請權還其新赴朝貢金允夫等十一人請留配國子監習業從之通考唐開元二十五年遣邢璹使新羅帝詔璹曰新羅號君子國知詩書以卿醇儒故持節往宜演經誼册府元龜唐開元二十六年渤海遣使寫唐禮及三國志三十六國春秋通考渤海知書契習識古今制度為海東盛國諸番志新羅治法峻故少犯道不拾遺人知書喜學里有庠扁曰局堂處子弟之未昏者習書射其中三嵗一試舉人有進士算學諸科號君子國樂有二品曰庫樂曰鄉樂每受詔為謝表有文采金史粟末靺鞨後為渤海傳十餘世有文字禮樂官府制度金金史世紀黑水舊俗隨水草以居遷徙不常獻祖乃耕墾樹藝始築室有棟宇之制舊無書契無約束昭祖稍以條教為治部落寖强初諸部各有信牌穆宗用太祖議擅置牌號者置于法自是號令乃一民聽不疑矣自景祖以來一切治以本部法令金蓋盛於此金史太祖收國二年詔曰國書詔令宜選善屬文者為之其令所在訪求博學雄才之士敦遣赴闕五年詔曰若克中京所得禮樂儀仗圗書文籍竝先次津發赴闕金史天輔三年頒女真字金史太宗天㑹三年召頁嚕滿洲語嚴穴也舊作葉魯今改正赴京師教授女真字金史熙宗天眷元年頒女真小字皇統五年初用御製小字金史完顔希尹本名古紳滿州語三十數也舊作谷神今改正太祖命撰本國字備制度希尹乃依倣漢人楷字因契丹字制度合本國語製女真字天輔三年八月書成太祖大悅命頒行之其後熙宗亦製女真字與希尹所製字俱行用希尹所撰謂之女真大字希宗所撰謂之小字金史世宗大定十三年三月乙卯上謂宰臣曰朕少時見女真風俗迄今不忘今之燕飲音樂皆習漢風蓋以備禮也非朕心所好東宫不知女真風俗第以朕故猶尚存之恐異時一變此風欲一至㑹寧使子孫得見舊俗四月乙亥上御睿思殿命歌者歌女真詞顧謂皇太子及諸王曰朕思先朝所行之事未嘗暫忘故時聽此詞亦欲令汝輩知之汝輩自幼惟習漢人風俗不知女真純實之風至於文字語言或不通曉是忘本也汝輩當體朕意至於子孫亦當遵朕教也五月戊戌禁女真人母得譯為漢姓十六年正月上與宰執論古今興廢事曰女真舊風最為純直雖不知書然其祭天地敬親戚尊耆老接賔客信朋友禮意欵曲皆出自然其善與古書所載無異汝輩當習學之舊風不可忘也二十三年八月以女真字孝經千部分賜護衛親軍九月譯經所進所譯易書論語孟子老子揚子文中子及新唐書上謂宰臣曰朕所以令譯五經者正欲女真人知仁義道德所在耳令頒行之二十五年四月上謂羣臣曰上京風物朕自樂之每奏還都輒用感愴祖宗舊邦不忍捨去又謂宗室戚屬曰太平嵗久汝等皆奢縱往往貧乏朕甚憐之當務儉約無忘先祖艱難二十六年三月以親軍完顔齊諾䝉古語狼也舊作乞奴今改正言制明安穆昆皆先讀女真字經史然後承襲因曰但令稍通古今則不肯為非爾一親軍粗人乃能言此審其有益何憚而不從二十八年萬春節上以本國音自度曲言臨御久思國家基緒之重萬世無窮之託四月命建女真大學金史樂志世宗大定二十五年四月幸上京宴宗室於皇武殿飲酒樂上諭之曰今日甚欲成醉此樂不易得也昔漢髙祖過故鄉與父老歡飲擊筑而歌令諸見和之彼起布衣尚且如此况我祖宗世有此土今天下一統朕巡幸至此何不樂飲於是宗室婦女起舞進酒畢羣臣故老起舞上曰吾來故鄉數月矣今回期已近未嘗有一人歌本曲者汝曹來前吾為汝歌上歌曲道祖宗創業艱難及所以繼述之意至慨想祖宗音容如睹之語悲感不復能成聲羣臣宗戚捧觴上夀於是諸老人更歌本曲如私家相㑹暢然歡洽上復續調歌曲留坐一更極歡而罷其辭曰猗歟我祖聖矣武元誕膺明命功光於天拯溺救焚深根固蒂克開我後傳福萬世無何海陵淫昏多罪反易天道茶毒海內自昔肇基至於繼體積纍之業淪胥且墜望戴所歸不謀同意宗廟至重人心難拒勉副樂推肆豫嗣緒二十四年兢業萬幾億兆庶姓懷保安綏國家閒腵廓然無事乃眷上都興帝之第屬兹來遊惻然豫思風物減耗殆非昔時于鄉于里皆非初始雖非初始朕自樂此雖非昔時朕無異視瞻戀慨想祖宗舊宇屬屬音容宛然如覩童嬉孺慕厯厯其處壯歲經行恍然如故舊年從遊依稀如昨歡誠契濶日暮之若吁嗟濶别分云胡不樂金史章宗明昌二年四月諭有司自今女真字直譯為漢字國史院專寫契丹字者罷之五年正月以頁嚕古紳始製女真字詔加封贈依倉頡立廟盩厔例祠于上京嵗時致祭金史選舉志大定十一年創設女真進士科初但試䇿後增試論用女真文字以為程文就其所長以收其用又行國字使通習而不廢金史選舉志女真學自大定四年以女真大小字譯尚書頌行之後擇明安穆昆內良家子弟為學生諸路至三千人取其尤俊秀者百人至京師以編修官溫特赫舊作溫迪罕今從八旗姓譜改正吉逹滿洲語槍也舊作締逹今改正教之十三年以䇿論取士始設女真國子學諸路設女真府學以新進士為教授金史選舉志䇿論進士女真人之科也始大定四年世宗命頒行女真大小字所譯經書每穆昆選二人習之尋欲興女真字學校明安穆昆內多擇良家子為生諸路至三千人九年選異等者得百人薦於京師廩給之命教以古書作詩䇿後復試得圖克坦鎰以下三十餘人十一年始議行䇿選之制至十三年始定每場䇿一道以五百字以上咸免鄉試府試止赴㑹試御試且詔京師設女真國子學諸路設女真府學擬以新進士充教授以教士民子弟之願學者耶律履墓志銘履素善契丹大小字嘗謂四方之人語雖不同意則無異至於有遼爰及聖代皆有本國文字互相傳譯縱橫貫通蓋以辭逹理得為盡善其要在譯者之工拙耳世宗即位之四年置唐書所先以漢文譯契丹小字既又譯為女真字選能者主之履在選中書成大蒙奬賞後改置經書所遂以女真字徑譯漢文選士之秀者就學神麓記女真始祖劈木為尅如文契約法令嚴峻果斷不私由是逺近皆服號為神明至獻祖教人燒炭煉鐡刳木為器制造舟車種植五榖建造屋宇有上古之風由是鄰近每有不平皆詣訴請遂號貝勒北盟録女真刻木為契謂之刻字賦斂調度皆刻箭為號事急者三刻之旗幟之外各有字記大小牌子繫馬上為號樂有腰鼓管笛琵琶方響􅌙笙筝箜篌大鼓拍板書史㑹要自太祖起兵常在行陳間初無文字國勢日强與鄰國交好始用契丹字太祖命完顔希尹撰本國字希尹乃因契丹字合本國語製女真字太祖大悅命頒行之其後熙宗亦製女真字與希尹所製字俱行希尹所撰謂之女真大字熙宗所撰謂之女真小字石墨鐫華金都統經略郎君行記郎君稱皇弟無姓名天㑹十三年記當為太宗之弟按金史世祖子十一人自康宗太宗而外尚八人未知誰是碑一字不能辨蓋女真字如是王元美所録明王慎德四夷咸賔八字正與此同法字刻唐乾陵無字碑上凡一百五字後有譯書漢字具録左方大金皇弟都統經略郎君嚮以疆埸無事獵於梁山之陽至唐乾陵殿廡頽然一無所覩爰命有司鳩工修飾今復謁陵下繪像一新回廊四起不勝欣懌與醴陽太守酣飲而歸時天㑹十二年嵗次甲寅仲冬十有四日尚書職方郎中黃應期宥州刺史王圭從行奉命題案金世祖之子自康宗太祖太宗而外金史有傳者六人無傳者二人皆未嘗經略陜西惟天㑹五年既定陜西五路使薩里干列屯衝要遂班師九年以陜西地賜劉豫而薩里千仍留鎮考本傳薩里干為安帝六代孫又為世祖養子其在陜西最久金時宗室皆稱郎君此或為薩里干也碑在陜西而字體無從辨識恐不免傳刻之訛石墨鐫華所刻傳寫尤恐失真今止載譯文以謹闕疑謹案肅慎之世倣佛結繩夫餘禮教漸興㑹同爼豆之儀同於三代百濟新羅文彩蔚焉與隋唐使命往來兼擅詞章之美洎渤海興而文物聲名臻於至盛經契丹兵燹名都大族轉徙他州而淳朴之風遂鍾於完顔部人無外慕道不拾遺依然肅慎之舊矣至字書則百濟新羅渤海沿用漢字金初尚用契丹字至金太祖始製女真字頒行天下熙宗又製女真小字用以譯經史試科舉至䝉古字行而女真字遂中輟明祕閣書目尚載有女真字母一書今已失傳趙崡石墨鐫華所録其石刻雖在陜西第果否當時所刻或後人依倣摹勒皆未可定我太祖髙皇帝創置國書精詳簡括雖語言與舊俗不殊而文字實不相沿襲云欽定滿洲源流考卷十七
