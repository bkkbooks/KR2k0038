body:
  text: 臣阿桂臣于敏中臣和珅臣董誥謹奏本年八月十九日奉上諭云云欽此所有編纂事宜臣等酌議凡例七條繕寫清單恭呈御覽伏候訓示並請欽定嘉名用光典册至此項書籍擬在方略館就近辦理所需編纂及譯漢人員擬派內閣侍讀麟喜中書呈麟筆帖式七德為滿纂修官理藩院筆帖式臨保候補筆帖式明倫工部庫使巴尼泰為譯漢官照滿謄録之例行走翰林院編修宋銑平恕候補部員曺錫寶為漢纂修官并派郎中巴尼琿侍讀孫永清為提調官専司督催稽核至繕寫收發之謄録供事等應即在方略館通融抽撥惟查該館現在趕辦平定兩金川方略并大清一統志西域圖志熱河志及元遼史明紀綱目明史本紀等書各有卯限原設之謄録供事僅供各書之用難以再為分撥臣等公同酌擬應再咨取漢謄録四名供事六名令其専心承辦庶有責成俟將來書成之日照例給豫議敘以示鼓勵其所添之謄録供事等應支桌飯銀兩并需用筆墨桌凳等項仍由該館照例隨時于户部等衙門撙節支領毋庸専欵置辦合併聲明是否伏祈皇上訓示遵行謹奏乾隆四十二年九月初八日奏初九日奉旨知道了書名著定為滿洲源流考欽此
