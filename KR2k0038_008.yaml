body:
  text: 部族四新羅一作斯盧一作新盧雞林附三國三國志魏書辰韓另條見前十二國有斯盧國通典新羅國魏時新盧國其先本辰韓辰韓始有六國稍分為十二新羅其一也魏將毌丘儉討髙麗破之髙麗王奔沃沮其後復歸故國留者遂為新羅焉通考新羅國在百濟東南五百餘里亦在髙麗東南兼有漢時樂浪郡之地初曰新盧或曰新羅東濵大海魏毌丘儉破髙麗奔沃沮其後復歸故國留者遂為新羅故其人雜有華夏髙麗百濟之屬兼有沃沮不耐韓濊之地其王本百濟人自海入新羅遂王其國晉前秦録新羅在百濟東符堅建元十六年符洛反遣使徴兵於百濟新羅等國並不從秦書符堅建元十八年新羅國王樓寒按蒙古語謂龍曰婁寒字當即汗音之訛遣使朝獻通志新羅國在百濟東南五百餘里東濵大海其王本百濟人自海入新羅遂王其地其國初附屬于百濟後因百濟伐髙麗人不堪戎役相率歸之遂致强盛因襲伽羅任那諸國滅之其西北界出髙麗之間先是其國小不能自通符堅時其王樓寒遣使衛頭朝貢堅曰卿言海東之事與古不同何也對曰亦猶中國時代變革名號改易今焉得同南北朝宋書元嘉二年倭國遣使自稱使持節都督倭百濟新羅任那秦韓慕韓六國諸軍事按宋書無新羅傳其名但見于倭國傳中南齊書同通志新羅魏時新盧國也宋時曰新羅或曰斯羅梁書新羅者其先本辰韓也辰韓亦曰秦韓相去萬里傳言秦人避役來適馬韓另條見前馬韓割其東界居之辰韓始有六國稍分為十二新羅其一也其國在百濟東南東濵大海南北與句驪百濟接魏時曰新盧宋時曰新羅或曰斯羅南史同國小不能自通使聘普通二年王名募秦按南史通志太平御覽皆作姓慕名秦通考引梁史亦同且云未詳易姓之由新羅金姓相承已久不應于梁時忽稱姓慕考中國人本稱秦人此慕秦二字當為書語非姓名也始使使隨百濟奉方物陳書本紀廢帝光大二年六月新羅國遣使獻方物宣帝太建二年六月三年五月十年七月並遣使獻方物南史新羅在百濟東南五十餘里其地東濵大海南北與句麗百濟接册府元龜北齊河清四年詔以新羅國王金真興為使持節領東夷校尉樂浪郡公新羅王自河清三年至武平四年並遣使朝貢北史百濟居漢時樂浪地或稱魏將毌丘儉討髙麗破之奔沃沮其後復歸故國有留者遂為新羅亦曰斯盧其王本百濟人自海入新羅初附庸于百濟百濟征髙麗不堪戎役民相率歸之遂强盛傳世三十至真平隋隋書新羅或稱斯盧其國傳祚至金真平開皇十四年遣使貢方物髙祖拜真平為上開府樂浪郡公新羅王大業以來嵗遣朝貢地多山險雖與百濟搆隙百濟亦不能圖之隋東蕃風土記新羅金姓相承三十餘葉至今亦姓金通考隋文帝時其王姓金名真平襲加羅任那諸國滅之並三韓之地其西北界犬牙出髙麗百濟之間地多山險王姓金貴人姓朴民無氏有名初百濟伐髙麗來請救悉兵往破之自是相攻不置後獲百濟王殺之結怨滋深唐舊唐書新羅辨韓之苗裔也在漢時樂浪之地有城邑材落王所居曰金城周七八里衛兵三千人設獅子隊武德四年王金真平遣使朝貢髙祖親勞問之遣通直散騎侍郎庾文素往使焉賜以璽書及畫屏風錦綵三百段自此朝貢不絶國人多金朴兩姓異姓不為婚髙祖既聞海東三國舊多怨隙遞相攻伐乃問其使為怨所由對曰先是百濟往伐髙麗詣新羅請救新羅發兵大破百濟國因此為怨每相攻伐新羅得百濟王殺之怨由此始七年遣使册拜金真平為柱國封樂浪郡王新羅王貞觀五年卒無子立其女善德為王宗室大臣乙祭案蒙古語謂全部之部曰伊濟與乙祭音近總知國政詔贈真平左光祿大夫九年遣使冊命善德為王十七年遣使上言髙麗百濟纍相攻襲亡失數十城乞偏師救助太宗遣相里元奬齎璽書賜髙麗不聽太宗將親伐髙麗詔新羅纂集士馬應接大軍新羅遣大臣領兵五萬人入髙麗南界攻水口城降之二十一年善德卒贈光祿大夫餘官封並如故立其妹真德為王二十二年真德遣其弟國相伊贊子金春秋按唐會要以春秋為真德子誤及其子文正按新書作文王來朝詔授春秋為特進文正為左武衛將軍春秋請詣國學觀釋奠及講論太宗因賜以所制溫湯及晉祠碑并新撰晉書將歸國令三品以上宴餞之永嶶元年真德大破百濟之衆遣其弟法敏以聞按下文云春秋卒以其子法敏嗣此處弟字當誤新書云遣春秋子法敏是也帝嘉之拜法敏為太府卿五年真德卒詔以春秋嗣立為王加授開府儀同三司樂浪郡王六年百濟與髙麗靺鞨率兵侵其北界攻陷三十餘城春秋上表求救顯慶五年命蘇定方為熊津道大總管統水陸十萬仍令春秋為嵎夷道行軍總管與定方討平百濟自是新羅漸有髙麗百濟之地其界益大龍朔元年春秋卒詔其子太府卿法敏嗣位為開府儀同三司上柱國樂浪郡王新羅王三年詔以其國為雞林州都督府按雞林與今吉林音譯地里俱符是時新羅既兼有百濟髙麗之地里與靺鞨故設都督府于此俾王領之以重其鎮耳授法敏為雞林州都督法敏以開耀元年卒其子政明嗣位垂拱二年遣使來朝天授三年按册府元龜作長壽二年政明卒立其子理洪為王仍令襲父輔國大將軍行豹韜衛大將軍雞林州都督理洪以長安二年卒輟朝二日立其弟興光為王仍襲兄將軍都督之號按遼宋以後每以雞林稱髙麗金元時亦以雞林郡公為髙麗封號蓋新羅嗣王既世襲都督雞林遂為新羅之通稱逮渤海盛而新羅偏安南境又為髙麗所併故髙麗亦襲是稱號雖地非其舊而名仍沿之耳興光本名與太宗同先天中則天改焉按唐會要興光本名崇基是與明皇同非太宗也又先天為明皇初即位改元之號其非則天所改益明蓋舊唐書記載之訛耳開元二十一年渤海靺鞨越海入登州時興光族人金思蘭先因入朝留京師至是拜為太僕員外卿令歸國發兵以伐靺鞨仍加授興光寧海軍使二十五年興光卒贈太子太保仍遣左贊善大夫邢璹往弔祭并冊立其子承慶上謂璹曰新羅號為君子之國卿到彼宜闡揚經典使知儒教之盛又聞其人多善奕碁因令善碁人率府兵曹楊季鷹為璹之副天寶二年承慶卒詔遣贊善大夫魏曜往弔祭之冊立其弟憲英為王大厯二年憲英卒國人立其弟乾運為王遣其大臣金隱居奉表入朝請加冊命三年遣使冊立仍冊乾運母為太妃建中四年乾運卒無子國人立其上相金良相為王貞元元年授良相檢校大尉都督雞林州刺史寧海軍使新羅王其年卒立上相金敬信為王敬信即從兄弟也按敬信即從兄弟句詞意未為明晰據通考蓋即良相之從兄弟耳十四年敬信卒其子先亡國人立敬信嫡孫俊雍十六年遣司封郎中韋丹持節冊命至鄆州聞俊雍卒丹還永貞元年遣兵部郎中元季方冊俊雍子重興按冊府元龜作重熙為王按冊府元龜云并冊其母和氏為太妃妻朴氏為妃元和三年新羅使人金力奇上言前貞元十六年奉詔冊臣故主金俊雍為王母申氏為太妃妻叔氏為王妃冊使韋丹至中路知俊雍薨其冊却回在中書省今臣還國請授臣以歸敕鴻臚寺于中書省領受至寺宣授與力奇令奉歸國七年重興卒立其相金彥升為王授彥升開府儀同三司檢校太尉持節大都督雞林州諸軍事寧海軍使上柱國新羅王妻貞氏冊為妃命職方員外郎崔廷持節弔祭冊立以其質子金士信副之太和五年彥升卒以嗣子金士徽為開府儀同三司檢校太尉使持節大都督雞林州諸軍事充寧海軍使新羅王母朴氏為太妃妻朴氏按冊府元龜作貞氏為妃命太子左諭德源寂持節弔祭冊立新唐書新羅國東距長人東南日本西百濟南瀕海北髙麗而王居金城長人者人類長三丈或搏人以食其國連山數十里有峽固以鐵闔號關門新羅常屯弩士數千守之貞觀二年獻女樂二太宗曰比林邑獻鸚鵡尚思鄉丏還况於人乎付使者歸之王金真平無子立女善德為王國人號聖祖皇姑二十一年其妹真德襲王明年遣子文王及弟伊贊子春秋來朝拜文王左武衛將軍春秋特進因請改章服從中國制內出珍服賜之龍朔三年詔以其國為雞林州大都督府授其王法敏都督咸亨五年納髙麗叛衆略百濟地守之詔削法敏官爵以其弟右驍衛大將軍臨海郡公仁問為新羅王自京師歸國詔劉仁軌為雞林道大總管發兵窮討法敏遣使入朝謝仁問乃還辭王詔復法敏官爵然多取百濟地遂抵髙麗南境矣按唐會要言盡有百濟之地及髙麗南境蓋髙麗北境已屬渤海故濟新羅既有百濟之地又兼有髙麗南境非得百而始抵髙麗之南也新書誤會及字之意與髙麗傳不合謹詳訂于從開元中王金興光數入朝帝賜興光瑞文錦五色羅紫繡紋袍金銀精器興光亦上異狗馬黃金美髢諸物初渤海靺鞨入登州興光擊走之進興光寧海軍大使使攻靺鞨二十五年冊其子承慶為王承慶妻朴氏為妃卒弟憲英嗣王帝在蜀遣使泝江至成都朝正月大厯初其子乾初立甫丱其宰相爭權相攻國大亂三嵗乃定建中元年卒無子國人共立宰相金良相貞元元年遣户部郎中蓋塤持節冊命之永貞三年使臣金力奇為其宰相金彥升金仲恭王弟蘇金添明丏門㦸詔皆可凡再朝貢七年彥升立長慶寶厯間再遣使者來朝留宿衛開成五年鴻臚寺籍質于及學生嵗滿者一百五人皆還之有張保皋鄭年者皆善戰工用槍年復能沒海履其地五十里不噎角其勇健保皋不能也年以兄呼保皋保皋以齒年以藝常不相下自其國皆來為武寧軍小將後保皋歸新羅謁其王曰遍中國以新羅人為奴婢願得鎮清海使賊不得掠人西去清海海路之要也王與保皋萬人守之自太和後海上無鬻新羅人者保皋既貴于其國年饑寒客漣水一日謂戍主馮元規曰我欲東歸乞食于保皋元規曰若與保皋所負何如奈何取死其手年曰饑寒死不如兵死快遂去謁保皋飲之極歡飲未卒聞大臣殺其王國亂無主保皋分兵五千人與年持年泣曰非子不能平禍難年至其國誅反者立王以報王遂召保皋為相以年代守清海會昌後朝貢不復至唐會要新羅者本辨韓之地其先出髙麗魏破髙麗其衆保沃沮後歸故國其留者號新羅國多金朴兩姓異姓不為婚永徽元年王金真德大破百濟遣使金法敏來朝五年真德卒髙宗為舉哀于永光門使太常丞張文收弔祭之贈開府儀同三司仍賜綾綵三百段詔以其子春秋嗣位顯慶元年三月又破百濟兵使來告捷龍朔元年春秋卒子法敏嗣位三年四月詔新羅置雞林大都督仍授法敏雞林州大都督麟德二年八月法敏與熊津都督夫餘隆盟于百濟之熊津城于是帶方州刺史劉仁軌領新羅百濟儋羅倭人四國使浮海西還以赴泰山之下上元元年按新唐書作咸亨五年與此異二月新羅王金法敏既已納髙麗叛亡之衆又封百濟故地遣兵守之帝怒削法敏官爵遣宰臣劉仁軌討之仍以法敏弟金仁問為新羅王時仁問在京師詔令歸國以代其兄仁問至中路聞新羅降乃還二年二月雞林道行軍大總管劉仁軌大破新羅之衆于七重城而還新羅于是遣使入朝并獻方物前後相屬復法敏官爵既盡有百濟之地及髙麗南境東西約九百里南北約一千八百里按舊唐書云東西千里南北二千里新唐書云橫千里縱三千里今既併百濟髙麗無反狹于前之理蓋專指新闢之地耳開耀元年法敏卒遣使冊立其子政明為王長夀二年舊唐書作天授三年政明卒冊其子理洪為王三年遣使來朝其年理洪卒舊唐書作長安二年卒冊其弟崇基為王仍襲兄輔國大將軍左豹韜衛大將軍雞林州都督神龍三年授驃騎大將軍先天元年改名興光開元十年頻遣使獻方物十二年興光遣獻果下馬二匹及金銀等仍上表陳謝至十二年遣其臣金武勳來賀正及武勳回降書賜之又使其弟金嗣宗來朝并貢方物至二十一年命太僕卿員外置金思蘭使于新羅思蘭本新羅行人恭而有禮因留宿衛及是委以出疆之任且便之也是年興光奏國內有芝草生畫圖以獻二十二年遣大臣金竭丹來賀正又遣姪志亷獻方物授志亷鴻臚少卿員外置賜絹百匹留宿衛二十三年十一月遣從弟金忠相來朝卒於路贈衛尉卿二十五年興光卒承慶嗣位至二十八年冊其妻朴氏為新羅王妃天寶三年卒命弟憲英嗣位是嵗四月遣使獻方物十月遣使來賀正授左清道率府員外長史賜緑袍銀帶還畨自後頻來朝貢七載遣使獻金銀及六十總布魚牙紬朝霞紬牛黃頭髮人參寶應二年憲英遣使朝貢授其使檢校禮部尚書放還大厯二年憲英卒子乾運立三年命倉部郎中歸崇敬持節冊命七年使金標石來賀正授衛尉員外少卿八年遣使來朝并獻金銀牛黃魚牙紬等方物建中四年乾運卒無子國人立其上相金良相為王貞元元年令户部郎中蓋塤往冊其年良相卒立上相敬信為王十四年敬信卒其子先卒國人立敬信嫡孫俊雍為王元和元年放宿衛王子金獻忠歸本國仍加試祕書監三年遣使金力奇來朝四年遣使金陸珍等來朝貢五年王子金憲章朝貢七年重興卒其相金彥升遣金昌南等告哀其年七月授彥升開府儀同三司檢校大尉新羅國王彥升妻貞氏冊為妃仍賜大宰相金斌等三人㦸十一年十一月其入朝王子金士信等遇風飄至楚州鹽城界淮南節度李鄘以聞十五年遣使來朝貢長慶二年使金柱弼來朝寶厯元年王子金昕來朝兼充宿衛太和四年舊唐書作五年彥升卒太和五年四月詔以金景徽為國王母朴氏太妃妻朴氏為妃開成元年王子義琮來謝恩宿衛會昌元年七月敕歸國新羅官前入新羅宣尉副使充兖州都督府司馬賜緋魚袋金雲卿可淄州長史唐六典河南道控新羅之貢獻册府元龜唐武德九年新羅遣使訟髙麗王建武關其道路不得入朝又相與有隙屢相侵掠詔員外散騎侍郎朱子奢和解之建武奉表謝罪請與新羅對使會盟貞觀十七年九月新羅遣使言髙麗百濟侵陵臣國纍遭攻襲數十城兩國連兵期于必取將以今兹九月大舉謹遣陪臣歸命大國願乞偏師以存救援帝謂使人曰我頻使人和爾三國髙麗百濟旋踵翻悔意在吞滅我少發邊兵總契丹靺鞨直入遼東爾國自解可緩一年之圍此後知無繼兵還肆侵侮然四國俱擾于國未安此為一策我又能給爾數千株袍丹幟二國兵至建而陳之彼以為我兵必皆奔走此為二策百濟負海之險不修兵械我以數十百船載卒泛海直襲其地此為三策爾國以婦人為主為鄰國輕侮我遣一宗枝以為國主待爾國安任爾自守此為四策爾宜思之將從何事使者但唯而無對帝於是遣相遣里元奬齎璽書賜髙麗曰新羅委命國家朝貢不闕爾與百濟宜即戢兵若更攻之明年當出師擊爾國矣蓋蘇文謂元奬曰髙麗新羅怨隙已久往者隋室相侵新羅乘釁奪髙麗五百之地自非反地還城此兵恐未能已元奬曰既往之事安可追論蘇文竟不從十八年元奬還元奬初至平壤蓋蘇文又破新羅兩城詔以髙麗侵逼新羅令營州都督張儉等率幽營二都督府兵馬問罪屬麗東水泛儉等兵不能濟二十二年新羅國伊贊於於字新舊唐書俱作子金春秋及其于文王來朝帝遣光祿卿栁亨持節郊勞之是年百濟復破其一十三城永徽元年六月新羅王金真德大破百濟之衆遣使以聞六年二月遣營州都督程元振左衛中郎將蘇定方發兵一萬討髙麗以侵掠新羅故也時新羅王金春秋言髙麗百濟靺鞨相連侵其北境奪三十三城乞兵救援故遣元振經略之顯慶元年百濟伐新羅新羅拒戰破之是年十月遣王子文王來朝咸亨四年燕山道總管李謹行按謹行靺鞨人破髙麗叛黨于瓠盧河之西髙麗平壤餘衆遁入新羅五年二月遣劉仁軌為雞林道行軍大總管以伐新羅又以靺鞨兵浮海而南略新羅之南境仁軌還詔以李謹行為安東鎮撫大使屯兵於新羅之買肖城以經略之前後三戰皆捷于是新羅遣使入朝并獻方物開元二年二月王子金守忠來朝留宿衛賜宅及帛以寵之十一年四月遣使獻果下馬一匹表曰鄉居海曲地處遐陬原無泉客之珍本乏賨人之貢敢將方産之物塵瀆天宫駑蹇之才滓穢龍廄竊方燕豕敢類楚雞深覺靦顔彌增汗戰是年賀正使金武勳還國賜興光錦袍金帶及綵素三千匹十九年二月使臣金志良來賀正授大僕員外少卿賜帛六十匹還畨降書與新羅王曰所進牛黃及金銀等物省表具知卿二明慶祚三韓善鄰時稱仁義之鄉代著勳賢之業文章禮樂聞君子之風納款輸誠效勤王之節固藩維之鎮衛諒中外之表儀朕每晨興佇念宵衣待賢想見其人以光啓沃俟卿覯止允副所懷今使至知嬰疾苦不遂祗命言念遐濶用增憂勞時侯暄和想痊復也今賜綵綾五百匹帛二千五百匹宜即領取詳此詔則開元時曽命新羅王入朝而王因疾不至也二十一年十二月王姪志亷來朝謝恩也初帝賜興光白鸚鵡雄雌各一及紫羅繡袍金銀鈿器物瑞文錦五色羅綵三百餘段興光表曰地隔蓬壺天慈洽逺鄉暌華夏睿澤覃幽伏覩瓊文跪披玉匣含九霄之雨露帶五采之鵷鸞辨惠靈禽素蒼兩妙或稱長安之樂或傳聖主之恩羅錦彩章金銀寶鈿見之者爛目聞之者驚心微效若塵重恩如嶽循涯揣分何以上酬詔饗志亷于內殿二十二年新羅王金興光從弟左領軍衛員外將軍忠信上表曰臣所奉進止令臣執節本國發兵馬攻靺鞨有事續奏者奉聖㫖時為替人金孝方身亡便留臣宿衛今從姪志亷到訖臣即合還每思前所奉旨無忘夙夜陛下先有制加本國王寧海軍大使錫之旌節伏望因臣還國以副使假臣豈惟斯怒益振固亦武夫作氣帝許焉二十四年六月新羅王表曰伏奉恩敇浿江以南令新羅安置錫臣境土廣臣邑居遂使墾闢有期農桑得所奉絲綸之㫖荷榮寵之深粉骨糜身無由上答按此則開元時以浿江以南地與新羅考新舊書俱未載天寶二年制曰故開府儀同三司使持節都督雞林州諸軍事兼持節寧海軍使新羅王金承慶弟憲英奕葉懷仁率心當禮大賢風教條理尤明中夏軌儀衣冠素襲馳海珍而遣使準雲吕而通朝代為純臣纍效忠節頃者兄承土宇沒而無嗣弟膺繼及抑惟常經是用賔懷優以冊命可襲兄新羅國王開府儀同三司使持節大都督雞林州諸軍事兼充持節寧海軍使憲宗元和三年敕新羅王叔金彥升弟仲恭等三人宜令本國准舊例賜㦸七年敕新羅國大宰相金崇斌等三人令本國准例賜㦸十五年新羅質子金士信奏本國嘗差質子宿衛每有天使臨畨即充副使轉通聖㫖下告國人今在城質子臣當次行敬宗初即位雞林人前右監門衛率府兵曹參軍金雲卿進狀請充入本國宣慰副使從之敬宗寶厯元年國王金彥升奏先在太學生崔利貞金叔貞朴季業四人請放還畨其新赴朝貢金允夫金立之朴亮之等十二人請留在宿衛仍請配國子監習業鴻臚寺給資糧從之二年十二月新羅質子金允夫請准舊例中使入畨便充副使同到本國譯詔書不許但隨告使充副使文宗開成元年新羅王金景徽遣其子義琮來謝恩兼宿衛二年還畨是年十二月新羅質子試光祿卿金允夫進狀稱入朝充質二十六年三蒙改授試官再當本國宣慰及冊立等副使准往例皆蒙特授正官遂授武成王廟令三年新羅王金祐徴遺淄青節度使奴婢帝矜以逺人令却歸本國新羅自武德四年至會昌元年朝貢不絶張九齡集與新羅王金興光敕知卿欲于浿江置戍既與渤海衝要又與祿山相望仍有逺圖宜遵長策且渤海久已逋誅卿每嫉惡深用嘉之五代五代史新羅自唐髙祖時封金真按新舊書俱作金真平當係此誤為樂浪郡王其後世常為君長同光元年國王金朴英遣使者來朝貢長興四年權知國事金溥遣使來朴英溥世次立卒史皆失其紀自晉以後不復至册府元龜後唐同光二年十一月國王金朴英遣倉部侍郎金鑠録事參軍金幼卿朝貢二年正月國王及本國泉州按新唐書有全州無泉州當即一州而傳寫異也節度使王逢規遣使朝貢六月遣使朝散大夫倉部侍郎賜紫金嶽來朝授朝議大夫試衛尉少卿天成二年四月新羅國康州遣使林彥來朝貢對于中興殿長興三年四月權知本國金溥遣使執事侍郎金朏貢方物五代會要天成二年二月新羅遣使張芬等來朝三月以新羅國權知康州事王逢規為懷化大將軍新羅國前登州都督府長史張希巖新羅登州舊訛金州據冊府元龜改知後官本國金州司馬李彥謨並檢校右散騎常侍又以張芬為檢校工部尚書副使兵部郎中朴述洪兼御史中丞判官倉部員外郎李忠式兼御史清泰二年以入朝使朏為檢校工部尚書副使司賔大卿李儒為將作少監宋諸蕃志新羅國與泉之海門對峙俗忌隂陽家子午之說故興販必先至四明而後再發按宋時新羅為契丹所隔故由海道以至四明與隂陽家之說殊無干涉志蓋為此說以文之耳或曰泉之水勢漸低故必經由四明有大族金氏朴氏其治法峻故少犯道不拾遺建隆二年遣使來貢興國二年又貢中國使至必涓吉而後具禮髙麗圖經髙麗既併新羅東北稍廣其西北與契丹接昔以遼為界後為所侵逼退保鴨淥以為險按此與下通考所云皆北宋末髙麗之界也是時新羅北境屬金其南境屬髙麗故髙麗之東北稍廣而退保鴨淥亦始于此時云通考髙麗以新羅為東州樂浪府號東京建炎二年募使絶域者浙東副總管楊應忱請身使三韓結雞林以達燕雲假刑部尚書往使髙麗髙麗不奉詔乃還奉使行程録自咸州九十里至同州皆北行東望大山金人云此新羅山山內深逺無路可行深處與髙麗接界山下至所行路可三十里自同州百七十里至黃龍府東行按遼之咸州金為咸平府同州金為銅山縣俱在今鐵嶺開原之間東至威堡堡即吉林界南至奉天即唐時髙麗界開原即漢時夫餘國界百濟之舊國也通考謂新羅西北界出髙麗百濟之間者應即指此其後皆併于渤海是時則屬女真也遼遼史太祖九年新羅遣使貢方物天贊四年復來貢天顯元年以王郁等從征新羅有功優加賞賚太宗天顯三年遷東丹民以實東平其民或亡入新羅女真聖宗開泰元年歸州言居民本新羅所遷未習文字請設學以教之遼史兵衛志屬國可紀者五十九其二十一曰新羅遼史地理志唐元和中渤海王大仁秀南定新羅開置郡縣海州巖淵縣東界新羅故平壤城在縣西南又中京大定府設朝天館以待新羅使契丹國志太祖併吞諸部渤海王大諲撰深憚之與新羅結援新羅言語名物有似中國國王誦自契丹承天太后時入貢其後王誦為部下所殺立其弟詢契丹以王誦進貢興兵北討十年方罷兵新羅依舊朝貢按新羅王之名遼史不載聖宗本紀髙麗西京留守康肇弒其王誦立誦從兄詢詔東征後髙麗復朝貢是誦與詢皆髙麗王名此事亦係髙麗非新羅也聖宗用兵新羅本紀亦未載惟地理志有聖宗伐新羅還一語耳契丹四至東南至新羅國以鴨淥江東八里黃土嶺為界元元史髙麗傳髙麗地東至新羅南至百濟皆跨大海後闢地益廣併古新羅百濟髙句麗三國為一按髙麗所併實止二國東南之地其西北諸境並未屬髙麗也謹按新羅自魏時始見謂之斯盧亦曰新盧實一國也唐初兼百濟髙麗二國之地龍朔元年始以其國為雞林州都督府以新羅王金法敏兼大都督其後嗣王皆兼雞林都督之號考新羅故地本與百濟髙麗為鄰通考云在百濟東南其西北界出髙麗百濟之間唐書唐會要言在百濟東北以新唐書髙麗傳考之髙麗東跨海距新羅南跨海距百濟西北渡遼水接營州北接靺鞨則自今奉天遼陽南至鳳凰城渡鴨淥江至今朝鮮之咸鏡平安等道者髙麗也自今開元廣寧錦義寧逺南至蓋平復州寧海又東南跨海極朝鮮之全羅黃海忠清等道者百濟也而新羅之境東南兼有今朝鮮慶尚江原二道西北直至今吉林烏拉又西近開元鐵嶺出髙麗百濟之間故百濟之東北東南皆相鄰近髙麗介處其中通考所云亦在髙麗東南奉使行程録所云自咸州至同州今開原鐵嶺界東望大山即新羅界遼志所云海州即今海城始屬百濟後為髙麗所分復入渤海又歸于遼東界新羅是也唐顯慶乾封以後百濟髙麗之地多入新羅東西增九百里南北增千餘里幅員益廣而唐人篇什往往以海外稱者蓋西北為渤海契丹所隔必浮海往來始達其南境故耳洎開元元和之際渤海愈盛鴨緑江以北皆為渤海所有遼志所謂渤海王大仁秀南定新羅開置郡邑是也後唐清泰末髙麗復起王建襲據新羅邊邑建都松嶽元史所謂在鴨淥江東千餘里非平壤之舊者是也于是新羅所有僅海城以東及朝鮮數道非復唐時之境而自五代至遼傳國依然不絶也至雞林即吉林雞與吉音既相符核諸地里亦合蓋在龍朔時既兼二國與靺鞨渤海壤地相錯設重鎮于此而王自領之自後相沿世襲其號雖吉林故地旋歸渤海而都督之號仍繫新羅雞林遂為新羅之通稱遼宋以後為髙麗所併因舉而屬之髙麗若王雲之撰雞林志王熙王煦之封雞林郡公亦皆沿其舊名耳諸史又云新羅始保沃沮考後漢書魏志通考俱有東沃沮南沃沮北沃沮之文無大君長邑落各自有帥而其地或在挹婁另條見前夫餘之南或在挹婁之北或屬元菟或屬樂浪或屬句驪東濵海而南接濊所載皆朝鮮句驪及漢樂浪諸郡事則沃沮者應即今之窩集盛京邊外東南北諸處在在有之新羅所保據毌丘儉傳在肅慎另條見前界南千餘里則當在吉林烏拉之南近長白山殆納沁庫魯訥納魯諸窩集之地歟王本百濟人金姓隋初已三十餘世唐武德至會昌又十八世五代以後史弗能詳至其山林盤互法令修明道不拾遺人嫻書射史稱君子之國不虛也若休忍耽羅諸國並為新羅所併其遺迹皆在今朝鮮南界云欽定滿洲源流考卷四
