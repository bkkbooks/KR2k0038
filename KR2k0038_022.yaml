body:
  text: 欽定四庫全書欽定滿洲源流考卷十八國俗三祭祀御製清寧宫館豳蹟輝古宅洛業思前苞茂如松竹清寧象地天雙騫排鳳扇上簟耀龍筵乃寝占佳夢明禋重吉蠲國朝禮重祭一遵神必于正寝兹旋故宫執豕薦舊制勿敢廢也休和晴旭麗淡蕩恵風旋惕若承堂構丕基永萬年謹按欽定滿洲祭祀典禮我朝自發祥肇始即恭設堂子立杆以祀天又於寝宫正殿設位以祀神其後定鼎中原建立壇廟禮文大備而舊俗未甞或改每嵗春秋有立杆大祭之禮有宫内報祭之禮又有月祭之禮有每日朝祭夕祭之禮有四季獻神之禮凡省牲受祚酒醴供獻祝辭儀注之屬詳見滿洲祭祀典禮一書今考自漢以後史傳所載祭天祀神有與本朝舊俗相近足資考證者分注按語臚次于後而以雜禮附之用昭我國家萬年法守云祭天後漢書夫餘國以臘月祭天大㑹連日飲食歌舞名曰迎鼓有軍事亦祭天按滿洲有每月祭天及春秋大祭之禮又出師凱旋有列纛祭天之禮與此相合三國志夫餘以殷正月祭天國中大㑹連日飲食歌舞有軍事亦祭天殺牛觀蹄以占吉凶蹄合者為吉晉書夫餘國有軍事殺牛祭天以蹄占吉凶通考夫餘以臘月祭天名曰迎鼓是時㫁刑辟觧囚徒後漢書三韓諸國邑各以一人主祭天地號為天君又立蘓塗建大木以懸鈴鼓事鬼神按滿洲祭祀典禮家各設立司祀與此所云以一人主祭者相合建大木之儀又與滿洲立杆祭祀之儀相合滿洲語稱祭祀有神杆為索摩與蘓塗音亦相近又滿洲神鈴及腰鈴手鼓等與此所云鈴鼓亦合但並不懸于木桿稍神杆惟夕祭儀有大小鈴七枚繫于樺懸于架梁之西與史所載有不同耳三國志三韓諸國邑各立一人主祭天神名之天君又諸國各有别邑名之為蘓塗立大木懸鈴鼓事鬼神其立蘓塗之義有似浮屠按此觧非是盖因塗屠二字音偶同而强觧之滿洲語稱神杆為索摩具載前注晉書三韓國邑各立一人主祭天又置别邑名蘓塗後漢書濊常用十月祭天晝夜歌舞飲酒名之為舞天按濊地與朝鮮相近見疆域門後周書百濟國以四仲之月祭天北史新羅每月旦拜日月神主隋書百濟王以四仲之月祭天新羅每當正月旦拜日月神金史太祖收國元年五月甲戌拜天射栁故事五月五日七月十五日九月九日拜天射栁嵗以為常金史世宗大定三年以重九拜天于北郊大定十四年詔明安穆昆之民今後不許殺牲祈祭若遇莭辰及祭天日許得飲㑹章宗明昌四年次奉先縣辛未拜天于縣西五年六月出獵拜天承安五年勅来日重五拜天服公裳者拜禮仍舊諸便服者並用女真拜泰和三年重五拜天射栁上三發三中宣宗貞祐元年閏九月拜日于仁政殿自是每月吉為常金史金因遼舊俗以重五中元重九日行拜天之禮重五于鞠場中元于内殿重九于都城外其制刳木為盤如舟状赤為質畫雲鶴文為架髙五六尺置盤其上薦食物其中聚宗族拜之若至尊則于常武殿築臺為拜天所重五日質明陳設畢百官班俟于毬場樂亭南皇帝靴袍乗輦宣徽使前𨗳自毬場南門入至拜天臺降輦至褥位皇太子以下百官皆詣褥位宣徽賛拜皇帝再拜上香又再拜排食抛盞畢又再拜飲福酒跪飲畢又再拜百官陪拜引皇太子以下先出皆如前𨗳引皇帝回輦至幄次更衣行射栁擊毬之戲亦遼俗也金因尚之凡重五日拜天禮畢插栁毬場為兩行當射者以尊卑序各以帕識其枝去地約數寸削其皮而白之先以一人馳馬前𨗳後馳馬以無羽横鏃箭射之既㫁栁又以手接而馳去者為上㫁而不䏻接去者次之或㫁其青䖏及中而不䏻㫁與不䏻中者為負每射必伐鼓以助其氣已而撃毬各乗所常習馬持鞠杖杖長數尺其端如偃月分其衆為兩隊共争撃一毬先于毬場南立雙桓置板下開一孔為門而加網為嚢䏻奪得鞠撃入網囊者為或曰兩端對立二門互相排撃各以出門為毬状小如拳以輕韌木柺其中而朱之皆所以習驍捷也既畢賜宴嵗以為常大金國志莭序則元日拜日相慶重五射栁北盟錄作砟栁祭天祀神後漢書馬韓常以五月田竟祭鬼神晝夜㑹聚歌舞舞輒數十人相随踏地為莭十月農功畢亦如之三國志三韓常以五月祭鬼神歌舞飲食日夜無休其舞數十人俱起相隨踏地低昻手足相應莭奏有似鐸舞按滿洲祭奏三絃神之禮有朝祭夕祭琵琶鳴相板司俎人等附掌以和夕祭則司祝束腰鈴執手鼔前後盤旋鏘地凡朝夕祭皆有歌祝之辭又紳國朝舊俗喜起舞宴樂每用之謂之瑪克魏志所記未必盡同其禮意則相似也晉書三韓俗重鬼神常以五月耕種畢羣聚歌舞以祭神十月農事畢亦如之按滿洲舊俗田苗長時有祭田苗神之禮至秋収後又有場院之祭然其禮視朝夕祭神為簡史所稱耕畢云云盖記每嵗祀神之時非必止為田事而祭也通考弁辰與辰韓風俗相似祠祭鬼神有異施竈皆在戸西按滿洲祭祀各姓㣲有不同夕祭所奉之神亦間随土俗山川而異至各盡敬以溯本源則一也竈為祭祀烹餁所用必在祀神室之中間屋内而開户近東故以為在户西耳後周書百濟以四仲月祭五帝之神又每嵗四祠其始祖仇台之廟隋書百濟王以四仲之月祭五帝之神立始祖仇台之廟于國城嵗四祀之舊唐書百濟王夫餘豐到熊津城與新羅王金法敏行白馬而盟先祀神祇及山谷之神而後歃血新唐書新羅王祠山神唐㑹要新羅好祭山神重元日每以其日拜鬼神雜禮通考百濟婚娶之禮同中國拜謁之禮以兩手據地為敬通考新羅每正月旦相賀上設宴㑹班賚羣官通考新雜羅見人必跪以手據地為恭通考新羅族第一骨第二骨以自别王族為第一骨妻亦其族不娶第二骨按此承新唐書之誤據史新羅王姓金自以金姓為一骨而凡唐時冊命國妃太妃皆朴姓申姓之属或于冊府元龜及唐書厯厯可考無一金姓者則所云妻亦其族不娶第二骨云云盖傳聞誤㒺之辭今蒙古以黒白骨分貴賤有察罕雅蘇台哈喇雅蘇台之稱新羅以骨為重亦即具意耳金史承安五年定本國婚娉之制泰和五年制定本朝婚禮又詔拜禮不依本朝者罰金史金之拜制先袖手微俯身稍復却跪左膝左右摇肘若舞蹈状凡跪摇袖下拂膝上則至左右肩者凡四如此者四跪復以手按右膝畢跪左膝而成禮國言摇手兩拜謂之蘇蘇勒蒙古語恭敬也舊作徹速今改正承安五年五月上諭有司曰女真漢人拜數可以相従者酌中議之禮官奏曰周官九拜一曰稽首拜中至重臣拜君之禮也乞自今凡公服則用漢拜若便服則各用本俗之拜主事陳松曰本朝拜禮其来久矣仍便服之拜也可令公服則朝拜便服則従本朝拜平章政事張萬公謂拜禮各便所習不湏改也司空完顔襄曰今諸人袵髪皆従本朝之制宜従本朝拜禮松言是也上乃命公裳則朝拜諸色人便服皆用本朝拜金史完顔衷深悉本朝婚禮皇族婚嫁每令衷相之大金國志金人舊俗多指腹為婚既長大雖貴賤殊隔亦不可渝壻納幣皆先期拜門戚屬偕行以酒饌往少者十餘車多至十倍飲客佳酒則以金銀旊貯其次以瓦旊列于前以百數賓退則分餉馬先以烏金銀杯酌飲貧者以木酒三行進大軟脂小軟脂如寒具次進蜜糕人各一盤曰茶食宴罷富者瀹建茗留客啜之婦家無大小坐于坑上壻黨羅拜其下謂之男下女禮畢牽馬百匹少者十匹陳于前婦翁選子姓之别馬者視之好則留不好則退留者不過什二三女家亦視其數而厚薄之一馬則報衣一襲壻皆親迎既成婚留于婦家三年然後以婦歸婦氏以奴婢數十户牛馬數十羣每羣九牝一牡以資遣之北盟錄女真飲宴賓客盡㩦親友而来相近之家不召皆至客坐主人立而侍之至食罷衆客方請主人就坐酒行無筭其禮則拱手退身為喏跪右膝蹲左膝著地拱手摇肘動止于三為拜元日則拜日相慶㩦妻歸寧謂之拜門執子壻之禮馬擴茆齋自叙擴道金主至混同江之北地不生榖麥所種止稗子金主聚諸将共食則于坑上用矮檯子或木盤相接人置稗子飯一椀加匕其上列以薺韭長𤓰皆塩漬者别以木楪盛猪羊雞鹿兔狼麂麞狐狸牛馬鵝雁魚鴨等肉或燔或烹或生臠以芥蒜汁清沃陸續供列各取佩刀臠切薦飯食罷方以薄酒傳杯而飲謂之御宴者亦如此既還乃令諸郎君家各具酒殽請南使赴飯十餘日始造國書適經元日隔夕令人具車仗召南使赴宴凌晨出館赴帳前金主于坑上設金装交椅而坐羣臣以名馬弓矢劍槊為獻且曰臣下有邪諂奸佞不忠不孝者願皇帝代上天以此劍此弓誅之各跪上夀杯國主酬酌之次令南使上夀杯于國主飲畢國主酌二杯酬南使且云我國自上世相傳止有如此風俗不㑹奢飾更不别修宫殿勞費百姓也當時已破遼上京取到樂工列于屋外奏曲薦觴金主不以為意殊如不聞北盟錄近咸州一里有墓室數間供帳畧偹州守出迎就坐有腰鼓籚管琵琶方響笙筝􅌙箜篌大鼔拍板舞者六七十人但如常服出手袖外周旋曲折酒五行歸館次日中使賜宴赴州宅就坐樂作酒九行猪鹿兔雁饅頭炊餅白熟之類鋪滿几案最重油煮麫食以宻塗拌名曰茶食非厚意不設以極肥猪肉或脂濶切大皆一小盤子虗装架起間揷青葱三五莖名曰肉盤子非大宴不設人各㩦以歸舍北盟錄南使朝見儀至日館伴使副同行就龍臺下馬行入宿圍西設毡帳各歸帳歇定客省使副使相見就坐酒三行少頃聞鞞鼓聲樂作閣門使引入即捧國書自山棚東入陳禮物于庭下傳進如儀賛通拜舞抃蹈訖使副上殿女真官員數百人班于西廂以次拜訖近貴者各百餘人上殿以次就座餘並退兩廂結架小葦屋幙以青幕以坐三莭人殿内以女真兵數十人分兩旁立各執長柄小骨朶為儀衛國主所坐若今之講堂施重茵前施朱漆銀装鍍金几案果楪以玉酒器以金食器以玳瑁題筯以象牙遇食時數人抬舁十數鼎鑊以前雜手旋切割餖飣以進名曰御厨宴所食物精細而味和情意至兩界中間彼此使副回馬對立馬上一杯换所執鞭以為異日之記背馬冋頭少頃進數歩為踟蹰不忍别之状如是者三乃行謹按我朝典禮莫重于祭祀其誠敬之心忠質之尚與雅頌所陳執豕酌匏執爨為爼之意無以異也核諸史傳所載其儀文尚可𩔖推至于燕饗之間肉必自割猶見古初淳質之風北盟錄所稱肉盤子御厨宴之制當因宋使南人不䏻自割故令人代之遂以為大宴盛禮耳伏讀太宗文皇帝聖諭寛衣大袖待人割肉而後食與尚左手之人無異煌煌祖訓垂示方来所以敦本善俗者至矣官制漢後漢書夫餘國以六畜名官有馬加牛加狗加其邑落皆主屬諸加按加字當為家字之誤猶今蒙古謂典牛之官曰和尼齊典馬者曰摩哩齊典駝者曰特黙齊皆因所牧之物以名其職正如周禮羊人犬人及漢狗監之掌范蔚宗不觧方言好竒逞妄殊為踳謬詳見御製夫餘國傳訂訛恭載部族門後漢書把婁國邑落各有大人後漢書辰韓諸别邑各有帥大者名臣智次有險通典作儉側次有樊祇次有殺奚次有邑借皆其官名按此所載官名本屬傳聞之誤陳夀三國志因之與此又多顛倒同異皆輾轉傳訛不足信也後漢書東沃沮邑落有長帥濊其官有侯邑君三老三國三國志夫餘國有君王皆以六畜名官有馬加牛加猪加狗加犬使者按陳夀魏志承范蔚宗之誤邑落有豪民民下戸皆為奴僕諸加别主四出道大者主數千家小者數百家有敵諸加自戰下戸担粮飲食之三國志馬韓各有長帥大者自名為臣智其次有邑借臣智或加優呼臣雲遣支報安邪踧支濆臣離兒不例拘邪秦支亷之號其官有魏率善邑君歸義侯中郎将都尉柏長侯三國志弁辰國邑各有長帥大者名臣智其次有險側次有樊濊次有殺奚次有借邑三國志東沃沮邑落各有長帥皆自稱三老故縣國之制也晉晉書馬韓小國五十六大者萬戸小者數千家各有帥辰韓十二之國各有帥南北朝魏書勿吉國邑落各自有長不相縂一北史勿吉國邑落各有長帥曰大莫弗瞞咄周書百濟官有十六品左平舊唐書作佐平五人一品達率按隋書作大率通考作佐率三十人二品恩率三品徳率四品扞率五品柰率按百濟官名多用漢語惟柰率義無所取以滿洲語考之或為納伊二字之音猶言地方也六品將徳七品施徳八品固徳九品李北史作季徳十品對徳十一品文督十二品武督十三品佐軍十四品振武十五品克虞十六品自恩率以下官無常員各有部司分掌衆務内官有前内部穀部肉部内掠部外掠部按穀部等名皆用漢語此内掠外掠字義無取當有訛謬馬部刀部功徳部藥部木部法部後官北史作宫部外官有司軍部司徒部司空部司宼部㸃口部客部外舍部紬部日官北史作宫部都市部都下有萬家分為五部曰上部前部中部下部後部各統兵五百人國城外更有五方中方曰古沙城東方曰得安城南方曰久知下城西方曰刀先城北方曰熊津城五方各有方領一人以達率為之郡將三人以徳率為之方統兵一千二百人以下七百人以上城之内外民庶及餘小城咸分𨽻焉宋書百濟官有左賢王右賢王冠將軍將軍征虜將軍輔國將軍龍驤將軍寧朔將軍建武將軍西河太守臺使齊書百濟官名有面中王都漢王阿錯王邁盧王邁羅王辟中王八中侯弗斯侯弗中侯面中侯按百濟盡有三韓之地所封王侯之號如面中邁盧當即三韓属國彌凍莫盧之属其與滿洲語相近者如云都漢當即為多罕橋也辟中當為博勒卓約㑹也弗斯當為富森滋生也弗中當為法珠樹杈也其音尚有可推者耳寧朔將軍冠軍將軍都將軍建威將軍龍驤將軍廣武將軍宣威將軍征虜將軍安國將軍武威將軍廣威將軍建武將軍振武將軍揚武將軍廣陽太守朝鮮太守帶方太守廣陵太守清河太守樂浪太守城陽太守又有長史司馬叅軍北史百濟官有十六品長吏三年一交代都下分五部部有五巷士庶居焉五方各有方領一人方佐貳之方有十郡郡有將三人通考百濟官有十六品曰左率曰恩率曰徳率曰柰率曰扞率將徳施徳固徳季徳對徳文督武督佐軍振武克虞統兵以達率徳率扞率等為之人庶及餘小城皆分𨽻焉梁書新羅國有六喙五十二邑勒詳後語言條内其官名有子賁旱支齊旱支謁旱支壹告支竒貝旱支按滿洲語哈濟親近也新羅官名不止于此而此數官皆有旱支二字之稱與哈濟音實相近或皆属近臣之稱耳北史新羅其官有十七等一曰伊罰干貴如相國次伊尺干次迎干次破彌干次大阿尺干次阿尺干次乙吉干次沙咄干次及伏干次大柰摩干次柰摩干次柰摩次大舍次小舍次吉士次大烏次小烏次造外有郡縣有大事則聚官詳議定之按此所稱官號凡十七等當為階品之名其十一等之在前者末皆有干字或即哈蕃二字之音而詰皆轉輾相傳致有訛誤耳唐舊唐書百濟國所置内官曰内臣唐會要又作内官佐平掌宣納事内顯佐平掌庫蔵事内法佐平掌禮儀事衛士佐平掌宿衛兵事朝廷佐平掌刑獄事兵官佐平掌在外兵馬事又外置六方方管十郡按後周書及北史官皆云左平五人據此當為六人新唐書百濟官有内臣佐平者宣納號令内頭佐平主帑聚内法佐平主禮衛士佐平典衛兵朝廷佐平主獄兵官佐平掌外兵舊唐書新羅文武官凡十七等新唐書新羅官有宰相侍中司農卿大府令凡十七等州有都督郡有太守縣有小守唐會要新羅國官有上相大宰相通考新羅官以親族為上官有宰相侍中有司農卿太府令凡十七等第二骨見前得為之事必與衆議一人異則罷宰相家不絶祿奴僕三千人九州州有都督統部十或二十郡有太守縣有小守新唐書渤海官有宣詔省左相左平章事侍中左常侍諫議居之中臺省右相右平章事内史詔誥舍人居之政堂省大内相一人居左右相上左右司政各二居左右平章事之下以比僕射左右允比二丞左六司忠仁義部各一卿居司政下支司爵倉膳部有郎中員外右六司智禮儀部支司戎計水部卿郎準左以比六官中正臺大中正一比御史大夫居司政下少正一又有殿中寺宗屬寺有大令文籍院有監令監皆有少太常司賓大農寺寺有卿司蔵司膳寺寺有令丞胄子監有監長巷伯局有常侍等官其武員有左右猛賁熊衛羆衛南左右衛北左右衛各大将軍一将軍一以品為秩通考渤海官有宣詔省中臺省政堂省有左右相左右平章侍中常侍諫議又左六司忠仁義部右六司智禮信部各有郎中員外有十五府分領二十六州又有獨奏州三並詳前疆域門按自宋以後以府頒州之制實始于此獨奏州不𨽻于府當如今之直𨽻州也五代册府元龜後唐時新羅國官名有倉部侍郎錄事𠫭軍朝議大夫中散大夫兵部侍郎郎中判官倉部員外郎執事侍郎司賔大卿五代㑹要後唐内光清秦時渤海使人其官有政堂省守和部少卿南海省都督政堂省工部卿金金史収國元年以弟烏竒邁為安班貝勒滿洲語安班大也貝勒管理衆人之稱舊作諳版勃極烈今改正舊觧云官之尊貴者意相合國相薩哈滿洲語小國也舊作撒叚今改正為古倫貝勒滿洲語古倫國也舊作國倫今改正觧云尊禮優崇得自由者蘇布嚇滿洲語酒醒也舊作辭不失今改正為爱滿貝勒滿洲語爱滿部落也舊作阿買今改正舊觧云治落邑者意相近弟舍音為古倫貝勒八月以古倫貝勒薩哈為古倫烏嚇哩貝勒滿洲語烏嚇哩總統也舊作忽魯今改正舊觧云統領官之稱意桐合離阿里哈滿洲語承當也舊作阿雜合今改正為古倫英實貝勒滿洲語英實筵席也舊作乙室今改正舊觧云迎迓之官或當時為諸國朝聘使臣而設以主燕饗之禮者二年五月徳特貝勒䝉古語徳特副佐也舊作迭今改正觧云倅貳之職義相合額國暉滿洲語强壮也舊作阿徒罕今改正破遼兵于照蘇滿洲語錢也舊作照撤今改正城古倫烏貝勒滿洲語温化也舊作吴又訛昃今改正舊觧隂陽之官義未當舍音取泰州五年六月以温貝勒舍音為烏嚇哩貝勒富嘉努為温貝勒宗翰為伊拉齊貝勒滿洲語伊拉齊第三也舊作伊賚今改正觧云位第三曰伊拉齊義相合天㑹二年以們圗琿滿洲語愚也舊作漫都訶今改正為阿斯罕貝勒滿洲語阿斯罕副也舊作阿捨今改正恭議國政天㑹十年以太祖孫亶為安班貝勒皇子宗磐為古倫烏嚇哩貝勒宗幹為古倫左貝勒伊拉齊貝勒宗翰為古倫右貝勒天㑹十年左國元帥宗翰等入朝議曰安班貝勒虚位已久今不早定恐授非其人哈喇先帝嫡孫當立太宗従之金史安班貝勒者太宗甞居是位及登大位以命弟杲杲卒定議照宗為儲嗣故以是命焉金史金自景祖始建官屬統諸部以専征伐其官長皆稱貝勒故太祖以達貝勒滿洲語逹為首之稱舊作都今改正觧云統治之官猶冢宰也嗣位太宗以安班貝勒居守安班尊大之稱也其次曰古倫烏嚇哩貝勒古倫言貴按滿洲語稱國為古倫凡爵號之稱古倫者在和碩之上此觧雖尗的而意則近是烏嚇哩猶縂帥也又有古倫貝勒或左右置所謂國相也其次諸貝勒之上則有古倫英實烏嚇哩伊拉齊爱滿阿斯罕温徳特之號以為陞拜宗室功臣之禮焉其部長曰貝勒統數部者曰烏嚇哩至熈宗定官制皆廢其後惟鎮撫遼民之官曰圗埒滿洲語外也舊作禿里今改正觧云掌部落詞訟察非違者烏爾古蒙古語滋長也舊作烏魯古今改正觧云牧圍之官盖取牧養蕃息之義之下有索約勒䝉古語化也舊作掃稳今改正圗伊達滿洲語纛長也舊作脫朶今改正詳衮舊觧云邉城之官也之下有黙齊格滿洲語傳事人也舊作麽忽今改正實訥昆蒙古語實訥新也昆人也舊作習尼昆今改正此則具于官制而不廢皆踵遼官之名也金史金初諸部之民壮者皆兵部長曰貝勒行兵則稱曰明安滿洲語干也舊作猛安今改正穆昆滿洲語族長也舊作謀克今改正従其多寡以為號明安者千夫長穆昆者百夫長也穆昆之副曰富埒琿滿洲語恵也舊作蒲里衍今改正士卒之副従曰伊勒希滿洲語副也舊作阿里喜今改正部卒之數初無定制太祖即位之二年始命以三百户為穆昆十穆昆為明安而諸部来䧏率以明安穆昆之名以授其首領而部伍其人東京既平山西繼定甞用遼人額里頁蒙古語花色也舊作訛里野今改正以北部百三十户為一穆昆漢人王六兒以諸州漢人六十五户為一穆昆王伯龍及髙従祐等並領所部為一明安天會二年宗望恐風俗糅雜民情弗便乃罷是制諸部降人但従漢官之號皇統五年又罷遼東漢人渤海明安穆昆承襲之制移兵柄于國人乃分明安穆昆為上中下三等宗室為上餘次之至海陵天徳三年省併諸路莭鎮及明安穆昆削上中下之名但稱諸明安穆昆循舊制間年一徴發以補老疾之數貞元遷都遂徙上京太祖遼王秦王之明安併為哈濟滿洲語親近也舊作合北今改正明安及右諫議沃里布滿洲語存留也舊作烏里補今改正等明安處之中都沃陵滿洲語小也舊作斡論今改正等八明安䖏之山東阿嚕䝉古語山隂也舊作阿魯今改正之族䖏之北京諳達滿洲語友也舊作安達今改正族屬䖏之河間世宗大定初契丹幹罕滿洲語袖口也舊作窩幹今改正既平乃散契丹𨽻諸明安穆昆三年詔河北山東所簽軍許以驅丁充伊勒希十五年再定明安穆昆户每穆昆户不過三百七穆昆至十穆昆置一明安二十年以祖宗以来所建立明安穆昆其間有户口繁簡地里逺近不同遂更令以詔天下二十一年詔遷河北東兩明安上曰朕始令移此欲與女真户相錯安置乆則自相姻親不生異意此長久之利也今者伊瑪䝉古語山羊也舊作移馬今改正河明安相錯以居甚符朕意而約羅蒙古語皂雕也舊作遥落今改正河明安不如此可再遣使按其地以雜居之二十二年遷山東東路八穆昆䖏之河間其棄地以山東東路特嚇滿洲語存水也舊作忒里今改正河明安下扎哈䝉古語疆界也舊作巴合今改正穆昆伊爾們今吉林河名舊作移里閔今改正鄂爾歡滿洲諳乾之滋乾也舊作幹魯渾今改正明安下錫布滿洲語填塞也舊作翕浦今改正穆昆佛門滿洲語唇也舊作付母温今改正山穆昆九村人户徙于舊地上嘗以率兵呼爾哈並見前人驍勇可用海陵嘗欲徙之而未能二十四年以上京刷和倫滿洲語刷大林也和倫威也舊作率胡剌温今改正之地廣而腴遂出府庫錢以濟行資遷率賔一明安呼爾哈二明安二十四穆昆以實之盖欲上京兵多可為緩急之偹也當是時多易置河北山東所屯之舊括地而為之業頒牛而使之耕畜甲兵而為之備乃大重其權授諸王以明安之號新置者特賜之名制其奢靡禁其飲酒習其騎射儲其粮糒其偹全嚴也是時宗室戸百七十明安二百二穆昆千八百七十八金史天輔五年置奚魯都統司以約尼滿洲語全也舊作輦今改正九營為九明安𨽻焉又以渤海軍為八明安凡明安之上置軍帥軍帥之上置萬户萬户之上置都統然亦時稱軍帥為明安而明安則稱親管明安禁軍之制本于哈濟穆昆哈濟者者親軍也以近親所領故以名焉貞元遷都更以太祖及遼王宗幹秦王宗翰軍為哈濟明安金史金置都元帥必以安班貝勒為之恒居守而不出天徳七年罷萬户之官詔曰太祖開創因時制宜材堪統衆授之萬户其次千户及穆昆當時許以世襲乃權宜之制可罷是