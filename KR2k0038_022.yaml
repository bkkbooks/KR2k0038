靖康元年尼堪攻擒范仲熊授以宣政殿學士濟蘇十八宿縻哩名作彌離勒官告一道因有以二為官之語不知羅索滿洲語極濕難耕地也濟蘇蒙古語顔色也當時誤以婁宿角宿對音耳北盟錄女真官名以九曜二十八宿宿為名曰安班貝勒大官貝勒官人其職曰圗們萬戸舊滿洲語萬也作忒母今改明安千户穆昆百夫長富埒琿版子頭貝勒者糾官也猶中國言總管云自五户貝勒至萬户貝勒皆自統兵其宗室皆謂之郎君無大小必以郎君總之卿相拜於馬前郎君不為禮又有號阿喇勒䝉古語島也舊作阿胡盧里今改正伊勒齊貝勒尼堪滿洲語漢人也舊作粘罕今改正為元帥後雖貴亦襲父官而不改其號松漠記聞尼堪者金太宗三從兄弟名宗幹本名曰尼堪言其貌類漢人也其父即阿喇勒為伊拉齊貝勒尼堪為大元帥後雖貴亦襲父官稱曰伊拉齊貝勒都元帥語言漢後漢書辰韓名國為邦弓為弧㦸為冦行酒為行觴相别為徙按魏志梁書通考俱作相呼皆為徙與此異又方言徥行也朝鮮冽水之間或曰徥與相别之意稍近或徙字為徥字之誤有似秦語弁辰與辰韓言語有異魏晉魏志把婁言語不與夫餘同魏志辰韓其言語不與馬韓同名國為邦弓為弧行酒為行觴相呼皆為徙有似秦人名樂浪人為阿殘東方人名我為阿按滿洲語並無是觧盖陳夀强為之辭謂樂浪人本其殘餘人弁辰言語與辰韓相似按後漢書云弁辰與辰韓言語有異而此云相似盖未知音譯其同異無由知也晉書辰韓言語有𩔖秦人南北朝魏書勿吉國言語獨異周書百濟王號于羅瑕民呼為號吉支夏言並王也妻號于陸夏言妃也按百濟新羅語與滿洲語多不合皆作史者輾轉傳訛之辭不足信也梁書百濟國號所治城曰固麻謂邑曰檐魯如中國之言郡縣也呼㡌曰複衫袴曰褌南史百濟呼㡌曰冠襦曰複衫袴曰禈按此較梁書為近似當是梁書脱誤也其言𠫭諸夏亦秦韓之遺俗云梁書新羅俗呼城曰建牟羅其邑在内曰喙評在外曰邑勒亦中國之言郡縣也其冠曰遺子禮襦曰蔚觧袴曰柯半靴曰洗冊府元龜新羅言語名物有似中國人名國為邦弓為弧㦸為冦行酒為行觴相呼皆為徙按此與漢書所載畧同通考新羅語言待百濟而後通事與衆議號和白按滿洲語赭伯商議也與此音義俱相合唐新唐書新羅謂城為健牟羅邑在内曰喙評在外曰邑勒新唐書渤海俗謂王曰可毒夫按蒙古語謂福曰呼圖克唐古特語謂再来人曰胡土克圗元時曾用為帝號此可毒夫之語意亦第如此第輾轉傳訛不可觧耳曰聖主曰基下其名為教王之父為老母王太妃妻貴妃長子曰副王諸子曰王子五代舊五代史渤海稱王曰可毒夫靣對曰聖牋奏稱基下金金史世宗大定十四年命衛士有不嫻女真語者並勒習學仍自後不得漢語十六年詔諭宰執曰諸王小字未甞以女真語命之今皆當更易卿等擇名以上二十五年謂宰臣曰開原王尹大與有女真人訴事以女真語問之漢人訴事漢語問之大抵習本朝語為善不習則淳風将棄二十八年上以本國音自度曲言國家基緒之重萬世無窮之托上自歌之皇太孫及克寧和之又謂宰臣曰朕甞命諸王習本朝語惟原王甚習朕甚嘉之金史額納格爾蒙古語猶言此室也舊作納葛里今改正漢言居室也佛葉滿洲語傷㾗也舊作僕鷰今改正漢言悪瘡也和倫滿洲語慈鴉也舊作活羅今改正漢言慈烏也金史得勝陀國言曰額特赫格們滿洲語額特赫已勝也格們都㑹也舊作忽土皚葛蠻今改正日月山國言曰納喇薩喇蒙古語日月也舊作湼里塞一今改正陷泉國言曰埒綳吉滿洲語陷泥地也舊作落孛魯今改正龍駒河國言曰達罕必喇滿洲語達罕馬駒也必喇河也舊作喝必剌盖誤合為一音今改正白濼國言曰舍音齊喇滿洲語白色也舊作勺赤勒今改正鴛鴦濼國言曰昻吉爾滿洲語野鴨之大而色黄者舊作昂吉今改正燕子城國言曰古勒達爾干滿洲語沙燕也舊作吉甫魯灣今改正羊城國言曰和寧滿洲語羊也舊作火唵今改正狗濼國言曰音達琿尼約滿洲語音達琿狗也尼約水甸也舊作押恩尼要今改正古北口國言曰紐斡哩滿洲語色蒼緑也葢指山色之蒼翠而言舊作留斡嶺今改正居庸闗國言曰齊喇哈藩滿洲語齊喇嚴也哈藩官也舊作查剌合攀今改正松亭闗國言曰薩勒扎滿洲語岐路也舊作斜烈只今改正化成闗國言曰哈斯哈雅䝉古語哈斯玉石也哈雅牆也舊作曷撒罕酉今改北盟錄女真言語謂好為賽堪滿洲語善美也舊作感今改正又為賽音滿洲語好也舊作塞痕今改正謂不好為朗色滿洲語遢也舊作辣撒今改正謂酒為博囉達喇蘓蒙古語好酒也舊作勃蘇盖音急而訛今改正謂棍子敲殺曰穆克珊滿洲語挺也舊作䝉霜今改正坦塔哈滿洲語已打之謂舊作特庫今改正又曰穆克珊解見上舊作蒙山今併改布徹赫斡布嚕滿洲語布徹赫已死之謂斡布嚕該殺之謂舊作不屈花不辣今改正又曰斡布哈滿洲語令其殺之也舊作窪勃辣駭今改正夫謂妻為薩爾罕滿洲語妻也舊作薩那罕今改正謂夫為額伊根滿洲語夫也舊作愛根今改正北盟錄薩滿滿洲語師巫也舊作珊蠻今改正者女巫嫗也遼東行部誌呼圖克蒙古語福也舊作胡土虎今改正漢言渾河也按此盖稱名之異非渾河之解下文清河范河並同哈達滿洲語山峯也舊作胡底今改正漢言山也按此解近似達巴罕滿洲語嶺也舊作南謀懶今改正漢言嶺也桑阿滿洲語孔也舊作松瓦今改正者城也按此解誤布拉克蒙古語泉也舊作闢羅今改正漢語煖泉也按此解近似而未當奎滿洲語村荘也舊作叩畏今改正漢言清河也雅塔喇庫滿洲語火鎌也舊作耶塔剌虎今改漢言火䥥也和勒端滿洲語栝松也舊作和魯奪徒今改正漢言松也茂摩囉滿洲語茂木也摩囉椀也舊作䝉古魯今改正漢言木盂子也博囉和屯䝉古語博囉青色也和屯城也舊作鼻里合土今改正漢言范河也附金史舊國語解考按金史舊國語解分官稱人事物象物類姓氏五類官稱已詳前官制條姓氏附入部族門其人事等三類仍按原次附考于此勃端察爾胚胎之名按䝉古語稱始祖為勃端察爾此云胚胎之名義未當第以漢語稱鼻祖例之意尚可通爾雅亦以胎字祖字皆訓為始也原文作孛倫出今從䝉古源流改正阿鴻阿長子滿洲語阿鴻阿長也舊作阿胡迭今改正固納季也按滿洲語固納三嵗牛也此解為季誤原文作骨𧹞今改正費揚古曰幼子滿洲語費揚古㓜子也義與此合原文作蒲陽過今改正伊都次第之通稱滿洲語伊都班次也此解近似舊作益都今改正第九曰烏雲按此與滿洲語義相合原文作烏也今改正十六曰紐勒琿滿洲語紐勒琿正月十六日也原文作女魯歡今改正按塔哈客之通稱滿洲語義相合舊作按荅海今改正沙津昆舍人也按䝉古語沙津教也昆人也舊作山只昆今改正賽音伯竒男子滿洲語賽音好也伯竒堅固也舊作散亦孛竒今改正薩克達老人之稱也滿洲語薩克達老人也舊作撒答今改正實古納䝉古語審問也舊作什古乃解云瘠人並誤今改正薩哈連黧黒之名滿洲語薩哈連黑色也舊作撒合輦今改正博果尼侏儒䝉古語博果尼矮人也舊作保活里今改正額爾遜貌不揚也滿洲語額爾遜怪醜状也舊作阿里孫今改正阿實罕採薪之子滿洲語阿實罕年少也舊作阿徒罕今改正解云採薪之子誤塔哩雅耘田者䝉古語塔里雅糧也舊作荅不也今改正解云耘田者誤阿多古善採捕者䝉古語阿多古牧場也舊作阿土古今改正解亦誤巴爾斯角觝戲者䝉古語巴爾斯虎也舊作㧞里速今改正舊解並誤阿里哈尼雅勒瑪臂鷹鷂者滿洲語架鷹人也舊作阿离合懣盖音急而訛今改正舊解相合圖嚕拉户長滿洲語率領也舊作胡魯剌今改正舊解近似阿哈人奴也滿洲語奴也舊作阿合今改正烏珠曰頭滿洲語義相合舊作兀术今改正尼雅滿心也滿洲語義相合舊作粘罕今改正又别解云漢人則當為尼堪之訛義解迥殊音亦有别而皆誤以粘罕二字對音實由不知譯語之故耳威赫牙滿洲語義相合舊作吾亦可又訛界可今改正佛爾赫滿洲語大拇指也舊作盤里合解云将指並誤今改正薩木哈人之靨也滿洲語黶也義相合舊作三合今改正約赫徳瘍瘡滿洲語瘡疤也舊解未當原文作牙吾塔今改正富拉塔目赤而盲也滿洲語爛眼也舊解近似原文作蒲剌都今改實格訥溲疾䝉古語溺也舊解近是而未當原文作石哥里今改正們圖琿癡騃之謂滿洲語愚也舊解相近原文作謾都謌今改正穆哩庫無賴之名滿洲語穆哩庫執謬人也舊解未當原文作謀良虎今改正與人同受福曰呼圖克䝉古語福也舊解近是原文作忽都今改正以力助人曰愛實拉布滿洲語令扶助也原文作阿息保今改正蘇布赫酒醒也滿洲語義相合原文作辭不失今改正訥蘇肯和睦之義滿洲語温和也舊解誤原文作奴中今改正温綽寛寛容之名也滿洲語義相合舊作訛出虎今改正色拉哈安樂滿洲語色拉哈暢快也舊解近是原文作賽里今改正阿庫納滿洲語令周到也原文作迪吉乃解云未也並誤今改正薩巴䝉古語器皿也原文作撒八解云迅速之義並誤今改正烏肯徹蒙古語柔弱也舊作烏古出解云方言曰再休猶言再不復也意近似而未當今改正以物與人已然曰阿里布滿洲語令其呈獻也舊解未當原文作阿里白今改正沃哩布蓄積之名滿洲語存留也舊解近似原文作吾里補今改正興色猶云常川也滿洲語孜孜不倦也舊解相近原文作習矢今改正凡市物已得曰烏達哈滿洲語已買之謂舊解正相合原文作兀帶今改烏勒登明星滿洲語烏勒登晨光也舊解未當原文作兀典今改正阿林山滿洲語義相合原文作阿鄰今改正登髙也滿洲語義相合原文作太神今改正山之上鋭者曰哈達滿洲語峯也原文作哈丹今改正坡陀曰阿拉滿洲語山岡也原文作阿懶今改正山大而峻曰實納蒙古語山梁也原文作斜魯今改正達賚海也䝉古語義相合舊作忒鄰今改正扎呼岱舟也滿洲語義相合舊作沙忽帶今改正沃楞滿洲語水紋也原文作幹論觧云生鐡並誤今改正釡曰實木圗滿洲語大鉄鍋也原作闍母今改正刄曰色埒黙滿洲語順刀也原文作斜烈今改正佛勒和者鎚也滿洲語義相合原文作婆盧今改正金曰爱紳滿洲語義相合原文作按春則滿洲語耳墜之稱雖耳以金為之致誤亦有由而義名各殊並為訂正尼楚赫珠也滿洲語義相合原文作銀术可今改正布囊曰富埒呼滿洲語口袋也舊觧近是原文作蒲盧琿今改正盆曰阿里庫滿洲語盤也舊觧未當原文作阿里虎今改正罐曰呼紐滿洲語水桶也舊觧未當原文作活女今改正烏哩草廩也滿洲語草也舊觧近似原文作烏烈今改正沙拉衣襟也滿洲語衣襟角也舊觧相近原文作沙剌今改正富拉琿色之赤者也滿洲語水紅色也舊觧相近原文作活臘胡今改正呼蘭竈突滿洲語烟洞也舊觧近似原文作胡剌今改正和勒端松滿洲語括松也舊文作拉端今改正瑚哩松子滿洲語義相合原文作阿虎里今改正舒伊勒哈蓮也滿洲語蓮花也義相合原文作孰輦盖語急而訛今改正呼爾罕羔按此與蒙古語義相合原文作活离罕今改正喀齊喀犬子滿洲語小犬也原作合喜今改正額聶亨庫哩犬之有文者滿洲語上三字母狗也庫里花色也原文作訛古乃今改正烏勒呼瑪山雞滿洲語義相合原文作蒲阿今改正色克貂鼠滿洲語義相合原文作斜哥今改正烏木罕鳥卵也滿洲語義相合原文作窩謀罕今改正謹按後漢書魏志所載夫餘諸國官名好竒逞妄多属傳訛其後百濟新羅渤海或用漢語名官金朝語言本與滿洲相同故其官名尤可考據且有與我朝制度合者如孛極烈之即貝勒烏克遜之為宗室古倫乃邦國之稱㕘佐有章京之目約略相仿矣又如明安穆昆仿彿我朝八旂佐領之制其或由世襲或以材選則猶世職及公中之例也其以契丹渤海漢人别為編列又猶八旂之有蒙古漢軍也分戍河南陜西山東等路又猶各省之設駐防也他若賞䘏之典及厯過軍功年老放罷之條制有損益而義可𩔖推至于語言則無弗相同雖各書之譯對多訛而音義具可尋䆒欽定遼金元三史語觧詳加釐正曠若發蒙第篇頁既繁未䏻盡載今就史傳中原有舊觧者正其音譯考其當否以次繋之而金史所有舊國語觧音義近似者尚多並為考正以附諸後庶可得其大畧云欽定滿洲源流考卷十八
