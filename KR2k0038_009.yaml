body:
  text: 部族五靺鞨南北朝北史靺鞨即古肅慎氏也所居多依山水渠帥曰大莫弗瞞咄案滿洲語謂長曰達稱老翁曰薩克達瑪法是大莫弗三字當係達瑪法也瞞咄二字與滿珠音相近括地志靺鞨古肅慎也在柬北萬里已下東及北各抵大海册府元龜靺鞨在髙麗之北其地在營州東二千里南與新羅相接地方二千里編戶十餘萬兵數萬人北齊武成帝河清二年三年俱遣使朝貢後主天統元年至四年武平元年四年六年並遣使朝貢後周書髙麗北鄰靺鞨隋隋書靺鞨國在髙麗之北邑落各有君長不相總一凡有七部詳見前勿吉條西北與契丹接每相攻掠後因其使來髙祖謂之曰我憐念契丹與爾無異宜各守土境豈不安樂何為輒相攻擊使者謝髙祖因厚勞之煬帝初與髙麗戰頻敗其衆渠帥度地稽率其部來歸拜右光祿大夫居之桞城及遼東之役度地稽率其徒以從每有戰功十三年從帝幸江都尋令歸栁城在途遇李密之亂至髙陽復沒於王須拔未幾歸羅藝册府元龜開皇元年靺鞨遣使貢方物三年十一年十三年大業十一年並來貢突地稽者靺鞨之長也大業中與兄瞞咄率其部內屬營州瞞咄卒代總其衆拜遼西太守封夫餘侯親來江都屬宇文化及之亂仍歸栁城唐武德二年通使焉唐舊唐書靺鞨蓋肅慎之地後魏謂之勿吉在京師東北六千餘里其國凡為數十部各有長帥而黑水靺鞨按黑水即黑龍江詳見前勿吉條最處北方尤稱徑健父子相承世為君長武德初突地稽遣使朝貢以其部落置燕州仍以突地稽為總管劉黑闥之叛也突地稽率所部赴定州遣使詣太宗請授節度以戰功封蓍國公册府元龜作耆國公又徙其部落於幽州之昌平城會髙開道引突厥來攻幽州突地稽率兵邀擊大破之貞觀初拜右衛將軍賜姓李氏尋卒子謹行偉貌武力絶人麟德中厯遷營州都督其部落家僮數千人以財力雄邉纍拜右領軍大將軍為積石道經略大使吐蕃論欽陵等率衆十萬人入冦湟中謹行兵士採樵素不設備忽聞賊至遂建旗伐鼓開門以待之吐蕃疑有伏兵竟不敢進上元三年又破吐蕃數萬衆於青海降璽書勉勞之纍授右衛大將軍封燕國公永淳元年卒贈幽州都督自後或其長自來或遣使朝貢每嵗不絶其白山部素附於髙麗因收平壤之後部種多入中國汩咄安居骨室等部亦因髙麗破後並為渤海編戶惟黑水部全盛分為十六部開元十三年安東都護薛泰請於黑水靺鞨內置黑水軍續更以最大部落為黑水府按渤海傳作開元十四與與此小異仍以其首領為都督諸部刺史𨽻屬焉中國置長史就其部落監領之十六年其都督賜姓李氏名獻誠授雲麾將軍兼黑水經略使仍以幽州都督為其押使自此朝貢不絶舊唐書百濟傳永徽六年新羅王金春秋表百濟與靺鞨攻其北界沒三十餘城舊唐書髙麗傳貞觀十九年太宗次安市城髙麗北部耨薩髙延夀等率髙麗靺鞨之衆十五萬來援安市乾封九年分髙麗故地置都督府九又置安東都護府以統之自是髙麗舊戶分投靺鞨舊唐書鐵勒傳鐵勒國東至靺鞨西至葉護太宗征髙麗鐵勒遣使請發兵助軍髙麗莫離支潛令靺鞨啖以厚利不敢動新唐書地理志靺鞨州三府三慎州武德初以涑沫烏素固部落置僑治良鄉夷賔州乾符中以愁思嶺部落置僑治良鄉黎州載初元年析慎州置僑治良鄉無按原文作載初二年考本紀載初二年今改黑水州都督府渤海都督府安靜都督府右初皆𨽻營州都督府李盡忠陷營州乃遷慎州於淄青之境夷賔州於徐州之境黎州於宋州之境神龍初乃使北還二年皆𨽻幽州都督府通典古時肅慎後魏以後曰勿吉唐則曰靺鞈焉按鞨字作鞈與諸史異册府元龜唐武德五年靺鞨帥阿固郎來朝七年九年貞觀三年並來朝貢五年黑水部獨來自此每嵗朝貢開元元年靺鞨王子來朝請就市交易入寺禮拜許之二年拂涅靺鞨首領失異䝉越喜靺鞨首領烏施可䝉鐵利靺鞨首領闥許離等來朝迄開元天寶之世一嵗或二三至十年拂涅部靺如價鐵利部買取利來朝並授折衝越喜部茂利䝉鐵利部可婁計黑水部倪屬利稽來朝並授中郎將十一年越喜部勃施計勿涅部朱施䝉鐵利部倪處梨來朝並授郎將十二年鐵利部洖池䝉來朝授將軍越喜部努布利沸涅部魚可䝉並授郎將黑水首領屋作箇授折衝越喜部復遣使破支䝉來賀正旦十三年黑水部遣其將五郎子來賀正授將軍鐡利大首領封阿利越喜部苾利施拂涅部薛利䝉來朝黑水大首領烏素可䝉授折衝諾箇䝉授果毅職紇䝉授郎將十五年鐵利部米象來朝授郎將失伊䝉授果毅十八年黑水部遣使阿布科思又作阿布思利獻方物倪屬利稽等十人來朝授中郎將拂涅部兀異獻馬四十匹授左武衛折衝留宿衛二十四年越喜部首領聿棄計授折衝二十五年拂涅首領兀異授中郎將二十八年越喜部遣其臣野古利鐵利部遣其臣綿度戶獻方物二十九年越喜部遣烏舍利黑水部遣阿布利稽拂涅部遣那棄並來朝大厯二年至十二年建中八年並遣使朝貢建中十九年虞婁越喜並來元和十年黑水部長十一人來案册府元龜所載靺鞨人名以滿洲語考之如謂好曰賽音謂能曰莽阿與失異䝉音近工於甲者曰烏克紳莽阿與烏施可䝉音近善騎射者曰摩琳莽阿與茂林䝉音近謂努曰努伯哩與努布利音近羽毛豐滿曰豐阿拉與封阿利音近聰明能事曰蘇哷莽阿與薛利䝉音近甚能曰諾凱莽阿與諾箇䝉延音近稱弓彆曰密色與米象音近謂柔軟曰烏與兀異音近傳譯之訛尚有可訂也册府元龜唐髙宗儀鳯中授髙藏為朝鮮郡王夫餘隆為帶方郡王並遣歸遼東以輯髙麗百濟餘衆髙藏既至謀叛唐與靺鞨相結召還流卭州其地沒於新羅餘衆散投突厥及靺鞨夫餘隆亦不敢歸舊國土地盡沒於靺鞨髙氏夫餘氏君長遂絶上元二年劉仁軌破新羅之衆於七重城又以靺鞨兵浮海而南略新羅之南境斬獲甚衆開元八年九月遣左驍衛郎將攝郎中張越使於靺鞨以將討奚及契丹也開元十二年新羅王弟金忠信上表請攻靺鞨帝許之太平寰宇記靺鞨在髙麗北古肅慎地隋初有使來獻謂即勿吉也唐武德三年部長突地稽遣使朝貢以其部置燕州拜為總管其後黑水部全盛分為十六部落黑水西北有思慕靺鞨正北微東十日程有郡利靺鞨東北十日程有窟說靺鞨亦謂之屈設東南十日程有莫曳皆靺鞨今黑水靺靺界南至渤海國德里府北至小海東至大海西至室韋南北二千里東西千里初太宗謂侍臣曰靺鞨逺來蓋突厥降朕所致也其拂涅等部唐初至天寶末亦嘗朝貢或隨渤海國而來惟郡利莫曳皆二部未至通考唐武德五年靺鞨渠長阿固郎始來太宗貞觀二年以其地為燕州帝伐髙麗其北部與髙麗合率衆援安市城每戰靺鞨常居前開元十年其帥倪屬利稽來朝拜勃利州刺史於是置黑水府以部長為都督刺史訖帝世朝獻者十五大厯世凡七貞元一來元和中再初黑水西北又有思慕部益北又十日得郡利部東北行十日得窟說部稍東南行十日得莫曳皆部又有拂涅虞婁越喜鐵利等部其地南距渤海北東際於海西抵室韋南北袤二千里東西千里其後渤海盛皆役屬之五代五代史黑水靺鞨本號勿吉當後魏時見中國其國東至海南界髙麗西接突厥北鄰室韋蓋肅慎氏之地也同光二年黑水首領兀兒遣使者來其後常來朝貢自登州泛海出青州其部族世次史皆失其紀按索倫語謂山曰烏呼與兀兒音同黑水部族至廣而兀兒所部史失其紀以音譯考之當與今索倫近也五代會要黑水靺鞨蓋肅慎之地在京師東北六千餘里東至於海西接突厥南界髙麗北鄰室韋其國凡有十部各有統帥而黑水最處北方尤稱徑健天成四年八月遣使骨至按骨至當為郭濟之訛滿洲語曲指也來貢方物以骨至為歸德司戈遣還長興元年二月其首領兀兒復遣使朝貢二年五月青州奏黑水兀兒部至登州賣馬册府元龜後唐同光二年九月黑水國遣使朝貢三年黑水胡獨鹿按滿洲語令急速曰呼都拉與胡獨鹿音近等遣使朝貢三年青州奏市到黑水馬三十匹遼遼史太祖天顯元年靺鞨來貢太宗會同元年靺鞨來貢遼史兵衛志屬國軍有靺鞨部朝貢無常有事則遣使徴兵或下詔令專征助軍多寡各從其便遼史地理志唐載初元年原本作載初二年蓋沿唐志之誤謹改析慎州原本慎訛鎮今據唐地理志改置黎州處靺鞨部落後為奚人所據遼為榆州金金史世紀靺鞨本號勿吉隋稱靺鞨而七部並同唐初有黑水靺鞨粟末靺鞨其五部無聞粟末靺鞨後稱渤海黑水靺鞨居肅慎地東瀕海南接髙麗嘗以兵十五萬助髙麗拒唐太宗開元中置黑水府賜都督姓李氏名獻誠領黑水經略使其後渤海盛强黑水役屬之朝貢遂絶五代時契丹盡取渤海地而黑水附於契丹其在南者籍契丹其在北者不在契丹籍地有長白山黑龍江所謂白山黑水是也元元史地理志開元路古肅慎之地隋唐曰黑水靺鞨其後渤海盛役屬之渤海為契丹所攻黑水復有其地謹按靺鞨後魏謂之勿吉其名始見於南北朝北史合為一傳至隋唐則專為靺鞨傳武德以後遂無復勿吉之稱其七部即勿吉之七部也逮後分部愈廣至有數十最强者為粟末黑水粟末部大氏既興改稱渤海另條詳後靺鞨自後魏以來邑落各有君長不相統一其與隋唐諸國使命相通者特其一部一邑即唐時都督刺史之授亦不過假借虛名以通互市往來之便實未有能統而一之者後或分屬契丹猶然散處而黑水一部實在今薩哈連烏拉之境唐時即已獨盛又自分為十六部至五代時改稱女真兼靺鞨諸部而有之而完顔氏另條詳後世君其地未嘗一日屬契丹也其部族之可考者若思慕郡利窟說莫曳皆虞婁越喜鐵利等皆是案今黑龍江將軍所屬有錫呼穆苐河有庫裕爾河與思慕窟說音相近當皆以水得名八旗姓譜中有裕嚕氏當即虞婁之轉音上溯挹婁亦相近也又滿洲語謂全部之部曰約希謂隊伍曰默音謂理曰堅與越喜莫曵皆音亦近中間渤海盛時亦有侵併至若越喜故地之為懷逺安逺二府領達越等十三州鐵利故地之為鐵利府領廣汾府六州而遼地志載新興縣本越喜國地遼本紀鐵驪國屢通貢使至天祚不絶是越喜入遼而鐵利復自立國迄於金世猶存利與驪音同續通考乃云不知其所始非也虞婁當即挹婁之轉音思慕等部亦當在今黑龍江左右至唐書言白山部分散入中國而遼志有長白山女真三十部稱號雖殊山川可考金源盛而諸部始歸於一焉爾欽定滿洲源流考卷五
