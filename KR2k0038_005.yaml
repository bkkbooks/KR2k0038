body:
  text: 欽定四庫全書欽定滿洲源流考卷一部族一謹按我國家誕膺景命肇啓大東育瑞凝祥同符雅頌皇皇乎元鳥之生商髙禖之啓稷矣恭考實録自始祖定三姓之亂建國鄂多理城即以滿洲建號繼繼繩繩鍾靈篤慶洪惟肇祖原皇帝創業於赫圖阿喇之地爰及景祖覲光揚烈乃舉五嶺以東蘇克素護河以西諸部而撫綏之逮我太祖髙皇帝天錫智勇懋建大勳既克圖倫遂收棟鄂太宗文皇帝鴻圖式廓遐邇景從東北諸部盡為臣僕稽諸古昔若肅慎夫餘三韓靺鞨伯濟新羅渤海女真諸國沿革可徵淮南子云東方多君子之國信矣臣等謹立部族一門先臚舉史册所載各條參以今之考證或訂其音轉之訛或稽其分合之迹斷自肅慎為始而仍辨國號於簡端以著統尊溯源之義云滿洲按滿洲本部族名恭考發祥世紀長白山之東有布庫哩山其下有池曰布勒瑚里相傳三天女浴于池有神鵲銜朱果置季女衣季女含口中忽已入腹遂有身尋産一男生而能言體貌竒異及長天女告以吞米果之故因錫之姓曰愛新覺羅名之曰布庫哩雍順與之小舠且曰天生汝以定亂國其往治之天女遂凌空去于是乘舠順流至河步折栁枝及野蒿為坐具端坐以待時長白山東南鄂謨輝之地有三姓爭為雄長日搆兵相仇殺適一人取水河步歸語衆曰汝等勿爭吾取水河步見一男子察其貌非常人也天不虛生此人衆皆趨問答曰我天女所生以定汝等之亂者且告以姓名衆曰此天生聖人也不可使之徒行遂交手為舁迎至家三姓者議推為主遂妻以女奉為貝勒居長白山東鄂多理城建號滿洲是為國家開基之始以國書考之滿洲本作滿珠二字皆平讀我朝光啓東土每嵗西藏獻丹書皆稱曼珠師利大皇帝翻譯名義曰曼珠華言妙吉祥也又作曼殊室利大教王經云釋迦牟尼師毗盧遮那如來而大聖曼殊室利為毗盧遮那本師殊珠音同室師一音也當時鴻號肇稱實本諸此今漢字作滿洲蓋因洲字義近地名假借用之遂相沿耳實則部族而非地名固章章可考也御製全韻詩天造皇清發祥大東山曰長白江曰混同峻極襟帶福萃靈鍾山頂有潭闥門名揚叶亘長白山髙二百餘里綿千餘里雄觀峻極扶輿靈氣所鍾山之上有潭曰闥門周八十里源深流廣鴨緑混同愛滹三江出焉三天女者降而浴躬神鵲含果吞以娠中錫之姓名母遂凌空山之東有布庫哩山其下有池曰布勒瑚里相傳有三天女曰恩古倫次正古倫次佛庫倫浴于池有神鵲含米果置季女衣季女含口中忽已入腹遂有身尋産一男生而能言體貌竒異及長母告以吞米果之故因錫之姓為愛新覺羅名之曰布庫哩雍順與小舠桑之母遂凌空去有取水人見訝異徴叶交手舁歸推為主國叶三姓定亂鄂多城崇號建滿洲開基肇宗天男乘舠順流而下至河步登岸折栁及蒿為坐具端坐其上其地有三姓爭為雄長搆兵仇殺有取水河步者見而異之歸語人曰汝等勿爭吾取水河步見一男子察其貌非常人也天必不虛生此人衆往視皆以為異因詰其由來答曰我天女所生天男生我以定汝等之亂者且告其姓名衆曰此天生聖人也不可使之徒行乃交手為舁迎至家三姓者議推為國主以女百里妻之奉為貝勒其亂乃定遂居長白山東鄂多理城國號滿洲是為開基之始按滿洲清字本作滿珠我國家肇基于東故西藏每嵗獻丹書皆稱曼珠師利大皇帝至今漢字作滿洲者蓋因洲字義近地名假借用之遂相沿從俗云元鳥商室帝武周家叶聖必有啓異揆同風右長白山發祥肅慎一作息慎又作禝慎虞竹書紀年帝舜有虞氏二十五年息慎氏來朝貢弓矢史記虞帝紀云南撫交址北發西戎析枝渠搜氐羌北山戎發息慎周汲冡周書王會解云西面者正北方稷慎大麈孔子家語武王克商肅慎氏貢楛矢尚書序成王既伐東夷息慎來賀尚書傳王俾榮伯作賄肅慎之命史記孔子世家有隼集于陳庭楛矢貫之石砮矢長尺有咫陳湣公使使問仲尼仲尼曰隼來逺矣此肅慎之矢也後漢書康王之時肅慎復至漢後漢書古肅慎國在夫餘東北千餘里東濵大海淮南子海外三十六國有肅慎氏三國三國志魏書明帝青龍四年肅慎貢楛矢晉晉書肅慎國東北有山出石其利入鐵將取之必先祈神周武王時獻其楛矢石砮逮于周公輔成王復遣使入賀爾後千餘年雖秦漢之盛莫之致也及文帝作相魏景元末來貢楛矢魏帝詔歸於相府賜其王傉雞錦罽綿帛至武帝元康初復來貢獻元帝中興又詣江左貢其石砮成帝時復通使於石季龍南北朝册府元龜宋孝武帝大明三年肅慎國獻楛矢按肅慎之名著于周初考竹書紀年有虞舜二十五年息慎獻弓矢之文史記虞帝紀亦稱北發息慎鄭元注曰息慎或謂之肅慎周書王會解又作稷慎息稷與肅音轉之訛其為一國無疑由來固已逺矣秦漢之盛史無傳焉後漢書挹婁傳則云即古肅慎似其名至漢而止然魏晉時間通使聘史官皆以肅慎書之則不得云東漢無肅慎也要之負山襟海地大物博又風氣朴淳故厯虞夏商周迄魏晉傳世二千餘年不絶范蔚宗謂冠辨衣錦器用爼豆誠非虛語特自漢以後始有岐稱耳宋劉忠恕稱金之姓為米里真夫北音讀肅為須須朱同韻里真二字合呼之音近慎蓋即肅慎之轉音而不知者遂以為姓國初舊稱所屬曰珠申亦即肅慎轉音漢人不知原委遂岐而二之猶之或為稷慎或為息慎其實一也至于自漢魏以後所稱部名則分條詳係于後云夫餘一作扶餘御製夫餘國傳訂訛近閲四庫全書內元郝經續後漢書所作夫餘國列傳其官有馬加牛加之名訝其誕詭不經疑有舛誤因命館臣覆勘其説實本之後漢書及三國魏志夫餘傳之文于是嘆范蔚宗陳夀之徒不識方言好竒逞妄疑誤後人而更惜郝經之失于裁擇也其傳曰國以六畜名官有馬加牛加豬加狗加諸加别主四出道有敵諸加自戰下户擔糧飲食之信如其言則所謂諸加者何所取義乎史稱夫餘善養牲則畜牧必蕃盛當各有官以主之猶今蒙古謂典羊之官曰和尼齊和尼者羊也典馬者曰摩哩齊摩哩者馬也典駝者曰特默齊特默者駝也皆因所牧之物以名其職特百官中之一二志夫餘者必當時有知夫餘語之人譯其司馬司牛者為馬家牛家遂訛為馬加牛加正如周禮之有羊人犬人漢之有狗監耳若必以六畜名官寓相貶則郯子所對少皥氏鳥名官為鳥師而鳥名又何以稱乎蔚宗輩既訛家為加又求其説而不得乃強為之辭誠不值一噱總由晉宋間人與外域道理遼阻于一切音譯素所不通遂若越人視秦人之肥瘠率憑耳食為傅會甚而至借惡詞醜字曲肆其其詆毁之私可鄙孰甚且蔚宗以附彭城王義康謀反伏誅陳夀索米為人作佳傳其人皆不足取其言又何足據乎苐後漢書三國志久經刋行舊文難以更易因命于續後漢書中改加為家並為訂其踳謬如右謹按馬加牛加之説始于范蔚宗陳夀厯代史志襲謬承訛至郝經續後漢書猶沿用之蓋當時音譯未通曲為傅會更千百年未有能知其妄者恭讀御製夫餘國傳訂訛指加為家字之誤近例之蒙古典羊典馬之官逺徴諸周禮羊人犬人之掌設官分職至理所存古今一揆也蔚宗輩之貽誤後人蓋非淺鮮矣臣等敬録冠簡端以示萬世折衷之準其自後漢以下諸書凡有關夫餘事實者仍以次條列云漢後漢書夫餘國在元菟北千里地方二千里最為平敞以員柵為城有宫室倉庫以六畜名官有馬加牛加狗加其邑落皆主屬諸加册府元龜夫餘國本濊地也漢武帝元朔元年以其地為滄海郡數年乃罷至元封三年滅朝鮮分置樂浪臨屯元莵真畨四郡至昭帝始元五年罷臨屯真畨以并樂浪元菟元莵復徙居句麗自單單大嶺後漢書作單大嶺魏志通考與此同已東悉屬樂浪後以境土廣逺復分嶺東七縣置樂浪東部都尉後漢書建武二十五年夫餘王遣使奉貢光武厚答報之于是使命嵗通永寧元年遣嗣子尉仇台詣闕順帝永和元年其王來朝帝作黃門㰻吹角抵以遣之桓帝延熹四年遣使朝賀貢獻靈帝熹平中復奉章貢册府元龜漢安帝延光元年夫餘王遣使貢獻又獻帝延康元年遣使貢獻通考漢安帝永初五年夫餘王始將步騎七八千人入樂浪桓帝永康元年王夫台將二萬人侵元莵三國志夫餘在長城之北去玄菟千里國有君王皆以六畜名官有馬加牛加豬加狗加犬使犬使者使者邑落有豪民民下户皆為奴僕諸加别主四出道大者主數千家小者數百家有敵諸加自戰下户俱擔糧飲食之漢末公孫度雄長海東夫餘王尉仇台更屬遼東時句麗鮮卑強度以夫餘介其間妻以宗女按郝經續後漢書與此同不復載三國三國志夫餘王尉仇台死簡位居立無適子有孽子麻余麻余死其子依慮年六嵗立以為王魏略夫餘其國殷富自先世以來未嘗破壞魏略昔北方有稿離之國按稿離後漢書作索離注云索音度洛反通典作槖離梁書作櫜離非髙句麗之髙麗也惟隋書直作髙麗合為一國誤其王者侍婢有身王欲殺之婢云有氣如雞子來下我故有身後生子名曰東明東明善射王恐奪其國也欲殺之東明走南至施掩水後漢書作掩㴲水注云今髙麗中有蓋斯水疑此水是也梁書作掩𢃄水以弓擊水魚鱉浮為橋東明得渡因都王夫餘之地晉晉書夫餘在元菟北千餘里其王印文稱濊王之印國中有古濊城武帝時頻來朝貢至太康六年為慕容廆所襲破其王依慮死子弟走保沃沮有司奏護東夷校尉鮮于嬰不救夫餘失于機略詔免嬰以何龕代之明年夫餘後王依羅遣詣龕求率見人還復舊國龕上列遣督郵賈沈以兵送之廆又要之于路沈與戰大敗之羅得復國南北朝梁書髙句驪其先出自東明東明本櫜離王之子王欲殺之東明走至夫餘而王焉隋書夫餘王嘗得河伯女閉于室內為日光隨而照之感而遂孕生一大卵有一男子破而出名曰朱蒙夫餘之臣咸請殺之其母以告朱蒙朱蒙東南走遇一大水朱蒙曰我是河伯外孫日之子也今有難而追兵且及如何得渡于是魚鱉積而成橋朱蒙遂渡朱蒙建國號髙句麗隋書百濟另條詳後之先出自髙麗其王有侍婢生東明及長王忌之東明懼逃至淹水夫餘人共奉之東明之後有仇台者篤于仁信始立其國于帶方故地漢遼東太守公孫度以女妻之漸以昌盛為強國初以百家濟海因號為百濟北史朱蒙者其俗言善射也按今滿洲語稱善射者謂之卓琳莽阿卓與朱音相近琳則齒舌之餘韻也莽阿二字急呼之則音近蒙是傳寫雖訛音解猶有可考也夫餘王狩于田以朱蒙善射給一矢殪獸甚多夫餘之臣謀殺之朱蒙乃與焉違等二人走至紇升骨城後周書作紇斗骨城居焉號曰髙句麗魏書豆莫婁國在勿吉國北千里去洛六千里舊北夫餘也在失失通考作室韋之東或言本濊地也通典百濟即後漢末夫餘王尉仇台之後延興二年其王餘慶上表云臣與髙麗先出夫餘唐唐書髙麗者出自夫餘之别種也百濟國本亦夫餘之别種通典髙麗得夫餘地置夫餘城後屬于渤海叧條詳後通考渤海以夫餘故地為夫餘府遼史地理志唐時契丹逹呼爾舊作大賀今從八旗姓氏通譜改氏蠶食夫餘靺鞨另條詳後之區地方二千餘里按髙麗出自夫餘夫餘出自索離索讀如槖故或書為槖槖形似櫜故又轉為櫜櫜與稿音同故魏略及遼志復作稿與髙麗實二國也夫餘在髙麗北稿離又在夫餘北故東明南走而至夫餘朱蒙亦南走而至髙麗然其事倣佛相同或傳聞之有一誤也隋書謂夫餘王尉仇台始立國于帶方自後遂稱百濟後魏時百濟所上書亦云先與髙麗源出夫餘自晉以後百濟王之姓名有夫餘腆夫餘豐夫餘隆蓋真以夫餘為姓矣後漢書稱夫餘在元菟北千里南接髙接髙麗東接挹婁本濊地故魏略云夫餘王印文曰濊王之印謂本濊地而夫餘居之其舊國為豆莫婁在勿吉北千里是夫餘始在極北後乃兼有南陲唐初地入于髙麗髙麗既滅屬于渤海為夫餘府其後見于史志者若遼之通州安逺軍龍州黃龍府金之隆州利涉軍元之開元路皆其故地並詳後渤海條及疆域門稿離國見于遼史為韓州鳳州俱在今開原西北境外與挹婁實唇齒之邦也欽定滿洲源流考卷一
