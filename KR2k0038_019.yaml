body:
  text: 欽定四庫全書欽定滿洲源流考卷十五山川二混同江御製松花江詩滚滚遙源出不咸松花江即混同江源出長白山山海經作不咸山大東王氣起龍潛劈空解使山原折接上那辭霧雨添兩岸參差青嶂印一川榮繆碧波恬地中呈象原簷鼓松花江以松阿哩烏拉得名松阿哩者即國語天河也石辨支機孰是嚴御製松花江放船恭依皇祖詩韻隆崇長白佑維清松花江源山頂生飛流銀河練影明縈回千里竹箭輕望祭申悃和鸞鳴臨江遂命青雀橫水天上下秋光晶馮夷靜恬濤不驚擊汰直達吉林城滄浪之水義最精俯看直欲濯我纓詎必昆明習戰兵隆崇長白佑維清繼繩祖烈希景行從流寧為去聲欣渟泓御製松花江捕魚松江網魚亦可觀潭清潦盡澄秋煙虞人技癢欲效悃我亦因之一放船施罟濊濊旋近岸清波可數鰷鱸鰱就中鱏鰉稱最大度以尋丈長鬐軒波裏頽如玉山倒擲義百中誠何難鈎牽繩曳乃就陸椎牛十五一當焉舉網邪許集衆力銀刀雪戟飛繽翻計功受賜即命罷方慮當秋江水寒魏書勿吉國有大水濶三里餘名速末水按速末即混同江亦作粟末新唐書粟末靺鞨依粟末水以居水源於太白山遼史本紀聖宗太平四年詔改鴨子河曰混同江遼史上京臨潢府有鴨子河金史本紀遼都統蕭嘉哩副都統托卜嘉滿洲語膝也舊作撻不野今改將步騎十萬會於鴨子河北太祖自將擊之金史本紀收國元年八月上親征黃龍府次混同江無舟上使一人導前乘赭白馬徑涉曰視吾鞭所指而行諸軍隨之水及馬腹後使舟人測其渡處深不得其底金史世紀混同江亦號黑龍江案混同江自長白山北流折而東與黑龍江會黑龍江出喀爾喀北界東南流與混同江會實係二水合流非一水而二名也史文殊誤金史上京路水有混同江松阿哩江鴨子河按混同江即松阿哩江遼史又稱即鴨子河金志誤分為三水金史世宗大定二十五年册混同江之神為興國應聖公立廟致祭契丹國志長白山黑水發源於此案黑龍江並不發源長白此蓋誤以混同為黑水也舊云粟末河太宗破晉改為混同江按遼史聖宗時始改名混同江葉隆禮契丹國志作太宗誤也許亢宗奉使行程録古烏舍塞枕混同江湄其源來自廣漠之北逺不可究自此南流五百里接髙麗鴨緑江注海案此條舛誤尤甚混同江出長白北流會黑龍江東入海乃云來自廣漠之北南流會鴨緑蓋據圖臆揣之誤也元一統志混同江俗呼松阿哩江源出長白北流經舊建州詳前部族門及渤海疆域條西五十里會諸水東北流經故上京見金上京條下達五國頭城見前疆域門北又東北注於海明統志混同江在開原城北一千五百里源出長白山蒼名粟末河俗呼松阿哩江北流經金故會寧府下繞五國頭城東注於海松花江在開原城東北一千里源出長白山北流經故南京城合輝發江混同江東流注海按混同江發源於長白山北自吉林東南北流出邉受嫩江折而東北受黑龍江南受烏蘇哩江東注於海遼太平四年詔改鴨子河為混同江混同之名始見於此土人呼為松阿哩江金志作宋瓦江則松阿哩音之誤也明統志作松花江則宋瓦之轉音也金史本紀有云混同江一名黑龍江指下流交會之處言之或以此江名松花而以薩哈連烏拉為混同誤也金史地理志既載混同江又載宋瓦江鴨子河是不知一江之有三名而誤以為三水明統志既載混同江又載松花江是又誤以一江為二水云鴨緑江漢書地理志元莬郡西蓋馬縣馬訾水西北入鹽難水西南至西安平入海過郡二行二千一百里通典馬訾水一名鴨緑江源出靺鞨白山水色似鴨頭故名通鑑大業八年伐髙麗分道並進皆會於鴨緑水西通鑑貞觀十九年程名振等拔卑沙城遣將耀兵於鴨緑水又龍朔元年契苾何力討髙麗髙麗守鴨緑不得濟何力乘堅冰渡水大破之乾封二年李績伐髙麗管記元萬項檄文曰不知守鴨緑之險髙麗報曰謹聞命矣即移兵拒守唐兵不得渡遼史聖宗統和二十八年自將伐髙麗大軍渡鴨緑江康肇拒戰敗之通考女真世居長白山鴨緑水之源元一統志鴨緑江在遼陽路東五百六十里按唐書馬訾水出靺鞨白山西與鹽難水合又西南至安平入於海唐太宗征髙麗遣邱孝忠耀兵於鴨緑水即此今考其源出於長白山西南流經故博索府見前疆域門東南入海髙麗圖經鴨緑之水源出靺鞨其色如鴨頭故以名之去遼東五百里又西與一水合即鹽難水也二水合流西南至安平城入海髙麗之中此水最大波瀾清徹其國恃此以為天塹水濶三百步在平壤城西北四百五十里遼水東南四百八十里自遼水以東即屬契丹大金以其地不毛不復城守徒為往來之道而已按鴨緑水其色如鴨頭乃史家傳會之論詳見完顔部條明統志鴨緑江在遼東都司城東五百六十里按鴨緑江在吉林烏拉南九百七十里源出長白山西南流與朝鮮分界至鳯凰城東南入海即古馬訾水亦名益州江蓋渤海益州所治也見前疆域門愛呼河金史烏庫哩舊訛烏古論今從八旗姓譜改薩哈滿洲語小圍也舊説三合今改海蘭路愛呼河人金史烏雅舊訛烏延今從八旗姓譜改和囉噶蒙古語墻圈也舊訛胡里改今改海蘭人後徙愛呼穆昆家焉愛呼舊訛愛也窟今改正元一統志長白山頂有潭周八十里南流為鴨緑江北流為混同江東流為愛呼河明統志愛呼河源出長白山東流入海案元明統志又俱訛為阿也苦今併改考集盛京通志吉林諸河多發源於長白山諸窩中而自入海者惟混同鴨緑圖們三江愛呼河自納穆窩集會拉發河入混同江今明統志云入海誤圖們江金史景祖兵勢稍振圖們舊訛統門今改正水溫特赫舊作溫迪痕今據八旗姓譜改正部來附金史天會九年以圖們水以西和屯錫馨珊沁三水以北間田給海蘭路諸穆昆案圖們江在寧古塔城南六百里源出長白山東北流違朝鮮北界復東南折入海佟佳江漢書地理志馬訾水西北入鹽難水案與鴨緑江會流入海者惟佟佳江為大漢書所稱鹽難水當即是也新唐書鴨緑水西與鹽難水合元一統志大蟲江在遼陽路發源原缺縣名縣東南龍鳳山分水嶺下東南流經廢博索府見前疆域門南流合於鴨緑江明統志大蟲江在遼東都司城東南四百里源出龍鳳山南流入鴨緑江按一統志云佟住江在吉林烏拉城南八百二里亦名通佳江南流會鴨緑江即古鹽難水明統志有大蟲江疑即佟佳江也今考佟佳江源出分水嶺西南流受喀爾敏諸水鴨緑江自東來會南入於海龍鳳山之名無可考惟鳯凰城西北有龍鳯臺山遼河御製渡句驪河句驪舊遼水千載帶遼陽古客曽何在今人引興長蒹葭餘敗質汀嶼何蒼茫飲練雙長虹橫臥水中央幾箇無心鷗衝波任翺翔戰勳尋堞壘世態驚滄桑惟此東流水今古無間忙積素漫兩岸流澌聲琅琅誰能呼舴艋捕彼鯉與魴近樹銀為飾逺山玉作裝憑輿愁峭寒披裘且倣徨常時禁體詩苦吟讀書堂奚如眺攬餘萬景箇中藏御製渡遼水鏡影照龍旃橋山展謁旋寧同貞觀后撠挶為開邉漢書地理志大遼水出塞外南至安市入海行一千二百五十里三國魏志司馬懿伐公孫淵圍襄平會大霖雨遼水暴漲運船自遼口竟至城下平地水數尺水經大遼水出塞外衛白平山東南入塞過遼東襄平縣西又東南過房縣西又東過安市縣西南入於海水經注遼水亦言出砥石山自塞外東流直遼東之望平縣西屈而西南流徑襄平縣故城西又東徑遼隊縣故城西又南小遼水注之又右會白狼水至安市縣入海隋書開皇八年命漢王諒討髙麗軍次遼水髙麗遣使謝罪乃罷兵通鑑大業七年諸軍會遼水髙麗阻水拒守隋兵不得濟命宇文愷造浮橋三道於遼水西岸既成引橋趣東岸橋短丈餘士卒赴水接戰髙麗乘髙擊之為所敗乃引橋復就西岸命何稠接橋二日而成諸軍進戰於東岸通鑑貞觀十八年遣營州都督張儉討髙麗值遼水漲儉等久不得濟次年車駕至遼澤泥淖二百餘里人馬不可通詔閻立德布土作橋既濟撤之以堅士心及師還遣長孫無忌將萬人翦草填道深處以車為梁上自繫薪於馬鞘以助役通典貞觀二十一年李績破髙麗於南蘇班師至頗利城渡白狼黃嵓二水皆由膝以下績怪二水狹淺問契丹遼源所在云此二水合而南流即稱遼水更無遼源可得也案遼河二源一為吉林之赫爾蘇河一為潢河又有喀喇沁之土河東流合於潢河水經注稱遼水過房縣西右會白狼水又稱白狼水經古黃龍栁城之北與今土河相合故或疑白狼水即土河然按之水經注亦難一一吻合李績自南蘇班師南蘇為今復州寧海地去潢河土河甚遠唐書所言未足為據又明志以艾河土河合流為遼河上源尤不足信耳通典大遼水源出靺鞨國西南山南流至安市入海遼史東京遼陽府遼河出東北山口會范河原本會誤作為范河源出嘉穆呼山入遼河别係一河也今改正西南流為大口入於海金史遼陽府瀋州章義縣有遼河元一統志遼河在遼陽路西一百五十里按前漢地理志遼東郡望平縣下注云大遼水出塞外後漢書注引山海經曰遼水出白平東郭璞曰出塞外御白平山此作御白平與今本水經異今按圖册上從咸平府界流經瀋陽府城西北一百二十里下流入廣寧路境明統志遼河源出塞外自三萬衛西北入境南流經鐵嶺瀋陽都司之西境廣寧之東境又南至海州衛入海按遼河東源出吉林城西南之庫勒訥窩集為赫爾蘇河北流出邉西北繞鄧子河又西南折為潢河會其西源即潢河也二河合流自開原縣入邊經鐡嶺入雙峽口分為二曰內遼河外邉河繞縣之西南復合為一至開城為巨流河亦名句驪河又作枸栁河又分流復南滙經海城縣西與太子河會遂為三汊河入海水經所稱衛白平山及砥石山皆傳聞未審之辭耳渾河瀋水漢書地理志髙句麗遼山遼水所出西南至遼隊入大遼水水經元莬髙句麗縣有遼山小遼水所出西南至遼隊入於大遼水水經注小遼水出遼山西南經遼陽縣與大梁水會又東南徑襄平縣為淡淵晉永嘉三年涸又徑襄平縣入大梁水按渾河與太子河會西流合遼河為三汊河故漢志云入大遼水此云入大梁水疑大遼水之誤與大梁水會巳見上文大梁水即太子河也遼史東京遼陽府渾河在東梁范河之間金史東京路瀋州樂郊縣有渾河貴德州奉集縣亦有渾河元一統志渾河在遼陽路本路圖册引遼志云源自越喜國見前靺鞨條出熊水西北合衆流會淄水屈曲數千里入於海按地志集略云源出女真國西流過貴德州由州西流入梁水西南七十里合遼河入於海元一統志渾河在瀋陽路源出廢貴德州東北西南經瀋州南一十五里遼陽西四十里會太子河合遼水南注於海舊稱瀋水水勢湍激沙土混流故名渾河今水澄徹遇漲則渾案元一統志所稱蓋即一水以圖册分載而兩存之也德盛京通志又載有小瀋水俗名五里河在承縣城南自東關觀音閣東發源一名萬泉河流至騾子圈南入渾河水北曰陽瀋陽之名以此明志稱一名活水髙永昌拒金兵於活水者非是明統志渾河源出塞外西南流至瀋陽衛合沙河又西南流至遼東城西北入太子河案渾河發源自長白山納魯窩集中西北流入英額邉門經太興京界內繞盛京之西南至王大人屯與子河會西流會遼河為三汊河入海太子河漢書地理志遼陽縣大梁水西南至遼陽入遼遼史地理志東梁河自東山西流與渾河合為小口會遼河入於海又名太子河亦曰大梁水金史地理志東京路遼陽府遼陽縣有東梁河國名烏勒呼滿洲語蘆葦也舊作兀魯忽今改正必喇俗名太