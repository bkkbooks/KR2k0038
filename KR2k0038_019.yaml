布水完顔部圖們水溫特赫部俱來歸金之為國自此益大金史完顔伊爾必斯海蘭路特克新必喇明安人金史通恩阿爾本特克新水赫舍哩部人穆稜水金史拉必瑪察敗於穆稜舊作暮稜今改水瑪察遁去頗克綽歡與拉必就擒金史拉必據穆稜水保固險阻世祖率兵圍之金史拉必瑪察據穆稜水世祖擒拉必穆稜水人尚反側不自安使阿里罕往撫察之野鵲水巴拉密特水金史拉必瑪察掠拉林水牧馬世祖至混同江與穆宗分軍世祖自圖古勒津倍道兼行遇拉必於野鵲水穆宗自額圖琿津渡江遇敵於巴喇密特舊作蒲盧買今改水金史收國二年南路都統斡魯來見於巴喇密特水金史五國穆延部蘇頁叛遼景祖伐之蘇頁敗走巴喇密特濼時方十月冰忽解蘇頁不能軍衆潰去哲克依水金史瑪察尚據哲克依舊作直屋鎧今改水肅宗使太祖先取瑪察家屬康宗至哲克依水圍之太祖會軍親獲瑪察金史瑪察據哲克依水招之不聽太祖獲瑪察殺之刷水金史瑪察據哲克依水繕完營堡杜絶往來者恃屯水民為助使康宗伐之是嵗白山混同江大溢水與岸齊康宗自阿林岡乘舟至於刷舊作帥今改水舍舟沿刷水而進金史太祖以偏師伐尼瑪哈部沿刷水夜行襲之金史太祖伐尼瑪哈部刷水摩囉歡村平之金史景祖昭肅皇后刷水卾約村唐古部人金史唐古德溫傳唐古德溫本名阿里上京刷河人也布克坦水摩多圖水舍琿水特克水金史和諾克薩克達與布呼薩克蘇及混同江左右布克坦舊作匹古敦今改水北諸部兵皆會和諾克恃其衆有必勝之心摩多圖舊作波多吐今改水費摩部鄂博貝勒附世祖和諾克等縱火焚之金史世祖以偏師涉舍琿舊作舍狠今改水經特克舊作貼割今改水覆和諾克薩克達之家大霧晦冥迷失道至摩多圖水乃覺金史世祖破和諾克薩克達軍乘勝逐之自安巴灣至於北隘甸死者如仆麻摩多圖水為之赤矩威水圖塔水拜格河金史穆宗令矩威圖塔舊作主偎秃答今改兩水之民陽為阻絶鷹路畋於屯水見前而歸金史穆宗使蒲嘉努以遼賜給矩威圗塔之民且修鷹路而歸金史穆宗使矩威圖塔水人偽阻鷹路者且使言於遼平鷹路非己不可畋於屯水謂遼人曰吾平鷹路也遼史來賞之穆宗盡以其物與矩威圖塔之人金史天輔四年九月矩威水部錫勒哈達等叛命斡魯討之金史矩威水部錫勒哈達殺綽哈布古德斡魯討之綽哈宗室子招降矩威水部以功為穆昆布古德領行軍千戶至是同被害金史忠義傳布固德與綽哈俱招降矩威水部族天輔五年綽哈布固德往拜格河籍軍馬矩威水部殺綽哈布固德納琳河梅赫河音達琿河金史珠勒根穆都哩上京納琳河人也後徙咸平路梅赫河授世襲音達琿舊作寧打渾今改考金史屬昌州河穆昆金史烏凌噶暉傳第三子天錫世襲納琳河明安親管穆昆阿卜薩水金史諾延溫都思忠阿卜薩舊作阿補斯今改水人金史烏春阿卜薩水溫都部人沃稜濼舒吉濼金史收國元年遼駙馬蕭特默等將騎五萬步四十萬至沃稜舊作斡鄰今改濼上自將禦之還至舒吉舊作熟結今改濼有光見於矛端金史太祖未至鴨子河既夜方就枕若有扶其首者三寤而起曰神明警我也即鳴鼓舉燧而行黎明及河遼兵方壞陵道選壯士十輩擊走之大軍繼進遂登岸遼兵潰逐至沃稜濼布爾噶水金史始祖居完顔部布爾噶舊作僕斡今改水之涯和碩河金史章宗欽懷皇后富察氏上京路和碩舊作曷速今改河人也金史富察鼎夀上京和碩河人博勒和河金史布薩忠義上京博勒和舊作拔盧古今改河人金史德濟呼遜居博勒和水烏春兵出其間終拒而不從伊蘇河金史富察鄂倫上京伊蘇舊作益速今改河人蘇素海水金史圖克坦喀齊喀上京蘇素海水人也納爾琿河烏楞古河金史完顔薩哈上京納爾琿舊作納魯渾今改河人也其先居於烏楞古舊作兀冷窟今改河密齊顯河金史芬徹自上京密齊顯舊作梅堅今改河徙屯天德初為元帥府章京沃赫河金史天輔四年遼上京留守托卜嘉以城降壬戍次沃赫河烏濟赫水金史英悼太子葬興陵之側上送至烏濟赫舊作烏只黑今改水而還實霞庫河金史瓜爾佳扎拉隆州實霞庫舊作失撒古今改河人也納爾琿河金史瓜爾佳實訥隆州納爾琿舊作納魯悔今改河人也案此與上京之納爾渾當為兩河哈沙河金史世宗大定二十五年上次哈沙河賜百嵗老嫗帛金史布薩揆授臨潢府路哈沙河世襲明安烏爾呼河金史伊喇富森東北路烏爾呼舊作烏連苦今改河明安人烏魯斯哈珠水金史肅宗與和諾克薩克達戰於烏魯斯哈珠舊作斡魯紺出今改水已再失利世祖使希卜蘇先陳於托果原而身出搏戰敗其步軍海倫河金史世宗昭德皇后烏凌噶氏其先居海倫舊作海羅伊今改河德里必喇金史顯宗孝懿皇后圖克坦氏其先德里必喇人也實埓水金史赫舍哩部阿勒呼丹阻兵普嘉努以偏師夜行抵實埓舊作石勒今改水襲擊破之圖嚕庫水金史圖嚕庫水赫舍哩部阻五國鷹路遼詔穆宗討之伯奇圖河金史圖克坦克寧授世襲伯奇圖舊作不扎土今改河明安兼親管穆昆和琳河金史阿里布襲和囉噶圗明安和琳河穆昆成默水金史綽哈撫定成默舊作讒謀今改水拜格部長和索哩以城降博囉水金史天輔二年詔曰博囉舊作匹里今改水路完顔珠勒呼等六穆昆貧乏之人昔嘗給以官糧置之漁獵之地今厯日已久不知登耗可具其數以聞色辰水金史色埒默至色辰舊作斜寸今改水取先在烏春軍者二十二人博多和河金史烏雅和囉噶子五十六詔授武功將軍世襲本路博多和舊作婆朵火今改河穆昆必勒哈水金史和卓哈斯罕必勒哈舊作苾里海今改水人也授必勒哈水世襲明安珠卜奇水金史赫木頗珠卜奇舊作术吉今改水錫默部人也和倫水金史德克德父阿古岱世為和倫舊作胡論今改水部長南圖琿河金史瓜爾佳沃哩布南圖琿舊作暗土渾今改河人寧嘉河金史富珠哩定方寧嘉舊作內吉今改河人也音德爾水金史忠義傳特庫音德爾舊作雅撻瀾今改水人葉赫水金史葉赫水納哈塔部安扎與人爭部族官不得遂歸穆宗珊沁水金史珊沁舊作蟬春今改水烏雅部富哲固納畏烏春強請世祖出兵其間以為重阿里瑪河索歡河特通額水金史薩里罕察必達爾兄弟嘗冦扎蘭路穆宗遣博勒和討之至阿里瑪舊作阿里門今改河薩里罕偽降掠馬畜三百而去博勒和渡索歡舊作蘇衮今改河招降旁近諸部至特通額舊作特勝吳今改水察必達爾偽降復叛執而殺之伊勒呼水金史太宗天會二年海蘭路伊勒呼舊作移鹿古今改水霖雨金史海蘭路有伊勒呼水庫特呼河金史額哩頁咸平路庫特呼舊作窟吐忽今改河人雅哈河金史忠義傳納喇綽奇咸平路雅哈舊作伊改今改河明安人鄂爾和水金史高永昌率衆來拒遇於鄂爾和舊作沃里活今改水我軍既濟永昌之軍不戰而却逐北至東京城下案明志刪去原文沃里二字稱高永昌拒金兵於活水謂即渾河殊誤威泰必喇金史富察鄭留東京路威泰舊作斡底今改必喇明安人諤都河金史富察世傑哈斯罕諤都舊作斡篤今改河人德里川案此與德里必喇是否一水實不可考今兩存之金史天輔六年齋貝勒昱襲皮室部於德里舊作鐵吕今改川追至潢水壯大破之必爾罕水金史遼人來攻貝勒和索哩城阿里赴之破其衆於必爾罕舊作闢離罕今改水上水為之不流富埒赫哈爾吉水馬韓島凡十餘戰破數十萬衆契丹奚人聚舟千艘將入於海阿里以二十七舟邀之於是蘇復州博索路皆平伊瑪河約羅河金史世宗二十一年詔遣大興尹完顔托果斯遷河北東路兩明安上曰朕始令移此欲令女真戶相錯安置久則自相姻親不生異意此長久之利也今者伊瑪舊作移馬今改河明安相錯以居甚符朕意而約羅舊作遙落今改河明安不如此可按視其地以雜居之案此戶雖已遷仍以舊地為明安之名斜江元一統志斜江在遼陽縣東按圖册源自長白山南流經廢博索府東十里流入於海穩圖河明統志穩圖河在開原城東五百里源出坊州北山北流入松花江案今無此河名惟寧古塔城東北九百餘里有溫屯河南流入混同又州興京西有溫都河渾河俱不相合坊見疆域門河州條哈喇河明統志哈喇河在開原城東四百里源出長白山北松山東流合輝發江入松花江案吉林境內入輝發江之水頗多惟無哈喇河繅烏河明統志繅烏河在開原城東北五百七十里出建州東南山東北流合圖魯瑪河入松花江案河名無考你傳聞之誤謹按自弱水以下散見諸書而地難指實蓋譯對既易傳訛而今古亦多殊號即有稱名偶同者仍未敢據以為是並類附於後以備參稽其在前卷已因山附見者亦不復復敘云欽定滿洲源流考卷十五
