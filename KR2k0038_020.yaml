body:
  text: 國俗一謹案自肅慎氏楛矢石砮著于周初徴于孔子厥後夫餘挹婁靺鞨女真諸部國名雖殊而弧矢之利以威天下者莫能或先焉良由稟質厚而習俗醇騎射之外他無所慕故閲數千百年異史同辭信乎扶輿剛粹之氣鍾聚於兹所以啓王師無敵之先聲而緜國家億萬年克詰方行之盛有由然也至於崇禮讓重祭祀以及官制語言之屬史文所載均有可稽所謂東方多君子之國而尊君親上先公後私尤習尚之固然無庸勉強者也臣等謹立國俗一門首列騎射冠服次政教文字次祭祀典禮次官制語言而以物産雜綴終焉自肅慎以下比𩔖相從仍冠滿洲於簡端以著舊俗之相符合云滿洲我國家肇造大東敦龎之俗弧矢之威自古已然恭考實録我太祖髙皇帝以十三甲始申天討義問宏昭乙酉年哲陳之役太祖率近侍三人敗諸部八百人丙午年裴優之役我兵二百敗烏拉兵萬人至天命四年薩爾滸之戰以我衆數千殱明兵四十萬明之宿將鋭師一舉而盡我太宗文皇帝服朝鮮降䝉古松山杏山之㨗破明兵十三萬咸用少擊衆一以當千固由神武之姿出于天授賢臣猛将恊力同心亦我貙虎熊羆之士有勇知方騎射之精自其夙習而争先敵愾氣倍奮焉故也若夫禀性篤敬立念肫誠祀天祀神典禮綦重較古人執豕酌匏之風尤為謹凜至于冠服語言一遵舊制訏謨諄戒永切紹聞且自葉赫輝發烏拉哈達同一語音之國既先入版圖我太祖創製國書因心作則備極軌範太宗命巴克什達海等繙譯書籍庫爾禅等記注政事天聰六年諭達海増加圈㸃七年命記載諸臣詳加訂正同文之盛實肇于兹我皇上繼志述事朂循舊章諄諭八旗臣僕敦本率初罔弗躬先而申訓之凡夫崇勲偉績祭祀冠服語言文字之詳具載於欽定開國方畧滿洲祭神祭天典禮皇朝禮器圖式大清通禮清文鑑諸書所以嚴萬世之法守而鞏無疆丕丕基者燦然大備矣騎射御製恭瞻太祖髙皇帝所貽甲胄武庫三曾器龍樓十襲緹千年過合甲七屬鄙函犀仰烈誠天授思難敢志擕雄闗為近户安恃一丸泥御製恭瞻太宗文皇帝所御弧矢青莖如古直解角到今堅不禁秋霜感遐思寶月懸比和經手御似訓作心傳撻伐前猷在居歆總賴天御製再題實勝寺故老今何在祗園此尚存藉尋禽敵烈總為戴天恩臨汝心毋貳蠢兹氣已吞戎衣寰海定武噐再三捫是寺㳟藏弗能勝太太祖髙皇帝所御甲胄數人舉之而祖文皇帝所貽弓壯士弗能開矢長四尺餘亦曾皇祖聖祖仁皇帝留寶劍云繼序思皇祖貽庥逮耳孫綿綿𤓰有瓞億載永蟠根御製全韻詩尼堪外蘭者奸詭趁塊尨介於諸部間讒言恣紛哤嗾明害我祖罪魁李成梁叶引先是尼堪外蘭隂搆明寕逺伯李成梁兵攻古哷城主阿太章京及沙濟城主阿亥章京成梁授尼堪外蘭兵符率遼陽廣寕兵二路進成梁與遼陽副将分攻両城尋克沙濟城殺阿亥復合兵攻古哷城阿太章京妻䧟偕景祖女孫也景祖聞古哷兵警恐女孫被顯祖往救既至見成梁兵方接戰令獨入城欲擕女孫歸阿太不從顯祖俟于城外顯祖俟良久亦入城探之古哷守禦甚堅成梁攻之不能克因責尼堪外蘭起釁敗軍之罪尼堪外蘭懼至城大呼紿城中士卒殺阿太降成梁盡誘城中人出而屠之尼堪外蘭復搆明兵害景祖顯祖焉因報不共天興師征其邦特標七大恨告天天眷蒙叶震怒二祖為明所害我然往詰明邉吏曰太祖聞之大慟勃祖父何故被害汝等乃不共戴天之讐也明遣使謝曰非有意也誤耳乃歸二祖䘮太祖謂使臣曰害我祖父者尼堪外蘭所搆也必執以與我乃已明使不從且欲助之太祖益恨乃于天命三年以七大恨告明無天其畧曰我寸土端起釁害我祖父未嘗損明邉一草祖父恨一也明雖起釁我尚欲修好設碑勒誓彼此毋越疆圉越者見即誅之明復渝誓言逞兵越界衛助葉赫恨二也明人毎嵗踰疆攘奪我遵誓行誅明負前盟責我擅殺拘我廣寕使臣挾取十人殺之邉境恨三也明越境以兵助葉赫俾我已聘之女改適䝉古恨四也柴河三坌撫安三路我累世分守疆土之衆耕田藝穀明不容刈穫遣兵驅逐恨五也邉外葉赫獲罪于也昔天明偏信其言遣使遺書詬詈肆行凌侮恨六哈達助葉赫二次來侵我自報之已而天既授我哈達之人矣明又黨之脅我還其國哈達數被葉赫侵掠初呼倫諸國合兵侵我故葉赫天厭呼倫啓釁惟我是眷今明助天譴之抗天意倒置是非妄為剖㫁恨七也遂中人親統師征明撫順招降守城游擊李永芳徙城口以歸将駐營謝哩甸明兵一萬来追還撃敗之斬總兵張承廕副將頗廷相叅將蒲世芳逰撃梁汝貴等尋復攻克清河城守城副將鄒儲賢及兵萬人盡殱焉制書代結繩文教誨愚憃滿州初無字字改太祖命巴克什額爾徳尼噶蓋以䝉古制國書二臣以難辭太祖曰無難也以䝉古字合我國語音聫綴成句即可因文見義遂裁定國書頒行傳布定旗以八色武功赫駿厖先是我國出兵校獵各隨族黨屯寨而行毎人各出一矢十矢領以一長稱為牛录辛丑年以徠服人衆編三百人為一牛录其長稱牛录額真乙夘年設甲喇額真轄五牛录又設固山額真轄五甲喇左右設兩梅勒額真初設黄白紅藍四旗後參用其色鑲之共為八旗以次平諸部遂逮松花江松阿哩烏拉國語謂天漢江即漢文所謂松花江是烏拉貝勒布占泰所據地也於癸巳年被擒至癸丑年滅其部肘腋患既除疆場漸拓張叶年己亥滅哈達丙午滅輝發巳未滅葉赫於是境壌日益恢廓矣遼陽駐明軍望之心已降右太祖興師征明二十萬衆明興師號稱丗萬威臨之兵分四路各出竒並趨興京力不遺己未二月明帝命經畧楊鎬等統兵二十萬號四十萬來攻左翼中路以杜松王宣趙夢麟張銓督兵六萬由渾河出撫順闗右翼中路以李如栢賀世賢閻鳴泰督兵六萬由清河出鴉鶻関左翼北路以馬林麻岩潘宗賢督兵四萬由開源合葉赫兵出三岔口右翼南路以劉綎康應乾督兵四萬合朝鮮兵出寛甸口期並趨我興京太祖聞報初弗疑應之以暇安其危堂堂陣復正正旗藎臣志同太宗辭三月朔我西南両路偵卒以明兵逼境告南也太祖曰明使我先見南路有兵者誘我兵而其由撫順西來者必大兵急冝拒戰乃率大貝勒代善及衆貝勒大臣統城中兵出大貝勒前行偵卒又以明兵出清河路來告大貝勒曰清河路仄兵未能驟至冝先往撫順以逆敵兵遂與達爾漢侍衛扈爾漢集兵以待事後太祖時貝勒太宗文皇帝稱在界四貝勒以祀至謂大曰我築城夫役藩山倘明兵奮力攻之柰何冝急進以安其心于是令軍士擐甲趨至太蘭岡大貝勒與扈爾漢欲駐兵僻地以伺以僻太宗曰正冝耀兵示敵壯我士卒夫役之膽何為巴勒魯額亦都曰四貝勒之言是也我兵當堂堂正正以向敵遂督兵赴界藩對明兵營列陣而待父子兄弟同努力叶子弟之兵左右隨人自為戰如熊羆快馬斫陣殱厥魁呌殭尸流若雁鶩靡叶衛先是我防築城之兵見杜松等兵過将半尾追之與夫役合㨿界藩之吉林崖杜松引兵來攻我兵下擊一戰而斬百人我衆貝勒甫至見明兵攻吉林崖者約二萬人又一軍列薩爾滸山巔遥為聲勢大貝勒與諸将議遣兵千人往助防衛兵馳下壓擊而以右翼四旗夾攻之别以左翼四旗當薩爾滸山之兵太祖至復令右二旗兵遥望界藩明兵俟我兵馳下時并力以戰乃合六旗兵進攻薩爾滸山明兵列陣發鎗礮我兵仰射之奮力衝擊不移時破其營壘死者相枕籍而夾攻界藩之兵縱横馳突無不一當百遂大破其衆明總兵杜松王宣趙夢麟皆歿於陣横屍亘山野血流成渠士卒死者蔽渾河而下如流凘時馬林兵四萬夜營於尚間崖翼旦大貝勒以三百騎馳往馬林濬壕三匝外列火器繼列騎兵又開原道潘宗顔一軍約萬人營斐芬山㳺擊龔念遂李希泌亦率兵萬餘營於幹琿鄂謨環車楯列火器太祖與太宗所率兵不滿千分其半下馬歩戰明兵發火器以拒太宗引騎士衛入我歩兵所其車楯明兵又大敗龔念遂李希泌皆陣殁五人至尚間崖明兵方布陣太祖急引侍從四太祖趣我軍先㨿山巔下擊衆方欲登山而馬林營内及壕外兵合其太祖今我軍下馬歩戰大貝勒怒馬迎敵直入陣二貝勒阿敏三貝勒莾古爾泰與衆台吉各鼓勇奮進遂敗明兵斬捕無算我六旗兵亦人自為戰飛矢利刃所向無前明兵不能支大敗而遁我兵乘勝追擊明副将麻岩及大小将士皆陣歿總兵馬林僅以身免葉赫太祖復集軍士馳攻斐芬山潘宗顔全軍盡歿貝勒錦台什布楊古聞明兵敗大驚遁去時劉綎李如栢両路之兵已近逼興京禦劉太祖至命大貝勒三貝勒及我太宗統軍綎而留兵四千於都城待李如栢等率精太宗同両貝勒兵甫出瓦岡喀什窩集劉綎所鋭二萬已分其半前掠将登阿布達哩岡前督太宗告大貝勒曰兄統大兵留此相機為援吾兵登岡自上下擊之大貝勒亦與出衆太宗約左右夾擊戰甚太宗遂引精騎三十超前自山馳下擊之酣後軍遂衝突而入大貝勒又率兵夾攻明兵大潰綎戰太宗乘勝追擊與劉綎遇殱其兩營兵萬人劉死是時明海葢康應乾與朝鮮兵營於富察之野甲仗堅鋭太宗同衆貝勒至督兵進攻明兵朝鮮兵競發火器忽大風驟作揚沙走石烟塵反撲敵營我軍乘之飛矢如雨又大破其衆殱二萬人康應乾遁去㳺擊喬一𤦺奔朝鮮我兵逐之朝鮮元帥姜功烈詣營降一琦自縊死楊鎬聞三路兵敗急檄總兵李如柏副將賀世賢等還軍如柏等自呼蘭路遁歸我哨兵二十人見而鳴螺呼噪下擊殺四十人明兵奪路而走相蹂踐死者復千餘破廿萬兵弗踰時其詳則見書事詞是役也明兵二十萬四路來侵我兵以少擊衆所向克捷五日之間悉為我軍誅滅其宿将猛士暴骸骨於外士卒死者不啻十餘萬而我士卒僅損二百人此誠上天佑助神武昭宣我國家億萬載丕基實肇乎此詳見向所作薩爾滸之戰書事篇恨不行間供驅馳薩爾滸戰王業基用示百世綿本支右太祖破明四路兵射獵習軍旅國俗舊弗違以此善攻戰諸部讋武威我祖常冬狩雪霽餘濘泥徒步過岡原因之行擷衣侍衛相竊語何用愛此為聞而笑諭曰寧之慳斯微要當崇節儉物力惜應思設解賜爾輩完潔豈弗宜衆乃服盛徳躬行化在兹霑濡太祖嘗出獵雪初霽恐草上浮雪擷衣而行侍衛等私語曰上何所不有而惜一衣耶衣賜太祖聞之笑曰吾豈為無衣而惜之吾常以汝等與其被雪霑濡何如鮮潔為愈躬行節儉微物必惜汝等正當效法耳敝袴待有功韓侯誠小哉叶允合示家法奕葉恒遵依右太祖擷衣行獵春蒐復秋獮豈不戒虞箴惟切覲揚志寧辭嵗月侵必克皇祖以我朝素嫻騎射故能戰必勝攻且深念祖宗創業艱難而開國諸臣亦皆勇果無敵由於所習之精勤也恐承平日乆人或貪安逸而忘本務是以常舉行圍之典自康熙壬戌以迄壬寅或近在獵於邉墻或或三田於塞外幾無虚嵗而南苑城南尺五嵗四莅焉凡以長治講武習勞景深逺前徽而敦舊俗為國家乆安計者至也多能固天縱二把皇祖神勇天錫及者力能挽强並用十長箭臣下罕有曾見聖諭且矢無虚發圍中射鹿率多貫脇洞胸即猛如虎健如熊捷如兔亦往往壹發殪之久道仰君臨避暑山莊闢受恩予最深戊子始構避暑山莊於熱河自是嵗以四五月駐蹕秋則蒐狩木蘭孫臣十二嵗時䝉見恩眷養育宫中扈從山莊日侍習射左右親皇祖披閲奏章引見官吏宫門諸事敬識之不敢忘及至木蘭中承念及恩慈愛䕶而期許者尤出諸孫之右至今毎一輒為淚下曽於事賜居之萬壑松風榜曰紀晏寧恩堂作記以誌其所以凜遵無逸不敢駐山莊而勤政敕幾幸木蘭而先勞肄武以至優撫藩部柔懐逺人無一非追憶見聞率循成憲承祖志即期以報恩耳祖右聖祖行圍講武謹案我朝騎射精嫻所向無敵列祖列宗神勇天錫尤亘古所未聞猶恐臣民日乆稍忘故風復時時諄諭及之我皇上紹聞繩武是闡是行備見於御製詩中葢大訓所存非僅陳土風已也臣等謹録冠肅慎諸條之前以著萬世家法所自云周國語有隼集於陳侯之庭楛矢貫之石砮其長尺有咫仲尼曰隼之來也逺矣此肅慎民之矢也漢後漢書夫餘國善射其人彊勇而謹厚以弓矢刀矛為兵後漢書挹婁國衆雖少而多勇力又善射發能入人目弓長四尺力如弩矢用楛長一尺八寸青石為鏃案國語所稱長尺有咫者指石鏃而言而後漢書以下乃皆云矢長尺八寸夫以四尺之弓而矢僅尺餘恐無是理後漢書馬韓其人壯勇後漢書東沃沮人性質直彊勇便持矛歩戰後漢書濊能歩戰作矛長三丈或數人共持之三國三國志夫餘其人强勇謹厚以刀矛弓矢為兵家家自有鎧仗三國志挹婁人多勇力其弓長四尺力如弩矢用楛長尺八寸青石為鏃善射射人皆入目其人衆雖少隣國畏其弓矢卒不能服三國志馬韓其人性强勇弁韓便歩戰兵仗與馬韓同晉晉書肅慎氏一名挹婁有石弩皮骨之甲檀弓三尺五寸楛矢長尺有咫晉書夫餘國其人强勇晉書馬韓性勇善用弓楯矛櫓雖有攻戰而貴相屈服弁韓其風俗類馬韓兵器亦與之同通考挹婁處山險善射中人即死隣國畏其弓矢南北朝魏書勿吉其人勁悍善射弓長三尺箭長尺二寸以石為鏃案此云箭長尺二寸蓋沿後漢書之誤周書百濟兵有弓箭刀矟俗重騎射北史夫餘王子朱蒙善射王狩于田以朱蒙善射給一矢殪獸甚多北史新羅甲兵同於中國選人壯健者悉入軍烽戍邏俱有屯管部伍風俗刑政與百濟同毎八月十五日設樂令官人射賞以馬布北史勿吉勝兵數千多驍武黑水部尤勁矢皆石鏃人皆善射以射獵為業通考新羅八月望日大宴官吏射其庭畜牧海中山須食乃射隋隋書百濟俗尚騎射隋書新羅風俗與百濟同括地志靺鞨人多勇力善射弓長四尺如弩矢用楛青石為鏃通考勿吉國其人勁悍常輕豆莫婁諸國其粟末部勝兵數千多驍武伯咄部勝兵七千安車骨拂涅號室黒水白山五部勝兵並不過三千而黒水部尤為勁健自拂湼以東矢皆石鏃最為强國人皆善射常以七八月造藥傳矢以射禽獸中者立死隋開皇初文帝詔其使曰朕聞彼土人勇今來實副朕懐厚勞之令宴飲於前使者與其徒起舞曲折多戰鬭容唐舊唐書黒水靺鞨處北方最稱勁健兵器有角弓及楛矢渤海靺鞨勝兵數萬人渤海王大祚榮驍勇善用兵新唐書黑水靺鞨人勁健善步戰射獵其矢石鏃長二尺蓋楛砮遺法册府元龜唐龍朔三年百濟西部人黒齒常之來歸常之長七尺餘驍勇有謀畧五代五代史黒水靺鞨其兵角弓楛矢五代會要黒水靺鞨處北方尤稱勁健兵器有角弓楛矢遼通考契丹主嘗攻女真女真衆裁萬人而弓矢精勁契丹引去大為山林之兵掩襲殺戮契丹國志女真其人朴勇每出戰皆被重扎精於騎射從古以來無盗賊詞訟之事契丹國志渤海國男子多智勇有三人渤海當一虎之語松漠紀聞渤海男子多智謀驍勇出他國右契丹太祖徙其名帳千餘户于燕有戰則用為前驅金金史女真舊無鐡鄰國有以甲胄來鬻者景祖傾貲厚價以與貿易亦令昆弟族人皆售之得鐡既多因之以修弓矢備器械兵勢稍振金史遼主命穆宗討蕭哈里滿洲語有水寛甸處也舊作海里今改正募軍得甲千餘女真甲兵之數始見於此葢未嘗滿千也至是太祖勇氣自倍曰有此甲兵何事不可圖渤海留守以甲贈太祖太祖不受曰被彼甲而勝則是因彼成功也是時遼追哈里兵數千人攻之不能克穆宗謂遼将曰退爾軍我獨當取哈里太祖策馬突戰流矢中哈里首墮馬執而殺之大破其軍金人自此知遼兵之易與也金史太祖十嵗好弓矢甫成童即善射嘗南望髙阜一發過之度所至諭三百二十歩天徳三年立射碑以識焉金史太祖始伐遼徴諸路兵得二千五百人遼将耶律色實滿洲語麺條餑餑也舊作謝十今改政墮馬遼人前救太祖射救者斃併射色實飲矢之半有突騎前又射之徹札洞胸太祖免胄而戰或自傍射之矢拂於顙太祖顧見射者一矢而斃謂将士曰盡敵而止衆從之勇氣自倍敵大奔蹂踐死者十七人遼蕭嘉哩等将歩騎十萬會鴨子河太祖自将擊之甲士三千七百至者纔三之一俄與敵遇會大風起乘風擊之遼兵潰遼人嘗言女真兵若滿萬則不可敵至是始滿萬云金史遼帝自将七十萬自圖們西還太祖兵止二萬追及之使右翼先戰兵數交左翼合而攻之遼兵大潰我師馳之横出其中遼師敗績金史世宗善騎射國人推為第一每出獵耆老隨而觀之金史世宗謂宰臣曰會寧乃國家興王之地自海陵遷都女真人寖忘舊風非長久之計甚欲一至會寧使子孫見舊俗庶幾效習之二十二年勅西北路招討司勒明安穆昆官督部人習武備又謂右丞相原王曰爾嘗讀太祖實録乎太祖征瑪展滿洲語大披箭也舊作麻産今改正襲之至泥淖馬不能進太祖捨馬而步罕都滿洲語稻也舊作歡都今改正射中瑪展遂擒之創業之難如此可不思乎又謂宰臣曰西南西北兩路招討司地隘明安人戸無處圍獵不能嫻習騎射委各明安穆昆官依時教練金史兵志金興用兵如神戰勝攻取無敵當世俗本鷙勁人多沈雄兄弟子姪才皆良將部落保伍技皆鋭兵無事耕可給衣食有事戰可致俘獲勞其筋骨以能寒暑徵發調遣事同一家是故將勇而志一兵精而力齊通考女真俗勇善射能為鹿鳴以呼羣鹿而射之按今哨鹿之制以本為哨具又象鹿之首戴之使鹿不疑惟精於獵者能之詳見御製哨鹿賦大金國志女真人善騎射耐饑渴苦辛騎上下崖壁如飛濟江河不用舟楫浮馬而渡大金國志金都會寧四時皆獵燕都城外皆民田三時無地可獵候冬月則出出必踰月毎獵則以隨駕軍宻布四圍名曰圍塲大金國志金國凡用師征伐上自大元帥中自萬户下至百户飲酒會食畧不間别與父子兄弟等所以上下情通無閉塞之患國有大事適野環坐畫灰而議自卑者始議畢即漫滅之不聞人聲軍將行大會而飲使人獻策主帥聴而擇焉其合者即為特將任其事暨師還戰勝又大會問有功者隨功髙下支賞舉以示衆衆以為薄則増之北盟録女真用兵以戈為前行號曰硬軍人馬皆全甲刀棓自副弓矢在後設而不發非五十歩不射弓力七斗箭鏃至六七寸形如鑿入輒不可出隊伍之法五長擊柝十長執旗百長挾鼓千人長則旗幟金鼓悉備將自執旗人視所向而趨自主帥至歩卒皆自控馬每五十人為一隊前二十人全裝重甲持棍槍後三十人輕甲操弓矢遇敵必有一二人躍馬而出先觀敵陣之虚實或向其左右前後結隊而馳擊之百歩之内弓矢齊發中者常多其分合出入應變若神北盟録女真善騎上下崖壁如飛精射獵每見巧獸之蹤能躡而推之淂其潛伏之所以樺皮為角吹作呦呦之聲呼鹿射之馬擴茆齋自叙擴隨金主打圍自拉林河東行毎旦金主於積雪中以一虎皮背風而坐諸將各取所佩箭一枝擲占逺近各隨所占左右上馬軍馬皆單行每騎相去五七歩接續不絶兩頭相望常及一二十里候放圍盡金主上馬去後隊一二里立認旗以行兩翼騎兵視旗進趨凡野獸自内赴外者四圍得迎射外赴内者湏主將先射凡圍如箕掌徐進約三四十里近可宿之處即兩梢合圍漸促湏臾作二三十匝野獸迸走或射或擊盡斃之取火炙㗖騎散之宿處金主言我國中最樂無如打圍其行軍布陣大概出此冠服御製長寧寺恭瞻太宗所貽冠服二首羮牆有志難為覩冠服重瞻仰聖靈應現吉祥雲作盖千秋萬載䕶長寧戎衣汗馬躬勞苦繼述常懷烈祖靈儉樸心欽發篋始微言那藉李邦寧按元史大安閣中有故篋李邦寕對云此世祖所遺裘帶有聖訓曰藏此使見吾樸儉云云御製全韻詩觀史知治亂匪詡文藻彬常稱金世宗不愧賢君真熙宗廢舊制海陵荒樂頻大定奮法祖勤求治理臻衣服及語言一惟舊制遵雖垂訓如此後世忘其諄乃知耽酒色無不致亡淪又如達海輩屢勸易衣冠叶不從謂拒諫比喻曉諸臣寛衣大袖坐勞薩忽挺身其孰能禦之何異尚左人在朕豈變更所以示子孫叶煌煌祖訓昭世守應無悛叶卧碑勒箭亭乾隆壬申春崇徳元年十一月命内太宗御翔鳯樓集諸王貝勒八旗大臣等曰𢎞文院大臣讀大金世宗本紀諭衆爾等審聴之世宗者䝉古漢人諸國聲名顯著之賢君也故當時後世咸稱為小堯舜朕披覧此書悉其梗㮣殊覺心往神馳耳目倍加明快不勝歎賞朕思金太祖太宗法度詳明可垂乆逺至熙宗合喇及完顔亮之世盡廢之耽于酒色盤樂無度效漢人之陋習世宗即位奮圖法祖勤求治理惟恐子孫仍效漢俗預為禁約屢以無忘祖宗為訓衣服語言悉遵舊制時時練習騎射以備武功雖垂訓如此後世之君漸至懈廢忘其騎射至于哀宗社稷傾危國遂滅亡乃知凡為君者耽于酒色未有不亡者也先時儒臣巴克什達海庫爾禪屢勸朕改滿洲衣服效漢人服飾制度朕不從輒以為朕不納諫朕試設為比喻如我等于此聚集寛衣大袖左佩矢右挾弓忽遇碩翁科羅巴圖魯勞薩挺身突入我等能禦之乎若廢騎射寛衣大袖待他人割肉而後食與尚左手之人何以異耶朕發此言實為子孫萬世之計也在朕身豈有變更之理恐日後子孫忘舊制廢騎射以效漢俗故常切此慮耳我國士卒初有幾何因嫻于騎射所以野戰則克攻城則取天下人稱我兵曰立則不動京摇進則不回顧威名震懾莫與争鋒此番往征燕出邊我之軍威竟為爾八大臣所累矣故諭及爾等其謹識朕言乾隆十七年春因恭讀太宗實録敬述此遵聴諭立卧碑子箭亭鎸示子孫臣庶使皆毋忘以綿我國家億載丕緒右太宗訓守冠服騎射舊制謹按我朝冠服制度法守攸闗尤與騎射舊俗為便太宗文皇帝睿慮深逺反覆申諭迥非當時達海諸臣所能仰窺萬一皇上述訓垂謨昭示億載洵乎先後聖之揆一也臣等恭録聖製用鋕遵循仍以各史所載條繫於後以備考核焉漢後漢書馬韓布袍革履弁辰衣服潔清三國三國志夫餘在國衣尚白白布大袂袍袴履革鞜出國則尚繒繡綿罽大人加狐哩狖白黒貂之裘以金銀餙冒三國志馬韓其俗好衣幘下户朝謁皆假衣幘自服印綬衣幘千有餘人以瓔珠為財寶或以綴衣為飾衣布袍足履革蹻蹋弁辰衣服潔清晉晉書夫餘國出使乃衣錦罽晉書馬韓貴瓔珠用以綴衣衣布袍履革蹻南北朝魏書勿吉男子皮裘婦人布裙周書百濟六品以上冠飾銀華七品紫帶八品皂帶九品赤帶十品青帶十一品十二品皆黄帶十三品至十六品皆白帶若朝拜祭天其冠兩廂加翅戎事則否婦人衣似袍而袖微大南史百濟衣服潔浄北史新羅服色尚畫素唐舊唐書百濟國其王服大袖紫袍青錦袴烏羅冠金花為飾素皮帶烏革履官人盡緋為衣銀花飾冠庻人不得衣緋紫新唐書新羅男子褐袴冒以黒巾婦人長襦新唐書渤海以品為秩三秩以上服紫牙笏金魚五秩以上服緋牙笏銀魚六秩七秩淺緋衣八秩緑衣皆木笏五代五代會要新羅朝服尚白契丹國志新羅國服色尚素金金史世宗謂大臣曰國初風俗淳儉居家帷布衣非大㑹賔客未嘗輒烹羊豕二十七年禁女真人不得改稱漢姓及學南人衣裝犯者抵罪金史輿服志金人之常服四帯巾盤領衣烏皮靴其束帯曰陶罕滿洲語帯餙也舊作吐鶻今改止巾之制以皂羅若紗為之其衣色多白三品以皂窄袖盤領縫腋下為襞積而不缺袴其胷臆肩袖或餙以金繡其從春水之服則多鶻捕鵞雜花卉之餙其從秋水之服則以熊鹿山林為文其長中骭取便於騎也陶罕玉為上金次之犀象骨角又次之銙周小者間置於前大者施於後左右有雙䤩尾納方束中其刻琢多如春水秋山之餙左佩牌右佩刀刀貴鑌尚雞舌木黄黒相半有黒雙距者為上或三事五事寳飾以醬瓣樺􅝑口飾以鮫或屑金鍮和漆塗鮫隙而礲平之醬瓣樺皮斑文色殷紫如醬中豆瓣也産其國故尚之女真人不得學南人裝束北盟録女真地極寒衣黒裘細布貂鼠青鼠狐貉之衣大金國志金俗好衣白自滅遼臣宋漸有文飾至於衣服尚如舊俗貴賤以布之粗細為别富人春夏多以紵絲綿紬為衫裳亦間用細布冬以貂鼠青鼠狐貉皮或羔皮為裘或作紵絲紬絹秋冬亦衣羊皮或獐鹿皮為衫袴襪皆以皮謹案白山黒水風氣質純騎射之精嫻士卒之勇果自肅慎以下史傳所載皆同至於用兵若神人自為戰如金史所稱兄弟子姪才皆良將部落保伍技皆鋭兵徴發調遣事同一家者尤與我朝俗尚相近故能風馳電掃所向無前所謂子弟之衛父兄手足之捍頭目猶未足盡其形容矣至冠服與騎射相需為用肅慎夫餘制度簡質新羅渤海漸事文飾金興而返質還淳務從其朔金世宗申禁國人不得學南人装束誠以故俗不可忘而於習武誠為利便我朝冠服之制不必盡與金同而便於騎射視金史所載尤為過之洵億萬世所當遵守也欽定滿洲源流考卷十六
