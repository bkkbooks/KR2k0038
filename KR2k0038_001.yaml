  text: 欽定四庫全書欽定滿洲源流考
  hash: sha256:26a39ef76dfa19b8de46142a301cd710c4c9bdd1318158336cdb6108c4e5630b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0038_WYG_001-1a, image: WYG0499/WYG0499-0451a.png}
body:
  text: 乾隆四十二年八月十九日内閣奉上諭頃閲金史世紀云金始祖居完顔部其地有白山黒水白山即長白山黒水即黒龍江本朝肇興東土山川鍾毓與大金正同史又稱金之先出靺鞨部古肅慎地我朝肇興時舊稱滿珠所屬曰珠申後改稱滿珠而漢字相沿訛為滿洲其實即古肅慎為珠申之轉音更足徴疆域之相同矣又後漢書三韓傳謂辰韓人兒生欲令頭匾押之以石夫兒初墮地豈堪以石押頭其説甚悖于理國朝舊俗兒生數日置卧具令兒仰寝其中久而腦骨自平頭形似匾斯乃習而自然無足為異辰韓或亦𩔖是范蔚宗不得其故曲為之觧甚矣其妄也若夫三韓命名苐列辰韓馬韓弁韓而不詳其義意當時三國必有三汗各統其一史家不知汗為君長之稱遂以音同誤譯而庸鄙者甚至訛韓為族姓尤不足當一噱向曽有三韓訂謬之作惜未令人盡讀之而共喻耳若唐時所稱雞林應即今吉林之訛而新羅百濟諸國亦皆其附近之地顧昔人無能考証者致明季狂誕之徒尋摘字句肆為詆毁此如桀犬之吠無庸深較而舛誤之甚者則不可以不辨若夫東夷之説因地得名如孟子稱舜東夷之人文王西夷之人此無可諱亦不必諱至于尊崇本朝者謂雖與大金俱在東方而非其同部則所見殊小我朝得姓曰愛新覺羅氏國語謂金曰愛新可為金源同派之証盖我朝在大金時未嘗非完顔氏之服屬猶之完顔氏在今日皆為我朝之臣僕普天率土統于一尊理固如斯也譬之漢唐宋明之相代豈皆非其勝國之臣僕乎又有云我祖宗時曽受明龍虎将軍封號亦無足異我朝初起時明國尚未削弱因欲與我修好借此以結兩國之歡我朝固不妨為樂天保世之計迨我國聲威日振明之綱紀日隳且彼妄信讒言潜謀戕害于是我太祖赫然震怒以七大恨告天興師報復自薩爾滸松山杏山諸戰大敗明兵明人欲與我求和斥而不許彼尚安能輕侮我朝乎且漢髙乃秦之亭長唐祖乃隋之列公宋為周之近臣明為元之百姓或攘或侵不復顧惜名義若我朝乃明與國當闖賊擾亂明社既移之後吴三桂迎迓王師入闗為之報讐殺賊然後我世祖章皇帝定鼎燕京統一寰㝢是得天下之堂堂正正孰有如我本朝者乎至若我國家誕膺天眷朱果發祥亦如商之元鳥降生周之髙禖履武紀以為受命之符要之仍係大金部族且天女所浴之布勒瑚里池即在長白山原不外白山黒水之境也又金世紀稱唐時靺鞨有渤海王傳十餘世有文字禮樂是金之先即有字矣而本朝國書則自太祖時命額爾徳尼巴克什等遵製通行或金初之字其後因式㣲散佚遂爾失傳至我朝復為剏造未可知也他如建州之沿革滿洲之始基與夫古今地名同異并當詳加稽考勒為一書垂示天下萬世着派大學士阿桂于敏中侍郎和珅董誥悉心檢覈分條編輯以次呈覽候朕親加釐定用昭傳信而闢羣惑並将此通諭知之欽此
